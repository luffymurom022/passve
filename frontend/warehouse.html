<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SafePass — Warehouse Network</title>
<style>
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#141921;--card:#111720;--card2:#161e2a;
  --border:#1e2a3a;--border2:#243042;
  --brand:#3d8ef8;--brandL:rgba(61,142,248,.08);--brandM:rgba(61,142,248,.18);
  --ok:#34d89e;--okBg:rgba(52,216,158,.08);
  --warn:#f59e0b;--warnBg:rgba(245,158,11,.08);
  --red:#f0566a;--redBg:rgba(240,86,106,.08);
  --purple:#9b87f5;--purpleBg:rgba(155,135,245,.08);
  --cyan:#00e5ff;--cyanBg:rgba(0,229,255,.07);
  --gold:#fbbf24;--goldBg:rgba(251,191,36,.08);
  --sub:#8892a4;--hint:#4a5568;--txt:#e2e8f0;
  --glow:0 0 20px rgba(61,142,248,.25);
  --radius:14px;--radius-sm:9px;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;}
button{cursor:pointer;font-family:var(--font);}
input,select,textarea{font-family:var(--font);}
a{color:var(--brand);}

.app{max-width:1200px;margin:0 auto;padding:0 16px 80px;}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(7,9,15,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-txt{font-size:18px;font-weight:800;color:var(--txt);}
.logo-txt span{color:var(--brand);}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--sub);font-size:13px;font-weight:600;transition:all .2s;}
.back-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brandL);}
.spacer{flex:1;}
.user-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:20px;background:var(--card);border:1px solid var(--border);font-size:13px;font-weight:600;}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}

/* TABS */
.tabs{display:flex;gap:4px;padding:16px 0 4px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:9px 18px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--sub);font-size:13px;font-weight:600;white-space:nowrap;transition:all .2s;}
.tab:hover{color:var(--txt);background:var(--card);}
.tab.active{background:var(--brandM);border-color:rgba(61,142,248,.3);color:var(--brand);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.card-title{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px;}

/* GRIDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:700px){.grid2{grid-template-columns:1fr;}.grid3,.grid4{grid-template-columns:1fr 1fr;}}
@media(max-width:440px){.grid3,.grid4{grid-template-columns:1fr;}}

/* STAT BOXES */
.stat-box{padding:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);text-align:center;}
.stat-box .s-val{font-size:24px;font-weight:900;font-family:var(--mono);}
.stat-box .s-lbl{font-size:11px;color:var(--sub);margin-top:3px;font-weight:600;}
.stat-box .s-sub{font-size:10px;color:var(--hint);margin-top:2px;}

/* WAREHOUSE CARDS */
.wh-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;transition:border-color .2s;cursor:pointer;
}
.wh-card:hover{border-color:var(--border2);}
.wh-card.active{border-color:var(--brand);background:var(--brandL);}
.wh-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.wh-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.wh-name{font-size:15px;font-weight:800;margin-bottom:2px;}
.wh-addr{font-size:12px;color:var(--sub);line-height:1.4;}
.wh-capacity{margin-top:8px;}
.cap-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;}
.cap-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ok),var(--brand));transition:width .5s;}
.cap-fill.warn{background:linear-gradient(90deg,var(--warn),var(--red));}

/* STATUS CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.chip-ok{background:var(--okBg);color:var(--ok);border:1px solid rgba(52,216,158,.2);}
.chip-warn{background:var(--warnBg);color:var(--warn);border:1px solid rgba(245,158,11,.2);}
.chip-brand{background:var(--brandL);color:var(--brand);border:1px solid rgba(61,142,248,.2);}
.chip-purple{background:var(--purpleBg);color:var(--purple);border:1px solid rgba(155,135,245,.2);}
.chip-red{background:var(--redBg);color:var(--red);border:1px solid rgba(240,86,106,.2);}
.chip-muted{background:var(--bg3);color:var(--hint);border:1px solid var(--border);}
.chip-cyan{background:var(--cyanBg);color:var(--cyan);border:1px solid rgba(0,229,255,.2);}
.chip-gold{background:var(--goldBg);color:var(--gold);border:1px solid rgba(251,191,36,.2);}

/* INVENTORY ROW */
.inv-row{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--card2);margin-bottom:8px;cursor:pointer;transition:border-color .2s;
}
.inv-row:hover{border-color:var(--border2);}
.inv-icon{width:38px;height:38px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.inv-info{flex:1;}
.inv-name{font-size:13px;font-weight:700;}
.inv-meta{font-size:11px;color:var(--sub);margin-top:2px;}
.inv-sku{font-family:var(--mono);font-size:10px;color:var(--hint);}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;border:none;transition:all .2s;}
.btn-primary{background:var(--brand);color:#fff;}
.btn-primary:hover{background:#2d7de8;box-shadow:var(--glow);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--sub);}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand);}
.btn-ok{background:transparent;border:1px solid rgba(52,216,158,.35);color:var(--ok);}
.btn-ok:hover{background:var(--okBg);}
.btn-danger{background:transparent;border:1px solid rgba(240,86,106,.35);color:var(--red);}
.btn-danger:hover{background:var(--redBg);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-xs{padding:4px 9px;font-size:11px;}

/* FORM FIELDS */
.field-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px;}
.field-input{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--txt);font-size:13px;transition:border-color .2s;outline:none;}
.field-input:focus{border-color:var(--brand);}
.field-input::placeholder{color:var(--hint);}
textarea.field-input{resize:vertical;min-height:70px;line-height:1.6;}
select.field-input option{background:var(--bg3);}

/* MAP GRID */
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin-top:10px;}
.map-cell{
  aspect-ratio:1;border-radius:7px;border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:10px;cursor:pointer;transition:all .15s;background:var(--card2);
  font-weight:700;gap:2px;
}
.map-cell.empty{border-color:var(--border);color:var(--hint);}
.map-cell.occupied{background:var(--brandL);border-color:rgba(61,142,248,.3);color:var(--brand);}
.map-cell.reserved{background:var(--warnBg);border-color:rgba(245,158,11,.3);color:var(--warn);}
.map-cell.maintenance{background:var(--redBg);border-color:rgba(240,86,106,.3);color:var(--red);}
.map-cell:hover{transform:scale(1.06);}

/* FEE TABLE */
.fee-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:10px;align-items:center;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card2);margin-bottom:6px;font-size:13px;}
.fee-row .f-lbl{font-weight:700;}
.fee-row .f-val{font-family:var(--mono);text-align:right;font-size:12px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-close{margin-left:auto;background:transparent;border:none;color:var(--hint);font-size:18px;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none;background:var(--card);border:1px solid var(--border);color:var(--txt);box-shadow:0 8px 32px rgba(0,0,0,.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(52,216,158,.4);color:var(--ok);}
.toast.err{border-color:rgba(240,86,106,.4);color:var(--red);}
.toast.info{border-color:rgba(61,142,248,.4);color:var(--brand);}

/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ANALYTICS */
.progress-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--hint);}
.empty .e-icon{font-size:40px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.6;}

/* TRANSFER STEP */
.transfer-arrow{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:13px;font-weight:600;color:var(--sub);}
.transfer-arrow span{color:var(--txt);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease both;}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="header">
    <a href="/" class="logo">
      <svg width="30" height="30" viewBox="0 0 64 64" fill="none"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00f5ff"/><stop offset="40%" stop-color="#4f8ef7"/><stop offset="100%" stop-color="#9b87f5"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="#030912"/><path d="M32 8L52 17L52 37Q52 52 32 58Q12 52 12 37L12 17Z" fill="rgba(0,245,255,.04)" stroke="url(#g)" stroke-width="1.5"/><text x="32" y="38" text-anchor="middle" font-size="14" font-weight="800" fill="url(#g)" font-family="JetBrains Mono,monospace">SP</text></svg>
      <span class="logo-txt">Safe<span>Pass</span></span>
    </a>
    <button class="back-btn" onclick="history.back()">← Quay lại</button>
    <div class="spacer"></div>
    <div class="user-chip">
      <div class="avatar" id="userAvatar">?</div>
      <span id="userName">Đang tải...</span>
    </div>
  </div>

  <!-- HERO -->
  <div style="padding:28px 0 4px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
      <span style="font-size:26px;">🏭</span>
      <h1 style="font-size:24px;font-weight:900;">Warehouse Network</h1>
      <span style="padding:3px 10px;border-radius:20px;background:var(--goldBg);color:var(--gold);font-size:11px;font-weight:800;border:1px solid rgba(251,191,36,.3);">4 KHO</span>
    </div>
    <p style="color:var(--sub);font-size:14px;">Hệ thống kho trung chuyển &amp; ký gửi toàn quốc — bảo quản, kiểm tra, đóng gói &amp; vận chuyển hàng hóa</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">🗺️ Tổng quan</button>
    <button class="tab" onclick="switchTab('consign')">📦 Ký gửi hàng</button>
    <button class="tab" onclick="switchTab('my')">📋 Hàng của tôi</button>
    <button class="tab" onclick="switchTab('fees')">💰 Phí lưu kho</button>
    <button class="tab admin-only" onclick="switchTab('admin')" style="display:none;">⚙️ Admin</button>
  </div>

  <div id="content" style="padding-top:12px;"></div>
</div>

<!-- MODAL -->
<div id="modalBg" class="modal-bg" style="display:none;" onclick="closeModal(event)">
  <div class="modal" id="modalBox" onclick="event.stopPropagation()"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('safepass_token');
let currentUser = null;
let warehouses = [];
let storageFees = [];
let myInventory = [];

const VND = n => new Intl.NumberFormat('vi-VN').format(n || 0) + 'đ';
const fmtDate = d => d ? new Date(d).toLocaleDateString('vi-VN') : '—';
const fmtDays = d => {
  if (!d) return 0;
  return Math.max(0, Math.floor((Date.now() - new Date(d).getTime()) / 86400000));
};

const STATUS_MAP = {
  pending_arrival: { label:'Chờ nhận', cls:'chip-warn', icon:'⏳' },
  received:        { label:'Đã nhận',  cls:'chip-brand',icon:'📬' },
  inspected:       { label:'Đã KT',    cls:'chip-purple',icon:'🔍' },
  stored:          { label:'Đang lưu', cls:'chip-ok',   icon:'📦' },
  reserved:        { label:'Đã giữ',   cls:'chip-gold', icon:'🔒' },
  picked:          { label:'Đang lấy', cls:'chip-cyan', icon:'🛒' },
  dispatched:      { label:'Đã giao',  cls:'chip-muted',icon:'🚚' },
  returned:        { label:'Trả về',   cls:'chip-red',  icon:'↩️' },
  lost:            { label:'Thất lạc', cls:'chip-red',  icon:'⚠️' },
};

const WH_STATUS_MAP = {
  active:      { label:'Hoạt động',  cls:'chip-ok' },
  maintenance: { label:'Bảo trì',    cls:'chip-warn' },
  full:        { label:'Đã đầy',     cls:'chip-red' },
  inactive:    { label:'Tạm dừng',   cls:'chip-muted' },
};

const CITY_ICON = { 'Hồ Chí Minh':'🌆','Hà Nội':'🏛️','Đà Nẵng':'🌉','Cần Thơ':'🌾' };

// ── INIT ──
async function init() {
  if (!token) { window.location.href = '/'; return; }
  try {
    const r = await fetch(`${API}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) { window.location.href = '/'; return; }
    currentUser = await r.json();
    document.getElementById('userAvatar').textContent = (currentUser.name||'?').slice(0,2).toUpperCase();
    document.getElementById('userName').textContent = currentUser.name || 'Người dùng';
    if (currentUser.is_admin) document.querySelector('.admin-only').style.display = '';
    await Promise.all([loadWarehouses(), loadStorageFees()]);
    renderTab('overview');
  } catch(e) { showToast('Lỗi kết nối', 'err'); }
}

async function loadWarehouses() {
  try {
    const r = await fetch(`${API}/api/warehouse/list`);
    if (r.ok) warehouses = (await r.json()).warehouses || [];
  } catch(e) {}
}

async function loadStorageFees() {
  try {
    const r = await fetch(`${API}/api/warehouse/fees`);
    if (r.ok) storageFees = (await r.json()).fees || [];
  } catch(e) {}
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabs = ['overview','consign','my','fees','admin'];
  const idx = tabs.indexOf(tab);
  if (idx >= 0) document.querySelectorAll('.tab')[idx]?.classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  const el = document.getElementById('content');
  if (tab === 'overview') el.innerHTML = buildOverview();
  else if (tab === 'consign') el.innerHTML = buildConsignForm();
  else if (tab === 'my') { el.innerHTML = '<div class="empty"><div class="e-icon"><span class="spinner"></span></div></div>'; loadMyInventory(); }
  else if (tab === 'fees') el.innerHTML = buildFeesTab();
  else if (tab === 'admin') { el.innerHTML = '<div class="empty"><div class="e-icon"><span class="spinner"></span></div></div>'; loadAdminPanel(); }
}

// ── OVERVIEW ──
function buildOverview() {
  const totalCap = warehouses.reduce((s,w) => s + w.capacity, 0);
  const totalUsed = warehouses.reduce((s,w) => s + (w.used_slots||0), 0);
  const pct = totalCap > 0 ? Math.round(totalUsed / totalCap * 100) : 0;

  return `<div class="fade-up">
    <!-- Global Stats -->
    <div class="grid4" style="margin-bottom:12px;">
      <div class="stat-box"><div class="s-val" style="color:var(--brand);">${warehouses.length}</div><div class="s-lbl">Số kho</div></div>
      <div class="stat-box"><div class="s-val" style="color:var(--ok);">${totalCap.toLocaleString()}</div><div class="s-lbl">Tổng sức chứa</div></div>
      <div class="stat-box"><div class="s-val" style="color:var(--warn);">${totalUsed.toLocaleString()}</div><div class="s-lbl">Đang sử dụng</div></div>
      <div class="stat-box"><div class="s-val" style="color:var(--purple);">${100-pct}%</div><div class="s-lbl">Còn trống</div></div>
    </div>

    <!-- Overall capacity bar -->
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="card-title" style="margin-bottom:0;">📊 Tổng công suất toàn hệ thống</div>
        <span style="font-size:14px;font-weight:800;font-family:var(--mono);color:${pct>80?'var(--red)':pct>60?'var(--warn)':'var(--ok)'};">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>80?'var(--red)':pct>60?'var(--warn)':'var(--ok)'}"></div></div>
    </div>

    <!-- Warehouse Cards Grid -->
    <div class="grid2">
      ${warehouses.map(w => buildWarehouseCard(w)).join('')}
    </div>

    <!-- How it works -->
    <div class="card" style="margin-top:12px;">
      <div class="card-title">⚙️ Quy trình ký gửi</div>
      <div class="grid4">
        ${[
          ['📝','1. Đăng ký','Gửi yêu cầu ký gửi & chọn kho gần nhất'],
          ['🚚','2. Gửi hàng','Vận chuyển hàng đến kho SafePass'],
          ['🔍','3. Kiểm tra','Kho nhận, kiểm tra, chụp ảnh & cân nặng'],
          ['📦','4. Lưu kho','Hàng được bảo quản & sẵn sàng giao'],
        ].map(([icon,title,desc]) => `
          <div style="text-align:center;padding:14px 10px;">
            <div style="font-size:28px;margin-bottom:8px;">${icon}</div>
            <div style="font-size:13px;font-weight:700;margin-bottom:4px;">${title}</div>
            <div style="font-size:11px;color:var(--sub);line-height:1.5;">${desc}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function buildWarehouseCard(w) {
  const pct = w.capacity > 0 ? Math.round((w.used_slots||0) / w.capacity * 100) : 0;
  const st = WH_STATUS_MAP[w.status] || { label: w.status, cls: 'chip-muted' };
  const city_icon = CITY_ICON[w.city] || '🏢';

  return `<div class="wh-card" onclick="showWarehouseModal('${w.id}')">
    <div class="wh-header">
      <div class="wh-icon">${city_icon}</div>
      <div style="flex:1;">
        <div class="wh-name">${w.name}</div>
        <div class="wh-addr">${w.address}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px;">
          <span class="chip ${st.cls}">${st.label}</span>
          <span style="font-size:10px;font-family:var(--mono);color:var(--hint);">${w.code}</span>
        </div>
      </div>
    </div>
    <div class="wh-capacity">

        <span style="font-size:12px;font-weight:700;color:${pct>80?'var(--red)':pct>60?'var(--warn)':'var(--ok)'};">${pct}%</span>
      </div>
      <div class="cap-bar"><div class="cap-fill ${pct>80?'warn':''}" style="width:${pct}%;"></div></div>
    </div>

  </div>`;
}

function showWarehouseModal(id) {
  const w = warehouses.find(x => x.id === id);
  if (!w) return;
  const pct = w.capacity > 0 ? Math.round((w.used_slots||0) / w.capacity * 100) : 0;
  const city_icon = CITY_ICON[w.city] || '🏢';
  const st = WH_STATUS_MAP[w.status] || { label: w.status, cls: 'chip-muted' };

  // Build a simple zone map simulation
  const zoneLetters = ['A','B','C','D','E','F'];
  const rows = 4, cols = 5;
  const cells = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const rand = Math.random();
      const state = rand < (pct/100) ? (Math.random() < 0.1 ? 'reserved' : 'occupied') : 'empty';
      cells.push(state);
    }
  }

  openModal(`
    <div class="modal-title">${city_icon} ${w.name} <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:14px;">
      <span class="chip ${st.cls}">${st.label}</span>
      <span style="margin-left:8px;font-size:12px;font-family:var(--mono);color:var(--hint);">${w.code}</span>
    </div>
    <div class="grid2" style="margin-bottom:14px;gap:8px;">
      ${[['📍 Địa chỉ',w.address],['🏙️ Thành phố',w.city],['📦 Sức chứa',w.capacity.toLocaleString()+' slot'],['📊 Đang dùng',`${(w.used_slots||0).toLocaleString()} (${pct}%)`]].map(([k,v]) => `
        <div style="padding:10px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);">
          <div style="font-size:10px;color:var(--hint);margin-bottom:3px;font-weight:700;">${k}</div>
          <div style="font-size:13px;font-weight:700;">${v}</div>
        </div>`).join('')}
    </div>
    <div style="margin-bottom:6px;font-size:12px;font-weight:700;color:var(--sub);">SƠ ĐỒ KHO (mô phỏng)</div>
    <div class="map-grid">
      ${cells.map((state,i) => {
        const zone = zoneLetters[Math.floor(i/cols)];
        const shelf = (i % cols) + 1;
        return `<div class="map-cell ${state}" title="${zone}${shelf}">
          <span>${zone}${shelf}</span>
          <span style="font-size:8px;">${state==='occupied'?'●':state==='reserved'?'◆':'○'}</span>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--brand);">● Đang lưu</span>
      <span style="font-size:11px;color:var(--warn);">◆ Đã giữ</span>
      <span style="font-size:11px;color:var(--hint);">○ Trống</span>
    </div>
    <div style="margin-top:16px;">
      <button class="btn btn-primary" style="width:100%;" onclick="closeModal();switchTab('consign');">📦 Gửi hàng vào kho này</button>
    </div>
  `);
}

let selectedSize = null;
let selectedWarehouse = null;

function selectSize(val) {
  selectedSize = val;
  document.querySelectorAll('[id^="size-"]').forEach(el => el.classList.remove('occupied'));
  const el = document.getElementById(`size-${val}`);
  if (el) el.classList.add('occupied');
  updateFeePreview();
}

function selectWarehouse(id) {
  selectedWarehouse = id;
  document.querySelectorAll('[id^="wh-sel-"]').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`wh-sel-${id}`);
  if (el) el.classList.add('active');
}

function updateFeePreview() {
  if (!selectedSize) return;
  const fee = storageFees.find(f => f.size_category === selectedSize);
  if (!fee) return;
  const preview = document.getElementById('feePreview');
  const content = document.getElementById('feePreviewContent');
  if (!preview || !content) return;
  preview.style.display = '';
  content.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
      ${[['📅 Theo ngày', fee.fee_per_day],['📆 Theo tuần', fee.fee_per_week],['🗓️ Theo tháng', fee.fee_per_month]].map(([lbl,val]) => `
        <div style="text-align:center;padding:12px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--sub);margin-bottom:4px;">${lbl}</div>
          <div style="font-size:16px;font-weight:900;font-family:var(--mono);color:var(--brand);">${VND(val)}</div>
        </div>`).join('')}
    </div>`;
}

async function submitConsignment() {
  const name = document.getElementById('cProductName')?.value?.trim();
  const category = document.getElementById('cCategory')?.value;
  const qty = parseInt(document.getElementById('cQty')?.value) || 1;
  const weight = parseFloat(document.getElementById('cWeight')?.value) || null;
  const condition = document.getElementById('cCondition')?.value;
  const desc = document.getElementById('cDesc')?.value?.trim();

  if (!name) { showToast('Vui lòng nhập tên sản phẩm', 'err'); return; }
  if (!selectedSize) { showToast('Vui lòng chọn kích thước', 'err'); return; }
  if (!selectedWarehouse) { showToast('Vui lòng chọn kho nhận hàng', 'err'); return; }

  const btn = event.currentTarget;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

  try {
    const r = await fetch(`${API}/api/warehouse/consign`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_name: name, category, quantity: qty, size_category: selectedSize, weight_kg: weight, condition, description: desc, warehouse_id: selectedWarehouse })
    });
    const data = await r.json();
    if (r.ok) {
      showToast('Đã đăng ký ký gửi thành công!', 'ok');
      selectedSize = null; selectedWarehouse = null;
      setTimeout(() => switchTab('my'), 800);
    } else {
      showToast(data.error || 'Lỗi đăng ký', 'err');
      btn.disabled = false; btn.innerHTML = '📦 Xác nhận ký gửi hàng';
    }
  } catch(e) {
    showToast('Lỗi kết nối', 'err');
    btn.disabled = false; btn.innerHTML = '📦 Xác nhận ký gửi hàng';
  }
}

// ── MY INVENTORY ──
async function loadMyInventory() {
  try {
    const r = await fetch(`${API}/api/warehouse/my-inventory`, { headers: { Authorization: `Bearer ${token}` } });
    const data = await r.json();
    myInventory = data.inventory || [];
    const el = document.getElementById('content');

    if (!myInventory.length) {
      el.innerHTML = `<div class="fade-up empty"><div class="e-icon">📦</div><p>Bạn chưa có hàng trong kho nào.<br/><br/><button class="btn btn-primary btn-sm" onclick="switchTab('consign')">➕ Ký gửi ngay</button></p></div>`;
      return;
    }

    const byStatus = {};
    myInventory.forEach(i => { byStatus[i.status] = (byStatus[i.status]||0) + 1; });
    const totalFee = myInventory.reduce((s,i) => {
      const fee = storageFees.find(f => f.size_category === i.size_category);
      return s + (fee ? fee.fee_per_day * fmtDays(i.stored_at || i.arrived_at || i.created_at) : 0);
    }, 0);

    el.innerHTML = `<div class="fade-up">
      <!-- Summary -->
      <div class="grid4" style="margin-bottom:12px;">
        <div class="stat-box"><div class="s-val" style="color:var(--brand);">${myInventory.length}</div><div class="s-lbl">Tổng mặt hàng</div></div>
        <div class="stat-box"><div class="s-val" style="color:var(--ok);">${byStatus.stored||0}</div><div class="s-lbl">Đang lưu kho</div></div>
        <div class="stat-box"><div class="s-val" style="color:var(--warn);">${byStatus.reserved||0}</div><div class="s-lbl">Đang giữ chỗ</div></div>
        <div class="stat-box"><div class="s-val" style="color:var(--red);">${VND(totalFee)}</div><div class="s-lbl">Phí tích lũy</div><div class="s-sub">(ước tính)</div></div>
      </div>
      <!-- Inventory list -->
      ${myInventory.map(item => buildInventoryRow(item)).join('')}
    </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="e-icon">⚠️</div><p>Lỗi tải dữ liệu</p></div>';
  }
}

const CAT_ICON = { phone:'📱', laptop:'💻', camera:'📷', watch:'⌚', shoes:'👟', bag:'👜', electronics:'🔌', collectible:'🎖️', other:'📦' };

function buildInventoryRow(item) {
  const st = STATUS_MAP[item.status] || { label: item.status, cls: 'chip-muted', icon: '?' };
  const wh = warehouses.find(w => w.id === item.warehouse_id);
  const catIcon = CAT_ICON[item.category] || '📦';
  const days = fmtDays(item.stored_at || item.arrived_at || item.created_at);
  const fee = storageFees.find(f => f.size_category === item.size_category);
  const accrued = fee ? fee.fee_per_day * days : 0;

  return `<div class="inv-row" onclick="showInventoryDetail('${item.id}')">
    <div class="inv-icon">${catIcon}</div>
    <div class="inv-info">
      <div class="inv-name">${item.product_name}</div>
      <div class="inv-meta">${wh ? wh.name : 'Chưa phân kho'} · ${item.shelf_location || 'Chưa có vị trí'} · ${days} ngày</div>
      <div class="inv-sku">${item.sku}</div>
    </div>
    <div style="text-align:right;flex-shrink:0;">
      <span class="chip ${st.cls}">${st.icon} ${st.label}</span>
      ${accrued > 0 ? `<div style="font-size:11px;color:var(--warn);margin-top:4px;font-family:var(--mono);">${VND(accrued)}</div>` : ''}
    </div>
  </div>`;
}

function showInventoryDetail(id) {
  const item = myInventory.find(i => i.id === id);
  if (!item) return;
  const st = STATUS_MAP[item.status] || { label: item.status, cls: 'chip-muted', icon: '?' };
  const wh = warehouses.find(w => w.id === item.warehouse_id);
  const days = fmtDays(item.stored_at || item.arrived_at || item.created_at);
  const fee = storageFees.find(f => f.size_category === item.size_category);
  const catIcon = CAT_ICON[item.category] || '📦';

  openModal(`
    <div class="modal-title">${catIcon} ${item.product_name} <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:12px;"><span class="chip ${st.cls}">${st.icon} ${st.label}</span></div>
    <div class="grid2" style="gap:8px;margin-bottom:14px;">
      ${[
        ['🏭 Kho', wh?.name || 'Chưa phân'],
        ['📍 Vị trí', item.shelf_location || 'Chưa có'],
        ['📦 Size', item.size_category],
        ['⚖️ Cân nặng', item.weight_kg ? item.weight_kg + ' kg' : '—'],
        ['📅 Ngày nhập', fmtDate(item.arrived_at || item.created_at)],
        ['⏱️ Số ngày', days + ' ngày'],
        ['🔖 SKU', item.sku],
        ['✅ Tình trạng', item.condition],
      ].map(([k,v]) => `<div style="padding:10px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);">
        <div style="font-size:10px;color:var(--hint);margin-bottom:2px;font-weight:700;">${k}</div>
        <div style="font-size:13px;font-weight:700;font-family:var(--mono);">${v}</div>
      </div>`).join('')}
    </div>
    ${item.notes ? `<div style="padding:10px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--sub);margin-bottom:12px;">${item.notes}</div>` : ''}
    ${fee ? `<div style="padding:12px;border-radius:var(--radius-sm);background:var(--brandL);border:1px solid rgba(61,142,248,.2);margin-bottom:14px;">
      <div style="font-size:11px;color:var(--brand);font-weight:700;margin-bottom:6px;">💰 PHÍ LƯU KHO</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <span style="font-size:12px;">Ngày: <strong style="font-family:var(--mono);">${VND(fee.fee_per_day)}</strong></span>
        <span style="font-size:12px;">Tuần: <strong style="font-family:var(--mono);">${VND(fee.fee_per_week)}</strong></span>
        <span style="font-size:12px;">Tháng: <strong style="font-family:var(--mono);">${VND(fee.fee_per_month)}</strong></span>
      </div>
      <div style="margin-top:6px;font-size:13px;font-weight:700;">Đã tích lũy: <span style="color:var(--warn);font-family:var(--mono);">${VND(fee.fee_per_day * days)}</span></div>
    </div>` : ''}
    ${['stored','received','inspected'].includes(item.status) ? `<div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" onclick="requestPickPack('${item.id}')">📦 Yêu cầu đóng gói & giao</button>
      <button class="btn btn-ghost btn-sm" onclick="requestTransfer('${item.id}')">🚚 Chuyển kho</button>
    </div>` : ''}
  `);
}

async function requestPickPack(inventoryId) {
  closeModal();
  try {
    const r = await fetch(`${API}/api/warehouse/pickpack`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ inventory_id: inventoryId })
    });
    if (r.ok) { showToast('Đã yêu cầu đóng gói & giao hàng', 'ok'); loadMyInventory(); }
    else { const d = await r.json(); showToast(d.error || 'Lỗi yêu cầu', 'err'); }
  } catch(e) { showToast('Lỗi kết nối', 'err'); }
}

async function requestTransfer(inventoryId) {
  const item = myInventory.find(i => i.id === inventoryId);
  const otherWH = warehouses.filter(w => w.id !== item?.warehouse_id && w.status === 'active');
  if (!otherWH.length) { showToast('Không có kho nào khác để chuyển', 'err'); return; }

  closeModal();
  openModal(`
    <div class="modal-title">🚚 Chuyển kho <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="transfer-arrow">
      Từ: <span>${warehouses.find(w=>w.id===item?.warehouse_id)?.name || 'Hiện tại'}</span>
    </div>
    <div style="margin-bottom:14px;">
      <label class="field-label">Chọn kho đích</label>
      ${otherWH.map(w => `
        <div class="wh-card" id="tr-${w.id}" onclick="selectTransferWH('${w.id}')" style="padding:12px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:20px;">${CITY_ICON[w.city]||'🏢'}</span>
            <div>
              <div style="font-size:13px;font-weight:700;">${w.name}</div>
              <div style="font-size:11px;color:var(--sub);">${w.city} · ${w.capacity-(w.used_slots||0)} slot trống</div>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <button class="btn btn-primary" id="confirmTransferBtn" style="width:100%;" onclick="confirmTransfer('${inventoryId}')">✓ Xác nhận chuyển kho</button>
  `);
}

let selectedTransferWH = null;
function selectTransferWH(id) {
  selectedTransferWH = id;
  document.querySelectorAll('[id^="tr-"]').forEach(el => el.classList.remove('active'));
  document.getElementById(`tr-${id}`)?.classList.add('active');
}

async function confirmTransfer(inventoryId) {
  if (!selectedTransferWH) { showToast('Chọn kho đích', 'err'); return; }
  try {
    const r = await fetch(`${API}/api/warehouse/transfer`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ inventory_id: inventoryId, to_warehouse_id: selectedTransferWH })
    });
    if (r.ok) { showToast('Đã yêu cầu chuyển kho', 'ok'); closeModal(); loadMyInventory(); }
    else { const d = await r.json(); showToast(d.error || 'Lỗi chuyển kho', 'err'); }
  } catch(e) { showToast('Lỗi kết nối', 'err'); }
}

              <th style="text-align:left;padding:10px;color:var(--sub);font-weight:700;font-size:11px;">KÍCH THƯỚC</th>
              <th style="text-align:right;padding:10px;color:var(--sub);font-weight:700;font-size:11px;">THEO NGÀY</th>
              <th style="text-align:right;padding:10px;color:var(--sub);font-weight:700;font-size:11px;">THEO TUẦN</th>
              <th style="text-align:right;padding:10px;color:var(--sub);font-weight:700;font-size:11px;">THEO THÁNG</th>
              <th style="text-align:right;padding:10px;color:var(--sub);font-weight:700;font-size:11px;">TỐI ĐA</th>
            </tr>
          </thead>
          <tbody>
            ${storageFees.map(f => `
              <tr style="border-bottom:1px solid var(--border);">
                <td style="padding:12px 10px;">
                  <div style="font-weight:700;">${f.label}</div>
                  <div style="font-size:11px;color:var(--sub);margin-top:2px;">${f.description||''}</div>
                </td>
                <td style="padding:12px 10px;text-align:right;font-family:var(--mono);font-weight:700;color:var(--brand);">${VND(f.fee_per_day)}</td>
                <td style="padding:12px 10px;text-align:right;font-family:var(--mono);font-weight:700;">${VND(f.fee_per_week)}</td>
                <td style="padding:12px 10px;text-align:right;font-family:var(--mono);font-weight:700;">${VND(f.fee_per_month)}</td>
                <td style="padding:12px 10px;text-align:right;font-size:12px;color:var(--sub);">${f.max_weight_kg ? f.max_weight_kg + ' kg' : 'Không giới hạn'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Calculator -->
    <div class="card" style="margin-top:12px;">
      <div class="card-title">🧮 Tính phí lưu kho</div>
      <div class="grid2">
        <div>
          <label class="field-label">Kích thước</label>
          <select class="field-input" id="calcSize" onchange="calcFee()">
            ${storageFees.map(f => `<option value="${f.size_category}">${f.label}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="field-label">Số ngày lưu kho</label>
          <input class="field-input" id="calcDays" type="number" value="30" min="1" oninput="calcFee()"/>
        </div>
      </div>
      <div id="calcResult" style="margin-top:12px;"></div>
    </div>
  </div>`;
}

function calcFee() {
  const size = document.getElementById('calcSize')?.value;
  const days = parseInt(document.getElementById('calcDays')?.value) || 0;
  const fee = storageFees.find(f => f.size_category === size);
  const el = document.getElementById('calcResult');
  if (!fee || !el || days <= 0) return;
  const total = fee.fee_per_day * days;
  el.innerHTML = `<div style="padding:14px;border-radius:var(--radius-sm);background:var(--brandL);border:1px solid rgba(61,142,248,.2);text-align:center;">
    <div style="font-size:12px;color:var(--sub);margin-bottom:4px;">${days} ngày × ${VND(fee.fee_per_day)}/ngày</div>
    <div style="font-size:28px;font-weight:900;font-family:var(--mono);color:var(--brand);">${VND(total)}</div>
  </div>`;
}

// ── ADMIN PANEL ──
async function loadAdminPanel() {
  try {
    const [dashR, invR] = await Promise.all([
      fetch(`${API}/api/admin/warehouse/dashboard`, { headers: { Authorization: `Bearer ${token}` } }),
      fetch(`${API}/api/admin/warehouse/inventory`, { headers: { Authorization: `Bearer ${token}` } })
    ]);
    const dash = dashR.ok ? await dashR.json() : {};
    const inv = invR.ok ? (await invR.json()).inventory || [] : [];

    document.getElementById('content').innerHTML = `<div class="fade-up">
      <!-- Stats -->
      <div class="grid4" style="margin-bottom:12px;">
        <div class="stat-box"><div class="s-val" style="color:var(--brand);">${dash.totalItems||0}</div><div class="s-lbl">Tổng mặt hàng</div></div>
        <div class="stat-box"><div class="s-val" style="color:var(--ok);">${dash.stored||0}</div><div class="s-lbl">Đang lưu</div></div>
        <div class="stat-box"><div class="s-val" style="color:var(--warn);">${dash.pending||0}</div><div class="s-lbl">Chờ nhận</div></div>
        <div class="stat-box"><div class="s-val" style="color:var(--gold);">${VND(dash.totalRevenue||0)}</div><div class="s-lbl">Doanh thu phí</div></div>
      </div>

      <!-- Warehouse capacity overview -->
      <div class="card" style="margin-bottom:12px;">
        <div class="card-title">🏭 Trạng thái các kho</div>
        ${warehouses.map(w => {
          const pct = w.capacity > 0 ? Math.round((w.used_slots||0)/w.capacity*100) : 0;
          return `<div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
              <span style="font-size:13px;font-weight:700;">${CITY_ICON[w.city]||'🏢'} ${w.name}</span>
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:12px;color:var(--sub);">${(w.used_slots||0).toLocaleString()} / ${w.capacity.toLocaleString()}</span>
                <span style="font-size:12px;font-weight:700;color:${pct>80?'var(--red)':pct>60?'var(--warn)':'var(--ok)'};">${pct}%</span>
              </div>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>80?'var(--red)':pct>60?'var(--warn)':'var(--ok)'}"></div></div>
          </div>`;
        }).join('')}
      </div>

      <!-- Inventory table -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div class="card-title" style="margin-bottom:0;">📦 Tất cả hàng trong kho</div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-primary btn-sm" onclick="openReceiveModal()">📬 Nhận hàng</button>
            <button class="btn btn-ghost btn-sm" onclick="openCreateWarehouseModal()">➕ Tạo kho</button>
          </div>
        </div>
        <!-- Filter -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
          ${['all',...Object.keys(STATUS_MAP)].slice(0,7).map(s => {
            const lbl = s === 'all' ? '📋 Tất cả' : `${STATUS_MAP[s]?.icon||''} ${STATUS_MAP[s]?.label||s}`;
            return `<button class="btn btn-ghost btn-xs" onclick="filterInv('${s}',event)">${lbl}</button>`;
          }).join('')}
        </div>
        <div id="adminInvList">
          ${inv.length === 0 ? '<div class="empty"><div class="e-icon">📭</div><p>Không có mặt hàng nào</p></div>' :
            inv.map(item => buildAdminInvRow(item)).join('')}
        </div>
      </div>
    </div>`;
    window._allAdminInv = inv;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="e-icon">⚠️</div><p>Lỗi tải admin panel</p></div>';
  }
}

function filterInv(status, event) {
  document.querySelectorAll('#adminInvList').forEach(() => {});
  const inv = (window._allAdminInv || []).filter(i => status === 'all' || i.status === status);
  document.getElementById('adminInvList').innerHTML = inv.length === 0
    ? '<div class="empty"><div class="e-icon">📭</div><p>Không có mặt hàng</p></div>'
    : inv.map(item => buildAdminInvRow(item)).join('');
}

function buildAdminInvRow(item) {
  const st = STATUS_MAP[item.status] || { label: item.status, cls: 'chip-muted', icon: '?' };
  const wh = warehouses.find(w => w.id === item.warehouse_id);
  const catIcon = CAT_ICON[item.category] || '📦';
  const days = fmtDays(item.stored_at || item.arrived_at || item.created_at);
  return `<div class="inv-row" style="cursor:default;">
    <div class="inv-icon">${catIcon}</div>
    <div class="inv-info">
      <div class="inv-name">${item.product_name}</div>
      <div class="inv-meta">${item.users?.name||'?'} · ${wh?.name||'—'} · ${days} ngày · ${item.size_category}</div>
      <div class="inv-sku">${item.sku}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
      <span class="chip ${st.cls}">${st.icon} ${st.label}</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        ${item.status === 'pending_arrival' ? `<button class="btn btn-ok btn-xs" onclick="adminUpdateStatus('${item.id}','received')">📬 Nhận</button>` : ''}
        ${item.status === 'received' ? `<button class="btn btn-ghost btn-xs" onclick="adminUpdateStatus('${item.id}','inspected')">🔍 Đã KT</button>` : ''}
        ${item.status === 'inspected' ? `<button class="btn btn-ghost btn-xs" onclick="openAssignSlotModal('${item.id}')">📌 Xếp kho</button>` : ''}
        ${item.status === 'stored' ? `<button class="btn btn-ghost btn-xs" onclick="adminUpdateStatus('${item.id}','reserved')">🔒 Giữ chỗ</button>` : ''}
      </div>
    </div>
  </div>`;
}

async function adminUpdateStatus(id, status, extra = {}) {
  try {
    const r = await fetch(`${API}/api/admin/warehouse/inventory/${id}/status`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, ...extra })
    });
    if (r.ok) { showToast('Đã cập nhật trạng thái', 'ok'); loadAdminPanel(); }
    else { const d = await r.json(); showToast(d.error || 'Lỗi cập nhật', 'err'); }
  } catch(e) { showToast('Lỗi kết nối', 'err'); }
}

function openAssignSlotModal(id) {
  openModal(`
    <div class="modal-title">📌 Xếp vị trí lưu kho <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:12px;">
      <label class="field-label">Vị trí kệ (VD: A3, B12)</label>
      <input class="field-input" id="slotInput" placeholder="VD: A3"/>
    </div>
    <div style="margin-bottom:14px;">
      <label class="field-label">Ghi chú</label>
      <input class="field-input" id="slotNote" placeholder="Ghi chú thêm..."/>
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="assignSlot('${id}')">✓ Xác nhận xếp kho</button>
  `);
}

async function assignSlot(id) {
  const shelf = document.getElementById('slotInput')?.value?.trim();
  const notes = document.getElementById('slotNote')?.value?.trim();
  if (!shelf) { showToast('Nhập vị trí kệ', 'err'); return; }
  await adminUpdateStatus(id, 'stored', { shelf_location: shelf, notes });
  closeModal();
}

function openReceiveModal() {
  openModal(`
    <div class="modal-title">📬 Nhận hàng mới vào kho <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="padding:16px;border-radius:var(--radius-sm);background:var(--brandL);border:1px solid rgba(61,142,248,.2);font-size:13px;color:var(--sub);">
      Hàng hóa đã đăng ký ký gửi có trạng thái <strong style="color:var(--txt);">"Chờ nhận"</strong> ở trên.<br/>
      Nhấn <strong style="color:var(--brand);">📬 Nhận</strong> để xác nhận đã nhận hàng.
    </div>
    <div style="margin-top:14px;">
      <button class="btn btn-ghost" style="width:100%;" onclick="closeModal()">Đóng</button>
    </div>
  `);
}

function openCreateWarehouseModal() {
  openModal(`
    <div class="modal-title">🏭 Tạo kho mới <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="display:grid;gap:12px;">
      <div class="grid2">
        <div><label class="field-label">Mã kho *</label><input class="field-input" id="wCode" placeholder="WH-XXX"/></div>
        <div><label class="field-label">Tên kho *</label><input class="field-input" id="wName" placeholder="Kho Hải Phòng"/></div>
      </div>
      <div><label class="field-label">Địa chỉ *</label><input class="field-input" id="wAddr" placeholder="Địa chỉ kho..."/></div>
      <div class="grid2">
        <div><label class="field-label">Thành phố *</label><input class="field-input" id="wCity" placeholder="Hải Phòng"/></div>
        <div><label class="field-label">Sức chứa (slot) *</label><input class="field-input" id="wCap" type="number" value="1000" min="1"/></div>
      </div>
      <div><label class="field-label">Phụ trách</label><input class="field-input" id="wMgr" placeholder="Tên người phụ trách"/></div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="createWarehouse()">✓ Tạo kho</button>
  `);
}

async function createWarehouse() {
  const code = document.getElementById('wCode')?.value?.trim();
  const name = document.getElementById('wName')?.value?.trim();
  const address = document.getElementById('wAddr')?.value?.trim();
  const city = document.getElementById('wCity')?.value?.trim();
  const capacity = parseInt(document.getElementById('wCap')?.value) || 1000;
  const manager_name = document.getElementById('wMgr')?.value?.trim();
  if (!code || !name || !address || !city) { showToast('Điền đủ thông tin bắt buộc', 'err'); return; }
  try {
    const r = await fetch(`${API}/api/admin/warehouse/create`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, name, address, city, capacity, manager_name })
    });
    const data = await r.json();
    if (r.ok) { showToast('Đã tạo kho mới', 'ok'); closeModal(); await loadWarehouses(); loadAdminPanel(); }
    else showToast(data.error || 'Lỗi tạo kho', 'err');
  } catch(e) { showToast('Lỗi kết nối', 'err'); }
}

// ── MODAL / TOAST / KEYBOARD ──
function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalBg').style.display = 'flex';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalBg')) return;
  document.getElementById('modalBg').style.display = 'none';
}
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 3200);
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalBg').style.display = 'none';
});

init();
setTimeout(calcFee, 800);
</script>
</body>
</html>
