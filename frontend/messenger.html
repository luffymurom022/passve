<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SafePass Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#18191a;--surface:#242526;--surface2:#3a3b3c;--surface3:#4e4f50;
  --border:#3a3b3c;--text:#e4e6eb;--text2:#b0b3b8;--text3:#8a8d91;
  --brand:#2d88ff;--brand-h:#1877f2;--brand-light:rgba(45,136,255,.15);
  --sent:#2d88ff;--recv:#3a3b3c;--green:#42b72a;--red:#e41e3f;
  --shadow:0 1px 2px rgba(0,0,0,.4);--nav-h:56px;
}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow:hidden;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;border:none;font-family:inherit;}

/* LAYOUT */
.app{display:flex;height:100vh;flex-direction:column;}
.top-nav{
  height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
}
.nav-logo{font-size:22px;font-weight:900;color:var(--brand);}
.nav-logo span{font-size:9px;background:var(--brand);color:#fff;padding:2px 5px;border-radius:4px;margin-left:3px;vertical-align:middle;}
.nav-spacer{flex:1;}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:7px 11px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);transition:.15s;}
.nav-link:hover{background:var(--surface2);color:var(--text);}

.messenger{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:320px;min-width:260px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);}
.sidebar-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:10px;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:22px;padding:8px 12px;}
.search-box input{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--text);}
.search-box input::placeholder{color:var(--text3);}
.new-chat-btn{
  width:100%;display:flex;align-items:center;gap:10px;padding:10px 16px;
  font-size:14px;font-weight:600;color:var(--brand);background:none;transition:.15s;text-align:left;
}
.new-chat-btn:hover{background:var(--surface2);}
.conv-list{flex:1;overflow-y:auto;}
.conv-list::-webkit-scrollbar{width:4px;}
.conv-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}

/* CONVERSATION ITEM */
.conv-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  cursor:pointer;transition:.15s;position:relative;
}
.conv-item:hover{background:var(--surface2);}
.conv-item.active{background:var(--brand-light);}
.conv-avatar{
  width:48px;height:48px;border-radius:50%;background:var(--brand);
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;
  color:#fff;flex-shrink:0;overflow:hidden;position:relative;
}
.conv-avatar img{width:100%;height:100%;object-fit:cover;}
.online-dot{
  position:absolute;bottom:2px;right:2px;width:12px;height:12px;
  border-radius:50%;background:var(--green);border:2px solid var(--surface);
}
.conv-body{flex:1;min-width:0;}
.conv-name{font-size:14px;font-weight:700;color:var(--text);display:flex;justify-content:space-between;}
.conv-time{font-size:12px;color:var(--text3);font-weight:400;}
.conv-preview{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;justify-content:space-between;align-items:center;}
.unread-badge{
  background:var(--brand);color:#fff;border-radius:10px;
  font-size:11px;font-weight:700;min-width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;
}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text3);
}
.chat-empty-icon{font-size:64px;margin-bottom:16px;}
.chat-empty-text{font-size:16px;font-weight:600;color:var(--text2);}
.chat-empty-sub{font-size:13px;margin-top:6px;}

/* CHAT HEADER */
.chat-header{
  height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
}
.chat-header-avatar{width:38px;height:38px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;position:relative;}
.chat-header-avatar img{width:100%;height:100%;object-fit:cover;}
.chat-header-info{flex:1;min-width:0;}
.chat-header-name{font-size:15px;font-weight:700;color:var(--text);}
.chat-header-status{font-size:12px;color:var(--green);}
.chat-header-status.offline{color:var(--text3);}
.chat-header-actions{display:flex;gap:6px;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:.15s;border:none;color:var(--text);}
.icon-btn:hover{background:var(--surface3);}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}
.msg-group{margin-bottom:8px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{
  max-width:65%;padding:10px 14px;border-radius:18px;
  font-size:14px;line-height:1.4;position:relative;word-break:break-word;
}
.msg-row:not(.mine) .msg-bubble{background:var(--recv);color:var(--text);border-bottom-left-radius:4px;}
.msg-row.mine .msg-bubble{background:var(--sent);color:#fff;border-bottom-right-radius:4px;}
.msg-row:not(.mine):not(:last-child) .msg-avatar{visibility:hidden;}
.msg-time{font-size:10px;color:var(--text3);padding:0 8px;margin-top:2px;text-align:center;}
.msg-image{max-width:200px;border-radius:12px;overflow:hidden;cursor:pointer;}
.msg-image img{width:100%;display:block;}
.msg-deleted{font-style:italic;color:var(--text3)!important;background:var(--surface2)!important;}

/* REACTIONS */
.msg-reactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.msg-reaction{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:2px 6px;font-size:13px;cursor:pointer;transition:.15s;
}
.msg-reaction:hover{background:var(--surface3);}

/* TYPING */
.typing-indicator{
  display:flex;align-items:center;gap:6px;padding:8px 0;
  font-size:13px;color:var(--text3);
}
.typing-dots{display:flex;gap:3px;}
.typing-dot{
  width:6px;height:6px;border-radius:50%;background:var(--text3);
  animation:bounce 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

/* INPUT BAR */
.input-bar{
  padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:10px;flex-shrink:0;
}
.input-wrap{flex:1;background:var(--surface2);border-radius:22px;display:flex;align-items:flex-end;padding:8px 14px;gap:8px;border:1.5px solid var(--border);transition:.15s;}
.input-wrap:focus-within{border-color:var(--brand);}
.msg-input{
  flex:1;background:none;border:none;outline:none;
  font-size:15px;color:var(--text);max-height:120px;min-height:22px;
  resize:none;font-family:inherit;line-height:1.4;
}
.msg-input::placeholder{color:var(--text3);}
.input-emoji-btn{font-size:20px;cursor:pointer;flex-shrink:0;line-height:1;}
.send-btn{
  width:40px;height:40px;border-radius:50%;background:var(--brand);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  flex-shrink:0;transition:.15s;border:none;color:#fff;
}
.send-btn:hover{background:var(--brand-h);}
.send-btn:disabled{background:var(--surface2);cursor:not-allowed;}

/* EMOJI PICKER */
.emoji-bar{display:flex;gap:8px;padding:8px 16px;background:var(--surface);border-top:1px solid var(--border);flex-wrap:wrap;}
.emoji-item{font-size:22px;cursor:pointer;transition:.15s;padding:4px;border-radius:8px;}
.emoji-item:hover{background:var(--surface2);}

/* NEW CHAT MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:.2s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:440px;overflow:hidden;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:.15s;border:none;cursor:pointer;}
.modal-close:hover{background:var(--surface3);}
.modal-body{padding:16px 20px;}
.form-input{width:100%;padding:10px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:.15s;}
.form-input:focus{border-color:var(--brand);}
.btn-primary{background:var(--brand);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:.15s;width:100%;margin-top:12px;}
.btn-primary:hover{background:var(--brand-h);}

/* REACT PICKER */
.react-picker{
  position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:6px 10px;display:flex;gap:6px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4);
  white-space:nowrap;bottom:calc(100% + 6px);
}
.react-picker.mine{right:0;}
.react-picker:not(.mine){left:0;}
.react-emoji{font-size:20px;cursor:pointer;transition:.15s;padding:2px;}
.react-emoji:hover{transform:scale(1.3);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1e21;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* MOBILE */
@media(max-width:640px){
  .sidebar{display:none;}
  .sidebar.show{display:flex;position:fixed;inset:0;z-index:300;width:100%;}
  .chat-area .back-btn{display:flex!important;}
}
.back-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;font-size:18px;color:var(--text);}
</style>
</head>
<body>

<div class="app">
  <!-- TOP NAV -->
  <nav class="top-nav">
    <div class="nav-logo">SafePass<span>CHAT</span></div>
    <div class="nav-links">
      <a href="/" class="nav-link">🏠 Trang chủ</a>
      <a href="/groups" class="nav-link">👥 Nhóm</a>
      <a href="/reels" class="nav-link">🎬 Reels</a>
    </div>
    <div class="nav-spacer"></div>
    <button class="icon-btn" onclick="openNewChat()" title="Chat mới">✏️</button>
  </nav>

  <div class="messenger">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Tin nhắn</div>
        <div class="search-box">
          <span>🔍</span>
          <input id="convSearch" placeholder="Tìm kiếm..." oninput="filterConvs(this.value)">
        </div>
      </div>
      <button class="new-chat-btn" onclick="openNewChat()">✏️ Cuộc trò chuyện mới</button>
      <div class="conv-list" id="convList">
        <div style="text-align:center;padding:32px;color:var(--text3)">Đang tải...</div>
      </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
      <div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">SafePass Messenger</div>
        <div class="chat-empty-sub">Chọn cuộc trò chuyện để bắt đầu nhắn tin</div>
        <br>
        <button onclick="openNewChat()" style="background:var(--brand);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer">✏️ Bắt đầu trò chuyện</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="modal-overlay" id="newChatModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✏️ Cuộc trò chuyện mới</div>
      <button class="modal-close" onclick="closeNewChat()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Nhập ID người dùng muốn nhắn tin:</p>
      <input class="form-input" id="newChatUserId" placeholder="ID người dùng..." onkeydown="if(event.key==='Enter')startNewChat()">
      <button class="btn-primary" onclick="startNewChat()">💬 Bắt đầu chat</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API='';
let token=localStorage.getItem('token');
let currentUser=null;
let conversations=[];
let currentConvId=null;
let messages=[];
let ws=null;
let typingTimeout=null;
let showEmoji=false;
const EMOJIS=['❤️','😂','😮','😢','😠','👍'];

function toast(msg,ok=true){
  const t=document.getElementById('toast');t.textContent=msg;
  t.style.borderColor=ok?'var(--green)':'var(--red)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

async function apiFetch(path, opts={}){
  const h={'Content-Type':'application/json'};
  if(token) h['Authorization']='Bearer '+token;
  const r=await fetch(API+path,{...opts,headers:{...h,...(opts.headers||{})}});
  return r.json();
}

function initials(n){ return (n||'?').slice(0,2).toUpperCase(); }
function timeAgo(ts){
  if(!ts) return '';
  const d=Math.floor((Date.now()-new Date(ts))/1000);
  if(d<60) return 'vừa xong';
  if(d<3600) return Math.floor(d/60)+'p';
  if(d<86400) return Math.floor(d/3600)+'h';
  return new Date(ts).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
}

// ── WS ──
function connectWS(){
  if(!token) return;
  const proto=location.protocol==='https:'?'wss':'ws';
  const wsUrl=`${proto}://${location.host}/ws/dm?token=${encodeURIComponent(token)}`;
  ws=new WebSocket(wsUrl);
  ws.onopen=()=>{ ping(); };
  ws.onmessage=e=>{
    let msg;try{msg=JSON.parse(e.data);}catch{return;}
    if(msg.type==='dm_message' && msg.message){
      const m=msg.message;
      if(m.conversation_id===currentConvId){
        appendMessage(m);scrollToBottom();
      }
      // Update sidebar preview
      updateSidebarPreview(m.conversation_id, m.content, m.created_at);
      // Unread if different conv
      if(m.conversation_id!==currentConvId){
        const el=document.getElementById('unread-'+m.conversation_id);
        if(el){const n=parseInt(el.textContent||'0')+1;el.textContent=n;el.style.display='';}
      }
    }
    if(msg.type==='typing' && msg.conversation_id===currentConvId){
      showTyping(msg.userId, msg.isTyping);
    }
  };
  ws.onclose=()=>setTimeout(connectWS, 3000);
  ws.onerror=()=>{};
}

function ping(){ if(ws&&ws.readyState===1){ws.send(JSON.stringify({type:'ping'}));setTimeout(ping,25000);} }
function sendTyping(on){ if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'typing',conversation_id:currentConvId,isTyping:on})); }

let typingUsers={};
function showTyping(uid, isTyping){
  if(uid===currentUser?.id) return;
  typingUsers[uid]=isTyping;
  const any=Object.values(typingUsers).some(Boolean);
  let el=document.getElementById('typingRow');
  if(!el){
    el=document.createElement('div');el.id='typingRow';el.className='typing-indicator';
    el.innerHTML=`<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span>đang gõ...</span>`;
    const msgs=document.getElementById('messagesEl');
    if(msgs) msgs.appendChild(el);
  }
  el.style.display=any?'flex':'none';
  if(any) scrollToBottom();
}

function updateSidebarPreview(convId, content, ts){
  const el=document.getElementById('prev-'+convId);
  if(el){el.textContent=content||'📎 Tệp đính kèm';}
  const tel=document.getElementById('time-'+convId);
  if(tel){tel.textContent=timeAgo(ts);}
}

// ── CONVERSATIONS ──
async function loadConversations(){
  if(!token){showLoginPrompt();return;}
  const d=await apiFetch('/api/dm/conversations');
  conversations=d.conversations||[];
  renderConvList(conversations);
}

function renderConvList(convs){
  const el=document.getElementById('convList');
  if(!convs.length){
    el.innerHTML=`<div style="text-align:center;padding:32px;color:var(--text3)"><div style="font-size:36px;margin-bottom:8px">💬</div>Chưa có cuộc trò chuyện nào<br><br><button onclick="openNewChat()" style="background:var(--brand);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer">Bắt đầu chat</button></div>`;
    return;
  }
  el.innerHTML=convs.map(c=>`
    <div class="conv-item" id="conv-${c.id}" onclick="openConversation('${c.id}')">
      <div class="conv-avatar" style="background:var(--brand)">
        ${c.display_avatar?`<img src="${c.display_avatar}" onerror="this.style.display='none'">`:''}
        <span>${initials(c.display_name)}</span>
        <div class="online-dot" id="online-${c.other_user_id||c.id}" style="display:none"></div>
      </div>
      <div class="conv-body">
        <div class="conv-name">
          <span>${c.display_name||'Người dùng'}</span>
          <span class="conv-time" id="time-${c.id}">${timeAgo(c.last_message_at)}</span>
        </div>
        <div class="conv-preview">
          <span id="prev-${c.id}">${c.last_message||'Bắt đầu trò chuyện'}</span>
          <span class="unread-badge" id="unread-${c.id}" style="${!c.unread_count?'display:none':''}">${c.unread_count||0}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filterConvs(q){
  const filtered=conversations.filter(c=>(c.display_name||'').toLowerCase().includes(q.toLowerCase()));
  renderConvList(filtered);
}

// ── OPEN CONVERSATION ──
async function openConversation(id){
  currentConvId=id;
  // Mark active
  document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
  const ci=document.getElementById('conv-'+id);
  if(ci){ci.classList.add('active');const u=document.getElementById('unread-'+id);if(u)u.style.display='none';}
  const conv=conversations.find(c=>c.id===id)||{};
  renderChatArea(conv);
  loadMessages(id);
}

function renderChatArea(conv){
  const el=document.getElementById('chatArea');
  el.innerHTML=`
    <div class="chat-header">
      <button class="back-btn" onclick="showSidebar()">←</button>
      <div class="chat-header-avatar">
        ${conv.display_avatar?`<img src="${conv.display_avatar}">`:''}
        <span>${initials(conv.display_name)}</span>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-name">${conv.display_name||'Người dùng'}</div>
        <div class="chat-header-status offline" id="chatStatus">Đang tải...</div>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" title="Cuộc gọi (sắp ra mắt)">📞</button>
        <button class="icon-btn" title="Video call (sắp ra mắt)">📹</button>
      </div>
    </div>
    <div class="messages" id="messagesEl"></div>
    <div id="emojiBar" style="display:none" class="emoji-bar">
      ${EMOJIS.map(e=>`<span class="emoji-item" onclick="quickEmoji('${e}')">${e}</span>`).join('')}
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <span class="input-emoji-btn" onclick="toggleEmoji()">😊</span>
        <textarea class="msg-input" id="msgInput" placeholder="Nhắn tin..." rows="1"
          oninput="autoResize(this);onTyping()"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  `;
}

function autoResize(el){ el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function toggleEmoji(){
  showEmoji=!showEmoji;
  const bar=document.getElementById('emojiBar');
  if(bar) bar.style.display=showEmoji?'flex':'none';
}
function quickEmoji(e){
  const inp=document.getElementById('msgInput');
  if(!inp) return;
  inp.value+=e;inp.focus();autoResize(inp);
}

function onTyping(){
  sendTyping(true);
  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>sendTyping(false),2000);
}

async function loadMessages(id){
  const el=document.getElementById('messagesEl');
  if(!el) return;
  const d=await apiFetch(`/api/dm/conversations/${id}/messages?limit=50`);
  messages=d.messages||[];
  el.innerHTML='';
  messages.forEach(m=>appendMessage(m,false));
  scrollToBottom();
  // Update status
  const st=document.getElementById('chatStatus');
  if(st){st.textContent='Hoạt động';st.className='chat-header-status';}
}

function appendMessage(m, scroll=true){
  const el=document.getElementById('messagesEl');
  if(!el) return;
  const isMine=m.sender_id===currentUser?.id;
  const div=document.createElement('div');
  div.className='msg-row'+(isMine?' mine':'');
  div.id='msg-'+m.id;
  const rxns=m.reactions||[];
  const rxnGroups={};
  rxns.forEach(r=>{ rxnGroups[r.emoji]=(rxnGroups[r.emoji]||0)+1; });
  const rxnHtml=Object.keys(rxnGroups).length?`<div class="msg-reactions">${Object.entries(rxnGroups).map(([e,n])=>`<span class="msg-reaction" onclick="reactMsg('${m.id}','${e}',this)">${e}${n>1?` ${n}`:''}</span>`).join('')}</div>`:'' ;
  div.innerHTML=`
    ${!isMine?`<div class="msg-avatar">${m.sender_name?initials(m.sender_name):'?'}</div>`:''}
    <div style="display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'};max-width:70%;position:relative">
      ${!isMine?`<div style="font-size:11px;color:var(--text3);margin-bottom:2px;padding:0 4px">${m.sender_name||'Ẩn danh'}</div>`:''}
      <div class="msg-bubble${m.is_deleted?' msg-deleted':''}" onclick="showReactPicker('${m.id}',${isMine},this)" style="cursor:pointer">
        ${m.msg_type==='image'&&m.media_url?`<div class="msg-image"><img src="${m.media_url}" loading="lazy"></div>`:''}
        <span>${m.is_deleted?'Tin nhắn đã bị thu hồi':(m.content||'')}</span>
      </div>
      ${rxnHtml}
      <div style="font-size:10px;color:var(--text3);margin-top:2px;padding:0 4px">${timeAgo(m.created_at)}</div>
    </div>
    ${isMine?`<div class="msg-avatar" style="background:var(--brand-light);color:var(--brand)">${currentUser?initials(currentUser.name):'?'}</div>`:''}
  `;
  el.appendChild(div);
  if(scroll) scrollToBottom();
}

function scrollToBottom(){
  const el=document.getElementById('messagesEl');
  if(el) requestAnimationFrame(()=>{el.scrollTop=el.scrollHeight;});
}

async function sendMessage(){
  if(!token){toast('Đăng nhập để nhắn tin',false);return;}
  const inp=document.getElementById('msgInput');
  if(!inp||!currentConvId) return;
  const content=inp.value.trim();
  if(!content) return;
  inp.value='';autoResize(inp);sendTyping(false);
  const d=await apiFetch(`/api/dm/conversations/${currentConvId}/messages`,{method:'POST',body:JSON.stringify({content,msg_type:'text'})});
  if(d.message){
    appendMessage(d.message);scrollToBottom();
    updateSidebarPreview(currentConvId,content,d.message.created_at);
  } else toast(d.error||'Lỗi gửi tin nhắn',false);
}

// REACT PICKER
let reactPicker=null;
function showReactPicker(msgId, isMine, bubble){
  if(reactPicker){reactPicker.remove();reactPicker=null;return;}
  const picker=document.createElement('div');
  picker.className='react-picker'+(isMine?' mine':'');
  picker.innerHTML=EMOJIS.map(e=>`<span class="react-emoji" onclick="reactMsg('${msgId}','${e}',null)">${e}</span>`).join('');
  bubble.parentElement.style.position='relative';
  bubble.parentElement.appendChild(picker);
  reactPicker=picker;
  setTimeout(()=>document.addEventListener('click',()=>{picker.remove();reactPicker=null;},{once:true}),0);
}

async function reactMsg(msgId, emoji, btn){
  if(!token){toast('Đăng nhập để thả cảm xúc',false);return;}
  await apiFetch(`/api/dm/messages/${msgId}/react`,{method:'POST',body:JSON.stringify({emoji})});
  // Reload the conversation to refresh reactions
  loadMessages(currentConvId);
}

// NEW CHAT
function openNewChat(){
  if(!token){toast('Vui lòng đăng nhập',false);return;}
  document.getElementById('newChatModal').classList.add('open');
  setTimeout(()=>document.getElementById('newChatUserId')?.focus(),100);
}
function closeNewChat(){ document.getElementById('newChatModal').classList.remove('open'); }
document.getElementById('newChatModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeNewChat(); });

async function startNewChat(){
  const userId=document.getElementById('newChatUserId').value.trim();
  if(!userId){toast('Nhập ID người dùng',false);return;}
  const d=await apiFetch('/api/dm/conversations',{method:'POST',body:JSON.stringify({user_id:userId,type:'direct'})});
  if(d.conversation){
    closeNewChat();
    document.getElementById('newChatUserId').value='';
    await loadConversations();
    openConversation(d.conversation.id);
  } else toast(d.error||'Lỗi',false);
}

function showLoginPrompt(){
  document.getElementById('chatArea').innerHTML=`
    <div class="chat-empty">
      <div class="chat-empty-icon">🔐</div>
      <div class="chat-empty-text">Đăng nhập để nhắn tin</div>
      <div class="chat-empty-sub">Bạn cần đăng nhập để sử dụng SafePass Messenger</div>
      <br>
      <button onclick="location.href='/'" style="background:var(--brand);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer">Đăng nhập</button>
    </div>
  `;
}

function showSidebar(){
  document.getElementById('sidebar').classList.add('show');
}

async function init(){
  if(token){
    try{
      const d=await apiFetch('/api/users/me');
      if(d.id) currentUser=d;
    }catch(e){}
  }
  loadConversations();
  connectWS();
}

init();
</script>
</body>
</html>
