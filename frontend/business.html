<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePass Business & Merchant Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05080f;--bg2:#080c18;--card:#0d1220;--card2:#111827;--card3:#141e30;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--border3:rgba(255,255,255,.16);
  --brand:#f97316;--brandD:#ea6c0a;--brandL:rgba(249,115,22,.12);
  --blue:#3d8ef8;--purple:#a78bfa;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--cyan:#06b6d4;
  --text:#e8edf5;--sub:#6b7a99;--sub2:#4a5568;
  --radius:12px;--radius2:8px;--sidebar-w:240px;
  --badge-v:linear-gradient(135deg,#f97316,#dc2626);
  --badge-t:linear-gradient(135deg,#3d8ef8,#06b6d4);
  --badge-p:linear-gradient(135deg,#a78bfa,#7c3aed);
  --badge-g:linear-gradient(135deg,#f59e0b,#d97706);
  --badge-d:linear-gradient(135deg,#06b6d4,#3d8ef8,#a78bfa);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;transition:.15s;}
input,select,textarea{font-family:inherit;color:var(--text);}

/* ── AUTH ── */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 60% 20%,rgba(249,115,22,.07),transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(61,142,248,.05),transparent 50%);}
.auth-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo .icon{width:44px;height:44px;background:linear-gradient(135deg,#f97316,#dc2626);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.auth-logo .texts .title{font-size:18px;font-weight:800;}
.auth-logo .texts .sub{font-size:12px;color:var(--sub);margin-top:1px;}
.auth-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--sub);transition:.2s;border:none;background:transparent;}
.auth-tab.active{background:var(--brand);color:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;color:var(--sub);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:10px 14px;color:var(--text);font-size:13px;outline:none;transition:.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--brand);}
.form-group select option{background:var(--card);}
.form-group textarea{resize:vertical;min-height:80px;}
.btn-primary{width:100%;background:var(--brand);color:#fff;border:none;border-radius:var(--radius2);padding:12px;font-size:14px;font-weight:700;letter-spacing:.2px;}
.btn-primary:hover{background:var(--brandD);}
.auth-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius2);padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:14px;display:none;}
.auth-divider{text-align:center;color:var(--sub);font-size:12px;margin:16px 0;}
.back-link{text-align:center;margin-top:16px;font-size:13px;color:var(--sub);}
.back-link a{color:var(--brand);cursor:pointer;}

/* ── APP ── */
#appScreen{display:none;min-height:100vh;}
.app-layout{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sidebar-brand{display:flex;align-items:center;gap:10px;}
.sidebar-brand .ico{width:36px;height:36px;background:linear-gradient(135deg,#f97316,#dc2626);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sidebar-brand .name{font-size:14px;font-weight:800;}
.sidebar-brand .tag{font-size:10px;color:var(--sub);}
.biz-info{padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(249,115,22,.04);}
.biz-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.biz-type{font-size:11px;color:var(--sub);margin-top:2px;}
.biz-badge-row{margin-top:6px;display:flex;align-items:center;gap:6px;}
.badge-pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
.badge-none{background:rgba(107,122,153,.15);color:var(--sub);}
.badge-verified{background:rgba(16,185,129,.15);color:var(--green);}
.badge-trusted{background:rgba(61,142,248,.15);color:var(--blue);}
.badge-premium{background:rgba(167,139,250,.15);color:var(--purple);}
.badge-gold{background:rgba(245,158,11,.15);color:var(--yellow);}
.badge-diamond{background:linear-gradient(135deg,rgba(6,182,212,.2),rgba(167,139,250,.2));color:var(--cyan);}
.sidebar-nav{flex:1;padding:10px 8px;}
.nav-section-label{font-size:9px;color:var(--sub2);font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius2);cursor:pointer;color:var(--sub);font-size:13px;font-weight:500;transition:.15s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:rgba(249,115,22,.12);color:var(--brand);}
.nav-item .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);}

/* Main */
.main-content{flex:1;margin-left:var(--sidebar-w);padding:0;min-height:100vh;}
.page-header{padding:24px 28px 0;margin-bottom:24px;}
.page-title{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px;}
.page-sub{font-size:13px;color:var(--sub);margin-top:4px;}
.page-body{padding:0 28px 40px;}

/* Cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--brand));}
.stat-label{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.stat-value{font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;}
.stat-sub{font-size:11px;color:var(--sub);margin-top:4px;}
.stat-trend{font-size:11px;margin-top:6px;font-weight:600;}
.stat-trend.up{color:var(--green);}
.stat-trend.down{color:var(--red);}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--radius2);font-size:13px;font-weight:600;border:none;transition:.15s;}
.btn-orange{background:var(--brand);color:#fff;}
.btn-orange:hover{background:var(--brandD);}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--card2);color:var(--text);}
.btn-green{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.btn-green:hover{background:rgba(16,185,129,.25);}
.btn-red{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-red:hover{background:rgba(239,68,68,.22);}
.btn-blue{background:rgba(61,142,248,.12);color:var(--blue);border:1px solid rgba(61,142,248,.3);}
.btn-sm{padding:5px 11px;font-size:12px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:10px 12px;font-size:11px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);}
.tbl td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}
.tbl-empty{text-align:center;padding:40px;color:var(--sub);}

/* Status badges */
.status{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.status-pending{background:rgba(245,158,11,.15);color:var(--yellow);}
.status-active{background:rgba(16,185,129,.15);color:var(--green);}
.status-approved{background:rgba(16,185,129,.15);color:var(--green);}
.status-rejected{background:rgba(239,68,68,.15);color:var(--red);}
.status-sold{background:rgba(61,142,248,.15);color:var(--blue);}
.status-listed{background:rgba(167,139,250,.15);color:var(--purple);}
.status-accepted{background:rgba(6,182,212,.15);color:var(--cyan);}
.status-returned{background:rgba(107,122,153,.15);color:var(--sub);}
.status-inactive{background:rgba(107,122,153,.15);color:var(--sub);}
.status-out_of_stock{background:rgba(239,68,68,.15);color:var(--red);}
.status-none{background:rgba(107,122,153,.15);color:var(--sub);}
.status-staff{background:rgba(107,122,153,.15);color:var(--sub);}
.status-manager{background:rgba(61,142,248,.15);color:var(--blue);}
.status-admin{background:rgba(249,115,22,.15);color:var(--brand);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:200;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:600px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:transparent;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:2px 6px;}

/* Store page card */
.store-hero{border-radius:var(--radius);overflow:hidden;margin-bottom:18px;position:relative;}
.store-banner{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#1a1f2e,#0d1220);display:block;}
.store-banner-placeholder{width:100%;height:160px;background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(61,142,248,.1));display:flex;align-items:center;justify-content:center;font-size:40px;}
.store-logo-wrap{position:absolute;bottom:-24px;left:20px;width:64px;height:64px;border-radius:14px;border:3px solid var(--card);background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;}
.store-info{padding:36px 20px 16px;}

/* Dashboard quick actions */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:24px;}
.quick-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;text-align:center;cursor:pointer;transition:.15s;}
.quick-card:hover{border-color:var(--brand);background:rgba(249,115,22,.06);}
.quick-card .qc-icon{font-size:24px;margin-bottom:8px;}
.quick-card .qc-label{font-size:12px;font-weight:600;color:var(--sub);}

/* Rankings */
.rank-card{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:10px;}
.rank-num{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;width:32px;text-align:center;flex-shrink:0;}
.rank-num.gold{color:var(--yellow);}
.rank-num.silver{color:#9ca3af;}
.rank-num.bronze{color:#d97706;}
.rank-avatar{width:40px;height:40px;border-radius:10px;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-meta{font-size:11px;color:var(--sub);}
.rank-score{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--brand);}

/* Wallet */
.wallet-card{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(61,142,248,.08));border:1px solid rgba(249,115,22,.2);border-radius:var(--radius);padding:24px;margin-bottom:18px;}
.wallet-balance{font-size:32px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--brand);}
.wallet-label{font-size:12px;color:var(--sub);margin-bottom:8px;}

/* Verification steps */
.verify-step{display:flex;gap:14px;padding:16px;border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:10px;align-items:flex-start;}
.verify-step .step-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.step-pending{background:rgba(245,158,11,.15);}
.step-done{background:rgba(16,185,129,.15);}
.step-rejected{background:rgba(239,68,68,.15);}
.verify-step .step-title{font-size:13px;font-weight:700;}
.verify-step .step-sub{font-size:12px;color:var(--sub);margin-top:2px;}

/* API section */
.api-key-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;word-break:break-all;display:flex;align-items:center;gap:10px;}
.api-key-text{flex:1;color:var(--green);}

/* Chart container */
.chart-wrap{position:relative;height:220px;}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:.3s;max-width:320px;}
#toast.show{opacity:1;}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:static;flex-direction:row;overflow-x:auto;}
  .sidebar-nav{display:flex;flex-direction:row;padding:4px;}
  .nav-section-label{display:none;}
  .main-content{margin-left:0;}
  .section-grid{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .page-header,.page-body{padding-left:16px;padding-right:16px;}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🏬</div>
      <div class="texts">
        <div class="title">SafePass Business</div>
        <div class="sub">Merchant & Business Center</div>
      </div>
    </div>
    <div class="auth-error" id="authErr"></div>
    <div id="authLoginForm">
      <div class="auth-tabs" style="margin-bottom:20px;">
        <button class="auth-tab active" onclick="showAuthTab('login')">Đăng nhập</button>
        <button class="auth-tab" onclick="showAuthTab('register')">Đăng ký</button>
      </div>
      <div class="form-group">
        <label>Email doanh nghiệp</label>
        <input type="email" id="loginEmail" placeholder="email@congty.com" />
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="loginPwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn-primary" onclick="doLogin()" id="loginBtn">Đăng nhập</button>
      <div class="back-link" style="margin-top:16px;"><a href="/">← Về SafePass</a></div>
    </div>

    <div id="authRegisterForm" style="display:none;">
      <div class="auth-tabs" style="margin-bottom:20px;">
        <button class="auth-tab" onclick="showAuthTab('login')">Đăng nhập</button>
        <button class="auth-tab active" onclick="showAuthTab('register')">Đăng ký</button>
      </div>
      <div class="form-group">
        <label>Loại tài khoản</label>
        <select id="regType">
          <option value="individual">Cá nhân (Individual)</option>
          <option value="store" selected>Cửa hàng (Store)</option>
          <option value="business">Doanh nghiệp (Business)</option>
          <option value="consignment">Đại lý ký gửi (Consignment Agent)</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tên công ty / Cửa hàng</label>
          <input type="text" id="regName" placeholder="Tên hiển thị" />
        </div>
        <div class="form-group">
          <label>Điện thoại</label>
          <input type="tel" id="regPhone" placeholder="09xxxxxxxx" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="email@congty.com" />
      </div>
      <div class="form-group">
        <label>Website (tùy chọn)</label>
        <input type="text" id="regWebsite" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Mật khẩu (ít nhất 8 ký tự)</label>
        <input type="password" id="regPwd" placeholder="••••••••" />
      </div>
      <button class="btn-primary" onclick="doRegister()" id="registerBtn">Tạo tài khoản</button>
      <div class="back-link"><a href="/">← Về SafePass</a></div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <div class="app-layout">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="ico">🏬</div>
          <div>
            <div class="name">Business Center</div>
            <div class="tag">SafePass Merchant</div>
          </div>
        </div>
      </div>
      <div class="biz-info" id="bizInfo">
        <div class="biz-name" id="bizNameDisplay">—</div>
        <div class="biz-type" id="bizTypeDisplay">—</div>
        <div class="biz-badge-row" id="bizBadgeRow"></div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section-label">Tổng quan</div>
        <button class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span> Dashboard</button>
        <button class="nav-item" onclick="showPage('profile')" id="nav-profile"><span class="nav-icon">🏪</span> Hồ Sơ Shop</button>
        <div class="nav-section-label">Kinh doanh</div>
        <button class="nav-item" onclick="showPage('inventory')" id="nav-inventory"><span class="nav-icon">📦</span> Kho Hàng</button>
        <button class="nav-item" onclick="showPage('consignment')" id="nav-consignment"><span class="nav-icon">🤝</span> Ký Gửi</button>
        <button class="nav-item" onclick="showPage('staff')" id="nav-staff"><span class="nav-icon">👥</span> Nhân Viên</button>
        <button class="nav-item" onclick="showPage('franchise')" id="nav-franchise"><span class="nav-icon">🏢</span> Chi Nhánh</button>
        <div class="nav-section-label">Tài chính</div>
        <button class="nav-item" onclick="showPage('wallet')" id="nav-wallet"><span class="nav-icon">💰</span> Ví Doanh Nghiệp</button>
        <button class="nav-item" onclick="showPage('analytics')" id="nav-analytics"><span class="nav-icon">📈</span> Phân Tích</button>
        <div class="nav-section-label">Hệ thống</div>
        <button class="nav-item" onclick="showPage('verification')" id="nav-verification"><span class="nav-icon">✅</span> Xác Minh</button>
        <button class="nav-item" onclick="showPage('store')" id="nav-store"><span class="nav-icon">🌐</span> Trang Shop</button>
        <button class="nav-item" onclick="showPage('rankings')" id="nav-rankings"><span class="nav-icon">🏆</span> Xếp Hạng</button>
        <button class="nav-item" onclick="showPage('apicenter')" id="nav-apicenter"><span class="nav-icon">🔌</span> API Center</button>
      </div>
      <div class="sidebar-footer">
        <button class="nav-item" onclick="doLogout()"><span class="nav-icon">🚪</span> Đăng xuất</button>
        <button class="nav-item" onclick="window.location.href='/'"><span class="nav-icon">←</span> Về SafePass</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
      <div id="pageContent"></div>
    </div>
  </div>

<script>
const API = '';
let bToken = localStorage.getItem('biz_token') || '';
let bizData = null;
let currentPage = 'dashboard';

// ── AUTH HELPERS ──
function showAuthTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('authLoginForm').style.display = isLogin ? '' : 'none';
  document.getElementById('authRegisterForm').style.display = isLogin ? 'none' : '';
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', isLogin ? i===0 : i===1);
  });
  clearAuthErr();
}
function showAuthErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg; el.style.display = '';
}
function clearAuthErr() { document.getElementById('authErr').style.display = 'none'; }

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPwd').value;
  if (!email || !password) return showAuthErr('Nhập email và mật khẩu');
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Đang đăng nhập…'; btn.disabled = true;
  const r = await apiFetch('/api/business/auth/login', 'POST', { email, password });
  btn.textContent = 'Đăng nhập'; btn.disabled = false;
  if (r.error) return showAuthErr(r.error);
  bToken = r.token;
  localStorage.setItem('biz_token', bToken);
  bizData = r.business;
  showApp();
}

async function doRegister() {
  const company_name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const website = document.getElementById('regWebsite').value.trim();
  const password = document.getElementById('regPwd').value;
  const account_type = document.getElementById('regType').value;
  if (!company_name || !email || !password) return showAuthErr('Điền đầy đủ thông tin bắt buộc');
  const btn = document.getElementById('registerBtn');
  btn.textContent = 'Đang tạo…'; btn.disabled = true;
  const r = await apiFetch('/api/business/auth/register', 'POST', { company_name, email, phone, website, password, account_type });
  btn.textContent = 'Tạo tài khoản'; btn.disabled = false;
  if (r.error) return showAuthErr(r.error);
  bToken = r.token;
  localStorage.setItem('biz_token', bToken);
  bizData = r.business;
  showApp();
}

function doLogout() {
  localStorage.removeItem('biz_token');
  bToken = ''; bizData = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

// ── APP INIT ──
function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = '';
  updateBizInfo();
  showPage('dashboard');
}

function updateBizInfo() {
  if (!bizData) return;
  document.getElementById('bizNameDisplay').textContent = bizData.company_name || '—';
  const typeMap = {individual:'Cá nhân',store:'Cửa hàng',business:'Doanh nghiệp',consignment:'Đại lý ký gửi'};
  document.getElementById('bizTypeDisplay').textContent = typeMap[bizData.account_type] || 'Cửa hàng';
  const badge = bizData.badge || 'none';
  const badgeMap = {none:'—',verified:'✅ Verified Shop',trusted:'💙 Trusted Shop',premium:'💜 Premium Shop',gold:'🥇 Gold Merchant',diamond:'💎 Diamond Merchant'};
  const badgeRow = document.getElementById('bizBadgeRow');
  if (badge !== 'none') badgeRow.innerHTML = `<span class="badge-pill badge-${badge}">${badgeMap[badge]}</span>`;
  else badgeRow.innerHTML = '';
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  const content = document.getElementById('pageContent');
  content.innerHTML = '<div class="page-header"><div class="page-title">⏳ Đang tải…</div></div>';
  const pages = {dashboard: renderDashboard, profile: renderProfile, inventory: renderInventory,
    consignment: renderConsignment, staff: renderStaff, franchise: renderFranchise,
    wallet: renderWallet, analytics: renderAnalytics, verification: renderVerification,
    store: renderStore, rankings: renderRankings, apicenter: renderApiCenter};
  if (pages[page]) pages[page]();
}

async function saveInventory() {
  const body = {
    name: document.getElementById('inv_name').value.trim(),
    sku: document.getElementById('inv_sku').value.trim(),
    description: document.getElementById('inv_desc').value.trim(),
    price: parseInt(document.getElementById('inv_price').value) || 0,
    stock: parseInt(document.getElementById('inv_stock').value) || 0,
    category: document.getElementById('inv_category').value,
    status: document.getElementById('inv_status').value
  };
  if (!body.name) return toast('❌ Nhập tên sản phẩm');
  const r = await apiFetch('/api/merchant/inventory', 'POST', body);
  if (r.error) return toast('❌ ' + r.error);
  closeModal('modalInventory');
  toast('✅ Đã thêm sản phẩm!');
  renderInventory();
}

async function deleteInventory(id) {
  if (!confirm('Xóa sản phẩm này?')) return;
  const r = await apiFetch('/api/merchant/inventory/' + id, 'DELETE');
  if (r.error) return toast('❌ ' + r.error);
  toast('🗑️ Đã xóa');
  renderInventory();
}

async function submitVerification() {
  const body = {
    license_number: document.getElementById('v_license_number').value.trim(),
    tax_id: document.getElementById('v_tax_id').value.trim(),
    representative_name: document.getElementById('v_rep_name').value.trim(),
    license_url: document.getElementById('v_license_url').value.trim(),
    id_card_url: document.getElementById('v_id_url').value.trim()
  };
  if (!body.license_number || !body.tax_id || !body.representative_name) return toast('❌ Điền đủ thông tin bắt buộc');
  const r = await apiFetch('/api/merchant/verification', 'POST', body);
  if (r.error) return toast('❌ ' + r.error);
  toast('✅ Đã nộp hồ sơ! Admin sẽ xem xét trong 1-3 ngày');
  renderVerification();
}

async function createApiKey() {
  const name = prompt('Tên API key:');
  if (!name) return;
  const env = confirm('Production key? (OK = production, Cancel = sandbox)') ? 'production' : 'sandbox';
  const r = await apiFetch('/api/business/api-keys', 'POST', { name, env_type: env });
  if (r.error) return toast('❌ ' + r.error);
  toast(`✅ Đã tạo key (${env}): ${r.api_key}`);
  renderApiCenter();
}

async function revokeKey(id) {
  if (!confirm('Thu hồi API key này?')) return;
  const r = await apiFetch('/api/business/api-keys/' + id, 'DELETE');
  if (r.error) return toast('❌ ' + r.error);
  toast('✅ Đã thu hồi key');
  renderApiCenter();
}

// ── HELPERS ──
async function apiFetch(url, method = 'GET', body = null) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (bToken) opts.headers['Authorization'] = 'Bearer ' + bToken;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + url, opts);
    return await res.json();
  } catch (e) { return { error: 'Lỗi kết nối' }; }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function copyTxt(text) {
  navigator.clipboard.writeText(text).then(() => toast('✅ Đã sao chép!'));
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMoney(n) { return Number(n||0).toLocaleString('vi-VN'); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—'; }

function statusLabel(s) {
  const m = {active:'Đang bán',inactive:'Tạm ngừng',out_of_stock:'Hết hàng',pending:'Chờ xử lý',accepted:'Đã nhận',listed:'Niêm yết',sold:'Đã bán',returned:'Trả lại',approved:'Đã duyệt',rejected:'Từ chối',staff:'Staff',manager:'Manager',admin:'Admin'};
  return m[s] || s;
}
function roleLabel(r) { return {staff:'Staff',manager:'Manager',admin:'Admin'}[r]||r; }
function catLabel(c) { return {general:'Chung',ticket:'Vé',digital:'Số',physical:'Vật lý',service:'Dịch vụ'}[c]||c; }
function txnTypeLabel(t) { return {revenue:'Doanh thu',fee:'Phí DV',withdrawal:'Rút tiền',deposit:'Nạp tiền',refund:'Hoàn tiền'}[t]||t; }
function txnTypeClass(t) { return {revenue:'status-approved',fee:'status-rejected',withdrawal:'status-pending',deposit:'status-approved',refund:'status-pending'}[t]||'status-none'; }

function badgeInfo() {
  return [
    {key:'none',icon:'⬜',name:'Chưa có huy hiệu',desc:'Hoàn thành xác minh để nhận huy hiệu đầu tiên'},
    {key:'verified',icon:'✅',name:'Verified Shop',desc:'Đã xác minh giấy phép kinh doanh'},
    {key:'trusted',icon:'💙',name:'Trusted Shop',desc:'Hoàn thành 50+ giao dịch, đánh giá ≥ 4.5'},
    {key:'premium',icon:'💜',name:'Premium Shop',desc:'Hoàn thành 200+ giao dịch, doanh thu cao'},
    {key:'gold',icon:'🥇',name:'Gold Merchant',desc:'Top 10% doanh thu toàn sàn'},
    {key:'diamond',icon:'💎',name:'Diamond Merchant',desc:'Top 1% — đối tác chiến lược SafePass'}
  ];
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) closeModal(o.id); }));

  if (bToken) {
    const r = await apiFetch('/api/business/auth/me');
    if (r.business) { bizData = r.business; showApp(); return; }
    localStorage.removeItem('biz_token'); bToken = '';
  }
  document.getElementById('authScreen').style.display = 'flex';
});
</script>
