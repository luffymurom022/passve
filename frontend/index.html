/* ══════════════════════════════════════════
   🔐 ADMIN DASHBOARD (4 tabs)
══════════════════════════════════════════ */
let _adminData = { stats: null, disputes: [], orders: [], users: [], withdrawals: [], loaded: false };
let _adminTab = 'overview';
let _adminLoading = false;
let _adminLastRefresh = null;
let _adminUserFilter = '';

function adminH() {
  const sec = localStorage.getItem('sp_admsec') || '';
  return { 'Content-Type': 'application/json', 'x-admin-secret': sec };
}

async function adminLoadData(silent = false) {
  if (!currentUser?.is_admin) return;
  if (!silent) { _adminLoading = true; render(); }
  try {
    const sec = encodeURIComponent(localStorage.getItem('sp_admsec') || '');
    const [statsRes, disputesRes, ordersRes, usersRes, wdRes] = await Promise.all([
      fetch(API + '/admin/stats', { headers: adminH() }).then(r => r.ok ? r.json() : null),
      fetch(API + '/admin/orders?status=disputed', { headers: adminH() }).then(r => r.ok ? r.json() : []),
      fetch(API + '/admin/orders', { headers: adminH() }).then(r => r.ok ? r.json() : []),
      fetch(API + '/admin/users', { headers: adminH() }).then(r => r.ok ? r.json() : []),
      fetch(API + '/admin/withdrawals', { headers: adminH() }).then(r => r.ok ? r.json() : []),
    ]);
    if (statsRes === null && !silent) { showToast('Sai Admin Secret — kiểm tra lại', 'var(--red)', '❌'); }
    _adminData.stats = statsRes;
    _adminData.disputes = Array.isArray(disputesRes) ? disputesRes : [];
    _adminData.orders = Array.isArray(ordersRes) ? ordersRes : [];
    _adminData.users = Array.isArray(usersRes) ? usersRes : [];
    _adminData.withdrawals = Array.isArray(wdRes) ? wdRes : [];
    _adminData.loaded = true;
    _adminLastRefresh = new Date();
  } catch(e) { if (!silent) showToast('Lỗi kết nối server', 'var(--red)', '❌'); }
  _adminLoading = false;
  render();
}

async function adminVerifyUser(userId, verify) {
  const action = verify ? 'verify' : 'unverify';
  const res = await fetch(API + '/admin/users/' + userId + '/' + action, { method: 'POST', headers: adminH() });
  if (res.ok) {
    const u = _adminData.users.find(x => x.id === userId);
    if (u) u.is_verified = verify;
    showToast(verify ? '✓ Đã xác minh seller' : 'Đã bỏ xác minh', 'var(--ok)', '✅');
    render();
  } else { showToast('Lỗi: Kiểm tra admin secret', 'var(--red)', '❌'); }
}

async function adminApproveWithdraw(id) {
  const note = prompt('Ghi chú cho user (tùy chọn):') ?? '';
  try {
    const res = await fetch(API + '/admin/withdrawals/' + id + '/approve', {
      method: 'POST', headers: adminH(), body: JSON.stringify({ note })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Lỗi', 'var(--red)', '❌'); return; }
    showToast(data.message || 'Đã duyệt', 'var(--ok)', '✅');
    adminLoadData(true);
  } catch(e) { showToast('Lỗi kết nối', 'var(--red)', '❌'); }
}

async function adminRejectWithdraw(id) {
  const note = prompt('Lý do từ chối (bắt buộc):');
  if (note === null) return;
  if (!note.trim()) { showToast('Vui lòng nhập lý do từ chối', 'var(--red)', '❌'); return; }
  try {
    const res = await fetch(API + '/admin/withdrawals/' + id + '/reject', {
      method: 'POST', headers: adminH(), body: JSON.stringify({ note })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Lỗi', 'var(--red)', '❌'); return; }
    showToast(data.message || 'Đã từ chối', 'var(--ok)', '✅');
    adminLoadData(true);
  } catch(e) { showToast('Lỗi kết nối', 'var(--red)', '❌'); }
}

async function adminBanUser(userId, ban) {
  const action = ban ? 'ban' : 'unban';
  const res = await fetch(API + '/admin/users/' + userId + '/' + action, {
    method: 'POST', headers: adminH(), body: JSON.stringify({ reason: '' })
  });
  if (res.ok) {
    const u = _adminData.users.find(x => x.id === userId);
    if (u) u.is_banned = ban;
    showToast(ban ? '🚫 Đã khoá tài khoản' : '✅ Đã mở khoá', ban ? 'var(--red)' : 'var(--ok)', ban ? '🚫' : '✅');
    render();
  } else { showToast('Lỗi: Kiểm tra admin secret', 'var(--red)', '❌'); }
}

async function adminSetModerator(userId, isMod) {
  const res = await fetch(API + '/admin/users/' + userId + '/set-moderator', {
    method: 'POST', headers: adminH(), body: JSON.stringify({ is_moderator: isMod, secret: localStorage.getItem('sp_admsec') || '' })
  });
  if (res.ok) {
    const u = _adminData.users.find(x => x.id === userId);
    if (u) u.is_moderator = isMod;
    showToast(isMod ? '⚖️ Đã cấp quyền Moderator' : '⚖️ Đã thu hồi quyền Mod', 'var(--purple)', '⚖️');
    render();
  } else { showToast('Lỗi: Kiểm tra admin secret', 'var(--red)', '❌'); }
}

async function adminResolveDispute(orderId, winner) {
  const noteEl = document.getElementById('adm-note-' + orderId);
  const note = noteEl ? noteEl.value.trim() : '';
  const btns = document.querySelectorAll('[data-resolve-id="' + orderId + '"]');
  btns.forEach(b => { b.disabled = true; b.style.opacity = '.5'; });
  try {
    const res = await fetch(API + '/admin/orders/' + orderId + '/resolve', {
      method: 'POST',
      headers: adminH(),
      body: JSON.stringify({ winner, note, secret: localStorage.getItem('sp_admsec') || '' })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Lỗi không xác định');
    showToast('✅ ' + data.message, 'var(--ok)', '✅');
    await adminLoadData(true);
  } catch(e) {
    showToast('❌ ' + e.message, 'var(--red)', '❌');
    btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
  }
}

async function adminExportCSV() {
  try {
    showToast('📥 Đang xuất CSV...', 'var(--brand)', '📥');
    const sec = encodeURIComponent(localStorage.getItem('sp_admsec') || '');
    const res = await fetch(API + '/admin/export?secret=' + sec, { headers: adminH() });
    if (!res.ok) { showToast('❌ Xuất thất bại', 'var(--red)', '❌'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'orders_safepass.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast('✅ Xuất CSV thành công!', 'var(--ok)', '✅');
  } catch(e) { showToast('❌ ' + e.message, 'var(--red)', '❌'); }
}

async function adminProcessTimeouts() {
  try {
    const sec = encodeURIComponent(localStorage.getItem('sp_admsec') || '');
    const res = await fetch(API + '/admin/process-timeouts?secret=' + sec, {
      method: 'POST', headers: adminH(), body: JSON.stringify({ secret: localStorage.getItem('sp_admsec') || '' })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    showToast('✅ Đã xử lý escrow timeouts', 'var(--ok)', '✅');
    await adminLoadData(true);
  } catch(e) { showToast('❌ ' + e.message, 'var(--red)', '❌'); }
}

async function adminLookupOrder(inputId, resultId) {
  const id = (document.getElementById(inputId)?.value || '').trim();
  if (!id) return;
  const el = document.getElementById(resultId);
  if (!el) return;
  el.innerHTML = '<div style="padding:16px;color:var(--hint);font-size:12px;">⏳ Đang tải...</div>';
  try {
    const res = await fetch(API + '/admin/orders/' + id, { headers: adminH() });
    if (res.ok) {
      const o = await res.json();
      el.innerHTML = adminOrderDetail(o);
    } else {
      el.innerHTML = adminResolveCard(id, null);
    }
  } catch(e) { el.innerHTML = `<div style="color:var(--red);font-size:12px;">${e.message}</div>`; }
}

function adminEsc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function adminFmtVND(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('vi-VN') + 'đ';
}
function adminFmtBig(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(0)+'K';
  return n.toLocaleString('vi-VN');
}
function adminStatusPill(status) {
  const map = {
    waiting_qr: '<span style="font-size:10px;font-weight:700;background:rgba(61,142,248,.1);color:var(--brand);border:1px solid rgba(61,142,248,.2);padding:2px 8px;border-radius:6px;">⏳ Chờ QR</span>',
    waiting_confirm: '<span style="font-size:10px;font-weight:700;background:rgba(61,142,248,.1);color:var(--brand);border:1px solid rgba(61,142,248,.2);padding:2px 8px;border-radius:6px;">📸 Chờ confirm</span>',
    completed: '<span style="font-size:10px;font-weight:700;background:var(--okBg);color:var(--ok);border:1px solid rgba(52,216,158,.2);padding:2px 8px;border-radius:6px;">✅ Hoàn tất</span>',
    disputed: '<span style="font-size:10px;font-weight:700;background:var(--redBg);color:var(--red);border:1px solid rgba(240,80,104,.2);padding:2px 8px;border-radius:6px;">⚠️ Tranh chấp</span>',
    refunded: '<span style="font-size:10px;font-weight:700;background:var(--warnBg);color:var(--warn);border:1px solid rgba(245,166,35,.2);padding:2px 8px;border-radius:6px;">↩️ Hoàn tiền</span>',
  };
  return map[status] || `<span style="font-size:10px;font-weight:700;border:1px solid var(--border);padding:2px 8px;border-radius:6px;">${status}</span>`;
}

function adminResolveCard(orderId, order) {
  return `<div style="background:var(--card);border:1.5px solid rgba(240,80,104,.25);border-radius:14px;padding:16px;margin-bottom:10px;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
      <div>
        <div style="font-size:14px;font-weight:700;">${order ? adminEsc(order.event_name) : 'Order: ' + orderId.slice(0,8) + '…'}</div>
        ${order ? `<div style="font-size:11px;color:var(--sub);margin-top:2px;">Buyer: <b>${adminEsc(order.buyer_name)}</b> · Seller: <b>${adminEsc(order.seller_name)}</b> · Tổng: <b>${adminFmtVND(order.total)}</b>${order.dispute_opened_at ? ' · Mở: '+new Date(order.dispute_opened_at).toLocaleString('vi-VN') : ''}</div>` : ''}
      </div>
      ${adminStatusPill('disputed')}
    </div>
    ${order?.dispute_reason ? `<div style="background:var(--redBg);border:1px solid rgba(240,80,104,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px;"><div style="font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;margin-bottom:3px;">Lý do khiếu nại</div><div style="font-size:12px;">${adminEsc(order.dispute_reason)}</div>${order.dispute_description?`<div style="font-size:11px;color:var(--sub);margin-top:4px;">${adminEsc(order.dispute_description)}</div>`:''}</div>` : ''}
    <textarea id="adm-note-${orderId}" rows="2" placeholder="Ghi chú lý do quyết định (optional)..." style="width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);outline:none;resize:vertical;font-family:'Inter',sans-serif;margin-bottom:8px;" onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border2)'"></textarea>
    <div style="display:flex;gap:8px;">
      <button data-resolve-id="${orderId}" onclick="adminResolveDispute('${orderId}','buyer')" style="flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid rgba(155,135,245,.3);background:var(--purpleBg);color:var(--purple);cursor:pointer;">👤 Buyer thắng — Hoàn tiền</button>
      <button data-resolve-id="${orderId}" onclick="adminResolveDispute('${orderId}','seller')" style="flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid rgba(245,166,35,.3);background:var(--warnBg);color:var(--warn);cursor:pointer;">🏪 Seller thắng — Giải ngân</button>
    </div>
  </div>`;
}

function adminOrderDetail(o) {
  return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div style="font-size:14px;font-weight:700;">${adminEsc(o.event_name)}</div>
        <div style="font-size:10px;color:var(--hint);font-family:'JetBrains Mono',monospace;margin-top:2px;">${o.id}</div>
      </div>
      ${adminStatusPill(o.status)}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;font-size:12px;">
      <div><span style="color:var(--sub);">Buyer:</span> <b>${adminEsc(o.buyer_name)}</b></div>
      <div><span style="color:var(--sub);">Seller:</span> <b>${adminEsc(o.seller_name)}</b></div>
      <div><span style="color:var(--sub);">Giá vé:</span> <span style="font-family:'JetBrains Mono',monospace;">${adminFmtVND(o.price)}</span></div>
      <div><span style="color:var(--sub);">Tổng+phí:</span> <span style="font-family:'JetBrains Mono',monospace;">${adminFmtVND(o.total)}</span></div>
    </div>
    ${o.status === 'disputed' ? adminResolveCard(o.id, o) : ''}

function buildAdminVerifyPage() {
  if (!currentUser?.is_admin) return `<div style="text-align:center;padding:80px 20px;color:var(--hint);">Không có quyền truy cập.</div>`;

  const sec = localStorage.getItem('sp_admsec') || '';
  const s = _adminData.stats || {};
  const disputes = _adminData.disputes;
  const orders = _adminData.orders;
  const users = _adminData.users;
  const loaded = _adminData.loaded;
  const timeStr = _adminLastRefresh ? _adminLastRefresh.toLocaleTimeString('vi-VN') : '—';

  const TAB_STYLE = (id) => `padding:8px 14px;border-radius:10px 10px 0 0;font-size:12px;font-weight:${_adminTab===id?'700':'500'};cursor:pointer;border:1px solid ${_adminTab===id?'var(--border)':'transparent'};border-bottom:1px solid ${_adminTab===id?'var(--card)':'transparent'};background:${_adminTab===id?'var(--card)':'none'};color:${_adminTab===id?'var(--text)':'var(--sub)'};transition:all .15s;white-space:nowrap;position:relative;bottom:-1px;`;

  const tabs = `
    <div style="display:flex;gap:2px;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px;margin-bottom:0;">
      <button style="${TAB_STYLE('overview')}" onclick="_adminTab='overview';render()">📊 Tổng quan</button>
      <button style="${TAB_STYLE('disputes')}" onclick="_adminTab='disputes';render()">🔥 Khiếu nại${disputes.length>0?` <span style="display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;background:var(--red);color:#fff;border-radius:8px;font-size:9px;margin-left:3px;">${disputes.length}</span>`:''}
      </button>
      <button style="${TAB_STYLE('orders')}" onclick="_adminTab='orders';render()">📋 Đơn hàng</button>
      <button style="${TAB_STYLE('users')}" onclick="_adminTab='users';render()">👥 Người dùng</button>
      <button style="${TAB_STYLE('withdrawals')}" onclick="_adminTab='withdrawals';render()">💸 Rút tiền${_adminData.withdrawals.filter(w=>w.status==='pending').length>0?` <span style="display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;background:var(--warn);color:#000;border-radius:8px;font-size:9px;margin-left:3px;">${_adminData.withdrawals.filter(w=>w.status==='pending').length}</span>`:''}</button>
    </div>`;

  // ─── Secret bar ───
  const secretBar = `
    <div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:11px;color:var(--hint);white-space:nowrap;">🔑 Secret:</span>
      <input type="password" value="${adminEsc(sec)}" oninput="localStorage.setItem('sp_admsec',this.value)"
        placeholder="Nhập admin secret..."
        style="flex:1;min-width:0;padding:6px 10px;border-radius:8px;border:1.5px solid var(--border2);background:var(--card);color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;"
        onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border2)'">
      <button onclick="adminLoadData(false)" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(61,142,248,.3);background:rgba(61,142,248,.1);color:var(--brand);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">🔄 Tải</button>
      ${loaded?`<span style="font-size:10px;color:var(--hint);white-space:nowrap;">${timeStr}</span>`:''}
    </div>`;

  // ─── Not loaded yet ───
  if (!loaded && !_adminLoading) {
    return `<div style="padding-bottom:80px;"><div style="font-size:22px;font-weight:800;font-family:'Syne',sans-serif;padding:20px 16px 0;">🔐 Admin Dashboard</div>${secretBar}<div style="text-align:center;padding:60px 20px;color:var(--hint);"><div style="font-size:36px;margin-bottom:10px;">🔐</div><div style="font-size:13px;">Nhập Admin Secret và bấm "Tải"</div></div></div>`;
  }
  if (_adminLoading) {
    return `<div style="padding-bottom:80px;"><div style="font-size:22px;font-weight:800;font-family:'Syne',sans-serif;padding:20px 16px 0;">🔐 Admin Dashboard</div>${secretBar}<div style="text-align:center;padding:60px 20px;color:var(--hint);font-size:13px;">⏳ Đang tải dữ liệu...</div></div>`;
  }

  // ─── OVERVIEW TAB ───
  const overviewTab = () => {
    const statCard = (label, val, col, sub) =>
      `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;flex:1;min-width:130px;">
        <div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;">${label}</div>
        <div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${col};">${val}</div>
        ${sub?`<div style="font-size:10px;color:var(--hint);margin-top:2px;">${sub}</div>`:''}
      </div>`;
    return `

let _modDisputes = [];
let _modLoading = false;
let _modLoaded = false;

async function modLoadDisputes() {
  _modLoading = true; render();
  try {
    const res = await fetch(API + '/moderator/disputes', { headers: { Authorization: 'Bearer ' + authToken } });
    if (!res.ok) { showToast('Lỗi tải dữ liệu', 'var(--red)', '❌'); _modLoading = false; render(); return; }
    _modDisputes = await res.json();
    _modLoaded = true;
  } catch(e) { showToast('Lỗi kết nối', 'var(--red)', '❌'); }
  _modLoading = false; render();
}

async function modResolveDispute(orderId, winner) {
  const noteEl = document.getElementById('mod-note-' + orderId);
  const note = noteEl ? noteEl.value.trim() : '';
  const btns = document.querySelectorAll('[data-mod-resolve-id="' + orderId + '"]');
  btns.forEach(b => { b.disabled = true; b.style.opacity = '.5'; });
  try {
    const res = await fetch(API + '/moderator/orders/' + orderId + '/resolve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + authToken },
      body: JSON.stringify({ winner, note })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Lỗi không xác định');
    showToast('✅ ' + data.message, 'var(--ok)', '✅');
    await modLoadDisputes();
  } catch(e) {
    showToast('❌ ' + e.message, 'var(--red)', '❌');
    btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
  }
}

  if(!cached){
    if(!window._sellerProfiles) window._sellerProfiles = {};
    window._sellerProfiles[sellerId] = 'loading';

      fetch(API+'/users/'+sellerId).then(r=>r.json()).catch(()=>null),

      fetch(API+'/users/'+sellerId+'/reviews').then(r=>r.json()).catch(()=>[]),

// Per-order chat threads stored in memory
const CHAT_THREADS={};

function getChatThread(orderId){
  if(!CHAT_THREADS[orderId]){
    const o=ORDERS.find(x=>x.id===orderId);
    const other=o?(o.role==="buyer"?o.seller:o.buyer):{name:"Người dùng",avatar:"?"};
    CHAT_THREADS[orderId]=[
      {role:"them",text:`Xin chào! Mình là ${other.name}. Có gì cần hỏi về đơn #${orderId.toUpperCase()} cứ nhắn mình nhé 😊`,time:"Hôm qua"}
    ];
  }
  return CHAT_THREADS[orderId];
}

let chatOrderTyping=false;
let chatOrderTimer=null;
let _chatPollInterval=null;
let _chatWS=null;
let _chatWSOrderId=null;
let _chatTypingTimer=null;
let _chatTypingTimeout=null;
let _chatReadStatus={};

function stopChatPolling(){
  if(_chatPollInterval){clearInterval(_chatPollInterval);_chatPollInterval=null;}
}

function startChatPolling(orderId){
  stopChatPolling();
  if(!authToken||!currentUser||currentUser.id==='demo'||!orderId.includes('-')) return;
  _chatPollInterval=setInterval(async()=>{
    if(state.page!=='chat'||state.activeChat!==orderId){stopChatPolling();return;}
    // Fallback refresh every 30s (WS handles real-time)
    if(!_chatWS||_chatWS.readyState>1) await loadChatMessages(orderId,false);
  },30000);
}

function getChatWSUrl(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  return`${proto}//${location.host}/ws/chat`;
}

function connectChatWS(orderId){
  if(!authToken||!currentUser||currentUser.id==='demo'||!orderId.includes('-')) return;
  if(_chatWSOrderId===orderId&&_chatWS&&_chatWS.readyState<=1) return;
  disconnectChatWS();
  _chatWSOrderId=orderId;
  try{
    const url=`${getChatWSUrl()}?token=${encodeURIComponent(authToken)}&orderId=${orderId}`;
    _chatWS=new WebSocket(url);

    _chatWS.onopen=()=>{
      try{_chatWS.send(JSON.stringify({type:'read'}));}catch(e){}
      _chatWS._ping=setInterval(()=>{
        if(_chatWS&&_chatWS.readyState===1) try{_chatWS.send(JSON.stringify({type:'ping'}));}catch(e){}
      },25000);
    };

    _chatWS.onmessage=(evt)=>{
      let msg;try{msg=JSON.parse(evt.data);}catch{return;}

      if(msg.type==='message'){
        const m=msg.message;
        const thread=getChatThread(orderId);
        const isMe=m.sender_id===currentUser?.id;
        if(!thread.find(t=>t.id===m.id)){
          thread.push({
            id:m.id,role:isMe?'me':'them',text:m.text,
            image_url:m.image_url||null,message_type:m.message_type||'text',
            time:new Date(m.created_at).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),
            sender_name:m.sender_name,read_at:null,
          });
        }
        if(state.page==='chat'&&state.activeChat===orderId){
          setState({});scrollOrderChatBottom();
          if(!isMe) try{_chatWS.send(JSON.stringify({type:'read'}));}catch(e){}
        } else if(!isMe){
          showToast(`💬 ${m.sender_name}: ${(m.message_type==='image'?'📎 Đã gửi ảnh':(m.text||'')).slice(0,40)}`,'var(--brand)','💬');
        }
      }

      if(msg.type==='typing'){
        clearTimeout(_chatTypingTimeout);
        if(state.page==='chat'&&state.activeChat===orderId){
          const el=document.getElementById('chat-typing-indicator');
          if(el){el.style.display=msg.isTyping?'flex':'none';if(msg.isTyping)scrollOrderChatBottom();}
          if(msg.isTyping){
            _chatTypingTimeout=setTimeout(()=>{
              const el2=document.getElementById('chat-typing-indicator');
              if(el2)el2.style.display='none';
            },3000);
          }
        }
      }

      if(msg.type==='read'){
        _chatReadStatus[orderId]=true;
        if(state.page==='chat'&&state.activeChat===orderId){
          document.querySelectorAll('.chat-receipt-unread').forEach(el=>{
            el.style.color='var(--brand)';
            el.classList.remove('chat-receipt-unread');
          });
        }
      }

      if(msg.type==='push_notification'){
        showToast(`💬 ${msg.senderName}: ${(msg.text||'').slice(0,40)}`,'var(--brand)','💬');
        loadNotificationsFromAPI&&loadNotificationsFromAPI().catch(()=>{});
      }
    };

    _chatWS.onclose=()=>{
      if(_chatWS&&_chatWS._ping){clearInterval(_chatWS._ping);}
      if(_chatWSOrderId===orderId)_chatWS=null;
    };
    _chatWS.onerror=()=>{};
  }catch(e){}
}

function disconnectChatWS(){
  if(_chatWS){
    if(_chatWS._ping)clearInterval(_chatWS._ping);
    try{_chatWS.close();}catch(e){}
    _chatWS=null;
  }
  _chatWSOrderId=null;
  clearTimeout(_chatTypingTimer);
  clearTimeout(_chatTypingTimeout);
  stopChatPolling();
}

function sendChatTyping(isTyping){
  if(_chatWS&&_chatWS.readyState===1){
    try{_chatWS.send(JSON.stringify({type:'typing',isTyping}));}catch(e){}
  }
}

function handleChatInput(orderId,el){
  el.style.height='38px';
  el.style.height=Math.min(el.scrollHeight,90)+'px';
  sendChatTyping(true);
  clearTimeout(_chatTypingTimer);
  _chatTypingTimer=setTimeout(()=>sendChatTyping(false),1500);
}

async function sendChatImage(orderId){
  if(!authToken){showToast('Cần đăng nhập','var(--red)','❌');return;}
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=async()=>{
    const file=input.files[0];
    if(!file)return;
    if(file.size>5*1024*1024){showToast('Ảnh tối đa 5MB','var(--red)','❌');return;}
    const btn=document.getElementById('chat-attach-btn');
    if(btn){btn.innerHTML='⏳';btn.disabled=true;}
    try{
      const fd=new FormData();fd.append('image',file);
      const res=await fetch(API+'/orders/'+orderId+'/messages/image',{
        method:'POST',headers:{'Authorization':'Bearer '+authToken},body:fd
      });
      const data=await res.json();
      if(!res.ok){showToast(data.error||'Lỗi gửi ảnh','var(--red)','❌');return;}
      const thread=getChatThread(orderId);
      if(!thread.find(t=>t.id===data.id)){
        thread.push({
          id:data.id,role:'me',text:'[Ảnh]',image_url:data.image_url,message_type:'image',
          time:new Date(data.created_at).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),
          sender_name:data.sender_name,read_at:null,
        });
      }
      setState({});scrollOrderChatBottom();
    }catch(e){showToast('Lỗi gửi ảnh','var(--red)','❌');}
    finally{if(btn){btn.innerHTML='📎';btn.disabled=false;}}
  };
  input.click();
}

async function loadChatMessages(orderId,scroll=true){
  if(!authToken||!currentUser||currentUser.id==='demo'||!orderId.includes('-')) return false;
  try{
    const res=await fetch(API+'/orders/'+orderId+'/messages',{headers:getHeaders()});
    if(!res.ok) return false;
    const msgs=await res.json();
    if(!Array.isArray(msgs)) return false;
    const mapped=msgs.map(m=>({
      id:m.id,
      role:m.sender_id===currentUser?.id?'me':'them',
      text:m.text,
      image_url:m.image_url||null,
      message_type:m.message_type||'text',
      time:new Date(m.created_at).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),
      sender_name:m.sender_name,
      read_at:m.read_at||null,
    }));
    CHAT_THREADS[orderId]=mapped;
    if(state.page==='chat'&&state.activeChat===orderId){
      const msgsEl=document.getElementById('order-chat-msgs');
      if(msgsEl){
        setState({});
        if(scroll) scrollOrderChatBottom();
      }
    }
    return true;
  }catch(e){return false;}
}

async function sendOrderChat(orderId,text){
  if(!text||!text.trim()) return;
  const t=text.trim();
  const now=new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
  if(document.getElementById("order-chat-input")){
    document.getElementById("order-chat-input").value="";
    document.getElementById("order-chat-input").style.height="38px";
  }

  // Real order (UUID) with authenticated user → use API
  if(authToken&&currentUser&&currentUser.id!=='demo'&&orderId.includes('-')){
    sendChatTyping(false);
    const thread=getChatThread(orderId);
    const tempId=`temp_${Date.now()}`;
    thread.push({id:tempId,role:"me",text:t,message_type:'text',time:now});
    setState({});
    scrollOrderChatBottom();
    try{
      const res=await fetch(API+'/orders/'+orderId+'/messages',{
        method:'POST',headers:getHeaders(),body:JSON.stringify({text:t})
      });
      if(res.ok){
        const data=await res.json();
        const idx=thread.findIndex(m=>m.id===tempId);
        if(idx>=0) thread[idx]={
          id:data.id,role:'me',text:data.text,message_type:data.message_type||'text',
          time:new Date(data.created_at).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),
          sender_name:data.sender_name,read_at:null,
        };
        setState({});
      } else {
        const idx=thread.findIndex(m=>m.id===tempId);
        if(idx>=0) thread.splice(idx,1);
        showToast('Lỗi gửi tin nhắn','var(--red)','❌');
        setState({});
      }
    }catch(e){
      const idx=thread.findIndex(m=>m.id===tempId);
      if(idx>=0) thread.splice(idx,1);
      showToast('Lỗi kết nối','var(--red)','❌');
      setState({});
    }
    return;
  }

  // Demo order → local simulation
  const thread=getChatThread(orderId);
  thread.push({role:"me",text:t,time:now});
  chatOrderTyping=true;
  setState({});
  scrollOrderChatBottom();

  clearTimeout(chatOrderTimer);
  chatOrderTimer=setTimeout(()=>{
    chatOrderTyping=false;
    const replies=buildSellerReply(t,orderId);
    thread.push({role:"them",text:replies,time:new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})});
    setState({});
    scrollOrderChatBottom();
  },800+Math.random()*700);
}

function scrollOrderChatBottom(){
  setTimeout(()=>{const el=document.getElementById("order-chat-msgs");if(el)el.scrollTop=el.scrollHeight;},50);
}

function buildSellerReply(q,orderId){
  const lower=q.toLowerCase();
  const o=ORDERS.find(x=>x.id===orderId);
  if(lower.includes("qr")||lower.includes("vé")||lower.includes("upload")){
    if(o&&o.status==="seller_accepted") return"Mình đang chuẩn bị QR vé, sẽ upload trong vòng 30 phút nha bạn 🙏";
    if(o&&o.status==="ticket_uploaded") return"QR vé mình đã upload rồi đó bạn, bạn xem lại mục 'Vé QR Code' trong đơn hàng nhé! ✅";
    return"Vé của mình còn nguyên bản 100%, QR chưa được dùng bao giờ. Yên tâm nha! 🎫";
  }
  if(lower.includes("cảm ơn")||lower.includes("ok")||lower.includes("ổn")) return"Cảm ơn bạn đã tin tưởng! Chúc bạn có buổi sự kiện vui vẻ 🎉";
  if(lower.includes("giá")||lower.includes("tiền")||lower.includes("bao nhiêu")) return`Giá ${VND(o?.total||0)} như đã đăng bạn nhé, không thương lượng thêm được vì đã vào Escrow rồi 😅`;
  if(lower.includes("khi nào")||lower.includes("bao lâu")) return"Mình sẽ phản hồi trong vòng 30 phút, còn QR vé upload trước ngày sự kiện 3 ngày 👍";

function copyReferralCode(code) {
  navigator.clipboard?.writeText(code).then(()=>showToast('Đã sao chép mã '+code,'var(--ok)','✅')).catch(()=>{
    const e=document.createElement('input');e.value=code;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);showToast('Đã sao chép!','var(--ok)','✅');
  });
}
function copyReferralLink(link) {
  navigator.clipboard?.writeText(link).then(()=>showToast('Đã sao chép link!','var(--ok)','✅')).catch(()=>{
    const e=document.createElement('input');e.value=link;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);showToast('Đã sao chép!','var(--ok)','✅');
  });
}
function shareReferralLink(code) {
  const url = `${location.origin}?ref=${code}`;
  const text = `Dùng mã ${code} để đăng ký SafePass — mua bán vé sự kiện an toàn! 🎁 Nhận +50,000đ ngay khi tạo tài khoản.`;
  if (navigator.share) {
    navigator.share({ title: 'SafePass — Giới thiệu bạn bè', text, url }).catch(()=>copyReferralLink(url));
  } else { copyReferralLink(url); }
}

let _refCheckTimer = null;
async function checkReferralCode(el) {
  el.value = el.value.toUpperCase();
  const code = el.value.trim();
  const msgEl = document.getElementById('auth-ref-msg');
  if (!msgEl) return;
  if (code.length < 3) { msgEl.textContent = ''; return; }
  clearTimeout(_refCheckTimer);
  _refCheckTimer = setTimeout(async () => {
    try {
      const res = await fetch(API + '/referral/check/' + encodeURIComponent(code));
      const data = await res.json();
      if (res.ok) {
        msgEl.textContent = `✅ Hợp lệ — được giới thiệu bởi ${data.name}. Bạn nhận +50,000đ!`;
        msgEl.style.color = 'var(--ok)';
      } else {
        msgEl.textContent = '❌ Mã không hợp lệ';
        msgEl.style.color = 'var(--red)';
      }
    } catch(e) {}
  }, 500);
}

function updatePricePreview(){
  const priceNum=parseInt(sellForm.price)||0;
  const origNum=parseInt(sellForm.original_price)||0;
  const disc=origNum>0&&priceNum>0?Math.round((1-priceNum/origNum)*100):0;
  const fee=Math.round(priceNum*0.03);
  const payout=priceNum-fee;
  // Update preview elements in-place (no DOM rebuild, no focus loss)
  const pp=document.getElementById("preview-price");
  const pf=document.getElementById("preview-fee");
  const pw=document.getElementById("preview-payout");
  const pd=document.getElementById("preview-disc");
  const pdc=document.getElementById("preview-disc-pct");
  if(pp) pp.textContent=VND(priceNum);
  if(pf) pf.textContent="-"+VND(fee);
  if(pw) pw.textContent=VND(payout);
  if(pd) pd.style.display=disc>0?"block":"none";
  if(pdc) pdc.textContent=disc;
}

function renderSellInPlace(){
  // Save focused element before full re-render
  const activeId=document.activeElement?.id||null;
  const activeType=document.activeElement?.type||null;
  // selectionStart is unsupported on number/date inputs — only read for text/textarea
  const canReadCursor=activeType==="text"||activeType==="textarea"||activeType==null;
  const activeCursor=canReadCursor?(document.activeElement?.selectionStart??null):null;
  const root=document.getElementById("root");
  if(root) setState({});
  // Restore focus after re-render (without setSelectionRange for number/date inputs)
  if(activeId){
    requestAnimationFrame(()=>{
      const el=document.getElementById(activeId);
      if(el){
        el.focus();
        if(activeCursor!==null&&(el.type==="text"||el.type==="textarea"||!el.type)){
          try{el.setSelectionRange(activeCursor,activeCursor);}catch(e){}
        }
      }
    });
  }
}

function advanceSellStep(){
  const step=sellForm.step||0;
  if(step===0){
    if(!sellForm.title.trim()){showToast("Vui lòng nhập tiêu đề","var(--red)","⚠️");return;}
    if((sellForm.type==="ticket"||sellForm.type==="booking")&&!sellForm.date){showToast("Vui lòng chọn ngày","var(--red)","⚠️");return;}
  }
  if(step===1){
    if(!sellForm.price||parseInt(sellForm.price)<1000){showToast("Giá bán phải từ 1,000đ trở lên","var(--red)","⚠️");return;}
  }
  sellForm.step=step+1;
  setState({});
  window.scrollTo(0,0);
}

async function submitSellForm(){
  if (!authToken) { showAuthModal('login'); return; }
  const payload = {
    type: sellForm.type || 'ticket',
    title: sellForm.title,
    price: parseInt(sellForm.price),
    quantity: sellForm.quantity,
    description: sellForm.description,
    images: sellPhotos.map(p => p.url),
    location: sellForm.location || '',
    section: sellForm.section || '',
    event_date: sellForm.date || null,
  };
  const ok = await submitSellAPI(payload);
  if (!ok) return;
  sellForm={type:"ticket",title:"",location:"TP.HCM",date:"",section:"",price:"",original_price:"",quantity:1,description:"",step:0};
  sellPhotos=[];
  await loadListingsFromAPI();
  setState({sellTab:'listings'});
}

function toggleCompare(lid){
  const idx=state.compareList.indexOf(lid);
  if(idx>=0){
    state.compareList.splice(idx,1);
    showToast("Đã bỏ khỏi danh sách so sánh","var(--hint)","⚖️");
  } else {
    if(state.compareList.length>=3){showToast("Tối đa 3 vé để so sánh","var(--warn)","⚠️");return;}
    state.compareList.push(lid);
    showToast("Đã thêm vào so sánh!","var(--brand)","⚖️");
  }
  setState({});
}

function renderCompareBar(){
  if(state.compareList.length===0) return"";
  const slots=[0,1,2].map(i=>{
    const lid=state.compareList[i];
    const l=lid?ALL_LISTINGS.find(x=>x.id===lid):null;
    return`<div class="compare-slot ${l?"filled":""}" onclick="${l?`removeCompare('${lid}')`:""}">

    </div>`;
  }).join("");
  return`<div class="compare-bar">
    <span style="font-size:11px;font-weight:700;color:var(--sub);">⚖️ So sánh</span>
    ${slots}
    <span style="font-size:10px;color:var(--hint);">${state.compareList.length}/3</span>
    ${state.compareList.length>=2
      ?`<button class="btn btn-primary btn-sm" onclick="setState({page:'compare'})">So sánh ngay →</button>`
      :`<span style="font-size:10px;color:var(--hint);">Thêm ${2-state.compareList.length} nữa</span>`

}

function removeCompare(lid){
  state.compareList=state.compareList.filter(x=>x!==lid);

function saveAlert(lid){
  const l=ALL_LISTINGS.find(x=>x.id===lid);
  const priceEl=document.getElementById("alert-price");
  const target=parseInt(priceEl?priceEl.value:0)||Math.round(l.price*0.9);
  const existing=PRICE_ALERTS.findIndex(a=>a.listingId===lid);
  const alert={listingId:lid,title:l.title,currentPrice:l.price,targetPrice:target,active:true,triggered:l.price<=target};
  if(existing>=0) PRICE_ALERTS[existing]=alert;
  else PRICE_ALERTS.push(alert);
  if(alert.triggered){
    showToast("🎉 Giá hiện tại đã đạt mục tiêu của bạn!","var(--ok)","🔔");
  } else {
    showToast(`Alert: Thông báo khi < ${VND(target)}`,"var(--brand)","🔔");
  }
  closeAlertModal();
  setState({});
}
function deleteAlert(lid){
  PRICE_ALERTS=PRICE_ALERTS.filter(a=>a.listingId!==lid);
  showToast("Đã xóa price alert","var(--hint)","🗑");
  closeAlertModal();
  setState({});
}

async function submitReview(orderId){
  const text=state.reviewText||"";
  if(text.trim().length<20){showToast("Vui lòng viết ít nhất 20 ký tự","var(--warn)","⚠️");return;}

  if(authToken){
    try{
      const res=await fetch(API+"/orders/"+orderId+"/review",{
        method:"POST",headers:getHeaders(),
        body:JSON.stringify({rating:state.reviewStars,text:text.trim()})
      });
      const data=await res.json();
      if(!res.ok){showToast(data.error||"Lỗi gửi đánh giá","var(--red)","❌");return;}
      showToast("Đánh giá đã gửi! Cảm ơn bạn ⭐","var(--gold)","⭐");
      state.showReviewModal=false;
      state.reviewText="";
      renderModals();
      return;
    }catch(e){
      showToast("Lỗi kết nối","var(--red)","❌");return;
    }
  }

  // Fallback demo
  const o=ORDERS?ORDERS.find(x=>x.id===orderId):null;
  const lid=o?o.listingId:null;
  if(lid){
    if(!ALL_REVIEWS[lid])ALL_REVIEWS[lid]=[];
    ALL_REVIEWS[lid].unshift({buyer:"Bạn",avatar:"B",rating:state.reviewStars,text:text,date:new Date().toLocaleDateString("vi-VN")});
  }
  showToast("Đánh giá đã gửi! Cảm ơn bạn ⭐","var(--gold)","⭐");
  state.showReviewModal=false;
  state.reviewText="";
  renderModals();
  setState({});
}

/* ══════════════════════════════════════════
   📸 TICKET PHOTO UPLOAD (in sell form)
══════════════════════════════════════════ */
let sellPhotos=[];

function triggerPhotoUpload(){
  if(sellPhotos.length>=4){showToast("Tối đa 4 ảnh","var(--warn)","⚠️");return;}
  if(!authToken){showAuthModal('login');return;}
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.onchange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    if(file.size>5*1024*1024){showToast("Ảnh tối đa 5MB","var(--red)","❌");return;}
    const reader=new FileReader();
    reader.onload=async(evt)=>{
      const base64=evt.target.result.split(',')[1];
      showToast("Đang tải ảnh lên...","var(--brand)","⏳");
      try{
        const res=await fetch(API+'/upload/ticket-image',{
          method:'POST',headers:getHeaders(),
          body:JSON.stringify({image_data:base64,content_type:file.type})
        });
        const d=await res.json();
        if(!res.ok){showToast(d.error||"Lỗi upload","var(--red)","❌");return;}
        sellPhotos.push({id:UID(),url:d.url});
        showToast("Ảnh đã tải lên thành công!","var(--ok)","📸");
        renderSellInPlace();
      }catch(err){showToast("Lỗi kết nối server","var(--red)","❌");}
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function removePhoto(id){
  sellPhotos=sellPhotos.filter(p=>p.id!==id);
  renderSellInPlace();
}

      </div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:16px;">Chọn lý do báo cáo để chúng tôi xem xét. Báo cáo giả mạo có thể dẫn đến khoá tài khoản.</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        ${REPORT_REASONS.map((r,i)=>`
        <label style="display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .2s;" onmouseover="this.style.borderColor='var(--brand)'" onmouseout="this.style.borderColor='var(--border)'">
          <input type="radio" name="rr-reason" value="${i}" style="accent-color:var(--brand);width:16px;height:16px;">
          <span style="font-size:13px;">${r}</span>
        </label>`).join('')}
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:10.5px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:7px;">Mô tả thêm (tuỳ chọn)</label>
        <textarea id="rr-desc" placeholder="Cho chúng tôi biết thêm..." style="width:100%;height:70px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--text);resize:none;outline:none;font-family:'Inter',sans-serif;" onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border2)'"></textarea>
      </div>
      <button onclick="submitReportReview('${reviewId}')" class="btn btn-primary" style="width:100%;">Gửi báo cáo</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

async function submitReportReview(reviewId){
  const sel=document.querySelector('input[name="rr-reason"]:checked');
  if(!sel){showToast('Vui lòng chọn lý do','var(--red)','⚠️');return;}
  const desc=document.getElementById('rr-desc')?.value||'';
  try{
    const res=await fetch(API+'/reviews/'+reviewId+'/report',{
      method:'POST',headers:getHeaders(),
      body:JSON.stringify({reason_index:parseInt(sel.value),description:desc})
    });
    const d=await res.json();
    document.getElementById('report-review-overlay')?.remove();
    if(!res.ok){showToast(d.error||'Lỗi gửi báo cáo','var(--red)','❌');return;}
    showToast(d.message||'Đã gửi báo cáo!','var(--ok)','🚩');
  }catch(e){showToast('Lỗi kết nối','var(--red)','❌');}
}

// ── VERIFY QR ──
async function showVerifyQr(orderId){
  const box=document.getElementById('verify-qr-box-'+orderId);
  if(!box) return;
  const isVisible=box.style.display!=='none';
  if(isVisible){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML='<div style="padding:16px;color:var(--hint);font-size:13px;">⏳ Đang tạo QR...</div>';
  try{
    const res=await fetch(API+'/orders/'+orderId+'/verify-qr',{headers:getHeaders()});
    const data=await res.json();
    if(!res.ok){box.innerHTML='<div style="color:var(--red);font-size:12px;">❌ '+( data.error||'Lỗi')+'</div>';return;}
    box.innerHTML=`
      <img src="${data.qr}" style="width:200px;height:200px;border-radius:12px;border:3px solid #fff;" alt="QR Xác minh">
      <div style="margin-top:10px;font-size:11px;color:var(--hint);">📌 Xuất trình QR này cho nhân viên tại cổng vào sự kiện.</div>
      <div style="margin-top:6px;font-size:10px;color:var(--hint);font-family:'DM Mono',monospace;word-break:break-all;background:rgba(255,255,255,.03);padding:8px;border-radius:8px;max-height:60px;overflow:hidden;">${data.token ? data.token.slice(0,80)+'...' : ''}</div>
      <button onclick="downloadVerifyQr('${orderId}')" style="margin-top:10px;padding:8px 16px;border-radius:8px;border:none;background:var(--brandM);color:var(--brand);font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">📥 Lưu QR</button>`;
    box._qrData=data.qr;
    box._eventName=data.event_name||'ticket';
  }catch(e){
    box.innerHTML='<div style="color:var(--red);font-size:12px;">❌ Không kết nối được server</div>';
  }
}

function downloadVerifyQr(orderId){
  const box=document.getElementById('verify-qr-box-'+orderId);
  if(!box||!box._qrData) return;
  const a=document.createElement('a');
  a.href=box._qrData;
  a.download='safepass-qr-'+(box._eventName||orderId).replace(/\s+/g,'-')+'.png';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

  const box=document.getElementById('kyc-status-box');
  if(!box||!authToken) return;
  try{
    const res=await fetch(API+'/kyc/status',{headers:getHeaders()});
    const d=await res.json();
    renderKycBox(box,d);
  }catch(e){
    box.innerHTML='<div style="font-size:12px;color:var(--hint);">Không tải được trạng thái KYC.</div>';
  }
}

  }

    box.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:12px;">

      <div><div style="font-size:13px;font-weight:700;color:var(--warn);">Đang chờ duyệt</div>

    <span>❌</span><div><div style="font-size:12px;font-weight:700;color:var(--red);">Yêu cầu bị từ chối</div>
    ${d.reject_reason?`<div style="font-size:11px;color:var(--sub);margin-top:2px;">Lý do: ${d.reject_reason}</div>`:''}
    <div style="font-size:11px;color:var(--sub);margin-top:2px;">Bạn có thể nộp lại với ảnh rõ hơn.</div></div></div>`:'';

  box.innerHTML=`${rejHtml}
  <div style="display:grid;gap:12px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label style="display:block;font-size:12px;color:var(--sub);margin-bottom:5px;">👤 Họ và tên (theo CCCD)</label>
        <input id="kyc-fullname" type="text" placeholder="Nguyễn Văn A" style="width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border2);background:var(--card2);color:var(--fg);font-size:13px;box-sizing:border-box;">
      </div>
      <div>
        <label style="display:block;font-size:12px;color:var(--sub);margin-bottom:5px;">📋 Loại giấy tờ</label>
        <select id="kyc-idtype" style="width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border2);background:var(--card2);color:var(--fg);font-size:13px;box-sizing:border-box;">
          <option value="CCCD">CCCD (Căn cước công dân)</option>
          <option value="CMND">CMND (Chứng minh nhân dân)</option>
          <option value="Passport">Hộ chiếu / Passport</option>
        </select>
      </div>
    </div>
    <div>
      <label style="display:block;font-size:12px;color:var(--sub);margin-bottom:6px;">📄 Mặt trước CCCD / Passport</label>
      <div id="kyc-front-preview" onclick="document.getElementById('kyc-front').click()" style="border:2px dashed var(--border2);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:border-color .2s;font-size:12px;color:var(--hint);">
        📷 Nhấn để chọn ảnh
      </div>
      <input id="kyc-front" type="file" accept="image/*" style="display:none" onchange="previewKycImg('kyc-front','kyc-front-preview')">
    </div>
    <div>
      <label style="display:block;font-size:12px;color:var(--sub);margin-bottom:6px;">📄 Mặt sau CCCD / Passport</label>
      <div id="kyc-back-preview" onclick="document.getElementById('kyc-back').click()" style="border:2px dashed var(--border2);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:border-color .2s;font-size:12px;color:var(--hint);">
        📷 Nhấn để chọn ảnh
      </div>
      <input id="kyc-back" type="file" accept="image/*" style="display:none" onchange="previewKycImg('kyc-back','kyc-back-preview')">
    </div>

      <label style="display:block;font-size:12px;color:var(--sub);margin-bottom:6px;">🤳 Ảnh selfie cầm CCCD</label>

        📷 Nhấn để chọn ảnh
      </div>
      <input id="kyc-selfie" type="file" accept="image/*" style="display:none" onchange="previewKycImg('kyc-selfie','kyc-selfie-preview')">

function previewKycImg(inputId,previewId){
  const file=document.getElementById(inputId)?.files?.[0];
  const preview=document.getElementById(previewId);
  if(!file||!preview) return;
  const url=URL.createObjectURL(file);
  preview.innerHTML=`<img src="${url}" style="max-width:100%;max-height:160px;border-radius:8px;object-fit:cover;">`;
  preview.style.padding='6px';
}

async function submitKyc(){
  const front=document.getElementById('kyc-front')?.files?.[0];
  const back=document.getElementById('kyc-back')?.files?.[0];
  const selfie=document.getElementById('kyc-selfie')?.files?.[0];
  const fullName=(document.getElementById('kyc-fullname')?.value||'').trim();
  const idType=document.getElementById('kyc-idtype')?.value||'CCCD';
  const msgEl=document.getElementById('kyc-msg');
  const btn=document.getElementById('kyc-submit-btn');
  if(!fullName){
    msgEl.textContent='Vui lòng nhập họ và tên theo giấy tờ.';msgEl.style.color='var(--red)';msgEl.style.display='block';return;
  }
  if(!front||!back||!selfie){
    msgEl.textContent='Vui lòng chọn đủ 3 ảnh.';msgEl.style.color='var(--red)';msgEl.style.display='block';return;
  }
  btn.disabled=true;btn.textContent='⏳ Đang gửi...';
  const fd=new FormData();
  fd.append('front_image',front);
  fd.append('back_image',back);
  fd.append('selfie_image',selfie);
  fd.append('full_name',fullName);
  fd.append('id_type',idType);
  try{
    const res=await fetch(API+'/kyc/submit',{
      method:'POST',
      headers:{Authorization:'Bearer '+authToken},
      body:fd,
    });
    const data=await res.json();
    if(!res.ok){
      msgEl.textContent=data.error||'Lỗi gửi KYC';msgEl.style.color='var(--red)';msgEl.style.display='block';
      btn.disabled=false;btn.textContent='🪪 Gửi xác minh KYC';return;
    }
    const box=document.getElementById('kyc-status-box');
    if(box) renderKycBox(box,{status:'pending'});
  }catch(e){
    msgEl.textContent='Không kết nối được server';msgEl.style.color='var(--red)';msgEl.style.display='block';
    btn.disabled=false;btn.textContent='🪪 Gửi xác minh KYC';
  }
}

async function saveProfile(){
  const name=document.getElementById('profile-name-val')?.value?.trim();
  const email=document.getElementById('profile-email-val')?.value?.trim();
  const msgEl=document.getElementById('profile-msg');
  if(!name){msgEl.textContent='Tên không được để trống';msgEl.style.color='var(--red)';msgEl.style.display='block';return;}
  try{
    const res=await fetch(API+'/auth/profile',{method:'PATCH',headers:getHeaders(),body:JSON.stringify({name,email:email||null})});
    const data=await res.json();
    if(!res.ok){msgEl.textContent=data.error||'Lỗi';msgEl.style.color='var(--red)';msgEl.style.display='block';return;}
    currentUser={...currentUser,...data.user};
    localStorage.setItem('sp_user',JSON.stringify(currentUser));
    msgEl.textContent='✅ Đã lưu thành công!';msgEl.style.color='var(--ok)';msgEl.style.display='block';
    setTimeout(()=>{msgEl.style.display='none';setState({});},2000);
  }catch(e){
    msgEl.textContent='Không kết nối được server';msgEl.style.color='var(--red)';msgEl.style.display='block';
  }
}

async function changePassword(){
  const current=document.getElementById('pw-current')?.value;
  const newPw=document.getElementById('pw-new')?.value;
  const confirm=document.getElementById('pw-confirm')?.value;
  const msgEl=document.getElementById('pw-msg');
  if(!current||!newPw||!confirm){msgEl.textContent='Vui lòng điền đầy đủ';msgEl.style.color='var(--red)';msgEl.style.display='block';return;}
  if(newPw.length<6){msgEl.textContent='Mật khẩu mới phải ít nhất 6 ký tự';msgEl.style.color='var(--red)';msgEl.style.display='block';return;}
  if(newPw!==confirm){msgEl.textContent='Mật khẩu xác nhận không khớp';msgEl.style.color='var(--red)';msgEl.style.display='block';return;}
  try{
    const res=await fetch(API+'/auth/password',{method:'PATCH',headers:getHeaders(),body:JSON.stringify({current_password:current,new_password:newPw})});
    const data=await res.json();
    if(!res.ok){msgEl.textContent=data.error||'Lỗi';msgEl.style.color='var(--red)';msgEl.style.display='block';return;}
    msgEl.textContent='✅ Đổi mật khẩu thành công!';msgEl.style.color='var(--ok)';msgEl.style.display='block';
    document.getElementById('pw-current').value='';
    document.getElementById('pw-new').value='';
    document.getElementById('pw-confirm').value='';
    setTimeout(()=>{msgEl.style.display='none';},3000);
  }catch(e){
    msgEl.textContent='Không kết nối được server';msgEl.style.color='var(--red)';msgEl.style.display='block';
  }
}

async function switchDigitalTab(tab) {
  digitalState.subTab = tab;
  setState({});
  if (tab === 'browse') await loadDigitalListings();
  if (tab === 'my_assets') await loadMyDigitalOrders();
  if (tab === 'sell_mgr') await loadMyDigitalListings();
}

async function loadDigitalListings() {
  digitalState.loading = true; setState({});
  try {
    const params = digitalState.filter !== 'all' ? `?asset_type=${digitalState.filter}` : '';
    const res = await fetch(API + '/digital-listings' + params);
    const data = await res.json();
    digitalState.listings = data.listings || [];
  } catch(e) { digitalState.listings = []; }
  digitalState.loading = false; setState({});
}

async function loadMyDigitalOrders() {
  if (!authToken) return;
  try {
    const res = await fetch(API + '/digital-orders?role=buyer', { headers: getHeaders() });
    digitalState.myOrders = await res.json();
  } catch(e) { digitalState.myOrders = []; }
  setState({});
}

async function loadMyDigitalListings() {
  if (!authToken) return;
  try {
    const res = await fetch(API + '/digital-listings?seller_id=' + currentUser.id, { headers: getHeaders() });
    const data = await res.json();
    digitalState.myListings = data.listings || [];
  } catch(e) { digitalState.myListings = []; }
  setState({});
}

async function revealDigitalAsset(orderId) {
  try {
    const res = await fetch(API + '/digital-orders/' + orderId + '/asset', { headers: getHeaders() });
    if (!res.ok) { showToast('Lỗi tải thông tin', 'var(--red)', '❌'); return; }
    const data = await res.json();
    digitalState.revealedAssets[orderId] = data;
    setState({});
  } catch(e) { showToast('Không kết nối được server', 'var(--red)', '❌'); }
}

async function confirmDigitalOrder(orderId) {
  if (!confirm('Xác nhận tài khoản hoạt động tốt? Tiền sẽ giải ngân cho seller.')) return;
  try {
    const res = await fetch(API + '/digital-orders/' + orderId + '/confirm', { method:'POST', headers: getHeaders() });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Lỗi', 'var(--red)', '❌'); return; }
    showToast('Đã xác nhận! Giao dịch hoàn tất.', 'var(--ok)', '✅');
    await loadMyDigitalOrders();
  } catch(e) { showToast('Lỗi kết nối', 'var(--red)', '❌'); }
}

async function reportDigitalOrder(orderId) {
  const reason = prompt('Mô tả vấn đề (VD: sai mật khẩu, tài khoản chết...):');
  if (!reason) return;
  try {
    const res = await fetch(API + '/digital-orders/' + orderId + '/report', {
      method:'POST', headers: getHeaders(), body: JSON.stringify({ reason })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Lỗi', 'var(--red)', '❌'); return; }
    showToast('Đã gửi báo lỗi. Admin sẽ xử lý sớm.', 'var(--warn)', '⚠️');
    await loadMyDigitalOrders();
  } catch(e) { showToast('Lỗi kết nối', 'var(--red)', '❌'); }
}

  }).filter(a => a.username && a.password);

function normalizePhoneFE(raw) {
  if (!raw) return '';
  let p = String(raw).replace(/[\s\-\.\(\)]/g, '');
  if (p.startsWith('+84')) p = '0' + p.slice(3);
  if (p.startsWith('84') && p.length === 11) p = '0' + p.slice(2);
  return p;
}

async function submitAuth(tab) {
  const phone = normalizePhoneFE(document.getElementById('auth-phone')?.value);
  const pass = document.getElementById('auth-pass')?.value;
  const name = document.getElementById('auth-name')?.value?.trim();
  const email = document.getElementById('auth-email')?.value?.trim();
  const errEl = document.getElementById('auth-err');

  if (!phone || !pass || (tab==='register' && !name)) {
    errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display='block'; return;
  }

  try {
    const body = { phone, password: pass, name };
    if (tab === 'register' && email) body.email = email;
    if (tab === 'register') {
      const refCode = document.getElementById('auth-referral')?.value?.trim().toUpperCase();
      if (refCode) body.referral_code = refCode;
    }
    const res = await fetch(API + '/auth/' + (tab==='login'?'login':'register'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Lỗi'; errEl.style.display='block'; return; }

    authToken = data.token;
    currentUser = data.user;
    localStorage.setItem('sp_token', authToken);
    localStorage.setItem('sp_user', JSON.stringify(currentUser));
    document.getElementById('auth-modal')?.remove();
    showToast('Chào ' + currentUser.name + '! 👋', 'var(--ok)', '✅');
    await loadTicketsFromAPI();
    await loadOrdersFromAPI();
    await loadNotificationsFromAPI();
    setState({});

  } catch(e) {
    errEl.textContent = 'Không kết nối được server. Kiểm tra backend đang chạy chưa.'; errEl.style.display='block';
  }
}

// ── Load tickets từ API ──
function mapListing(l) {
  return {
    id: l.id,
    _source: 'listing',
    seller_id: l.seller_id,
    type: l.type,
    title: l.title,
    category: l.type,
    price: l.price,
    original_price: Math.round(l.price * 1.15),
    date: l.event_date || '',
    location: l.location || '',
    section: l.section || '',
    quantity: l.quantity || 1,
    views: 60,
    saved: 8,
    sold: 0,
    active: l.status === 'available',
    trust: l.seller_rating ? Math.min(99, Math.round(l.seller_rating * 20)) : 75,
    description: l.description || '',
    images: l.images || [],
    sellerVerified: l.seller_verified || false,
    seller_name: l.seller_name || '',
  };
}

function mapTicket(t) {
  return {
    id: t.id,
    _source: 'ticket',
    seller_id: t.seller_id,
    type: 'ticket',
    title: t.event_name,
    category: 'ticket',
    price: t.price,
    original_price: Math.round(t.price * 1.1),
    date: t.event_date || '',
    location: t.location || 'TP.HCM',
    section: t.section || '',
    quantity: t.quantity || 1,
    views: Math.floor(Math.random()*500)+50,
    saved: Math.floor(Math.random()*50),
    sold: 0,
    active: t.status === 'available',
    trust: 85,
    description: t.description || '',
    image_url: t.image_url || null,
    sellerVerified: t.seller_verified || false,
  };
}

async function loadListingsFromAPI(typeOverride) {
  if (!authToken) return;
  try {
    const cat = typeOverride !== undefined ? typeOverride : state.category;
    // Load new listings (all types)
    const params = new URLSearchParams({ limit: '100' });
    if (cat && cat !== 'all') params.set('type', cat);
    const res = await fetch(API + '/listings?' + params.toString(), { headers: getHeaders() });
    const resp = await res.json();
    const listingsData = Array.isArray(resp) ? resp : (resp.listings || []);
    const mappedListings = listingsData.map(l => mapListing(l));

    // Also load legacy tickets when browsing all or ticket type
    if (!cat || cat === 'all' || cat === 'ticket') {
      const tRes = await fetch(API + '/tickets?limit=100', { headers: getHeaders() });
      const tResp = await tRes.json();
      const ticketsData = Array.isArray(tResp) ? tResp : (tResp.tickets || []);
      const mappedTickets = ticketsData.map(t => mapTicket(t));
      const listingIds = new Set(mappedListings.map(l => l.id));
      ALL_LISTINGS = [...mappedListings, ...mappedTickets.filter(t => !listingIds.has(t.id))];
    } else {
      ALL_LISTINGS = mappedListings;
    }
    render();
  } catch(e) { console.log('Lỗi tải listings:', e); }
}

async function loadTicketsFromAPI(catOverride) {
  return loadListingsFromAPI(catOverride);
}

async function _legacyLoadTickets(catOverride) {
  if (!authToken) return;
  try {
    const params = new URLSearchParams({ limit: '100' });
    const cat = catOverride !== undefined ? catOverride : state.category;
    if (cat && cat !== 'all') params.set('category', cat);
    const res = await fetch(API + '/tickets?' + params.toString(), { headers: getHeaders() });
    const resp = await res.json();
    // API returns {tickets: [], total, page, limit} OR array (backwards compat)
    const data = Array.isArray(resp) ? resp : (resp.tickets || []);
    // When filtering by category, refresh only that category's listings
    if (cat && cat !== 'all') {
      const apiIds = new Set(data.map(t => t.id));
      // Remove stale listings for this category that are no longer available
      for (let i = ALL_LISTINGS.length - 1; i >= 0; i--) {
        if (ALL_LISTINGS[i].category === cat && !apiIds.has(ALL_LISTINGS[i].id)) {
          ALL_LISTINGS.splice(i, 1);
        }
      }
    }
    if (data.length > 0) {
      const mapped = data.map(t => mapTicket(t));
      mapped.forEach(t => {
        const idx = ALL_LISTINGS.findIndex(l => l.id === t.id);
        if (idx >= 0) ALL_LISTINGS[idx] = t; else ALL_LISTINGS.unshift(t);
      });
    }
    render();
  } catch(e) { console.log('Không tải được vé từ API:', e); }
}

// ── Load orders từ API ──
async function loadOrdersFromAPI() {
  if (!authToken) return;
  try {
    const [buyRes, sellRes] = await Promise.all([
      fetch(API + '/orders?role=buyer', { headers: getHeaders() }),
      fetch(API + '/orders?role=seller', { headers: getHeaders() })
    ]);
    const buyOrders = await buyRes.json();
    const sellOrders = await sellRes.json();

    const mapStatus = s => ({ waiting_qr:'awaiting_seller', waiting_confirm:'ticket_uploaded', shipping:'shipping', completed:'completed', disputed:'disputed', refunded:'refunded', cancelled:'cancelled' }[s] || s);

    const mapOrder = (o, role) => ({
      id: o.id,
      role,
      title: o.event_name,
      category: o.listing_type === 'product' ? 'product' : o.listing_type === 'course' ? 'course' : 'concerts',
      section: '',
      date: '',
      location: '',
      qty: 1,
      price: o.price,
      total: o.total,
      status: mapStatus(o.status),
      listing_type: o.listing_type || null,
      escrow: o.status !== 'completed' ? o.total : 0,
      qr: o.qr_code || null,
      dispute: null,
      created: new Date(o.created_at).toLocaleDateString('vi-VN'),
      timeline: [{ t: new Date(o.created_at).toLocaleString('vi-VN'), e: 'Đặt hàng thành công', i: '🛒', c: 'var(--brand)' }],
      ...(role==='buyer' ? { seller: { name: o.seller_name, trust: 85, avatar: o.seller_name?.slice(0,2).toUpperCase() } } : {}),
      ...(role==='seller' ? { buyer: { name: o.buyer_name, trust: 80, avatar: o.buyer_name?.slice(0,2).toUpperCase() } } : {})
    });

    const newOrders = [
      ...(Array.isArray(buyOrders) ? buyOrders.map(o => mapOrder(o, 'buyer')) : []),
      ...(Array.isArray(sellOrders) ? sellOrders.map(o => mapOrder(o, 'seller')) : [])
    ];

    newOrders.forEach(o => {
      const idx = ORDERS.findIndex(x => x.id === o.id);
      if (idx >= 0) ORDERS[idx] = o; else ORDERS.unshift(o);
    });
  } catch(e) { console.log('Không tải được đơn hàng:', e); }
}

    const res = await fetch(API + '/notifications', { headers: getHeaders() });
    if (!res.ok) return;
    const data = await res.json();
    NOTIFICATIONS = data.notifications || [];
    const newCount = data.unread || 0;
    if (newCount !== state.notifCount) {
      state.notifCount = newCount;
      render();
    }
  } catch(e) {}
}

// ── Polling: đơn mới + notifications (mỗi 30s) ──
let _lastKnownOrderIds = new Set();
let _pollingStarted = false;

async function pollSellerOrders() {
  if (!authToken || !currentUser || currentUser.id === 'demo') return;
  try {
    const res = await fetch(API + '/orders?role=seller', { headers: getHeaders() });
    if (!res.ok) return;
    const orders = await res.json();
    if (!Array.isArray(orders)) return;

    const newOrders = orders.filter(o =>
      o.status === 'waiting_qr' && !_lastKnownOrderIds.has(o.id)
    );
    orders.forEach(o => _lastKnownOrderIds.add(o.id));

    if (newOrders.length > 0) {
      await loadOrdersFromAPI();
      const first = newOrders[0];
      showToast('Đơn mới: ' + first.event_name, 'var(--ok)', '🛒');
      state.orderBadge = (state.orderBadge || 0) + newOrders.length;
    }

    // Luôn sync notifications từ API
    await loadNotificationsFromAPI();
    if (newOrders.length > 0) setState({});
  } catch(e) {}
}

function startPolling() {
  if (_pollingStarted) return;
  _pollingStarted = true;
  if (authToken) {
    fetch(API + '/orders?role=seller', { headers: getHeaders() })
      .then(r => r.json())
      .then(orders => {
        if (Array.isArray(orders)) orders.forEach(o => _lastKnownOrderIds.add(o.id));
      }).catch(() => {});
  }
  setInterval(pollSellerOrders, 30 * 1000);
}

// ── Boot: kiểm tra đăng nhập ──
(async function bootAPI() {
  const urlParams = new URLSearchParams(window.location.search);

  // Kiểm tra reset_token trong URL trước
  const resetToken = urlParams.get('reset_token');
  if (resetToken) {
    setTimeout(() => showResetPasswordModal(resetToken), 400);
    return;
  }

  // Xử lý VNPay callback
  const vnpayStatus = urlParams.get('vnpay');
  const vnpayPage   = urlParams.get('page');
  if (vnpayStatus) {
    // Xoá query params khỏi URL (sạch thanh địa chỉ)
    const cleanUrl = window.location.pathname;
    window.history.replaceState({}, '', cleanUrl);

    if (authToken) {
      try {
        const res = await fetch(API + '/auth/me', { headers: getHeaders() });
        if (res.ok) {
          currentUser = await res.json();
          localStorage.setItem('sp_user', JSON.stringify(currentUser));
        }
      } catch(e) {}
      await loadTicketsFromAPI();
      await loadOrdersFromAPI();
      await loadNotificationsFromAPI();
      setState({ page: 'wallet' });
      startPolling();

      if (vnpayStatus === 'success') {
        const amount = parseInt(urlParams.get('amount')) || 0;
        const fmtAmt = amount > 0 ? ` ${amount.toLocaleString('vi-VN')}đ` : '';
        setTimeout(() => showToast(`💰 Nạp tiền${fmtAmt} thành công!`, 'var(--ok)', '✅'), 300);
        setTimeout(() => loadTransactions(1), 600);
      } else {
        const code = urlParams.get('code') || '';
        const msgMap = {
          '24': 'Bạn đã huỷ giao dịch.',
          '51': 'Tài khoản không đủ số dư.',
          '65': 'Vượt hạn mức giao dịch trong ngày.',
          '75': 'Ngân hàng đang bảo trì.',
        };
        const msg = msgMap[code] || 'Thanh toán thất bại, vui lòng thử lại.';
        setTimeout(() => showToast(`❌ ${msg}`, 'var(--red)', '❌'), 300);
      }
      return;
    }
  }

  if (authToken) {
    try {
      const res = await fetch(API + '/auth/me', { headers: getHeaders() });
      if (res.ok) {
        currentUser = await res.json();
        localStorage.setItem('sp_user', JSON.stringify(currentUser));
        await loadTicketsFromAPI();
        await loadOrdersFromAPI();
        await loadNotificationsFromAPI();
        setState({});
        startPolling();
        return;
      }
    } catch(e) {}
    // Token hết hạn
    localStorage.removeItem('sp_token');
    localStorage.removeItem('sp_user');
    authToken = null; currentUser = null;
  }
  // Chưa đăng nhập → hiện modal
  setTimeout(() => showAuthModal('login'), 500);
})();

    if(o.revision_count < o.max_revisions) actions.push(`<button onclick="svcRequestRevision('${o.id}')" style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;">📝 Yêu cầu sửa (${o.revision_count}/${o.max_revisions})</button>`);
  }
  if(o.status==='completed'&&isBuyer&&!o.review) actions.push(`<button onclick="openSvcReview('${o.id}')" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(245,166,35,.4);background:rgba(245,166,35,.1);color:#f5a623;font-size:13px;font-weight:600;cursor:pointer;">⭐ Đánh giá</button>`);
  if(!['completed','cancelled','disputed'].includes(o.status)&&o.status!=='submitted') actions.push(`<button onclick="svcOpenDispute('${o.id}')" style="padding:10px;border-radius:10px;border:1px solid rgba(240,80,104,.3);background:rgba(240,80,104,.1);color:#f05068;font-size:13px;font-weight:600;cursor:pointer;">⚠️ Tranh chấp</button>`);
  if(['pending','in_progress'].includes(o.status)) actions.push(`<button onclick="svcOrderAction('${o.id}','cancel')" style="padding:10px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--sub);font-size:12px;cursor:pointer;">❌ Huỷ</button>`);

  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;" onclick="if(event.target===this)setSvcState({orderDetailId:null,_orderDetail:null})">
    <div style="background:var(--card);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:640px;margin:auto;">
      <!-- Header -->
      <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:15px;font-weight:800;">${escHtml(o.service_title)}</div>
          <div style="font-size:12px;color:var(--sub);margin-top:2px;">Gói: ${escHtml(o.package_name||'Cơ bản')} · <span style="color:${st.color};font-weight:600;">${st.label}</span></div>
        </div>
        <button onclick="setSvcState({orderDetailId:null,_orderDetail:null})" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:16px;color:var(--sub);">✕</button>
      </div>
      <!-- Info grid -->
      <div style="padding:16px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;border-bottom:1px solid var(--border);">
        <div style="text-align:center;background:var(--card2);border-radius:10px;padding:10px;"><div style="font-size:10px;color:var(--sub);margin-bottom:4px;">Giá trị</div><div style="font-size:16px;font-weight:800;color:var(--brand);">${(o.price||0).toLocaleString('vi-VN')}đ</div></div>
        <div style="text-align:center;background:var(--card2);border-radius:10px;padding:10px;"><div style="font-size:10px;color:var(--sub);margin-bottom:4px;">Hạn nộp</div><div style="font-size:13px;font-weight:700;">${o.deadline_at?new Date(o.deadline_at).toLocaleDateString('vi-VN'):'—'}</div></div>
        <div style="text-align:center;background:var(--card2);border-radius:10px;padding:10px;"><div style="font-size:10px;color:var(--sub);margin-bottom:4px;">Lần sửa</div><div style="font-size:13px;font-weight:700;">${o.revision_count}/${o.max_revisions}</div></div>
      </div>
      ${o.requirements?`<div style="padding:12px 24px;border-bottom:1px solid var(--border);"><div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:6px;">Yêu cầu của buyer</div><div style="font-size:13px;line-height:1.6;background:var(--card2);border-radius:10px;padding:10px 12px;">${escHtml(o.requirements)}</div></div>`:''}
      <!-- Deliverables -->
      ${deliverables?`<div style="padding:12px 24px;border-bottom:1px solid var(--border);"><div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:8px;">📦 Sản phẩm đã nộp</div>${deliverables}</div>`:''}
      <!-- Chat -->
      <div style="padding:12px 24px;border-bottom:1px solid var(--border);">
        <div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:8px;">💬 Chat</div>
        <div style="height:200px;overflow-y:auto;margin-bottom:8px;padding:4px;" id="svc-msgs-box">${msgs||'<div style="text-align:center;padding:30px;color:var(--hint);font-size:12px;">Chưa có tin nhắn</div>'}</div>
        <div style="display:flex;gap:8px;">
          <input id="svc-msg-input" placeholder="Nhập tin nhắn..." style="flex:1;padding:9px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;outline:none;" onkeydown="if(event.key==='Enter')sendSvcMsg('${o.id}')">
          <button onclick="sendSvcMsg('${o.id}')" style="padding:9px 16px;border-radius:10px;border:none;background:#3d8ef8;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">Gửi</button>
        </div>
      </div>
      <!-- Actions -->
      ${actions.length?`<div style="padding:16px 24px;display:flex;gap:8px;flex-wrap:wrap;">${actions.join('')}</div>`:'<div style="padding:16px 24px;"></div>'}
    </div>
  </div>`;
}

async function loadSvcListings(){
  const params=new URLSearchParams();
  if(svcState.searchQ) params.set('search',svcState.searchQ);
  if(svcState.cat) params.set('category',svcState.cat);
  if(svcState.sort) params.set('sort',svcState.sort);
  try{
    const r=await fetch(API+'/service-listings?'+params.toString());
    const d=await r.json();
    setSvcState({listings:Array.isArray(d)?d:[]});
  }catch(e){ setSvcState({listings:[]}); }
}

      <span style="font-size:13px;font-weight:600;">${escHtml(r.buyer_name)}</span>
      <span style="color:#f5a623;">${'⭐'.repeat(r.rating)}</span>

  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;" onclick="if(event.target===this)this.remove()">
    <div style="background:var(--card);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:640px;margin:auto;">

        <button onclick="this.closest('[style*=fixed]').remove()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:16px;color:var(--sub);">✕</button>
      </div>
      <div style="padding:20px 24px;">
        <h3 style="font-size:18px;font-weight:800;margin:0 0 8px;">${escHtml(s.title)}</h3>

async function confirmPlaceServiceOrder(serviceId, packageId, overlayEl){
  const reqs=document.getElementById('order-requirements')?.value.trim();
  try{
    const r=await fetch(API+'/service-orders',{method:'POST',headers:getHeaders(),body:JSON.stringify({service_id:serviceId,package_id:packageId||undefined,requirements:reqs||undefined})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    if(overlayEl) overlayEl.remove();
    document.querySelectorAll('[style*="position:fixed"][style*="z-index:300"]').forEach(el=>el.remove());
    showToast('✅ Đặt dịch vụ thành công!','ok');
    setSvcState({tab:'myorders'});
    loadSvcMyOrders();
  }catch(e){ showToast(e.message,'err'); }
}

async function openSvcOrderDetail(orderId){
  setSvcState({orderDetailId:orderId,_orderDetail:null});
  try{
    const r=await fetch(API+'/service-orders/'+orderId,{headers:getHeaders()});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    setSvcState({_orderDetail:d});
    // scroll chat to bottom
    setTimeout(()=>{ const box=document.getElementById('svc-msgs-box'); if(box) box.scrollTop=box.scrollHeight; },50);
  }catch(e){ setSvcState({orderDetailId:null}); showToast(e.message,'err'); }
}

async function svcOrderAction(orderId, action){
  try{
    const r=await fetch(API+`/service-orders/${orderId}/${action}`,{method:'POST',headers:getHeaders()});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    showToast(d.message||'Thành công','ok');
    openSvcOrderDetail(orderId);
    loadSvcMyOrders();
    loadSvcMyGigs();
  }catch(e){ showToast(e.message,'err'); }
}

async function svcRequestRevision(orderId){
  const note=prompt('Nội dung cần sửa:','');
  if(note===null) return;
  try{
    const r=await fetch(API+`/service-orders/${orderId}/revision`,{method:'POST',headers:getHeaders(),body:JSON.stringify({note})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    showToast(d.message,'ok');
    openSvcOrderDetail(orderId);
  }catch(e){ showToast(e.message,'err'); }
}

async function svcOpenDispute(orderId){
  const reason=prompt('Lý do tranh chấp:','');
  if(!reason) return;
  try{
    const r=await fetch(API+`/service-orders/${orderId}/dispute`,{method:'POST',headers:getHeaders(),body:JSON.stringify({reason})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    showToast(d.message,'ok');
    openSvcOrderDetail(orderId);
  }catch(e){ showToast(e.message,'err'); }
}
