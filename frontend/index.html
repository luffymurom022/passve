<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePass — Mua Bán Đồ Cũ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SAFEPASS — FACEBOOK STYLE UI
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* Facebook Light Mode */
  --bg:#f0f2f5;
  --bg2:#e4e6eb;
  --card:#ffffff;
  --card2:#f0f2f5;
  --card3:#e4e6eb;

  /* Borders */
  --border:#dadde1;
  --border2:#ccd0d5;
  --border3:#bec3c9;

  /* Brand — Facebook Blue */
  --brand:#1877f2;
  --brandD:#166fe5;
  --brandL:rgba(24,119,242,.08);
  --brandM:rgba(24,119,242,.14);
  --brandGlow:rgba(24,119,242,.2);

  /* Text */
  --text:#050505;
  --sub:#65676b;
  --hint:#8a8d91;

  /* Status */
  --ok:#42b72a;     --okBg:rgba(66,183,42,.08);
  --warn:#f5a623;   --warnBg:rgba(245,166,35,.08);
  --red:#fa3e3e;    --redBg:rgba(250,62,62,.08);
  --purple:#9b87f5; --purpleBg:rgba(155,135,245,.08);
  --gold:#f5a623;
  --cyan:#1877f2;

  /* Elevation */
  --shadow-sm:0 1px 2px rgba(0,0,0,.1);
  --shadow:0 2px 8px rgba(0,0,0,.15);
  --shadow-lg:0 4px 20px rgba(0,0,0,.2);
  --glow:0 0 0 2px rgba(24,119,242,.2);
  --glow-ok:0 0 0 2px rgba(66,183,42,.2);

  /* Shape */
  --radius:8px;
  --radius-sm:6px;
  --radius-lg:12px;
  --radius-xl:16px;
}

/* Dark Mode */
body.dark{
  --bg:#18191a;
  --bg2:#242526;
  --card:#242526;
  --card2:#3a3b3c;
  --card3:#3a3b3c;
  --border:#3a3b3c;
  --border2:#4a4b4c;
  --border3:#5a5b5c;
  --text:#e4e6eb;
  --sub:#b0b3b8;
  --hint:#8a8d91;
}

/* ── BASE ── */
html,body{height:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.app{width:100%;margin:0;padding:0;}

/* ━━ FACEBOOK TOPBAR ━━ */
.header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:56px;
  background:var(--brand);
  box-shadow:0 2px 4px rgba(0,0,0,.25);
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  padding:0 12px;
  gap:8px;
}
body.dark .header{background:#242526;box-shadow:0 2px 4px rgba(0,0,0,.5);}

/* Left: logo + search */
.header-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;font-size:22px;
}
.logo-txt{display:none;}
.badge-v{display:none;}
.tb-searchbox{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.18);
  border-radius:20px;padding:8px 14px;
  cursor:pointer;min-width:220px;
  transition:background .15s;
}
body.dark .tb-searchbox{background:rgba(255,255,255,.08);}
.tb-searchbox:hover{background:rgba(255,255,255,.25);}
.tb-searchbox input{
  background:none;border:none;outline:none;
  font-size:15px;color:#fff;width:100%;
  font-family:'Inter',sans-serif;
}
.tb-searchbox input::placeholder{color:rgba(255,255,255,.75);}
@media(max-width:600px){.tb-searchbox{min-width:120px;}}

/* Center: nav icons */
.header-center{display:flex;align-items:center;justify-content:center;gap:2px;}
.nav-tab{
  width:110px;height:48px;
  border:none;background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius);
  position:relative;transition:background .15s;
  flex-shrink:0;
}
.nav-tab svg{width:24px;height:24px;fill:rgba(255,255,255,.7);}
.nav-tab:hover{background:rgba(255,255,255,.12);}
.nav-tab.active{border-bottom:3px solid #fff;}
.nav-tab.active svg{fill:#fff;}
.tab-badge{
  position:absolute;top:4px;right:18px;
  min-width:18px;height:18px;border-radius:10px;
  background:var(--red);color:#fff;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;border:2px solid var(--brand);
}
body.dark .tab-badge{border-color:#242526;}
.nav-tab-text{display:none;}

/* Right: user actions */
.header-right{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-shrink:0;}
.btn-icon{
  width:40px;height:40px;border-radius:50%;
  border:none;
  background:rgba(255,255,255,.15);
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;color:#fff;
  flex-shrink:0;position:relative;
}
body.dark .btn-icon{background:rgba(255,255,255,.08);}
.btn-icon:hover{background:rgba(255,255,255,.25);}
.tb-me-btn{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.15);
  border:none;border-radius:20px;padding:6px 10px;
  cursor:pointer;color:#fff;font-size:14px;font-weight:700;
  transition:background .15s;
}
body.dark .tb-me-btn{background:rgba(255,255,255,.08);}
.tb-me-btn:hover{background:rgba(255,255,255,.25);}
.tb-me-av{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  overflow:hidden;flex-shrink:0;
}
.tb-me-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.spacer{display:none;}

/* ━━ 3-COLUMN FACEBOOK LAYOUT ━━ */
#fb-layout{
  display:grid;
  grid-template-columns:280px 1fr 280px;
  min-height:calc(100vh - 56px);
  max-width:1440px;
  margin:56px auto 0;
  gap:0;
}
.fb-left{
  position:sticky;top:56px;height:calc(100vh - 56px);
  overflow-y:auto;padding:8px 8px 20px;
  scrollbar-width:thin;
  background:var(--bg);
}
.fb-left::-webkit-scrollbar{width:6px;}
.fb-left::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.fb-center{
  min-width:0;
  padding-bottom:60px;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}
.fb-right{
  position:sticky;top:56px;height:calc(100vh - 56px);
  overflow-y:auto;padding:16px 8px 20px;
  scrollbar-width:thin;
  background:var(--bg);
}
.fb-right::-webkit-scrollbar{width:6px;}
.fb-right::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:1280px){
  #fb-layout{grid-template-columns:240px 1fr 240px;}
}
@media(max-width:1024px){
  #fb-layout{grid-template-columns:0 1fr 0;}
  .fb-left,.fb-right{display:none;}
  .fb-center{border:none;}
}
@media(max-width:640px){
  .header-center{display:none;}
  .tb-searchbox{min-width:40px;}
}

/* ━━ LEFT SIDEBAR ━━ */
.lsb-user{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:var(--radius);
  cursor:pointer;margin-bottom:2px;
  transition:background .15s;
}
.lsb-user:hover{background:var(--card2);}
.lsb-av{
  width:36px;height:36px;border-radius:50%;
  background:var(--brand);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;
  overflow:hidden;flex-shrink:0;
}
.lsb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.lsb-name{font-size:15px;font-weight:600;}
.lsb-row{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:var(--radius);
  cursor:pointer;font-size:15px;font-weight:500;
  transition:background .15s;color:var(--text);
  text-decoration:none;
}
.lsb-row:hover{background:var(--card2);}
.lsb-ic{
  width:36px;height:36px;border-radius:50%;
  background:var(--card2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.lsb-divider{
  height:1px;background:var(--border);
  margin:8px 0;
}
.lsb-section{
  font-size:17px;font-weight:700;
  padding:8px 8px 4px;
  display:flex;justify-content:space-between;align-items:center;
}
.lsb-seeall{font-size:13px;font-weight:600;color:var(--brand);cursor:pointer;}
.lsb-seeall:hover{text-decoration:underline;}

/* ━━ RIGHT SIDEBAR ━━ */
.rsb-title{font-size:17px;font-weight:700;margin-bottom:12px;padding:0 8px;}
.rsb-item{
  display:flex;align-items:center;gap:10px;
  padding:8px;border-radius:var(--radius);
  cursor:pointer;margin-bottom:4px;
  transition:background .15s;
}
.rsb-item:hover{background:var(--card2);}
.rsb-av{
  width:44px;height:44px;border-radius:var(--radius);
  background:var(--brand);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.rsb-av img{width:100%;height:100%;object-fit:cover;}
.rsb-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.rsb-meta{font-size:12px;color:var(--sub);}
.rsb-btn{
  margin-left:auto;background:var(--brandL);color:var(--brand);
  border:none;border-radius:6px;padding:6px 12px;
  font-size:13px;font-weight:700;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:background .15s;
}
.rsb-btn:hover{background:var(--brandM);}
.rsb-divider{height:1px;background:var(--border);margin:12px 8px;}

/* ━━ LEFT SIDEBAR ACTIVE STATE ━━ */
.lsb-row-active{background:var(--brandL);color:var(--brand);font-weight:700;}
.lsb-row-active .lsb-ic{background:var(--brand);color:#fff;}
.lsb-ic-brand{background:var(--brand)!important;color:#fff!important;}

/* ━━ SOCIAL FEED ━━ */
/* Stories */
.sf-stories-wrap{
  display:flex;gap:10px;overflow-x:auto;padding:12px;
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:10px;
  scrollbar-width:none;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.sf-stories-wrap::-webkit-scrollbar{display:none;}
.sf-story{
  position:relative;width:114px;height:200px;flex-shrink:0;
  border-radius:14px;overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.14);
  transition:transform .18s ease,box-shadow .18s ease;
}
.sf-story:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(0,0,0,.22);}
.sf-story-bg{position:absolute;inset:0;}
.sf-story-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 55%);
}
.sf-story-av-ring{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:44px;height:44px;border-radius:50%;
  border:3px solid var(--brand);
  display:flex;align-items:center;justify-content:center;
  background:var(--brand);
  box-shadow:0 0 0 2px var(--card);
}
.sf-story-add-av{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:var(--brand);
  border:2px solid var(--card);
}
.sf-story-add-bg{position:absolute;inset:0;background:var(--card2);}
.sf-story-plus-ring{
  position:absolute;top:38px;left:50%;transform:translateX(-50%);
  width:22px;height:22px;border-radius:50%;
  background:var(--brand);color:#fff;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:3px solid var(--card);z-index:2;
}
.sf-story-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-40%);
  font-size:52px;opacity:.9;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
}
.sf-story-name{
  position:relative;font-size:12px;font-weight:700;
  color:#fff;text-align:center;
  text-shadow:0 1px 5px rgba(0,0,0,.7);
  max-width:104px;padding:0 4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
/* Create post */
.sf-create{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.sf-create-top{display:flex;gap:10px;align-items:center;margin-bottom:12px;}
.sf-create-input{
  flex:1;background:var(--card2);border:1.5px solid var(--border2);
  border-radius:24px;padding:11px 18px;cursor:pointer;
  font-size:15px;color:var(--hint);
  transition:border-color .15s;
}
.sf-create-input:hover{border-color:var(--brand);}
.sf-create-actions{display:flex;border-top:1px solid var(--border);padding-top:8px;}
.sf-create-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 4px;border:none;background:none;cursor:pointer;
  font-size:14px;font-weight:600;color:var(--sub);border-radius:10px;
  font-family:'Inter',sans-serif;transition:background .15s;white-space:nowrap;
}
.sf-create-btn:hover{background:var(--card2);}
/* Post card */
.sf-post{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  animation:sfCardIn .22s ease;
}
@keyframes sfCardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sf-post-hd{
  display:flex;align-items:center;gap:10px;padding:14px 16px 6px;
}
.sf-post-av{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;flex-shrink:0;cursor:pointer;
}
.sf-post-text{padding:4px 16px 10px;font-size:15px;line-height:1.6;color:var(--text);}
.sf-post-img{
  width:100%;display:flex;align-items:center;justify-content:center;
  font-size:80px;min-height:220px;cursor:pointer;position:relative;overflow:hidden;
}
.sf-post-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.35) 0%,transparent 55%);
}
.sf-attach{
  border-top:1px solid var(--border);cursor:pointer;
  display:flex;align-items:stretch;transition:background .15s;
}
.sf-attach:hover{background:var(--card2);}
.sf-attach-thumb{
  width:90px;min-height:90px;flex-shrink:0;
  background:linear-gradient(135deg,var(--brandL),var(--card2));
  display:flex;align-items:center;justify-content:center;font-size:36px;
}
.sf-attach-info{padding:12px 14px;flex:1;min-width:0;}
.sf-attach-buy{
  display:inline-block;margin-top:8px;padding:5px 14px;border-radius:20px;
  background:var(--brand);color:#fff;font-size:12px;font-weight:700;
  border:none;cursor:pointer;font-family:'Inter',sans-serif;
}
.sf-post-stats{
  display:flex;align-items:center;padding:10px 16px 8px;
  font-size:13px;color:var(--sub);border-bottom:1px solid var(--border);cursor:pointer;
}
.sf-post-acts{display:flex;padding:4px 8px 4px;}
.sf-act-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 4px;border:none;background:none;cursor:pointer;
  font-size:14px;font-weight:600;color:var(--sub);border-radius:10px;
  font-family:'Inter',sans-serif;transition:background .15s,color .15s;
}
.sf-act-btn:hover{background:var(--card2);}
.sf-act-btn.liked{color:var(--brand);font-weight:700;}
.sf-act-icon{font-size:18px;}
.sf-comment-row{display:flex;gap:8px;padding:2px 16px 12px;align-items:center;}
.sf-comment-inp{
  flex:1;background:var(--card2);border-radius:20px;border:1px solid transparent;
  padding:8px 16px;font-size:13px;color:var(--hint);cursor:text;
  transition:border-color .15s;
}
.sf-comment-inp:hover{border-color:var(--border2);}
/* Reels row */
.sf-reels-wrap{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.sf-reels-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;border-bottom:1px solid var(--border);
}
.sf-reels-more{font-size:13px;color:var(--brand);font-weight:600;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;}
.sf-reels-more:hover{text-decoration:underline;}
.sf-reels-row{display:flex;gap:8px;overflow-x:auto;padding:12px;scrollbar-width:none;}
.sf-reels-row::-webkit-scrollbar{display:none;}
.sf-reel{
  position:relative;width:130px;height:220px;flex-shrink:0;
  border-radius:12px;overflow:hidden;cursor:pointer;background:#0a0a1a;
  transition:transform .18s ease;box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.sf-reel:hover{transform:scale(1.04);}
.sf-reel-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 60%,transparent 100%);
}
.sf-reel-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:56px;opacity:.9;transition:opacity .18s;
}
.sf-reel:hover .sf-reel-center{opacity:.45;}
.sf-reel-play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;backdrop-filter:blur(4px);
  opacity:0;transition:opacity .18s;
}
.sf-reel:hover .sf-reel-play{opacity:1;}
.sf-reel-info{position:absolute;bottom:0;left:0;right:0;padding:10px 10px 12px;}
.sf-reel-name{font-size:11px;font-weight:700;color:#fff;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sf-reel-stats{font-size:11px;color:rgba(255,255,255,.8);}
/* Groups row */
.sf-groups-wrap{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.sf-groups-row{display:flex;gap:10px;overflow-x:auto;padding:12px;scrollbar-width:none;}
.sf-groups-row::-webkit-scrollbar{display:none;}
.sf-group-card{
  width:150px;flex-shrink:0;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);cursor:pointer;transition:border-color .15s,transform .15s;
  background:var(--card);
}
.sf-group-card:hover{border-color:var(--brand);transform:translateY(-2px);}
.sf-group-cover{height:80px;display:flex;align-items:center;justify-content:center;font-size:38px;}
.sf-group-info{padding:8px 10px 10px;}
.sf-group-name{font-size:13px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sf-group-members{font-size:11px;color:var(--sub);margin-bottom:6px;}
.sf-group-join{
  width:100%;padding:5px;border-radius:6px;border:none;
  background:var(--brandL);color:var(--brand);
  font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;
}
.sf-group-join:hover{background:var(--brandM);}
/* Floating Messenger */
.sf-messenger-fab{position:fixed;bottom:24px;right:24px;z-index:900;}
@media(max-width:640px){.sf-messenger-fab{bottom:72px;right:12px;}}
.sf-messenger-toggle{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#1877f2,#1251b3);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:#fff;
  box-shadow:0 4px 16px rgba(24,119,242,.5);
  transition:transform .18s ease,box-shadow .18s;position:relative;
}
.sf-messenger-toggle:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(24,119,242,.6);}
.sf-messenger-badge{
  position:absolute;top:-2px;right:-2px;
  width:18px;height:18px;border-radius:50%;
  background:#e74c3c;color:#fff;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--card);
}
.sf-messenger-panel{
  position:absolute;bottom:66px;right:0;width:300px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:16px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
  animation:dropIn .18s ease;
}
.sf-msg-hd{
  background:linear-gradient(135deg,#1877f2,#1251b3);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
}
.sf-msg-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);
}
.sf-msg-item:hover{background:var(--card2);}
.sf-msg-item:last-child{border-bottom:none;}

/* ━━ MOBILE BOTTOM NAV ━━ */
.mb-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--card);
  border-top:1px solid var(--border);
  padding:4px 0;
}
.mb-nav-inner{display:flex;}
.mb-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:6px 4px;border:none;background:none;cursor:pointer;
  font-size:22px;color:var(--hint);position:relative;transition:color .15s;
}
.mb-btn.active{color:var(--brand);}
.mb-label{font-size:10px;font-weight:600;margin-top:2px;}
@media(max-width:640px){
  .mb-nav{display:block;}
  #fb-layout{margin-bottom:56px;}
}

/* ━━ FACEBOOK CARD STYLE ━━ */
.fb-card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  margin-bottom:12px;
  overflow:hidden;
}
.fb-card-p{padding:16px;}

/* ━━ NOTIF DROPDOWN ━━ */
.notif-dd{
  position:fixed;top:56px;right:8px;z-index:300;
  background:var(--card);border-radius:var(--radius-lg);
  width:360px;max-height:calc(100vh - 70px);
  overflow-y:auto;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  border:1px solid var(--border);
}
.notif-dd-h{
  padding:16px;font-size:24px;font-weight:800;
  position:sticky;top:0;background:var(--card);z-index:1;
  border-bottom:1px solid var(--border);
}
.notif-item-fb{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 12px;cursor:pointer;transition:background .15s;
}
.notif-item-fb:hover{background:var(--bg2);}
.ni-av{
  width:56px;height:56px;border-radius:50%;
  background:var(--brand);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;
  position:relative;flex-shrink:0;overflow:hidden;
}
.ni-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ni-ic{
  position:absolute;bottom:0;right:0;
  width:22px;height:22px;border-radius:50%;
  background:var(--brand);color:#fff;
  font-size:11px;border:2px solid var(--card);
  display:flex;align-items:center;justify-content:center;
}
.ni-msg{font-size:14px;color:var(--text);line-height:1.4;}
.ni-time{font-size:12px;color:var(--brand);font-weight:600;margin-top:3px;}
.ni-dot{width:12px;height:12px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:8px;}

/* ━━ SEARCH TOPBAR (replace old sticky search) ━━ */
.search-wrap{
  position:sticky;top:56px;z-index:90;
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:8px 16px;
}
.search-row{display:flex;gap:8px;align-items:center;}
.search-box{flex:1;position:relative;}
.search-input{
  width:100%;height:42px;
  border:1px solid var(--border2);border-radius:10px;
  padding:0 44px 0 44px;
  font-size:13.5px;font-weight:400;
  color:var(--text);
  background:var(--bg2);
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  font-family:'Inter',sans-serif;
}
.search-input:focus{
  border-color:var(--brand);
  background:var(--card);
  box-shadow:0 0 0 2px rgba(24,119,242,.15);
}
.search-input::placeholder{color:var(--hint);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--hint);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--border2);border:none;cursor:pointer;font-size:11px;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.search-clear:hover{background:var(--border3);color:var(--text);}
.btn-icon:hover{background:rgba(255,255,255,.25);}
.btn-icon:hover{border-color:var(--border2);color:var(--text);background:var(--card2);}

/* ━━ CARDS ━━ */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
  transition:border-color .2s,box-shadow .2s;
}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);}

/* ━━ CHIPS ━━ */
.chip{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:20px;white-space:nowrap;
  letter-spacing:.02em;
}
.chip-ok{background:rgba(34,211,142,.1);color:var(--ok);border:1px solid rgba(34,211,142,.2);}
.chip-warn{background:rgba(245,166,35,.1);color:var(--warn);border:1px solid rgba(245,166,35,.2);}
.chip-brand{background:rgba(61,142,248,.1);color:var(--brand);border:1px solid rgba(61,142,248,.2);}
.chip-red{
  background:rgba(240,80,104,.1);color:#fff;
  border:none;
  font-size:9.5px;padding:3px 8px;
  background:linear-gradient(135deg,#e04060,#c0304a);
  letter-spacing:.04em;
}
.chip-purple{background:rgba(155,135,245,.1);color:var(--purple);border:1px solid rgba(155,135,245,.2);}

/* ━━ BUTTONS ━━ */
.btn{
  padding:10px 20px;border-radius:var(--radius-sm);
  font-weight:700;font-size:13px;cursor:pointer;border:none;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  font-family:'Inter',sans-serif;letter-spacing:-.1px;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(255,255,255,.06),transparent);
  pointer-events:none;border-radius:inherit;
}
.btn-primary{
  background:linear-gradient(135deg,#3d8ef8 0%,#2e6fd6 100%);
  color:#fff;
  box-shadow:0 4px 16px rgba(61,142,248,.3),inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#5299f9 0%,#3d80e8 100%);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(61,142,248,.4),inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{
  background:rgba(255,255,255,.04);color:var(--sub);
  border:1px solid var(--border);
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,.07);}
.btn-sm{padding:6px 14px;font-size:11.5px;border-radius:8px;}
.btn-outline{
  background:transparent;color:var(--brand);
  border:1.5px solid rgba(61,142,248,.35);
}
.btn-outline:hover{background:var(--brandM);border-color:rgba(61,142,248,.6);}

/* ━━ PROGRESS ━━ */
.progress-bar{height:3px;border-radius:2px;background:var(--border);overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* ━━ TOAST ━━ */
.toast-area{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:290px;}
.toast{
  background:rgba(16,24,40,.95);
  color:var(--text);padding:11px 15px;
  border-radius:12px;font-size:12px;font-weight:600;
  box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.08);
  display:flex;align-items:center;gap:9px;
  backdrop-filter:blur(20px);
  animation:slideIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideIn{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ━━ SEARCH ━━ */
.search-wrap{
  position:sticky;top:60px;z-index:90;
  background:rgba(6,9,15,.92);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom:1px solid var(--border);
  padding:11px 16px;
}
.search-row{display:flex;gap:8px;align-items:center;}
.search-box{flex:1;position:relative;}
.search-input{
  width:100%;height:42px;
  border:1px solid var(--border2);border-radius:10px;
  padding:0 44px 0 44px;
  font-size:13.5px;font-weight:400;
  color:var(--text);
  background:rgba(255,255,255,.04);
  outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  font-family:'Inter',sans-serif;
}
.search-input:focus{
  border-color:var(--brand);
  background:rgba(61,142,248,.05);
  box-shadow:0 0 0 3px rgba(61,142,248,.1);
}
.search-input::placeholder{color:var(--hint);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--hint);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--border2);border:none;cursor:pointer;font-size:11px;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.search-clear:hover{background:var(--border3);color:var(--text);}
.filter-toggle{
  height:42px;padding:0 14px;border-radius:10px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,.04);
  cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:all .2s;font-family:'Inter',sans-serif;
}
.filter-toggle:hover,.filter-toggle.active{
  border-color:rgba(61,142,248,.5);color:var(--brand);
  background:rgba(61,142,248,.07);
}
.filter-count{width:18px;height:18px;border-radius:50%;background:var(--brand);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ━━ SUGGESTIONS ━━ */
.suggestions{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:rgba(13,18,32,.97);
  border:1px solid var(--border2);
  border-radius:var(--radius);overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05);
  z-index:200;animation:dropIn .15s ease;
  backdrop-filter:blur(20px);
}
@keyframes dropIn{from{transform:translateY(-8px);opacity:0;}to{transform:none;opacity:1;}}
.sugg-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;font-size:13px;}
.sugg-item:hover{background:rgba(61,142,248,.07);}
.sugg-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sugg-section{padding:6px 14px;font-size:10px;font-weight:700;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--border);}

/* ━━ FILTER PANEL ━━ */
.filter-panel{border-bottom:1px solid var(--border);padding:0 16px;overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .25s;}
.filter-panel.open{max-height:600px;padding:16px;}

/* ━━ CATEGORY PILLS ━━ */
.cat-pills{display:flex;gap:7px;flex-wrap:wrap;}
.cat-pill{
  padding:6px 15px;border-radius:30px;
  border:1px solid var(--border);
  background:transparent;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--sub);
  transition:all .2s;white-space:nowrap;
  font-family:'Inter',sans-serif;
}
.cat-pill:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,.04);}
.cat-pill.selected{
  border-color:rgba(61,142,248,.4);
  background:rgba(61,142,248,.1);
  color:var(--brand);font-weight:600;
}

/* ━━ RANGE ━━ */
.range-wrap{position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.08);margin:10px 0;}
.range-track{position:absolute;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--brand),#7c5cf5);}
.range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:var(--brand);border:3px solid var(--bg);cursor:grab;transition:transform .15s,box-shadow .15s;box-shadow:0 0 0 3px rgba(61,142,248,.2);}
.range-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.18);box-shadow:0 0 0 5px rgba(61,142,248,.25);}
input[type=range]{position:absolute;inset:0;width:100%;opacity:0;cursor:pointer;margin:0;}

/* ━━ SORT BAR ━━ */
.sort-bar{
  display:flex;align-items:center;gap:6px;
  padding:9px 16px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;background:rgba(9,13,22,.6);
  scrollbar-width:none;
}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{
  padding:5px 13px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;cursor:pointer;
  font-size:11.5px;font-weight:500;color:var(--hint);
  white-space:nowrap;transition:all .2s;
  font-family:'Inter',sans-serif;display:flex;align-items:center;gap:4px;
}
.sort-btn:hover{border-color:var(--border2);color:var(--sub);}
.sort-btn.active{
  border-color:rgba(61,142,248,.4);
  background:rgba(61,142,248,.1);color:var(--brand);
  font-weight:600;
}

/* ━━ ACTIVE FILTERS ━━ */
.active-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);min-height:42px;}
.active-filter-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:rgba(61,142,248,.1);color:var(--brand);
  font-size:11px;font-weight:600;
  border:1px solid rgba(61,142,248,.18);
  cursor:pointer;transition:all .18s;
}
.active-filter-tag:hover{background:rgba(61,142,248,.18);}
.active-filter-tag .remove{font-size:10px;opacity:.5;}

/* ━━ RESULTS ━━ */
.results-area{padding:14px 16px;}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.results-count{font-size:12.5px;color:var(--sub);}
.results-count strong{color:var(--text);font-weight:700;}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);}
.view-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--hint);transition:all .2s;}
.view-btn.active{background:var(--brandM);color:var(--brand);}

/* ━━ LISTING GRID ━━ */
.listing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.listing-grid.list-view{grid-template-columns:1fr;}

/* ━━ RESULT CARDS ━━ */
.result-card{
  background:linear-gradient(160deg,var(--card) 0%,rgba(9,13,22,.9) 100%);
  border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s,border-color .22s;
  animation:cardIn .3s ease both;
}
.result-card:hover{
  transform:translateY(-3px) scale(1.005);
  box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(61,142,248,.2),0 0 24px rgba(61,142,248,.06);
  border-color:rgba(61,142,248,.18);
}
@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.result-card.list-view{border-radius:12px;display:flex;align-items:center;}
.result-card.list-view .card-thumb{width:72px;height:72px;border-radius:0;flex-shrink:0;}
.result-card.list-view .card-body{padding:12px;flex:1;min-width:0;}
.result-card.list-view .card-actions{padding:12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}

/* ━━ EMPTY STATE ━━ */
.empty-state{text-align:center;padding:60px 20px;}

/* ━━ LOCATION PILLS ━━ */
.loc-pills{display:flex;gap:6px;flex-wrap:wrap;}

/* ━━ LIGHT MODE ━━ */
body:not(.dark){
  --bg:#f2f5fa;
  --bg2:#e8edf6;
  --card:#ffffff;
  --card2:#f6f8fd;
  --card3:#f0f3fa;
  --border:rgba(0,0,0,.08);
  --border2:rgba(0,0,0,.13);
  --border3:rgba(0,0,0,.20);
  --text:#1a2235;
  --sub:#485672;
  --hint:#94a3b8;
  --shadow-sm:0 2px 8px rgba(0,0,0,.08);
  --shadow:0 8px 32px rgba(0,0,0,.12);
  --shadow-lg:0 20px 60px rgba(0,0,0,.18);
  --glow:0 0 28px rgba(61,142,248,.1);
  --okBg:rgba(34,211,142,.08);
  --warnBg:rgba(245,166,35,.08);
  --redBg:rgba(240,80,104,.08);
  --purpleBg:rgba(155,135,245,.08);
  background-image:
    radial-gradient(ellipse 80% 60% at 80% -10%, rgba(61,142,248,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at -10% 80%, rgba(155,135,245,.04) 0%, transparent 60%);
}
body:not(.dark) .header{background:rgba(242,245,250,.92);}
body:not(.dark) .search-wrap{background:rgba(242,245,250,.95);}
body:not(.dark) .suggestions{background:rgba(255,255,255,.98);}
body:not(.dark) .toast{background:rgba(255,255,255,.96);color:var(--text);}
body:not(.dark) .sort-bar{background:rgba(248,250,253,.8);}
body:not(.dark) .filter-panel{background:var(--card);}
body:not(.dark) .btn-ghost{background:rgba(0,0,0,.04);}
body:not(.dark) .btn-ghost:hover{background:rgba(0,0,0,.07);}
body:not(.dark) .nav-tab:hover{background:rgba(0,0,0,.04);}
body:not(.dark) .result-card{background:var(--card);}
body:not(.dark) input,body:not(.dark) textarea,body:not(.dark) select{background:var(--bg2);color:var(--text);}
body:not(.dark) .modal-sheet,body:not(.dark) .modal-box{background:var(--card);}

/* ━━ RESPONSIVE ━━ */
@media(max-width:600px){
  .app{padding:0 0 100px;}
  .header{padding:0 10px;gap:2px;height:52px;}
  .nav-tab{padding:4px 7px;font-size:10px;gap:2px;}
  .logo-txt{display:none;}
  .badge-v{display:none;}
  .listing-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;}
  .results-area{padding:10px 12px;}
  .search-wrap{padding:8px 12px;}
  .sort-bar{padding:7px 12px;}
  .filter-panel.open{padding:11px;}
  .modal-sheet{border-radius:20px 20px 0 0;padding:16px;}
  .card{padding:13px;}
  .stat-card{min-width:86px;padding:10px 11px;}
  .btn{font-size:12.5px;padding:9px 16px;}
  .modal-box{border-radius:18px;padding:20px;}
}
@media(max-width:400px){
  .listing-grid{grid-template-columns:1fr 1fr;}
  .nav-tab .nav-label{display:none;}
  .header{gap:1px;}
}

/* ━━ MISC ━━ */
.dual-range{position:relative;height:28px;display:flex;align-items:center;}
.dual-range .range-wrap{flex:1;}
.dual-range-inputs{position:absolute;inset:0;display:flex;}
.dual-range-inputs input[type=range]{width:100%;pointer-events:none;}
.dual-range-inputs input[type=range]::-webkit-slider-thumb{pointer-events:all;width:18px;height:18px;border-radius:50%;background:var(--brand);border:3px solid var(--bg);cursor:grab;-webkit-appearance:none;}
.dual-range-inputs input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:transparent;}
input[type=range]{-webkit-appearance:none;background:transparent;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;}
.hl{color:var(--brand);font-weight:700;}
@keyframes shimmer{0%{background-position:-600px 0;}100%{background-position:600px 0;}}
.shimmer{
  background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,.04) 50%,var(--card) 75%);
  background-size:1200px 100%;animation:shimmer 2s infinite;
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}
@keyframes popIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  z-index:9000;

/* ── FILTER ENGINE ── */
function applyFilters(listings){
  let res=[...listings];

  // Text search
  if(state.query.trim()){
    // Nếu có kết quả từ API search, ưu tiên dùng
    if(state._searchIds){
      results=results.filter(l=>state._searchIds.has(l.id));
      state._searchIds=null; // dùng 1 lần rồi reset
    }
    const q=state.query.toLowerCase();
    res=res.filter(l=>
      l.title.toLowerCase().includes(q)||
      l.location.toLowerCase().includes(q)||
      l.category.toLowerCase().includes(q)||
      l.section.toLowerCase().includes(q)
    );
  }

  // Category
  if(state.category!=="all") res=res.filter(l=>l.category===state.category);

  // Location
  if(state.location!=="Tất cả") res=res.filter(l=>l.location===state.location);

  // Price
  res=res.filter(l=>l.price>=state.priceMin&&l.price<=state.priceMax);

  // Date
  if(state.dateFrom) res=res.filter(l=>new Date(l.date)>=new Date(state.dateFrom));
  if(state.dateTo)   res=res.filter(l=>new Date(l.date)<=new Date(state.dateTo));

  // Trust
  if(state.trustMin>0) res=res.filter(l=>l.trust>=state.trustMin);

  // Only verified sellers
  if(state.onlyVerified) res=res.filter(l=>l.trust>=80);

  // Only in stock
  if(state.onlyInStock) res=res.filter(l=>l.quantity>0);

  // Sort
  switch(state.sortBy){
    case"price_asc":  res.sort((a,b)=>a.price-b.price);break;
    case"price_desc": res.sort((a,b)=>b.price-a.price);break;
    case"date_asc":   res.sort((a,b)=>new Date(a.date)-new Date(b.date));break;
    case"trust":      res.sort((a,b)=>b.trust-a.trust);break;
    case"popular":    res.sort((a,b)=>(b.views+b.saved)-(a.views+a.saved));break;
    case"discount":   res.sort((a,b)=>(1-b.price/b.original_price)-(1-a.price/a.original_price));break;
    default:          res.sort((a,b)=>(b.views+b.saved*2)-(a.views+a.saved*2));
  }

  return res;
}

function countActiveFilters(){
  let c=0;
  if(state.category!=="all")c++;
  if(state.location!=="Tất cả")c++;
  if(state.priceMin>0||state.priceMax<PRICE_MAX_LIMIT)c++;
  if(state.dateFrom||state.dateTo)c++;
  if(state.trustMin>0)c++;
  if(state.onlyVerified)c++;
  if(state.onlyInStock)c++;
  return c;
}

/* ── HIGHLIGHT ── */
function highlight(text,query){
  if(!query.trim())return text;
  const re=new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return text.replace(re,`<span class="hl">$1</span>`);
}

  if(state.priceMin>0||state.priceMax<PRICE_MAX_LIMIT){

/* ── DATE HELPERS ── */
function dateOffset(days){
  const d=new Date();d.setDate(d.getDate()+days);
  return d.toISOString().split("T")[0];
}

/* ── RANGE HANDLERS ── */
function onRangeLo(v){
  const val=parseInt(v);
  if(val>=state.priceMax-200000)return;
  setState({priceMin:val});
}
function onRangeHi(v){
  const val=parseInt(v);
  if(val<=state.priceMin+200000)return;
  setState({priceMax:val});
}

function toggleWish(id){
  const wl=state.wishlist.includes(id)?state.wishlist.filter(x=>x!==id):[...state.wishlist,id];
  setState({wishlist:wl});
  showToast(wl.includes(id)?"Đã lưu vào yêu thích!":"Đã bỏ yêu thích",wl.includes(id)?"#059669":"#6b7280",wl.includes(id)?"❤️":"🤍");
}

function timeAgo(dateStr){
  const diff=Date.now()-new Date(dateStr).getTime();
  const m=Math.floor(diff/60000);
  if(m<1)return'Vừa xong';
  if(m<60)return m+'p trước';
  const h=Math.floor(m/60);
  if(h<24)return h+'h trước';
  const d=Math.floor(h/24);
  if(d<7)return d+' ngày trước';
  return new Date(dateStr).toLocaleDateString('vi-VN');
}
async function handleNotifClick(nid,action){
  const n=NOTIFICATIONS.find(x=>x.id===nid);
  if(!n)return;
  if(!n.is_read){
    n.is_read=true;
    state.notifCount=Math.max(0,state.notifCount-1);
    if(authToken) fetch(API+'/notifications/'+nid+'/read',{method:'POST',headers:getHeaders()}).catch(()=>{});
  }
  setState({notifOpen:false,page:action||'orders'});
}

let _txPage=1;
let _txTotal=0;
const _TX_PAGE_SIZE=20;

async function loadTransactions(page){
  if(!authToken) return;
  page=page||1;
  const el=document.getElementById('tx-list');
  const moreBtn=document.getElementById('tx-load-more');
  if(!el) return;
  if(page===1) el.innerHTML='<div style="text-align:center;padding:30px 0;color:var(--hint);">⏳ Đang tải...</div>';
  try{
    const res=await fetch(API+'/wallet/transactions?page='+page+'&limit='+_TX_PAGE_SIZE,{headers:getHeaders()});
    const resp=await res.json();
    const txs=resp.transactions||[];
    _txTotal=resp.total||0;
    _txPage=page;
    if(page===1){
      el.innerHTML=txs.length===0
        ?'<div style="text-align:center;padding:40px 0;"><div style="font-size:36px;margin-bottom:10px;">📭</div><div style="font-size:14px;font-weight:700;margin-bottom:4px;">Chưa có giao dịch nào</div><div style="font-size:12px;color:var(--hint);">Các giao dịch sẽ xuất hiện ở đây</div></div>'
        :txs.map(t=>renderTxRow(t)).join('');
    } else {
      el.innerHTML+=txs.map(t=>renderTxRow(t)).join('');
    }
    const loaded=Math.min(page*_TX_PAGE_SIZE,_txTotal);
    const countEl=document.getElementById('tx-count');
    if(countEl) countEl.textContent=`${loaded}/${_txTotal} giao dịch`;
    if(moreBtn){
      if(loaded>=_txTotal||txs.length===0){
        moreBtn.style.display='none';
      } else {
        moreBtn.style.display='block';
        moreBtn.textContent=`Tải thêm (còn ${_txTotal-loaded})`;
      }
    }
  }catch(e){
    if(el) el.innerHTML='<div style="text-align:center;padding:20px;color:var(--red);">Lỗi tải giao dịch</div>';
  }
}

async function submitWithdraw(){
  const amount=parseInt(document.getElementById('wd-amount')?.value||0);
  const bank_name=document.getElementById('wd-bank')?.value||'';
  const account_number=document.getElementById('wd-acno')?.value?.trim()||'';
  const account_holder=document.getElementById('wd-holder')?.value?.trim()||'';
  const errEl=document.getElementById('wd-err');
  function showErr(msg){errEl.textContent=msg;errEl.style.display='block';}
  if(!amount||amount<50000){showErr('Số tiền tối thiểu là 50,000đ');return;}
  if(!bank_name){showErr('Vui lòng chọn ngân hàng');return;}
  if(!account_number){showErr('Vui lòng nhập số tài khoản');return;}
  if(!account_holder){showErr('Vui lòng nhập tên chủ tài khoản');return;}
  errEl.style.display='none';
  const btn=document.querySelector('#wd-modal button:last-child');
  if(btn){btn.disabled=true;btn.textContent='⏳ Đang gửi...';}
  try{
    const res=await fetch(API+'/wallet/withdraw',{method:'POST',headers:getHeaders(),body:JSON.stringify({amount,bank_name,account_number,account_holder})});
    const data=await res.json();
    if(!res.ok){showErr(data.error||'Lỗi không xác định');if(btn){btn.disabled=false;btn.textContent='💳 Xác nhận rút tiền';}return;}
    document.getElementById('wd-modal').style.display='none';
    showToast('✅ '+data.message,'var(--ok)','✅');
    refreshBalance();
    setState({walletTab:'withdraw'});
  }catch(e){showErr('Không kết nối được server');if(btn){btn.disabled=false;btn.textContent='💳 Xác nhận rút tiền';}}
}

async function exportTransactionsCSV(){
  if(!authToken){showToast('Cần đăng nhập','var(--red)','❌');return;}
  try{
    showToast('Đang xuất CSV...','var(--brand)','⏳');
    const res=await fetch(API+'/wallet/transactions/export',{headers:getHeaders()});
    if(!res.ok){showToast('Xuất thất bại','var(--red)','❌');return;}
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='transactions.csv';
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('Xuất CSV thành công! 📊','var(--ok)','✅');
  }catch(e){showToast('Lỗi xuất CSV','var(--red)','❌');}
}

async function sendAIMessage(text){
  if(!text||!text.trim()||state.aiTyping) return;
  const userMsg={role:"user",content:text.trim()};
  state.aiMessages=[...state.aiMessages,userMsg];
  state.aiTyping=true;
  const inp=document.getElementById("ai-input");
  if(inp)inp.value="";
  render();
  // scroll to bottom
  setTimeout(()=>{const el=document.getElementById("ai-msgs");if(el)el.scrollTop=el.scrollHeight;},50);

  try{
    const res=await fetch(API+"/ai/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json",...getHeaders()},
      body:JSON.stringify({
        messages:state.aiMessages.map(m=>({role:m.role,content:m.content})),
      })
    });
    const data=await res.json();
    const reply=data.reply||"Xin lỗi, mình gặp lỗi. Thử lại nhé!";
    state.aiMessages=[...state.aiMessages,{role:"assistant",content:reply}];
  }catch(e){
    state.aiMessages=[...state.aiMessages,{role:"assistant",content:"Xin lỗi, mình đang gặp sự cố kết nối. Vui lòng thử lại sau nhé! 🙏"}];
  }
  state.aiTyping=false;
  render();
  setTimeout(()=>{const el=document.getElementById("ai-msgs");if(el)el.scrollTop=el.scrollHeight;},50);
}

function closeReviewModal(){
  state.showReviewModal=false;
  state.reviewOrderId=null;
  renderModals();
}

function submitReview(orderId){
  const o=ORDERS.find(x=>x.id===orderId);
  if(!o)return;
  const text=document.getElementById("review-text")?.value||reviewForm.text;
  const other=o.role==="buyer"?o.seller:o.buyer;
  // Add review to seller
  const sellerId=o.role==="buyer"?(ALL_LISTINGS.find(l=>l.title===o.title)?.seller_id||"u2"):"u1";
  if(SELLER_REVIEWS[sellerId]){
    SELLER_REVIEWS[sellerId].unshift({buyer:"Bạn",avatar:"VA",rating:reviewForm.rating,text:text||"Giao dịch tốt!",date:new Date().toLocaleDateString("vi-VN")});
  }
  // Add notification
  NOTIFICATIONS.unshift({id:"n"+UID(),type:"review",icon:"⭐",title:"Đánh giá đã gửi!",body:`Bạn đã đánh giá ${reviewForm.rating}⭐ cho ${other.name}`,created_at:new Date().toISOString(),is_read:false,link:'orders'});
  state.notifCount++;
  closeReviewModal();
  showToast(`Cảm ơn! Đánh giá ${reviewForm.rating}⭐ đã gửi 🎉`,"var(--ok)","⭐");
  render();
}

/* ── SEARCH ACTIONS ── */
let searchTimer=null;

function onSearchInput(val){
  const inp=document.getElementById("main-search");
  _searchFocused=true;
  _searchCursor=inp?inp.selectionStart:val.length;
  state.queryInput=val;
  state.showSuggestions=true;
  clearTimeout(searchTimer);
  if(!val.trim()){
    state.query="";
    // Reset về danh sách đầy đủ từ API
    loadTicketsFromAPI().then(()=>render());
    render();
    return;
  }
  // Debounce 350ms → gọi API search thật
  searchTimer=setTimeout(async ()=>{
    state.query=val;
    state.loading=true;
    _searchCursor=val.length;
    render();
    try{
      const params=new URLSearchParams({search:val.trim()});
      const res=await fetch(API+'/tickets?'+params.toString());
      const data=await res.json();
      if(Array.isArray(data)){
        // Merge vào ALL_LISTINGS — giữ local, thêm kết quả API chưa có
        const existingIds=new Set(ALL_LISTINGS.map(x=>x.id));
        data.forEach(t=>{
          if(!existingIds.has(t.id)){
            ALL_LISTINGS.push(mapTicket(t));
          }
        });
        // Đánh dấu query để filter đúng
        state._searchIds=new Set(data.map(t=>t.id));
      }
    }catch(e){}
    state.loading=false;
    render();
  },350);
  render();
}

function onSearchKey(e){
  if(e.key==="Enter"){
    const val=document.getElementById("main-search")?.value||"";
    doSearch(val);
  }
  if(e.key==="Escape"){
    setState({showSuggestions:false});
    document.getElementById("main-search")?.blur();
  }
}

function doSearch(term){
  state.queryInput=term;
  state.query=term;
  state.showSuggestions=false;
  state.loading=true;
  render();
  setTimeout(()=>{state.loading=false;render();},350);
}

function clearSearch(){
  state.query="";
  state.queryInput="";
  state.showSuggestions=false;
  _searchFocused=true;
  _searchCursor=0;
  render();
  setTimeout(()=>{
    const inp=document.getElementById("main-search");
    if(inp){inp.focus();inp.setSelectionRange(0,0);}
  },50);
}

// Close suggestions on outside click; also clear search focus tracking
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".search-box")){
    if(state.showSuggestions){state.showSuggestions=false;render();}
    if(e.target.id!=="main-search") _searchFocused=false;
  }
});

    const res=await fetch(API+'/orders/'+orderId+'/shipping',{headers:getHeaders()});
    if(res.ok){const d=await res.json();_shippingCache[orderId]=d;return d;}
  }catch(e){}
  return null;
}

function filteredOrders(){
  return ORDERS.filter(function(o){
    if(o.role!==state.orderTab) return false;
    if(state.orderFilter==="pending") return o.status==="awaiting_seller";
    if(state.orderFilter==="active") return o.status==="seller_accepted"||o.status==="ticket_uploaded"||o.status==="shipping";
    if(state.orderFilter==="done") return o.status==="completed";
    if(state.orderFilter==="dispute") return o.status==="disputed";
    return true;
  });
}

function buildOrdersPage(){
  if(state.activeOrder){
    var found=ORDERS.find(function(x){return x.id===state.activeOrder;});
    return found?buildOrderDetail(found):"";
  }
  var orders=filteredOrders();
  var buyer=ORDERS.filter(function(o){return o.role==="buyer";});
  var seller=ORDERS.filter(function(o){return o.role==="seller";});
  var isBuyer=state.orderTab==="buyer";

  var statsArr=isBuyer?[
    {label:"Tổng đơn",val:buyer.length,icon:"📦",col:"var(--brand)"},
    {label:"Đang chờ",val:buyer.filter(function(o){return o.status!=="completed"&&o.status!=="cancelled";}).length,icon:"⏳",col:"var(--warn)"},
    {label:"Hoàn thành",val:buyer.filter(function(o){return o.status==="completed";}).length,icon:"✅",col:"var(--ok)"},
    {label:"Escrow",val:VND(buyer.reduce(function(s,o){return s+(o.escrow||0);},0)),icon:"🔒",col:"var(--purple)"},
  ]:[
    {label:"Tổng đơn",val:seller.length,icon:"📦",col:"var(--brand)"},
    {label:"Cần xử lý",val:seller.filter(function(o){return o.status==="awaiting_seller";}).length,icon:"❗",col:"var(--red)"},
    {label:"Hoàn thành",val:seller.filter(function(o){return o.status==="completed";}).length,icon:"✅",col:"var(--ok)"},
    {label:"Đã nhận",val:VND(seller.filter(function(o){return o.status==="completed";}).reduce(function(s,o){return s+o.total;},0)),icon:"💸",col:"var(--ok)"},
  ];

  var filters=[
    {id:"all",label:"Tất cả"},
    {id:"pending",label:"⏳ Chờ xử lý"},
    {id:"active",label:"🔄 Đang xử lý"},
    {id:"done",label:"✅ Hoàn thành"},
    {id:"dispute",label:"⚠️ Khiếu nại"},
  ];

  var statsHTML=statsArr.map(function(s){
    return'<div class="stat-card"><div style="font-size:18px;margin-bottom:4px;">'+s.icon+'</div><div style="font-size:16px;font-weight:800;font-family:\'Syne\',sans-serif;color:'+s.col+';">'+s.val+'</div><div style="font-size:10px;color:var(--hint);font-weight:600;margin-top:1px;">'+s.label+'</div></div>';
  }).join("");

  var filtersHTML=filters.map(function(f){
    var isActive=state.orderFilter===f.id;
    return'<button onclick="setState({orderFilter:\''+f.id+'\'})" style="flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid '+(isActive?"var(--brand)":"var(--border)")+';background:'+(isActive?"var(--brandM)":"transparent")+';color:'+(isActive?"var(--brand)":"var(--sub)")+';font-size:11.5px;font-weight:700;cursor:pointer;transition:all .2s;font-family:\'Plus Jakarta Sans\',sans-serif;white-space:nowrap;">'+f.label+'</button>';
  }).join("");

  var ordersHTML=orders.length===0
    ?'<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:12px;">📭</div><div style="font-size:16px;font-weight:800;font-family:\'Syne\',sans-serif;margin-bottom:6px;">Chưa có đơn hàng</div><div style="font-size:12px;color:var(--sub);">Các đơn hàng phù hợp sẽ xuất hiện ở đây</div></div>'
    :orders.map(buildOrderCard).join("");

  var isStats=state.orderTab==="stats";

  if(isStats) return buildSellerStatsPage();

  return '<div style="padding-bottom:80px;">'
    +'<div style="padding:20px 20px 0;">'
    +'<div style="font-size:22px;font-weight:800;font-family:\'Syne\',sans-serif;margin-bottom:2px;">📋 Quản lý Đơn hàng</div>'
    +'<div style="font-size:12px;color:var(--sub);">Theo dõi và quản lý giao dịch an toàn</div></div>'
    +'<div style="padding:16px 20px 0;">'
    +'<div style="display:flex;background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow:hidden;">'
    +'<button onclick="setState({orderTab:\'buyer\',orderFilter:\'all\',activeOrder:null})" style="flex:1;padding:11px;font-size:12px;font-weight:700;font-family:\'Plus Jakarta Sans\',sans-serif;border:none;cursor:pointer;transition:all .2s;background:'+(isBuyer?"linear-gradient(135deg,var(--brand),var(--brandD))":"transparent")+';color:'+(isBuyer?"var(--bg)":"var(--sub)")+';">🛒 Người mua</button>'
    +'<button onclick="setState({orderTab:\'seller\',orderFilter:\'all\',activeOrder:null})" style="flex:1;padding:11px;font-size:12px;font-weight:700;font-family:\'Plus Jakarta Sans\',sans-serif;border:none;cursor:pointer;transition:all .2s;background:'+(!isBuyer&&!isStats?"linear-gradient(135deg,var(--brand),var(--brandD))":"transparent")+';color:'+(!isBuyer&&!isStats?"var(--bg)":"var(--sub)")+';">🏷️ Người bán</button>'
    +'<button onclick="openSellerStats()" style="flex:1;padding:11px;font-size:12px;font-weight:700;font-family:\'Plus Jakarta Sans\',sans-serif;border:none;cursor:pointer;transition:all .2s;background:transparent;color:var(--sub);">📊 Thống kê</button>'
    +'</div></div>'
    +'<div style="display:flex;gap:10px;padding:14px 20px;overflow-x:auto;">'+statsHTML+'</div>'
    +'<div style="display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;">'+filtersHTML+'</div>'
    +'<div style="padding:0 20px;display:flex;flex-direction:column;gap:12px;">'+ordersHTML+'</div>'
    +'</div>';
}

/* ══════════════════════════════════════════
   📊 SELLER STATS DASHBOARD

let _sellerChartInstance = null;
let _sellerChartMode = '30d'; // '30d' | '12m'

function openSellerStats(){
  setState({orderTab:'stats', orderFilter:'all', activeOrder:null});
  if(!state.sellerStats && !state.sellerStatsLoading) loadSellerStats();
}

async function loadSellerStats(){
  if(!authToken) return;
  state.sellerStatsLoading = true;
  render();
  try {
    const res = await fetch(API+'/seller/stats', {headers: getHeaders()});
    if(res.ok) state.sellerStats = await res.json();
  } catch(e){}
  state.sellerStatsLoading = false;
  render();
  setTimeout(()=>initSellerChart(_sellerChartMode), 80);
}

function switchSellerChart(mode){
  _sellerChartMode = mode;
  const btn30 = document.getElementById('schart-btn-30d');
  const btn12 = document.getElementById('schart-btn-12m');
  if(btn30 && btn12){
    btn30.style.background = mode==='30d' ? 'var(--brand)' : 'transparent';
    btn30.style.color = mode==='30d' ? '#fff' : 'var(--sub)';
    btn12.style.background = mode==='12m' ? 'var(--brand)' : 'transparent';
    btn12.style.color = mode==='12m' ? '#fff' : 'var(--sub)';
  }
  initSellerChart(mode);
}

function initSellerChart(mode){
  const canvas = document.getElementById('seller-orders-chart');
  if(!canvas || !window.Chart) return;
  const s = state.sellerStats;
  if(!s) return;
  if(_sellerChartInstance){ _sellerChartInstance.destroy(); _sellerChartInstance=null; }

  const fmtVal = v => v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'K':String(v);

  if(mode === '30d'){
    const days = s.orders_by_day || [];
    const labels = days.map((d,i)=>{
      const dt = new Date(d.date);
      return (i%5===0||i===days.length-1) ? (dt.getMonth()+1)+'/'+(dt.getDate()) : '';
    });
    _sellerChartInstance = new Chart(canvas.getContext('2d'), {
      type:'bar',
      data:{ labels, datasets:[
        { label:'Đơn hoàn thành', data:days.map(d=>d.count), backgroundColor:'rgba(61,142,248,0.75)', borderColor:'#3d8ef8', borderWidth:1, borderRadius:4, yAxisID:'y' },
        { label:'Doanh thu (đ)', data:days.map(d=>d.revenue), type:'line', borderColor:'#34d89e', backgroundColor:'rgba(52,216,158,0.08)', borderWidth:2, pointRadius:0, tension:0.4, fill:true, yAxisID:'y2' }
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:'#7b8fad', font:{size:10}, boxWidth:12 } } },
        scales:{
          x:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#4e6380',font:{size:9}} },
          y:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#4e6380',font:{size:9},stepSize:1}, position:'left' },
          y2:{ grid:{display:false}, ticks:{color:'#34d89e',font:{size:9},callback:fmtVal}, position:'right' }
        }
      }
    });
  } else {
    const months = s.orders_by_month || [];
    _sellerChartInstance = new Chart(canvas.getContext('2d'), {
      type:'bar',
      data:{ labels:months.map(m=>m.label), datasets:[
        { label:'Doanh thu (đ)', data:months.map(m=>m.revenue), backgroundColor:'rgba(61,142,248,0.8)', borderColor:'#3d8ef8', borderWidth:1, borderRadius:5, yAxisID:'y' },
        { label:'Đơn thành công', data:months.map(m=>m.sold), type:'line', borderColor:'#34d89e', backgroundColor:'rgba(52,216,158,0.1)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#34d89e', tension:0.3, fill:true, yAxisID:'y2' }
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:'#7b8fad', font:{size:10}, boxWidth:12 } } },
        scales:{
          x:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#4e6380',font:{size:9}} },
          y:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#4e6380',font:{size:9},callback:fmtVal}, position:'left' },
          y2:{ grid:{display:false}, ticks:{color:'#34d89e',font:{size:9},stepSize:1}, position:'right' }
        }
      }
    });
  }
}

        <div style="font-size:12px;">Đăng nhập để xem thống kê bán hàng</div>

      <!-- Stat cards 2x3 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">${cardsHTML}</div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div style="font-size:10.5px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;">📈 Doanh thu & đơn hàng</div>

            <button id="schart-btn-30d" onclick="switchSellerChart('30d')"
              style="font-size:10px;font-weight:700;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;transition:all .15s;background:${_sellerChartMode==='30d'?'var(--brand)':'transparent'};color:${_sellerChartMode==='30d'?'#fff':'var(--sub)'};">30 ngày</button>

              style="font-size:10px;font-weight:700;padding:4px 10px;border:none;border-radius:6px;cursor:pointer;transition:all .15s;background:${_sellerChartMode==='12m'?'var(--brand)':'transparent'};color:${_sellerChartMode==='12m'?'#fff':'var(--sub)'};">12 tháng</button>
          </div>
        </div>
        ${loading ? `<div style="text-align:center;padding:40px;color:var(--hint);font-size:12px;">⏳ Đang tải...</div>`
          : `<div style="position:relative;height:200px;"><canvas id="seller-orders-chart"></canvas></div>`}
      </div>

      <!-- Monthly table -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;">
        <div style="font-size:10.5px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;">📅 Chi tiết theo tháng</div>

      </div>
    </div>
  </div>`;
}

function buildOrderCard(o){
  var si=STATUS[o.status];
  var isSeller=o.role==="seller";
  var other=isSeller?o.buyer:o.seller;
  var tc=other.trust>=80?"var(--ok)":other.trust>=60?"var(--warn)":"var(--red)";
  var tcBg=other.trust>=80?"var(--okBg)":other.trust>=60?"var(--warnBg)":"var(--redBg)";

  var isPhysical=PHYSICAL_LISTING_TYPES.includes(o.listing_type);
  var actions="";
  if(isSeller){
    if(o.status==="awaiting_seller"){
      if(isPhysical)
        actions='<button class="btn btn-primary btn-sm" style="flex:1;" onclick="event.stopPropagation();openTrackingModal(\''+o.id+'\')">📦 Nhập mã vận đơn</button>';
      else
        actions='<button class="btn btn-primary btn-sm" style="flex:1;" onclick="event.stopPropagation();orderAccept(\''+o.id+'\')">✅ Xác nhận</button>'
               +'<button class="btn btn-sm" style="background:var(--redBg);color:var(--red);border:1px solid rgba(240,86,106,.2);" onclick="event.stopPropagation();orderReject(\''+o.id+'\')">✕ Từ chối</button>';
    }else if(o.status==="seller_accepted")
      actions='<button class="btn btn-primary btn-sm" style="flex:1;" onclick="event.stopPropagation();openModal(\'qr\',\''+o.id+'\')">📤 Upload QR vé</button>';
    else if(o.status==="ticket_uploaded")
      actions='<span style="font-size:11px;color:var(--warn);font-weight:700;">⏳ Chờ người mua xác nhận</span>';
    else if(o.status==="shipping")
      actions='<span style="font-size:11px;color:var(--cyan);font-weight:700;">🚚 Đang giao hàng · Chờ buyer xác nhận</span>';
  } else {
    if(o.status==="awaiting_seller"){
      if(isPhysical)
        actions='<span style="font-size:11px;color:var(--warn);font-weight:700;">⏳ Chờ người bán gửi hàng...</span>';
      else
        actions='<span style="font-size:11px;color:var(--warn);font-weight:700;">⏳ Chờ người bán xác nhận...</span>';
    }else if(o.status==="ticket_uploaded")
      actions='<button class="btn btn-primary btn-sm" style="flex:1;" onclick="event.stopPropagation();openModal(\'confirm\',\''+o.id+'\')">✅ Xác nhận nhận vé</button>'

/* ── MODAL MANAGER ── */
function openModal(type,orderId){
  state.showQRModal=type==="qr";
  state.showDisputeModal=type==="dispute";
  state.showConfirmModal=type==="confirm";
  state.modalOrderId=orderId;
  renderModals();
}
function closeModal(){
  state.showQRModal=false;
  state.showDisputeModal=false;
  state.showConfirmModal=false;
  state.showTrackingModal=false;
  state.modalOrderId=null;
  state.trackingOrderId=null;
  renderModals();
}
function openTrackingModal(orderId){
  state.showTrackingModal=true;
  state.trackingOrderId=orderId;
  renderModals();
}
function renderModals(){
  var el=document.getElementById("modal-root");
  if(!el){el=document.createElement("div");el.id="modal-root";document.body.appendChild(el);}
  if(!state.showQRModal&&!state.showDisputeModal&&!state.showConfirmModal&&!state.showReviewModal&&!state.showAlertModal&&!state.showTrackingModal){el.innerHTML="";return;}
  if(state.showQRModal) el.innerHTML=buildQRModal(state.modalOrderId);
  else if(state.showDisputeModal) el.innerHTML=buildDisputeModal(state.modalOrderId);
  else if(state.showConfirmModal) el.innerHTML=buildConfirmModal(state.modalOrderId);
  else if(state.showReviewModal) el.innerHTML=buildReviewModal(state.reviewOrderId);
  else if(state.showAlertModal) el.innerHTML=buildAlertModal(state.alertListingId);
  else if(state.showTrackingModal) el.innerHTML=buildTrackingModal(state.trackingOrderId);
}

function now(){return new Date().toLocaleString("vi-VN",{hour12:false});}

function orderAccept(oid){
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="seller_accepted";
  o.timeline.push({t:now(),e:"Bạn đã xác nhận đơn hàng",i:"✅",c:"var(--ok)"});
  o.timeline.push({t:now(),e:"Vui lòng upload QR vé",i:"🎫",c:"var(--warn)"});
  showToast("Đã xác nhận đơn hàng!","var(--ok)","✅");
  render();
}
function orderReject(oid){
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="cancelled";o.escrow=0;
  o.timeline.push({t:now(),e:"Bạn đã từ chối đơn hàng",i:"✕",c:"var(--red)"});
  o.timeline.push({t:now(),e:"Tiền đã được hoàn lại người mua",i:"💸",c:"var(--hint)"});
  showToast("Đã từ chối. Tiền sẽ hoàn lại người mua.","var(--red)","✕");
  render();
}
async function simulateQRUpload(oid){
  if(!authToken){showToast('Cần đăng nhập','var(--red)','❌');return;}
  try{
    showToast('Đang upload...','var(--brand)','⏳');
    const res=await fetch(API+'/orders/'+oid+'/upload-qr',{
      method:'POST',headers:getHeaders(),
      body:JSON.stringify({qr_code:'uploaded'})
    });
    const data=await res.json();
    if(!res.ok){showToast(data.error||'Lỗi upload','var(--red)','❌');return;}
    showToast('Upload QR thành công!','var(--purple)','🎫');
    closeModal();
    await loadOrdersFromAPI();
    setState({});
  }catch(e){showToast('Lỗi kết nối','var(--red)','❌');}
}
function confirmReceived(oid){
  // Nếu có authToken → gọi API thật, không update local
  if(authToken){
    closeModal();
    confirmOrderAPI(oid).then(()=>{
      setTimeout(()=>openReviewModal(oid),1200);
    });
    return;
  }
  // Fallback demo (không có token)
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="completed";o.escrow=0;
  o.timeline.push({t:now(),e:"Bạn đã xác nhận nhận vé",i:"🎉",c:"var(--ok)"});
  o.timeline.push({t:now(),e:VND(o.total)+" đã giải ngân cho người bán",i:"💸",c:"var(--ok)"});
  closeModal();
  setState({activeOrder:null});
  showToast("Hoàn tất! Giao dịch thành công 🎉","var(--ok)","🎉");
  setTimeout(()=>openReviewModal(oid),1200);
}
async function submitDispute(oid){
  var rEl=document.querySelector("input[name='dreason']:checked");
  var desc=(document.getElementById("ddesc")||{}).value||"";
  if(!rEl){showToast("Vui lòng chọn lý do khiếu nại","var(--red)","⚠️");return;}

  if(authToken){
    closeModal();
    showToast("Đang gửi khiếu nại...","var(--warn)","⏳");
    try{
      const res=await fetch(API+"/orders/"+oid+"/dispute",{
        method:"POST",headers:getHeaders(),
        body:JSON.stringify({reason_index:Number(rEl.value),description:desc})
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data.error||"Lỗi gửi khiếu nại");
      await loadOrdersFromAPI();
      setState({activeOrder:oid});
      showToast("Khiếu nại đã gửi. Phản hồi trong 24h.","var(--red)","⚠️");
    }catch(e){
      showToast(e.message,"var(--red)","❌");
    }
    return;
  }

  // Fallback demo
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="disputed";
  o.dispute={reason:rEl.value,desc:desc||"Không có mô tả.",opened:new Date().toLocaleDateString("vi-VN"),status:"reviewing"};
  o.timeline.push({t:now(),e:"Khiếu nại đã được gửi",i:"⚠️",c:"var(--red)"});
  o.timeline.push({t:now(),e:"Đội hỗ trợ đang xem xét",i:"🔍",c:"var(--warn)"});
  closeModal();
  setState({activeOrder:null});
  showToast("Khiếu nại đã gửi. Phản hồi trong 24h.","var(--red)","⚠️");
}
