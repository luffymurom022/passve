<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePass v13</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SAFEPASS — PREMIUM DARK UI
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* Backgrounds */
  --bg:#06090f;
  --bg2:#090d16;
  --card:#0d1220;
  --card2:#101828;
  --card3:#131d2e;

  /* Borders */
  --border:rgba(255,255,255,.055);
  --border2:rgba(255,255,255,.1);
  --border3:rgba(255,255,255,.16);

  /* Brand */
  --brand:#3d8ef8;
  --brandD:#2e7ef0;
  --brandL:rgba(61,142,248,.07);
  --brandM:rgba(61,142,248,.12);
  --brandGlow:rgba(61,142,248,.25);

  /* Text */
  --text:#e8edf8;
  --sub:#7b8fad;
  --hint:#3d4f6a;

  /* Status */
  --ok:#22d38e;     --okBg:rgba(34,211,142,.07);
  --warn:#f5a623;   --warnBg:rgba(245,166,35,.07);
  --red:#f05068;    --redBg:rgba(240,80,104,.07);
  --purple:#9b87f5; --purpleBg:rgba(155,135,245,.08);
  --gold:#f5a623;
  --cyan:#00e5ff;

  /* Elevation */
  --shadow-sm:0 2px 8px rgba(0,0,0,.4);
  --shadow:0 8px 32px rgba(0,0,0,.5);
  --shadow-lg:0 20px 60px rgba(0,0,0,.7);
  --glow:0 0 28px rgba(61,142,248,.14);
  --glow-ok:0 0 20px rgba(34,211,142,.12);

  /* Shape */
  --radius:16px;
  --radius-sm:10px;
  --radius-lg:20px;
  --radius-xl:24px;
}

/* ── BASE ── */
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(ellipse 80% 60% at 80% -10%, rgba(61,142,248,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at -10% 80%, rgba(155,135,245,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 110%, rgba(0,229,255,.025) 0%, transparent 50%);
}
.app{width:100%;margin:0;padding:0 0 88px;}

/* ━━ HEADER ━━ */
.header{
  position:sticky;top:0;z-index:100;
  height:60px;
  padding:0 16px;
  display:flex;align-items:center;gap:4px;
  background:rgba(6,9,15,.88);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.045);
  overflow-x:auto;scrollbar-width:none;
}
.header::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(61,142,248,.3),rgba(155,135,245,.2),transparent);
  pointer-events:none;
}
.header::-webkit-scrollbar{display:none;}

.logo{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(145deg,#1a2a4a,#0d1a36);
  border:1px solid rgba(61,142,248,.25);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 12px rgba(61,142,248,.12),inset 0 1px 0 rgba(255,255,255,.06);
}
.logo-txt{
  font-size:14px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--text) 40%,var(--sub));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.badge-v{
  font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:600;
  background:rgba(61,142,248,.1);
  color:var(--brand);
  padding:2px 7px;border-radius:5px;
  border:1px solid rgba(61,142,248,.18);
  letter-spacing:.04em;
}
.spacer{flex:1;}

/* ━━ NAV TABS ━━ */
.nav-tab{
  display:flex;align-items:center;gap:5px;
  padding:6px 11px;border:none;border-radius:9px;
  cursor:pointer;font-size:11.5px;font-weight:600;
  background:transparent;color:var(--hint);
  transition:all .2s cubic-bezier(.4,0,.2,1);
  position:relative;font-family:'Inter',sans-serif;
  letter-spacing:-.1px;white-space:nowrap;
}
.nav-tab:hover{color:var(--sub);background:rgba(255,255,255,.04);}
.nav-tab.active{
  color:var(--brand);
  background:linear-gradient(135deg,rgba(61,142,248,.12),rgba(61,142,248,.07));
  border:1px solid rgba(61,142,248,.15);
}
.nav-tab.active::after{
  content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;
  background:var(--brand);border-radius:2px 2px 0 0;
  box-shadow:0 0 8px var(--brandGlow);
}
.tab-badge{
  position:absolute;top:2px;right:2px;
  min-width:15px;height:15px;border-radius:8px;
  background:var(--red);color:#fff;
  font-size:8px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  padding:0 3px;
  box-shadow:0 0 8px rgba(240,80,104,.4);
}
.btn-icon{
  width:34px;height:34px;border-radius:9px;
  border:1px solid var(--border);
  background:var(--card);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:var(--sub);
  flex-shrink:0;
}
.btn-icon:hover{border-color:var(--border2);color:var(--text);background:var(--card2);}

/* ━━ CARDS ━━ */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
  transition:border-color .2s,box-shadow .2s;
}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);}

/* ━━ CHIPS ━━ */
.chip{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:20px;white-space:nowrap;
  letter-spacing:.02em;
}
.chip-ok{background:rgba(34,211,142,.1);color:var(--ok);border:1px solid rgba(34,211,142,.2);}
.chip-warn{background:rgba(245,166,35,.1);color:var(--warn);border:1px solid rgba(245,166,35,.2);}
.chip-brand{background:rgba(61,142,248,.1);color:var(--brand);border:1px solid rgba(61,142,248,.2);}
.chip-red{
  background:rgba(240,80,104,.1);color:#fff;
  border:none;
  font-size:9.5px;padding:3px 8px;
  background:linear-gradient(135deg,#e04060,#c0304a);
  letter-spacing:.04em;
}
.chip-purple{background:rgba(155,135,245,.1);color:var(--purple);border:1px solid rgba(155,135,245,.2);}

/* ━━ BUTTONS ━━ */
.btn{
  padding:10px 20px;border-radius:var(--radius-sm);
  font-weight:700;font-size:13px;cursor:pointer;border:none;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  font-family:'Inter',sans-serif;letter-spacing:-.1px;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(255,255,255,.06),transparent);
  pointer-events:none;border-radius:inherit;
}
.btn-primary{
  background:linear-gradient(135deg,#3d8ef8 0%,#2e6fd6 100%);
  color:#fff;
  box-shadow:0 4px 16px rgba(61,142,248,.3),inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-primary:hover{
  background:linear-gradient(135deg,#5299f9 0%,#3d80e8 100%);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(61,142,248,.4),inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{
  background:rgba(255,255,255,.04);color:var(--sub);
  border:1px solid var(--border);
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,.07);}
.btn-sm{padding:6px 14px;font-size:11.5px;border-radius:8px;}
.btn-outline{
  background:transparent;color:var(--brand);
  border:1.5px solid rgba(61,142,248,.35);
}
.btn-outline:hover{background:var(--brandM);border-color:rgba(61,142,248,.6);}

/* ━━ PROGRESS ━━ */
.progress-bar{height:3px;border-radius:2px;background:var(--border);overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* ━━ TOAST ━━ */
.toast-area{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:290px;}
.toast{
  background:rgba(16,24,40,.95);
  color:var(--text);padding:11px 15px;
  border-radius:12px;font-size:12px;font-weight:600;
  box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.08);
  display:flex;align-items:center;gap:9px;
  backdrop-filter:blur(20px);
  animation:slideIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideIn{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ━━ SEARCH ━━ */
.search-wrap{
  position:sticky;top:60px;z-index:90;
  background:rgba(6,9,15,.92);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom:1px solid var(--border);
  padding:11px 16px;
}
.search-row{display:flex;gap:8px;align-items:center;}
.search-box{flex:1;position:relative;}
.search-input{
  width:100%;height:42px;
  border:1px solid var(--border2);border-radius:10px;
  padding:0 44px 0 44px;
  font-size:13.5px;font-weight:400;
  color:var(--text);
  background:rgba(255,255,255,.04);
  outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  font-family:'Inter',sans-serif;
}
.search-input:focus{
  border-color:var(--brand);
  background:rgba(61,142,248,.05);
  box-shadow:0 0 0 3px rgba(61,142,248,.1);
}
.search-input::placeholder{color:var(--hint);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--hint);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--border2);border:none;cursor:pointer;font-size:11px;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.search-clear:hover{background:var(--border3);color:var(--text);}
.filter-toggle{
  height:42px;padding:0 14px;border-radius:10px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,.04);
  cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:all .2s;font-family:'Inter',sans-serif;
}
.filter-toggle:hover,.filter-toggle.active{
  border-color:rgba(61,142,248,.5);color:var(--brand);
  background:rgba(61,142,248,.07);
}
.filter-count{width:18px;height:18px;border-radius:50%;background:var(--brand);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ━━ SUGGESTIONS ━━ */
.suggestions{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:rgba(13,18,32,.97);
  border:1px solid var(--border2);
  border-radius:var(--radius);overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05);
  z-index:200;animation:dropIn .15s ease;
  backdrop-filter:blur(20px);
}
@keyframes dropIn{from{transform:translateY(-8px);opacity:0;}to{transform:none;opacity:1;}}
.sugg-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;font-size:13px;}
.sugg-item:hover{background:rgba(61,142,248,.07);}
.sugg-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sugg-section{padding:6px 14px;font-size:10px;font-weight:700;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--border);}

/* ━━ FILTER PANEL ━━ */
.filter-panel{border-bottom:1px solid var(--border);padding:0 16px;overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),padding .25s;}
.filter-panel.open{max-height:600px;padding:16px;}

/* ━━ CATEGORY PILLS ━━ */
.cat-pills{display:flex;gap:7px;flex-wrap:wrap;}
.cat-pill{
  padding:6px 15px;border-radius:30px;
  border:1px solid var(--border);
  background:transparent;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--sub);
  transition:all .2s;white-space:nowrap;
  font-family:'Inter',sans-serif;
}
.cat-pill:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,.04);}
.cat-pill.selected{
  border-color:rgba(61,142,248,.4);
  background:rgba(61,142,248,.1);
  color:var(--brand);font-weight:600;
}

/* ━━ RANGE ━━ */
.range-wrap{position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.08);margin:10px 0;}
.range-track{position:absolute;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--brand),#7c5cf5);}
.range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:var(--brand);border:3px solid var(--bg);cursor:grab;transition:transform .15s,box-shadow .15s;box-shadow:0 0 0 3px rgba(61,142,248,.2);}
.range-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.18);box-shadow:0 0 0 5px rgba(61,142,248,.25);}
input[type=range]{position:absolute;inset:0;width:100%;opacity:0;cursor:pointer;margin:0;}

/* ━━ SORT BAR ━━ */
.sort-bar{
  display:flex;align-items:center;gap:6px;
  padding:9px 16px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;background:rgba(9,13,22,.6);
  scrollbar-width:none;
}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{
  padding:5px 13px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;cursor:pointer;
  font-size:11.5px;font-weight:500;color:var(--hint);
  white-space:nowrap;transition:all .2s;
  font-family:'Inter',sans-serif;display:flex;align-items:center;gap:4px;
}
.sort-btn:hover{border-color:var(--border2);color:var(--sub);}
.sort-btn.active{
  border-color:rgba(61,142,248,.4);
  background:rgba(61,142,248,.1);color:var(--brand);
  font-weight:600;
}

/* ━━ ACTIVE FILTERS ━━ */
.active-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);min-height:42px;}
.active-filter-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:rgba(61,142,248,.1);color:var(--brand);
  font-size:11px;font-weight:600;
  border:1px solid rgba(61,142,248,.18);
  cursor:pointer;transition:all .18s;
}
.active-filter-tag:hover{background:rgba(61,142,248,.18);}
.active-filter-tag .remove{font-size:10px;opacity:.5;}

/* ━━ RESULTS ━━ */
.results-area{padding:14px 16px;}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.results-count{font-size:12.5px;color:var(--sub);}
.results-count strong{color:var(--text);font-weight:700;}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card);}
.view-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--hint);transition:all .2s;}
.view-btn.active{background:var(--brandM);color:var(--brand);}

/* ━━ LISTING GRID ━━ */
.listing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.listing-grid.list-view{grid-template-columns:1fr;}

/* ━━ RESULT CARDS ━━ */
.result-card{
  background:linear-gradient(160deg,var(--card) 0%,rgba(9,13,22,.9) 100%);
  border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s,border-color .22s;
  animation:cardIn .3s ease both;
}
.result-card:hover{
  transform:translateY(-3px) scale(1.005);
  box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(61,142,248,.2),0 0 24px rgba(61,142,248,.06);
  border-color:rgba(61,142,248,.18);
}
@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.result-card.list-view{border-radius:12px;display:flex;align-items:center;}
.result-card.list-view .card-thumb{width:72px;height:72px;border-radius:0;flex-shrink:0;}
.result-card.list-view .card-body{padding:12px;flex:1;min-width:0;}
.result-card.list-view .card-actions{padding:12px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}

/* ━━ EMPTY STATE ━━ */
.empty-state{text-align:center;padding:60px 20px;}

/* ━━ LOCATION PILLS ━━ */
.loc-pills{display:flex;gap:6px;flex-wrap:wrap;}

/* ━━ RESPONSIVE ━━ */
@media(max-width:600px){
  .app{padding:0 0 100px;}
  .header{padding:0 12px;gap:3px;height:56px;}
  .nav-tab{padding:5px 8px;font-size:10.5px;gap:3px;}
  .logo-txt{display:none;}
  .badge-v{display:none;}
  .listing-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
  .results-area{padding:12px;}
  .search-wrap{padding:9px 12px;}
  .sort-bar{padding:8px 12px;}
  .filter-panel.open{padding:12px;}
  .modal-sheet{border-radius:20px 20px 0 0;padding:18px;}
  .card{padding:14px;}
  .stat-card{min-width:90px;padding:10px 12px;}
}
@media(max-width:400px){
  .listing-grid{grid-template-columns:1fr 1fr;}
}

/* ━━ MISC ━━ */
.dual-range{position:relative;height:28px;display:flex;align-items:center;}
.dual-range .range-wrap{flex:1;}
.dual-range-inputs{position:absolute;inset:0;display:flex;}
.dual-range-inputs input[type=range]{width:100%;pointer-events:none;}
.dual-range-inputs input[type=range]::-webkit-slider-thumb{pointer-events:all;width:18px;height:18px;border-radius:50%;background:var(--brand);border:3px solid var(--bg);cursor:grab;-webkit-appearance:none;}
.dual-range-inputs input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:transparent;}
input[type=range]{-webkit-appearance:none;background:transparent;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;}
.hl{color:var(--brand);font-weight:700;}
@keyframes shimmer{0%{background-position:-600px 0;}100%{background-position:600px 0;}}
.shimmer{
  background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,.04) 50%,var(--card) 75%);
  background-size:1200px 100%;animation:shimmer 2s infinite;
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}
@keyframes popIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  z-index:9000;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(12px);
}
.modal-sheet{
  background:linear-gradient(160deg,var(--card2) 0%,var(--card) 100%);
  border:1px solid var(--border2);
  border-radius:24px 24px 0 0;
  padding:24px;width:100%;max-width:100%;
  animation:slideUp .32s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;
}
.modal-center{align-items:center;padding:20px;}
.modal-box{
  background:linear-gradient(160deg,var(--card2) 0%,var(--card3) 100%);
  border:1px solid var(--border2);
  border-radius:22px;padding:28px;
  width:100%;max-width:520px;
  animation:popIn .28s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.order-card{
  background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);
  border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:all .22s cubic-bezier(.4,0,.2,1);animation:cardIn .3s ease;
}
.order-card:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
  box-shadow:0 12px 36px rgba(0,0,0,.4);
}
.order-card.urgent{border-color:rgba(245,166,35,.3);}

/* ── FILTER ENGINE ── */
function applyFilters(listings){
  let res=[...listings];

  // Text search
  if(state.query.trim()){
    // Nếu có kết quả từ API search, ưu tiên dùng
    if(state._searchIds){
      results=results.filter(l=>state._searchIds.has(l.id));
      state._searchIds=null; // dùng 1 lần rồi reset
    }
    const q=state.query.toLowerCase();
    res=res.filter(l=>
      l.title.toLowerCase().includes(q)||
      l.location.toLowerCase().includes(q)||
      l.category.toLowerCase().includes(q)||
      l.section.toLowerCase().includes(q)
    );
  }

  // Category
  if(state.category!=="all") res=res.filter(l=>l.category===state.category);

  // Location
  if(state.location!=="Tất cả") res=res.filter(l=>l.location===state.location);

  // Price
  res=res.filter(l=>l.price>=state.priceMin&&l.price<=state.priceMax);

  // Date
  if(state.dateFrom) res=res.filter(l=>new Date(l.date)>=new Date(state.dateFrom));
  if(state.dateTo)   res=res.filter(l=>new Date(l.date)<=new Date(state.dateTo));

  // Trust
  if(state.trustMin>0) res=res.filter(l=>l.trust>=state.trustMin);

  // Only verified sellers
  if(state.onlyVerified) res=res.filter(l=>l.trust>=80);

  // Only in stock
  if(state.onlyInStock) res=res.filter(l=>l.quantity>0);

  // Sort
  switch(state.sortBy){
    case"price_asc":  res.sort((a,b)=>a.price-b.price);break;
    case"price_desc": res.sort((a,b)=>b.price-a.price);break;
    case"date_asc":   res.sort((a,b)=>new Date(a.date)-new Date(b.date));break;
    case"trust":      res.sort((a,b)=>b.trust-a.trust);break;
    case"popular":    res.sort((a,b)=>(b.views+b.saved)-(a.views+a.saved));break;
    case"discount":   res.sort((a,b)=>(1-b.price/b.original_price)-(1-a.price/a.original_price));break;
    default:          res.sort((a,b)=>(b.views+b.saved*2)-(a.views+a.saved*2));
  }

  return res;
}

}

  if(!query.trim())return text;
  const re=new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return text.replace(re,`<span class="hl">$1</span>`);
}

/* ── RENDER ACTIVE FILTER TAGS ── */
function renderActiveTags(){
  const tags=[];
  if(state.category!=="all"){
    const c=CATEGORIES.find(x=>x.id===state.category);
    tags.push({label:`${c?.icon} ${c?.label}`,action:`setState({category:'all'})`});
  }
  if(state.location!=="Tất cả")tags.push({label:`📍 ${state.location}`,action:`setState({location:'Tất cả'})`});
  if(state.priceMin>0||state.priceMax<PRICE_MAX_LIMIT){
    const lo=state.priceMin>0?`${(state.priceMin/1000000).toFixed(1)}M`:"0";
    const hi=state.priceMax<PRICE_MAX_LIMIT?`${(state.priceMax/1000000).toFixed(1)}M`:"∞";
    tags.push({label:`💰 ${lo}–${hi}`,action:`setState({priceMin:0,priceMax:${PRICE_MAX_LIMIT}})`});
  }
  if(state.dateFrom)tags.push({label:`📅 Từ ${state.dateFrom}`,action:`setState({dateFrom:''})`});
  if(state.dateTo)tags.push({label:`📅 Đến ${state.dateTo}`,action:`setState({dateTo:''})`});
  if(state.trustMin>0)tags.push({label:`🛡 Trust ≥${state.trustMin}`,action:`setState({trustMin:0})`});
  if(state.onlyVerified)tags.push({label:"✓ Đã xác minh",action:`setState({onlyVerified:false})`});
  if(state.onlyInStock)tags.push({label:"📦 Còn hàng",action:`setState({onlyInStock:false})`});

  if(!tags.length)return"";
  return`
  <div class="active-filters">
    <span style="font-size:11px;color:var(--hint);font-weight:600;white-space:nowrap;">Đang lọc:</span>
    ${tags.map(t=>`<span class="active-filter-tag" onclick="${t.action}">${t.label} <span class="remove">✕</span></span>`).join("")}
    <button onclick="resetFilters()" style="margin-left:auto;font-size:11px;font-weight:700;color:var(--red);background:none;border:none;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;">✕ Xóa tất cả</button>
  </div>`;
}

/* ── DATE HELPERS ── */
function dateOffset(days){
  const d=new Date();d.setDate(d.getDate()+days);
  return d.toISOString().split("T")[0];
}

/* ── RANGE HANDLERS ── */
function onRangeLo(v){
  const val=parseInt(v);
  if(val>=state.priceMax-200000)return;
  setState({priceMin:val});
}
function onRangeHi(v){
  const val=parseInt(v);
  if(val<=state.priceMin+200000)return;
  setState({priceMax:val});
}

function toggleWish(id){
  const wl=state.wishlist.includes(id)?state.wishlist.filter(x=>x!==id):[...state.wishlist,id];
  setState({wishlist:wl});
  showToast(wl.includes(id)?"Đã lưu vào yêu thích!":"Đã bỏ yêu thích",wl.includes(id)?"#059669":"#6b7280",wl.includes(id)?"❤️":"🤍");
}

  const isDark=state.theme==="dark";

  const hasQuery=state.query.trim().length>0;

  ];

dots --> <circle cx="12" cy="17" r="2" fill="#00f5ff" class="holo-pulse"/> <circle cx="52" cy="17" r="2" fill="#9b87f5" class="holo-pulse" style="animation-delay:.5s"/> <circle cx="32" cy="58" r="2" fill="#4f8ef7" class="holo-pulse" style="animation-delay:1s"/></svg>

        const click=p.id==="orders"
          ?"setState({page:'orders',orderBadge:0,activeOrder:null})"
          :`setState({page:'${p.id}'})`;
        return`<button class="nav-tab ${isActive?"active":""}" style="position:relative;" onclick="${click}">${p.icon} ${p.label}${badge}</button>`;
      }).join("")}
      <!-- Notification Bell -->
      <div style="position:relative;">
        <button class="btn-icon" onclick="toggleNotif()" style="${state.notifOpen?'border-color:var(--brand);box-shadow:var(--glow);':''}" title="Thông báo">🔔
          ${state.notifCount>0?`<span style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);">${state.notifCount}</span>`:""}

    : buildPlaceholderPage(state.page)}
  </div>`;

  // Re-attach modals outside innerHTML to avoid nesting issues
  renderModals();

  // Restore focus & cursor position in search input after re-render
  if(_searchFocused){
    requestAnimationFrame(()=>{
      const inp=document.getElementById("main-search");
      if(inp&&document.activeElement!==inp){
        inp.focus();
        try{inp.setSelectionRange(_searchCursor,_searchCursor);}catch(e){}
      }
    });

function buildPlaceholderPage(page){
  if(page==="home") return buildHomePage();
  if(page==="wallet") return buildWalletPage();
  if(page==="analytics") return buildAnalyticsPage();
  if(page==="aichat") return buildAIChatPage();
  if(page==="profile") return buildProfilePage();
  if(page==="sell") return buildSellPage();
  if(page==="map") return buildMapPage();
  if(page==="compare") return buildComparePage();
  if(page==="alerts") return buildAlertsPage();
  return`<div style="text-align:center;padding:80px 20px;"><div style="font-size:13px;color:var(--sub);">Sắp ra mắt.</div></div>`;
}

    <div onclick="handleNotifClick('${n.id}')" style="display:flex;gap:10px;padding:12px 14px;cursor:pointer;background:${n.read?"transparent":"var(--brandL)"};border-bottom:1px solid var(--border);transition:background .15s;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='${n.read?"transparent":"var(--brandL)"}'">
      <div style="width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">${n.icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;">
          <div style="font-size:12px;font-weight:${n.read?600:800};color:var(--text);line-height:1.3;">${n.title}</div>
          ${!n.read?`<div style="width:7px;height:7px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:3px;"></div>`:""}
        </div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${n.body}</div>
        <div style="font-size:10px;color:var(--hint);margin-top:3px;font-family:'JetBrains Mono',monospace;">${n.time}</div>
      </div>
    </div>`).join("");
  return`
  <div style="position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--card2);border:1px solid var(--border2);border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:9999;animation:dropIn .18s ease;" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);">
      <div style="font-size:13px;font-weight:800;font-family:'Inter',sans-serif;">Thông báo</div>
      <button onclick="markAllRead()" style="font-size:11px;color:var(--brand);background:none;border:none;cursor:pointer;font-weight:700;font-family:'Inter',sans-serif;">Đọc tất cả</button>
    </div>
    <div style="max-height:360px;overflow-y:auto;">${items}</div>
    <div style="padding:10px 14px;text-align:center;border-top:1px solid var(--border);">
      <button onclick="setState({notifOpen:false})" style="font-size:11.5px;color:var(--sub);background:none;border:none;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;">Đóng</button>
    </div>
  </div>`;
}
function handleNotifClick(nid){
  const n=NOTIFICATIONS.find(x=>x.id===nid);
  if(!n)return;
  if(!n.read){n.read=true;state.notifCount=Math.max(0,state.notifCount-1);}
  setState({notifOpen:false,page:n.action});
}
// Close notif on outside click
document.addEventListener("click",e=>{
  if(state.notifOpen&&!e.target.closest(".btn-icon")&&!e.target.closest('[onclick*="toggleNotif"]')){
    state.notifOpen=false;render();
  }
});

async function refreshBalance(){
  if(!authToken) return;
  try {
    const d=await (await fetch(API+'/auth/me',{headers:getHeaders()})).json();
    currentUser={...currentUser,...d};
    localStorage.setItem('sp_user',JSON.stringify(currentUser));
    const balEl=document.querySelector('[data-balance]');
    if(balEl) balEl.textContent=VND(currentUser.balance);
  } catch(e){}
}

function buildWalletPage(){
  // Refresh balance from API
  refreshBalance();

  // Load transactions từ API nếu đang ở tab history
  const tab=state.walletTab||"overview";
  if(tab==="history" && authToken){
    fetch(API+'/wallet/transactions',{headers:getHeaders()})
      .then(r=>r.json()).then(data=>{
        if(Array.isArray(data)){
          const el=document.getElementById('tx-list');
          if(!el) return;
          if(data.length===0){
            el.innerHTML='<div style="text-align:center;padding:40px 0;color:var(--hint);">Chưa có giao dịch nào</div>';
            return;
          }
          el.innerHTML=data.map(t=>renderTxRow(t)).join("");
          document.getElementById('tx-count')&&(document.getElementById('tx-count').textContent=data.length+' giao dịch');
        }
      }).catch(()=>{});
  }

  const txTypes={
    topup:{label:"Nạp tiền",col:"var(--brand)",icon:"💰"},
    escrow_lock:{label:"Escrow giữ",col:"var(--purple)",icon:"🔒"},
    escrow_release:{label:"Giải ngân",col:"var(--ok)",icon:"✅"},
    payout:{label:"Nhận tiền",col:"var(--ok)",icon:"💸"},
    refund:{label:"Hoàn tiền",col:"var(--cyan)",icon:"↩️"},
    fee:{label:"Phí",col:"var(--hint)",icon:"📊"},

    out:{label:"Rút tiền",col:"var(--red)",icon:"📤"},

  function renderTxRow(t){

    const isPos=t.amount>0;
    const amtColor=isPos?"var(--ok)":t.amount===0?"var(--hint)":t.type==="escrow_lock"?"var(--purple)":"var(--red)";
    const bgColor=isPos?"var(--okBg)":t.type==="escrow_lock"?"var(--purpleBg)":t.type==="topup"?"var(--brandL)":t.type==="refund"?"rgba(0,229,255,.06)":"var(--redBg)";
    const borderColor=isPos?"rgba(52,216,158,.2)":t.type==="escrow_lock"?"rgba(155,135,245,.2)":t.type==="topup"?"rgba(79,142,247,.2)":t.type==="refund"?"rgba(0,229,255,.2)":"rgba(240,86,106,.2)";
    const date=t.created_at?new Date(t.created_at).toLocaleString('vi-VN',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):(t.date||"");
    const amtStr=t.amount===0?"—":(isPos?"+":"")+VND(t.amount);
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);">
      <div style="width:40px;height:40px;border-radius:11px;background:${bgColor};border:1px solid ${borderColor};display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">${ty.icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.description||ty.label}</div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:2px;">
          <span style="font-size:10px;font-weight:700;color:${ty.col};background:${ty.col}18;padding:1px 7px;border-radius:5px;">${ty.label}</span>
          <span style="font-size:10px;color:var(--hint);font-family:'JetBrains Mono',monospace;">${date}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:14px;font-weight:800;font-family:'Inter',sans-serif;color:${amtColor};">${amtStr}</div>
      </div>
    </div>`;
  }

  const txHTML=WALLET.transactions.map(t=>renderTxRow({...t,created_at:null})).join("");

  const overviewHTML=`
    <!-- Balance cards -->
    <div style="padding:20px 20px 0;">
      <!-- Main balance -->
      <div style="background:linear-gradient(135deg,#0a2040 0%,#0d2a50 50%,#0a2040 100%);border:1px solid var(--border2);border-radius:20px;padding:24px;margin-bottom:14px;position:relative;overflow:hidden;">
        <div style="position:absolute;top:-30px;right:-30px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.1) 0%,transparent 70%);pointer-events:none;"></div>
        <div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">💳 Số dư khả dụng</div>
        <div data-balance style="font-size:34px;font-weight:800;font-family:'Inter',sans-serif;color:var(--brand);margin-bottom:16px;">${VND(currentUser?.balance ?? WALLET.balance)}</div>
        <div style="display:flex;gap:8px;">
          <button onclick="(function(){var a=prompt('Số tiền muốn nạp (VND):','100000');if(a)topupWalletAPI(parseInt(a));})()" class="btn btn-primary btn-sm" style="flex:1;">⬆️ Nạp tiền</button>
          <button onclick="showToast('Tính năng rút tiền sắp ra mắt!','var(--purple)','💳')" class="btn btn-ghost btn-sm" style="flex:1;border-color:var(--border2);">💳 Rút tiền</button>
        </div>
      </div>
      <!-- Mini stats -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
        <div style="background:var(--purpleBg);border:1px solid rgba(155,135,245,.2);border-radius:14px;padding:14px;">
          <div style="font-size:10px;font-weight:700;color:var(--purple);margin-bottom:5px;">🔒 Đang Escrow</div>
          <div style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:var(--purple);">${VND(currentUser?.escrow ?? WALLET.escrow)}</div>
          <div style="font-size:10px;color:var(--hint);margin-top:2px;">Đang bảo vệ giao dịch</div>
        </div>
        <div style="background:var(--okBg);border:1px solid rgba(52,216,158,.2);border-radius:14px;padding:14px;">
          <div style="font-size:10px;font-weight:700;color:var(--ok);margin-bottom:5px;">📈 Tổng đã nhận</div>
          <div style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:var(--ok);">${VND(WALLET.total_earned)}</div>
          <div style="font-size:10px;color:var(--hint);margin-top:2px;">Từ trước đến nay</div>
        </div>
        <div style="background:var(--redBg);border:1px solid rgba(240,86,106,.15);border-radius:14px;padding:14px;">
          <div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:5px;">🛒 Tổng đã chi</div>
          <div style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:var(--red);">${VND(WALLET.total_spent)}</div>
          <div style="font-size:10px;color:var(--hint);margin-top:2px;">Mua vé</div>
        </div>
        <div style="background:var(--brandL);border:1px solid rgba(79,142,247,.15);border-radius:14px;padding:14px;">
          <div style="font-size:10px;font-weight:700;color:var(--brand);margin-bottom:5px;">💰 Lợi nhuận</div>
          <div style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:var(--brand);">${VND(WALLET.total_earned-WALLET.total_spent)}</div>
          <div style="font-size:10px;color:var(--hint);margin-top:2px;">Hiệu quả kinh doanh</div>
        </div>
      </div>
    </div>
    <!-- Payment methods -->
    <div style="padding:0 20px 20px;">
      <div style="font-size:13px;font-weight:800;font-family:'Inter',sans-serif;margin-bottom:12px;">💳 Phương thức thanh toán</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;">
        ${[
          {icon:"🏦",name:"VietcomBank ****1234",sub:"Tài khoản chính · Đã xác minh",ok:true},
          {icon:"📱",name:"MoMo ****5678",sub:"Nạp tiền nhanh",ok:true},
          {icon:"💳",name:"Thêm phương thức",sub:"VISA, Mastercard, ZaloPay...",ok:false},
        ].map((m,i)=>`
        <button onclick="showToast('${m.ok?m.name:"Thêm phương thức thanh toán"} — sắp cập nhật!','var(--brand)','${m.icon}')" style="width:100%;display:flex;align-items:center;gap:12px;padding:13px 16px;background:none;border:none;${i<2?"border-bottom:1px solid var(--border);":""}cursor:pointer;text-align:left;transition:background .15s;font-family:'Inter',sans-serif;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='none'">
          <div style="width:38px;height:38px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${m.icon}</div>
          <div style="flex:1;">
            <div style="font-size:12.5px;font-weight:700;">${m.name}</div>
            <div style="font-size:10.5px;color:var(--hint);">${m.sub}</div>
          </div>
          ${m.ok?`<span style="font-size:10px;color:var(--ok);font-weight:700;">✓</span>`:`<span style="font-size:14px;color:var(--hint);">+</span>`}
        </button>`).join("")}
      </div>
    </div>`;

  return`<div style="padding-bottom:80px;">
    <div style="padding:20px 20px 0;">
      <div style="font-size:20px;font-weight:800;font-family:'Inter',sans-serif;margin-bottom:2px;">💳 Ví SafePass</div>
      <div style="font-size:12px;color:var(--sub);">Quản lý tiền & giao dịch</div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:0;margin:14px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;">

    ${tab==="overview"?overviewHTML:`

/* ══════════════════════════════════════════

function buildAnalyticsPage(){
  const maxRev=Math.max(...ANALYTICS_REVENUE.map(d=>d.revenue));
  const maxView=Math.max(...ANALYTICS_VIEWS.map(d=>d.views));
  const totalRev=ANALYTICS_REVENUE.reduce((s,d)=>s+d.revenue,0);
  const totalOrders=ANALYTICS_REVENUE.reduce((s,d)=>s+d.orders,0);
  const myListings=ALL_LISTINGS.filter(l=>l.seller_id==="u1");

  const revenueChart=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
        <div>
          <div style="font-size:10.5px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;">📈 Doanh thu 6 tháng</div>
          <div style="font-size:24px;font-weight:800;font-family:'Inter',sans-serif;color:var(--ok);margin-top:3px;">${VND(totalRev)}</div>
        </div>
        <span style="font-size:11px;font-weight:700;color:var(--ok);background:var(--okBg);padding:3px 10px;border-radius:8px;border:1px solid rgba(52,216,158,.2);">+156% ↑</span>
      </div>
      <!-- Bar chart -->
      <div style="display:flex;gap:8px;align-items:flex-end;height:100px;">
        ${ANALYTICS_REVENUE.map(d=>{
          const h=maxRev>0?Math.round((d.revenue/maxRev)*90):4;
          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;">
            <div style="font-size:9px;font-weight:700;color:${d.revenue>0?"var(--ok)":"var(--hint)"};">${d.revenue>0?(d.revenue/1000000).toFixed(1)+"M":""}</div>
            <div style="width:100%;height:${h}px;background:${d.revenue>0?"linear-gradient(to top,var(--ok),var(--brand))":"var(--border)"};border-radius:5px 5px 0 0;transition:height .5s;"></div>
            <div style="font-size:10px;color:var(--hint);font-weight:600;">${d.month}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`;

  const viewChart=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;">
      <div style="font-size:10.5px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">👁 Lượt xem tuần này</div>
      <div style="font-size:22px;font-weight:800;font-family:'Inter',sans-serif;color:var(--brand);margin-bottom:16px;">${ANALYTICS_VIEWS.reduce((s,d)=>s+d.views,0).toLocaleString()} views</div>
      <!-- Line chart via SVG -->
      <svg viewBox="0 0 280 70" style="width:100%;height:70px;overflow:visible;">
        <defs>
          <linearGradient id="lineGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="var(--brand)" stop-opacity=".3"/>
            <stop offset="100%" stop-color="var(--brand)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${(()=>{
          const pts=ANALYTICS_VIEWS.map((d,i)=>{
            const x=i*(280/6);
            const y=70-Math.round((d.views/maxView)*65);
            return{x,y,d};
          });
          const lineD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
          const areaD=`${lineD} L${pts[pts.length-1].x},70 L${pts[0].x},70 Z`;
          return`<path d="${areaD}" fill="url(#lineGrad)"/>
          <path d="${lineD}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linejoin="round"/>
          ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--brand)" stroke="var(--bg)" stroke-width="1.5"/>
          <text x="${p.x}" y="68" text-anchor="middle" font-size="8" fill="var(--hint)" font-family="'DM Mono',monospace">${p.d.day}</text>`).join("")}`;
        })()}
      </svg>
    </div>`;

  const listingPerfHTML=myListings.map(l=>{
    const convRate=l.views>0?((l.sold/l.views)*100).toFixed(1):0;
    return`<div style="padding:11px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">
      <div style="${catGrad(l.category)};width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">${catEmoji(l.category)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.title}</div>
        <div style="display:flex;gap:10px;margin-top:3px;">
          <span style="font-size:10px;color:var(--hint);">👁 ${l.views.toLocaleString()}</span>
          <span style="font-size:10px;color:var(--hint);">✅ ${l.sold} bán</span>
          <span style="font-size:10px;color:var(--hint);">❤️ ${l.saved}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:12px;font-weight:800;color:${convRate>=2?"var(--ok)":convRate>=1?"var(--warn)":"var(--hint)"};">${convRate}%</div>
        <div style="font-size:9.5px;color:var(--hint);">conv.</div>
      </div>
    </div>`;
  }).join("");

  return`<div style="padding-bottom:80px;">
    <div style="padding:20px 20px 0;">
      <div style="font-size:20px;font-weight:800;font-family:'Inter',sans-serif;margin-bottom:2px;">📊 Analytics</div>
      <div style="font-size:12px;color:var(--sub);">Hiệu suất bán hàng của bạn</div>
    </div>

    <!-- KPI strip -->
    <div style="display:flex;gap:0;margin:16px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;">
      ${[
        {n:totalOrders,l:"Đơn thành công",c:"var(--brand)"},
        {n:"98.5%",l:"Tỉ lệ thành công",c:"var(--ok)"},
        {n:"4.9⭐",l:"Đánh giá TB",c:"var(--gold)"},
      ].map((s,i)=>`
      <div style="flex:1;padding:14px 10px;text-align:center;${i<2?"border-right:1px solid var(--border);":""}">
        <div style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:${s.c};">${s.n}</div>
        <div style="font-size:10px;color:var(--hint);margin-top:2px;font-weight:600;">${s.l}</div>
      </div>`).join("")}
    </div>

    <div style="padding:16px 20px 0;">
      ${revenueChart}
      ${viewChart}

      <!-- Listing performance -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;">
        <div style="font-size:13px;font-weight:800;font-family:'Inter',sans-serif;margin-bottom:14px;">🎟 Hiệu suất listing</div>
        ${listingPerfHTML}
      </div>

      <!-- Category breakdown -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;">
        <div style="font-size:13px;font-weight:800;font-family:'Inter',sans-serif;margin-bottom:14px;">📂 Theo danh mục</div>
        ${CATEGORIES.filter(c=>c.id!=="all").map(c=>{
          const ls=myListings.filter(l=>l.category===c.id);
          const totalSold=ls.reduce((s,l)=>s+l.sold,0);
          const pct=totalOrders>0?Math.round((totalSold/totalOrders)*100):0;
          return`<div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
              <span style="font-size:12px;font-weight:600;">${c.icon} ${c.label}</span>
              <span style="font-size:12px;font-weight:700;color:var(--brand);">${totalSold} vé · ${pct}%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--brand);"></div></div>
          </div>`;
        }).join("")}
      </div>
    </div>

async function sendAIMessage(text){
  if(!text||!text.trim()||state.aiTyping) return;
  const userMsg={role:"user",content:text.trim()};
  state.aiMessages=[...state.aiMessages,userMsg];
  state.aiTyping=true;
  const inp=document.getElementById("ai-input");
  if(inp)inp.value="";
  render();
  // scroll to bottom
  setTimeout(()=>{const el=document.getElementById("ai-msgs");if(el)el.scrollTop=el.scrollHeight;},50);

  try{
    const sysPrompt=`Bạn là trợ lý AI của SafePass — nền tảng mua bán vé sự kiện uy tín tại Việt Nam. SafePass dùng cơ chế Escrow: tiền được giữ an toàn cho đến khi người mua xác nhận nhận được vé QR hợp lệ. Phí 3% trên mỗi giao dịch thành công. Trả lời ngắn gọn, thân thiện, bằng tiếng Việt. Tập trung vào hỗ trợ người dùng mua/bán vé an toàn.`;
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:sysPrompt,
        messages:state.aiMessages.map(m=>({role:m.role,content:m.content})),
      })
    });
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||"").join("")||"Xin lỗi, mình gặp lỗi. Thử lại nhé!";
    state.aiMessages=[...state.aiMessages,{role:"assistant",content:reply}];
  }catch(e){
    state.aiMessages=[...state.aiMessages,{role:"assistant",content:"Xin lỗi, mình đang gặp sự cố kết nối. Vui lòng thử lại sau nhé! 🙏"}];
  }
  state.aiTyping=false;
  render();
  setTimeout(()=>{const el=document.getElementById("ai-msgs");if(el)el.scrollTop=el.scrollHeight;},50);
}

function submitReview(orderId){
  const o=ORDERS.find(x=>x.id===orderId);
  if(!o)return;
  const text=document.getElementById("review-text")?.value||reviewForm.text;
  const other=o.role==="buyer"?o.seller:o.buyer;
  // Add review to seller
  const sellerId=o.role==="buyer"?(ALL_LISTINGS.find(l=>l.title===o.title)?.seller_id||"u2"):"u1";
  if(SELLER_REVIEWS[sellerId]){
    SELLER_REVIEWS[sellerId].unshift({buyer:"Bạn",avatar:"VA",rating:reviewForm.rating,text:text||"Giao dịch tốt!",date:new Date().toLocaleDateString("vi-VN")});
  }
  // Add notification
  NOTIFICATIONS.unshift({id:"n"+UID(),type:"review",icon:"⭐",title:"Đánh giá đã gửi!",body:`Bạn đã đánh giá ${reviewForm.rating}⭐ cho ${other.name}`,time:"Vừa xong",read:false,action:"orders"});
  state.notifCount++;
  closeReviewModal();
  showToast(`Cảm ơn! Đánh giá ${reviewForm.rating}⭐ đã gửi 🎉`,"var(--ok)","⭐");
  render();
}

/* ── SEARCH ACTIONS ── */
let searchTimer=null;

function onSearchInput(val){
  const inp=document.getElementById("main-search");
  _searchFocused=true;
  _searchCursor=inp?inp.selectionStart:val.length;
  state.queryInput=val;
  state.showSuggestions=true;
  clearTimeout(searchTimer);
  if(!val.trim()){
    state.query="";
    // Reset về danh sách đầy đủ từ API
    loadTicketsFromAPI().then(()=>render());
    render();
    return;
  }
  // Debounce 350ms → gọi API search thật
  searchTimer=setTimeout(async ()=>{
    state.query=val;
    state.loading=true;
    _searchCursor=val.length;
    render();
    try{
      const params=new URLSearchParams({search:val.trim()});
      const res=await fetch(API+'/tickets?'+params.toString());
      const data=await res.json();
      if(Array.isArray(data)){
        // Merge vào ALL_LISTINGS — giữ local, thêm kết quả API chưa có
        const existingIds=new Set(ALL_LISTINGS.map(x=>x.id));
        data.forEach(t=>{
          if(!existingIds.has(t.id)){
            ALL_LISTINGS.push(mapTicket(t));
          }
        });
        // Đánh dấu query để filter đúng
        state._searchIds=new Set(data.map(t=>t.id));
      }
    }catch(e){}
    state.loading=false;
    render();
  },350);
  render();
}

function onSearchKey(e){
  if(e.key==="Enter"){
    const val=document.getElementById("main-search")?.value||"";
    doSearch(val);
  }
  if(e.key==="Escape"){
    setState({showSuggestions:false});
    document.getElementById("main-search")?.blur();
  }
}

function doSearch(term){
  state.queryInput=term;
  state.query=term;
  state.showSuggestions=false;
  state.loading=true;
  render();
  setTimeout(()=>{state.loading=false;render();},350);
}

function clearSearch(){
  state.query="";
  state.queryInput="";
  state.showSuggestions=false;
  _searchFocused=true;
  _searchCursor=0;
  render();
  setTimeout(()=>{
    const inp=document.getElementById("main-search");
    if(inp){inp.focus();inp.setSelectionRange(0,0);}
  },50);
}

// Close suggestions on outside click; also clear search focus tracking
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".search-box")){
    if(state.showSuggestions){state.showSuggestions=false;render();}
    if(e.target.id!=="main-search") _searchFocused=false;
  }
});

const STEPS=["awaiting_seller","seller_accepted","ticket_uploaded","completed"];

function filteredOrders(){
  return ORDERS.filter(function(o){
    if(o.role!==state.orderTab) return false;
    if(state.orderFilter==="pending") return o.status==="awaiting_seller";
    if(state.orderFilter==="active") return o.status==="seller_accepted"||o.status==="ticket_uploaded";
    if(state.orderFilter==="done") return o.status==="completed";
    if(state.orderFilter==="dispute") return o.status==="disputed";
    return true;
  });
}

    bottomAction='<button class="btn btn-primary" style="width:100%;" onclick="openModal(\'qr\',\''+o.id+'\')">📤 Upload QR vé ngay</button>';

/* ── MODAL MANAGER ── */
function openModal(type,orderId){
  state.showQRModal=type==="qr";
  state.showDisputeModal=type==="dispute";
  state.showConfirmModal=type==="confirm";
  state.modalOrderId=orderId;
  renderModals();
}
function closeModal(){
  state.showQRModal=false;
  state.showDisputeModal=false;
  state.showConfirmModal=false;
  state.modalOrderId=null;
  renderModals();
}
function renderModals(){
  var el=document.getElementById("modal-root");
  if(!el){el=document.createElement("div");el.id="modal-root";document.body.appendChild(el);}
  if(!state.showQRModal&&!state.showDisputeModal&&!state.showConfirmModal&&!state.showReviewModal&&!state.showAlertModal){el.innerHTML="";return;}
  if(state.showQRModal) el.innerHTML=buildQRModal(state.modalOrderId);
  else if(state.showDisputeModal) el.innerHTML=buildDisputeModal(state.modalOrderId);
  else if(state.showConfirmModal) el.innerHTML=buildConfirmModal(state.modalOrderId);
  else if(state.showReviewModal) el.innerHTML=buildReviewModal(state.reviewOrderId);
  else if(state.showAlertModal) el.innerHTML=buildAlertModal(state.alertListingId);
}

/* ── ORDER ACTIONS ── */
function now(){return new Date().toLocaleString("vi-VN",{hour12:false});}

function orderAccept(oid){
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="seller_accepted";
  o.timeline.push({t:now(),e:"Bạn đã xác nhận đơn hàng",i:"✅",c:"var(--ok)"});
  o.timeline.push({t:now(),e:"Vui lòng upload QR vé",i:"🎫",c:"var(--warn)"});
  showToast("Đã xác nhận đơn hàng!","var(--ok)","✅");
  render();
}
function orderReject(oid){
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="cancelled";o.escrow=0;
  o.timeline.push({t:now(),e:"Bạn đã từ chối đơn hàng",i:"✕",c:"var(--red)"});
  o.timeline.push({t:now(),e:"Tiền đã được hoàn lại người mua",i:"💸",c:"var(--hint)"});
  showToast("Đã từ chối. Tiền sẽ hoàn lại người mua.","var(--red)","✕");
  render();
}
async function simulateQRUpload(oid){
  if(!authToken){showToast('Cần đăng nhập','var(--red)','❌');return;}
  try{
    showToast('Đang upload...','var(--brand)','⏳');
    const res=await fetch(API+'/orders/'+oid+'/upload-qr',{
      method:'POST',headers:getHeaders(),
      body:JSON.stringify({qr_code:'uploaded'})
    });
    const data=await res.json();
    if(!res.ok){showToast(data.error||'Lỗi upload','var(--red)','❌');return;}
    showToast('Upload QR thành công!','var(--purple)','🎫');
    closeModal();
    await loadOrdersFromAPI();
    setState({});
  }catch(e){showToast('Lỗi kết nối','var(--red)','❌');}
}
function confirmReceived(oid){
  // Nếu có authToken → gọi API thật, không update local
  if(authToken){
    closeModal();
    confirmOrderAPI(oid).then(()=>{
      setTimeout(()=>openReviewModal(oid),1200);
    });
    return;
  }
  // Fallback demo (không có token)
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="completed";o.escrow=0;
  o.timeline.push({t:now(),e:"Bạn đã xác nhận nhận vé",i:"🎉",c:"var(--ok)"});
  o.timeline.push({t:now(),e:VND(o.total)+" đã giải ngân cho người bán",i:"💸",c:"var(--ok)"});
  closeModal();
  setState({activeOrder:null});
  showToast("Hoàn tất! Giao dịch thành công 🎉","var(--ok)","🎉");
  setTimeout(()=>openReviewModal(oid),1200);
}
async function submitDispute(oid){
  var rEl=document.querySelector("input[name='dreason']:checked");
  var desc=(document.getElementById("ddesc")||{}).value||"";
  if(!rEl){showToast("Vui lòng chọn lý do khiếu nại","var(--red)","⚠️");return;}

  if(authToken){
    closeModal();
    showToast("Đang gửi khiếu nại...","var(--warn)","⏳");
    try{
      const res=await fetch(API+"/orders/"+oid+"/dispute",{
        method:"POST",headers:getHeaders(),
        body:JSON.stringify({reason_index:Number(rEl.value),description:desc})
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data.error||"Lỗi gửi khiếu nại");
      await loadOrdersFromAPI();
      setState({activeOrder:oid});
      showToast("Khiếu nại đã gửi. Phản hồi trong 24h.","var(--red)","⚠️");
    }catch(e){
      showToast(e.message,"var(--red)","❌");
    }
    return;
  }

  // Fallback demo
  var o=ORDERS.find(function(x){return x.id===oid;});if(!o)return;
  o.status="disputed";
  o.dispute={reason:rEl.value,desc:desc||"Không có mô tả.",opened:new Date().toLocaleDateString("vi-VN"),status:"reviewing"};
  o.timeline.push({t:now(),e:"Khiếu nại đã được gửi",i:"⚠️",c:"var(--red)"});
  o.timeline.push({t:now(),e:"Đội hỗ trợ đang xem xét",i:"🔍",c:"var(--warn)"});
  closeModal();
  setState({activeOrder:null});
  showToast("Khiếu nại đã gửi. Phản hồi trong 24h.","var(--red)","⚠️");
}

function sendOrderChat(orderId,text){
  if(!text||!text.trim()) return;
  const t=text.trim();
  const now=new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
  const thread=getChatThread(orderId);
  thread.push({role:"me",text:t,time:now});
  if(document.getElementById("order-chat-input")){
    document.getElementById("order-chat-input").value="";
    document.getElementById("order-chat-input").style.height="38px";
  }
  chatOrderTyping=true;
  setState({});
  scrollOrderChatBottom();

  clearTimeout(chatOrderTimer);
  chatOrderTimer=setTimeout(()=>{
    chatOrderTyping=false;
    const replies=buildSellerReply(t,orderId);
    thread.push({role:"them",text:replies,time:new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})});
    setState({});
    scrollOrderChatBottom();
  },800+Math.random()*700);
}

function scrollOrderChatBottom(){
  setTimeout(()=>{const el=document.getElementById("order-chat-msgs");if(el)el.scrollTop=el.scrollHeight;},50);
}

function buildSellerReply(q,orderId){
  const lower=q.toLowerCase();
  const o=ORDERS.find(x=>x.id===orderId);
  if(lower.includes("qr")||lower.includes("vé")||lower.includes("upload")){
    if(o&&o.status==="seller_accepted") return"Mình đang chuẩn bị QR vé, sẽ upload trong vòng 30 phút nha bạn 🙏";
    if(o&&o.status==="ticket_uploaded") return"QR vé mình đã upload rồi đó bạn, bạn xem lại mục 'Vé QR Code' trong đơn hàng nhé! ✅";
    return"Vé của mình còn nguyên bản 100%, QR chưa được dùng bao giờ. Yên tâm nha! 🎫";
  }
  if(lower.includes("cảm ơn")||lower.includes("ok")||lower.includes("ổn")) return"Cảm ơn bạn đã tin tưởng! Chúc bạn có buổi sự kiện vui vẻ 🎉";
  if(lower.includes("giá")||lower.includes("tiền")||lower.includes("bao nhiêu")) return`Giá ${VND(o?.total||0)} như đã đăng bạn nhé, không thương lượng thêm được vì đã vào Escrow rồi 😅`;
  if(lower.includes("khi nào")||lower.includes("bao lâu")) return"Mình sẽ phản hồi trong vòng 30 phút, còn QR vé upload trước ngày sự kiện 3 ngày 👍";
  const auto=["Mình hiểu rồi, để mình kiểm tra lại nhé!","OK bạn, để mình xử lý ngay.","Cảm ơn bạn đã liên hệ! Mình sẽ hỗ trợ sớm nhất.","Bạn cứ yên tâm, mọi thứ đang trong Escrow an toàn 🛡"];
  return auto[Math.floor(Math.random()*auto.length)];
}

function updatePricePreview(){
  const priceNum=parseInt(sellForm.price)||0;
  const origNum=parseInt(sellForm.original_price)||0;
  const disc=origNum>0&&priceNum>0?Math.round((1-priceNum/origNum)*100):0;
  const fee=Math.round(priceNum*0.03);
  const payout=priceNum-fee;
  // Update preview elements in-place (no DOM rebuild, no focus loss)
  const pp=document.getElementById("preview-price");
  const pf=document.getElementById("preview-fee");
  const pw=document.getElementById("preview-payout");
  const pd=document.getElementById("preview-disc");
  const pdc=document.getElementById("preview-disc-pct");
  if(pp) pp.textContent=VND(priceNum);
  if(pf) pf.textContent="-"+VND(fee);
  if(pw) pw.textContent=VND(payout);
  if(pd) pd.style.display=disc>0?"block":"none";
  if(pdc) pdc.textContent=disc;
}

function renderSellInPlace(){
  // Save focused element before full re-render
  const activeId=document.activeElement?.id||null;
  const activeType=document.activeElement?.type||null;
  // selectionStart is unsupported on number/date inputs — only read for text/textarea
  const canReadCursor=activeType==="text"||activeType==="textarea"||activeType==null;
  const activeCursor=canReadCursor?(document.activeElement?.selectionStart??null):null;
  const root=document.getElementById("root");
  if(root) setState({});
  // Restore focus after re-render (without setSelectionRange for number/date inputs)
  if(activeId){
    requestAnimationFrame(()=>{
      const el=document.getElementById(activeId);
      if(el){
        el.focus();
        if(activeCursor!==null&&(el.type==="text"||el.type==="textarea"||!el.type)){
          try{el.setSelectionRange(activeCursor,activeCursor);}catch(e){}
        }
      }
    });
  }
}

function advanceSellStep(){
  const step=sellForm.step||0;
  if(step===0){
    if(!sellForm.title.trim()){showToast("Vui lòng nhập tên sự kiện","var(--red)","⚠️");return;}
    if(!sellForm.date){showToast("Vui lòng chọn ngày sự kiện","var(--red)","⚠️");return;}
  }
  if(step===1){
    if(!sellForm.section.trim()){showToast("Vui lòng nhập khu vực / loại vé","var(--red)","⚠️");return;}
    if(!sellForm.price||parseInt(sellForm.price)<100000){showToast("Giá bán phải từ 100,000đ trở lên","var(--red)","⚠️");return;}
  }
  sellForm.step=step+1;
  setState({});
  window.scrollTo(0,0);
}

async function submitSellForm(){
  if (!authToken) { showAuthModal('login'); return; }
  const payload = {
    event_name: sellForm.title,
    price: parseInt(sellForm.price),
    quantity: sellForm.quantity,
    event_date: sellForm.date,
    location: sellForm.location,
    section: sellForm.section,
    description: sellForm.description
  };
  const ok = await submitSellAPI(payload);
  if (!ok) return;
  // Reset form + photos
  sellForm={title:"",category:"concerts",location:"TP.HCM",date:"",section:"",price:"",original_price:"",quantity:1,description:"",step:0};
  sellPhotos=[];
  await loadMyTicketsFromAPI();
  setState({sellTab:'listings'});
}

function toggleCompare(lid){
  const idx=state.compareList.indexOf(lid);
  if(idx>=0){
    state.compareList.splice(idx,1);
    showToast("Đã bỏ khỏi danh sách so sánh","var(--hint)","⚖️");
  } else {
    if(state.compareList.length>=3){showToast("Tối đa 3 vé để so sánh","var(--warn)","⚠️");return;}
    state.compareList.push(lid);
    showToast("Đã thêm vào so sánh!","var(--brand)","⚖️");
  }
  setState({});
}

  const listings=state.compareList.map(id=>ALL_LISTINGS.find(l=>l.id===id)).filter(Boolean);

  const rows=[

    {label:"Danh mục",fn:l=>catEmoji(l.category)+" "+(l.category==="concerts"?"Concert":l.category==="kpop"?"K-Pop":l.category==="sports"?"Thể thao":"Festival"),type:"text"},

    {label:"Ngày",fn:l=>l.date,type:"text"},
    {label:"Khu vực",fn:l=>l.section,type:"text"},

    {label:"Trust Score",fn:l=>l.trust,type:"trust",raw:l=>l.trust},
    {label:"Lượt xem",fn:l=>l.views.toLocaleString(),type:"num",raw:l=>l.views},
    {label:"Đã bán",fn:l=>l.sold,type:"num",raw:l=>l.sold},
  ];

  const cols=listings.length;
  const colPct=Math.floor(100/cols);

  const headerHTML=listings.map(l=>`

      </div>
    </th>`).join("");

  const rowsHTML=rows.map(row=>{
    const vals=listings.map(l=>row.raw?row.raw(l):null);
    const best=row.raw?(row.type==="price"?Math.min(...vals):Math.max(...vals)):null;
    return`<tr>
      <td style="padding:10px 12px;font-size:11px;font-weight:700;color:var(--hint);white-space:nowrap;border-bottom:1px solid var(--border);background:var(--bg2);">${row.label}</td>
      ${listings.map((l,i)=>{
        const v=row.fn(l);
        const raw=row.raw?row.raw(l):null;

        const trustCol=row.type==="trust"?(l.trust>=80?"var(--ok)":l.trust>=60?"var(--warn)":"var(--red)"):"var(--text)";
        return`<td style="padding:10px 10px;text-align:center;font-size:12px;font-weight:${isBest?800:500};color:${row.type==="price"&&isBest?"var(--ok)":row.type==="trust"?trustCol:"var(--text)"};border-bottom:1px solid var(--border);background:${isBest?"rgba(34,211,142,.04)":"transparent"};">

  const buyBtnsHTML=listings.map(l=>`

  return`<div style="padding-bottom:80px;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
      <button onclick="setState({page:'search'})" style="background:var(--card);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;">←</button>
      <div>
        <div style="font-size:18px;font-weight:800;">⚖️ So sánh vé</div>
        <div style="font-size:11px;color:var(--sub);">So sánh ${cols} listing</div>
      </div>
      ${cols<3?`<button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="setState({page:'search'})">+ Thêm vé</button>`:""}
    </div>
    <div style="overflow-x:auto;padding:16px;">
      <table style="width:100%;border-collapse:collapse;min-width:${cols*160+130}px;">
        <thead>
          <tr>
            <th style="padding:12px;text-align:left;font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;border-bottom:2px solid var(--border2);white-space:nowrap;min-width:100px;">Tiêu chí</th>
            ${headerHTML}
          </tr>
        </thead>
        <tbody>
          ${rowsHTML}
          <tr>
            <td style="padding:12px 10px;background:var(--bg2);"></td>
            ${buyBtnsHTML}
          </tr>
        </tbody>
      </table>
    </div>
    <div style="padding:0 16px;">
      <div style="background:var(--brandL);border:1px solid rgba(61,142,248,.15);border-radius:12px;padding:12px 14px;font-size:11px;color:var(--sub);">
        💡 Ô <span style="color:var(--ok);font-weight:700;">xanh ✓</span> là giá trị tốt nhất trong từng tiêu chí
      </div>
    </div>

}

let PRICE_ALERTS=[];

function openAlertModal(lid){
  setState({showAlertModal:true,alertListingId:lid});
}
function closeAlertModal(){
  setState({showAlertModal:false,alertListingId:null});
  renderModals();
}
function buildAlertModal(lid){
  const l=ALL_LISTINGS.find(x=>x.id===lid);
  if(!l) return"";
  const existing=PRICE_ALERTS.find(a=>a.listingId===lid);
  return`<div class="modal-overlay" onclick="if(event.target===this)closeAlertModal()">
    <div class="modal-sheet">
      <div style="width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px;"></div>
      <div style="font-size:18px;font-weight:800;margin-bottom:4px;">🔔 Đặt Price Alert</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:18px;">${l.title}</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--sub);">Giá hiện tại</span>
        <span style="font-size:16px;font-weight:800;color:var(--brand);">${VND(l.price)}</span>
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:10.5px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:8px;">🎯 Thông báo khi giá xuống dưới</label>
        <input id="alert-price" type="number" placeholder="${Math.round(l.price*0.9)}"
          value="${existing?existing.targetPrice:Math.round(l.price*0.9)}"
          style="width:100%;height:48px;border:1.5px solid var(--border2);border-radius:12px;padding:0 16px;font-size:16px;font-weight:800;color:var(--brand);background:var(--bg2);outline:none;font-family:'JetBrains Mono',monospace;transition:border-color .2s;"
          onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border2)'">
        <div style="font-size:10.5px;color:var(--hint);margin-top:6px;">Gợi ý: ${VND(Math.round(l.price*0.9))} (-10%) hoặc ${VND(Math.round(l.price*0.8))} (-20%)</div>
      </div>
      ${existing?`<div style="background:var(--warnBg);border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:10px 14px;font-size:11.5px;color:var(--warn);margin-bottom:14px;">⚠️ Bạn đã có alert cho vé này — sẽ được cập nhật</div>`:""}
      <button class="btn btn-primary" style="width:100%;margin-bottom:8px;" onclick="saveAlert('${lid}')">🔔 Đặt thông báo</button>
      ${existing?`<button class="btn btn-ghost btn-sm" style="width:100%;color:var(--red);" onclick="deleteAlert('${lid}')">🗑 Xóa alert này</button>`:""}
      <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="closeAlertModal()">Hủy</button>
    </div>
  </div>`;
}
function saveAlert(lid){
  const l=ALL_LISTINGS.find(x=>x.id===lid);
  const priceEl=document.getElementById("alert-price");
  const target=parseInt(priceEl?priceEl.value:0)||Math.round(l.price*0.9);
  const existing=PRICE_ALERTS.findIndex(a=>a.listingId===lid);
  const alert={listingId:lid,title:l.title,currentPrice:l.price,targetPrice:target,active:true,triggered:l.price<=target};
  if(existing>=0) PRICE_ALERTS[existing]=alert;
  else PRICE_ALERTS.push(alert);
  if(alert.triggered){
    showToast("🎉 Giá hiện tại đã đạt mục tiêu của bạn!","var(--ok)","🔔");
  } else {
    showToast(`Alert: Thông báo khi < ${VND(target)}`,"var(--brand)","🔔");
  }
  closeAlertModal();
  setState({});
}
function deleteAlert(lid){
  PRICE_ALERTS=PRICE_ALERTS.filter(a=>a.listingId!==lid);
  showToast("Đã xóa price alert","var(--hint)","🗑");
  closeAlertModal();
  setState({});
}
function buildAlertsPage(){
  if(PRICE_ALERTS.length===0) return`<div style="padding-bottom:80px;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);">

      <div style="font-size:12px;color:var(--sub);margin-bottom:20px;">Vào trang chi tiết vé và bấm "🔔 Đặt Alert giá" để theo dõi</div>
      <button class="btn btn-primary" onclick="setState({page:'search'})">🔍 Tìm vé ngay</button>
    </div>

  const alertsHTML=PRICE_ALERTS.map(a=>{
    const l=ALL_LISTINGS.find(x=>x.id===a.listingId);
    const diff=a.currentPrice-a.targetPrice;

    return`<div class="alert-row ${a.triggered?"triggered":""}" style="margin-bottom:10px;">

      <div style="flex:1;min-width:0;">
        <div style="font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.title}</div>
        <div style="font-size:10.5px;color:var(--hint);margin-top:2px;">Giá hiện tại: <span style="color:var(--brand);font-weight:700;">${VND(a.currentPrice)}</span></div>
        <div style="font-size:10.5px;margin-top:1px;">
          Mục tiêu: <span style="font-weight:700;color:${a.triggered?"var(--ok)":"var(--warn)"};">${VND(a.targetPrice)}</span>
          ${a.triggered
            ?`<span style="font-size:9.5px;background:var(--okBg);color:var(--ok);padding:1px 6px;border-radius:5px;margin-left:5px;font-weight:700;">✓ Đã kích hoạt!</span>`
            :`<span style="font-size:9.5px;color:var(--hint);"> (cần giảm thêm ${pct}%)</span>`
          }
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button class="btn btn-ghost btn-sm" style="font-size:10px;" onclick="openAlertModal('${a.listingId}')">✏️</button>
        <button class="btn btn-ghost btn-sm" style="font-size:10px;color:var(--red);" onclick="deleteAlert('${a.listingId}')">🗑</button>
      </div>
    </div>`;
  }).join("");

  const triggered=PRICE_ALERTS.filter(a=>a.triggered).length;
  return`<div style="padding-bottom:80px;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);">
      <div style="font-size:20px;font-weight:800;">🔔 Price Alerts</div>
      <div style="font-size:12px;color:var(--sub);">${PRICE_ALERTS.length} alert đang theo dõi${triggered>0?` · <span style="color:var(--ok);">${triggered} đã kích hoạt</span>`:""}</div>
    </div>
    ${triggered>0?`<div style="margin:14px 16px 0;background:var(--okBg);border:1px solid rgba(34,211,142,.2);border-radius:12px;padding:12px 16px;font-size:12px;font-weight:700;color:var(--ok);">
      🎉 ${triggered} alert đã đạt giá mục tiêu — Mua ngay kẻo hết!
    </div>`:""}
    <div style="padding:16px;">${alertsHTML}</div>
    <div style="padding:0 16px;">
      <button class="btn btn-ghost" style="width:100%;" onclick="setState({page:'search'})">+ Tìm thêm vé để theo dõi</button>
    </div>
  </div>`;
}

      <div style="text-align:center;margin-bottom:18px;">

          ${[1,2,3,4,5].map(s=>`<span id="rs${s}" onclick="setReviewStars(${s})" style="font-size:36px;cursor:pointer;filter:${state.reviewStars>=s?"none":"grayscale(1)"};opacity:${state.reviewStars>=s?1:.35};transition:all .15s;transform:${state.reviewStars>=s?"scale(1.1)":"scale(1)"};">⭐</span>`).join("")}
        </div>
        <div id="star-label" style="font-size:13px;font-weight:700;color:var(--gold);">${["","Tệ","Không ổn","Bình thường","Tốt","Xuất sắc 🎉"][state.reviewStars]}</div>
      </div>
      <!-- Text -->
      <textarea id="review-text" placeholder="Chia sẻ trải nghiệm của bạn... QR vé có ổn không? Người bán có nhiệt tình không?"
        style="width:100%;height:100px;border:1.5px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text);background:var(--bg2);outline:none;resize:none;font-family:'Inter',sans-serif;transition:border-color .2s;line-height:1.6;"

      <div style="font-size:10px;color:var(--hint);margin-top:5px;margin-bottom:16px;">Tối thiểu 20 ký tự để đánh giá có giá trị</div>
      <!-- Tags -->
      <div style="margin-bottom:16px;">
        <div style="font-size:10.5px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Tag nhanh (tuỳ chọn)</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;" id="review-tags">
          ${["QR ok ngay 🎫","Vé đúng mô tả ✅","Giao dịch nhanh ⚡","Người bán uy tín 🛡","Rất recommend 👍","Sẽ mua lại 🔄"].map(tag=>`
          <button onclick="appendTag('${tag}')" style="padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;font-size:11px;font-weight:500;color:var(--sub);transition:all .18s;font-family:'Inter',sans-serif;" onmouseover="this.style.borderColor='var(--brand)';this.style.color='var(--brand)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--sub)'">${tag}</button>`).join("")}

    </div>
  </div>`;
}

function setReviewStars(n){
  state.reviewStars=n;
  renderModals();
}
function appendTag(tag){
  const el=document.getElementById("review-text");
  if(el){
    const cur=el.value.trim();
    el.value=cur?(cur+" "+tag):tag;
    state.reviewText=el.value;
  }
}
async function submitReview(orderId){
  const text=state.reviewText||"";
  if(text.trim().length<20){showToast("Vui lòng viết ít nhất 20 ký tự","var(--warn)","⚠️");return;}

  if(authToken){
    try{
      const res=await fetch(API+"/orders/"+orderId+"/review",{
        method:"POST",headers:getHeaders(),
        body:JSON.stringify({rating:state.reviewStars,text:text.trim()})
      });
      const data=await res.json();
      if(!res.ok){showToast(data.error||"Lỗi gửi đánh giá","var(--red)","❌");return;}
      showToast("Đánh giá đã gửi! Cảm ơn bạn ⭐","var(--gold)","⭐");
      state.showReviewModal=false;
      state.reviewText="";
      renderModals();
      return;
    }catch(e){
      showToast("Lỗi kết nối","var(--red)","❌");return;
    }
  }

  // Fallback demo
  const o=ORDERS?ORDERS.find(x=>x.id===orderId):null;
  const lid=o?o.listingId:null;
  if(lid){
    if(!ALL_REVIEWS[lid])ALL_REVIEWS[lid]=[];
    ALL_REVIEWS[lid].unshift({buyer:"Bạn",avatar:"B",rating:state.reviewStars,text:text,date:new Date().toLocaleDateString("vi-VN")});
  }
  showToast("Đánh giá đã gửi! Cảm ơn bạn ⭐","var(--gold)","⭐");
  state.showReviewModal=false;
  state.reviewText="";
  renderModals();
  setState({});
}
