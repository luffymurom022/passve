/* ══════════════════════════════════════════
   🔌 SAFEPASS API LAYER — kết nối backend thật
══════════════════════════════════════════ */

const API = window.location.origin + '/api';

// ── Auth state ──
let currentUser = JSON.parse(localStorage.getItem('sp_user') || 'null');
let authToken = localStorage.getItem('sp_token') || null;

function getHeaders() {
  return { 'Content-Type': 'application/json', ...(authToken ? { Authorization: 'Bearer ' + authToken } : {}) };
}

// ── Login / Register Modal ──
function showAuthModal(tab = 'login') {
  let el = document.getElementById('auth-modal');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-modal';
    el.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;';
    document.body.appendChild(el);
  }
  el.innerHTML = `
    <div style="background:#0d1220;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;width:100%;max-width:380px;">
      <div style="display:flex;gap:8px;margin-bottom:24px;">
        <button onclick="showAuthModal('login')" style="flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:14px;
          background:${tab==='login'?'#3d8ef8':'transparent'};color:${tab==='login'?'#fff':'#7b8fad'};">Đăng nhập</button>
        <button onclick="showAuthModal('register')" style="flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:14px;
          background:${tab==='register'?'#3d8ef8':'transparent'};color:${tab==='register'?'#fff':'#7b8fad'};">Đăng ký</button>
      </div>
      ${tab==='register' ? '<input id="auth-name" placeholder="Họ tên" style="width:100%;margin-bottom:10px;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e8edf8;font-size:14px;">' : ''}
      <input id="auth-phone" placeholder="Số điện thoại" type="tel" style="width:100%;margin-bottom:10px;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e8edf8;font-size:14px;">
      <input id="auth-pass" placeholder="Mật khẩu" type="password" style="width:100%;margin-bottom:16px;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e8edf8;font-size:14px;">
      <div id="auth-err" style="color:#f05068;font-size:13px;margin-bottom:10px;display:none;"></div>
      <button onclick="submitAuth('${tab}')" style="width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#3d8ef8,#2563eb);color:#fff;font-size:15px;font-weight:700;cursor:pointer;">
        ${tab==='login' ? 'Đăng nhập' : 'Tạo tài khoản'}
      </button>
      ${currentUser ? '' : '<p style="text-align:center;margin-top:14px;font-size:12px;color:#3d4f6a;">Bỏ qua → dùng tài khoản demo</p>'}
      ${currentUser ? '' : '<button onclick="loginDemo()" style="width:100%;margin-top:6px;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#7b8fad;font-size:13px;cursor:pointer;">Dùng demo (không lưu dữ liệu)</button>'}
    </div>`;
}

async function submitAuth(tab) {
  const phone = document.getElementById('auth-phone')?.value?.trim();
  const pass = document.getElementById('auth-pass')?.value;
  const name = document.getElementById('auth-name')?.value?.trim();
  const errEl = document.getElementById('auth-err');

  if (!phone || !pass || (tab==='register' && !name)) {
    errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.style.display='block'; return;
  }

  try {
    const res = await fetch(API + '/auth/' + (tab==='login'?'login':'register'), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password: pass, name })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Lỗi'; errEl.style.display='block'; return; }

    authToken = data.token;
    currentUser = data.user;
    localStorage.setItem('sp_token', authToken);
    localStorage.setItem('sp_user', JSON.stringify(currentUser));
    document.getElementById('auth-modal')?.remove();
    showToast('Chào ' + currentUser.name + '! 👋', 'var(--ok)', '✅');
    await loadTicketsFromAPI();
    await loadOrdersFromAPI();
    setState({});
    startPolling();
  } catch(e) {
    errEl.textContent = 'Không kết nối được server. Kiểm tra backend đang chạy chưa.'; errEl.style.display='block';
  }
}

function loginDemo() {
  currentUser = { id: 'demo', name: 'Demo User', phone: '0000000000', balance: 5000000, escrow: 0 };
  document.getElementById('auth-modal')?.remove();
  showToast('Đang dùng tài khoản demo', 'var(--warn)', '⚠️');
  setState({});
}

function logout() {
  localStorage.removeItem('sp_token');
  localStorage.removeItem('sp_user');
  authToken = null; currentUser = null;
  showAuthModal('login');
}

// ── Load tickets từ API ──
function mapTicket(t) {
  return {
    id: t.id,
    seller_id: t.seller_id,
    title: t.event_name,
    category: 'concerts',
    price: t.price,
    original_price: Math.round(t.price * 1.1),
    date: t.event_date || '',
    location: t.location || 'TP.HCM',
    section: t.section || '',
    quantity: t.quantity || 1,
    views: Math.floor(Math.random()*500)+50,
    saved: Math.floor(Math.random()*50),
    sold: 0,
    active: t.status === 'available',
    trust: 85,
    description: t.description || ''
  };
}

async function loadTicketsFromAPI() {
  if (!authToken) return;
  try {
    const res = await fetch(API + '/tickets', { headers: getHeaders() });
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      // Map API format → UI format
      const mapped = data.map(t => mapTicket(t));
      // Prepend API tickets to top of list
      mapped.forEach(t => {
        if (!ALL_LISTINGS.find(l => l.id === t.id)) ALL_LISTINGS.unshift(t);
      });
      render();
    }
  } catch(e) { console.log('Không tải được vé từ API:', e); }
}

// ── Load orders từ API ──
async function loadOrdersFromAPI() {
  if (!authToken) return;
  try {
    const [buyRes, sellRes] = await Promise.all([
      fetch(API + '/orders?role=buyer', { headers: getHeaders() }),
      fetch(API + '/orders?role=seller', { headers: getHeaders() })
    ]);
    const buyOrders = await buyRes.json();
    const sellOrders = await sellRes.json();

    const mapStatus = s => ({ waiting_qr:'awaiting_seller', waiting_confirm:'ticket_uploaded', completed:'completed', disputed:'disputed', refunded:'refunded' }[s] || s);

    const mapOrder = (o, role) => ({
      id: o.id,
      role,
      title: o.event_name,
      category: 'concerts',
      section: '',
      date: '',
      location: '',
      qty: 1,
      price: o.price,
      total: o.total,
      status: mapStatus(o.status),
      escrow: o.status !== 'completed' ? o.total : 0,
      qr: o.qr_code || null,
      dispute: null,
      created: new Date(o.created_at).toLocaleDateString('vi-VN'),
      timeline: [{ t: new Date(o.created_at).toLocaleString('vi-VN'), e: 'Đặt hàng thành công', i: '🛒', c: 'var(--brand)' }],
      ...(role==='buyer' ? { seller: { name: o.seller_name, trust: 85, avatar: o.seller_name?.slice(0,2).toUpperCase() } } : {}),
      ...(role==='seller' ? { buyer: { name: o.buyer_name, trust: 80, avatar: o.buyer_name?.slice(0,2).toUpperCase() } } : {})
    });

    const newOrders = [
      ...(Array.isArray(buyOrders) ? buyOrders.map(o => mapOrder(o, 'buyer')) : []),
      ...(Array.isArray(sellOrders) ? sellOrders.map(o => mapOrder(o, 'seller')) : [])
    ];

    newOrders.forEach(o => {
      const idx = ORDERS.findIndex(x => x.id === o.id);
      if (idx >= 0) ORDERS[idx] = o; else ORDERS.unshift(o);
    });
  } catch(e) { console.log('Không tải được đơn hàng:', e); }
}

// ── Mua vé thật ──
async function buyTicketAPI(ticketId) {
  if (!authToken) { showAuthModal('login'); return; }
  if (!currentUser || currentUser.id === 'demo') { showToast('Tính năng mua vé cần tài khoản thật', 'var(--warn)', '⚠️'); return; }

  try {
    showToast('Đang xử lý...', 'var(--brand)', '⏳');
    const res = await fetch(API + '/orders', {
      method: 'POST', headers: getHeaders(),
      body: JSON.stringify({ ticket_id: ticketId })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Lỗi mua vé', 'var(--red)', '❌'); return; }

    showToast('Đặt mua thành công! Tiền đang được giữ escrow 🔒', 'var(--ok)', '✅');
    await refreshBalance();
    await loadOrdersFromAPI();
    await loadTicketsFromAPI();
    setState({ page: 'orders' });
  } catch(e) { showToast('Lỗi kết nối server', 'var(--red)', '❌'); }
}

async function confirmOrderAPI(orderId) {

// ── Nạp tiền ──
async function topupWalletAPI(amount) {
  if (!authToken) return;
  try {
    const res = await fetch(API + '/wallet/topup', {
      method: 'POST', headers: getHeaders(),
      body: JSON.stringify({ amount })
    });

// ── Đăng bán vé thật ──
async function submitSellAPI(formData) {
  if (!authToken) { showAuthModal('login'); return; }
  try {
    const res = await fetch(API + '/tickets', {
      method: 'POST', headers: getHeaders(),
      body: JSON.stringify(formData)
    });

    showToast('Đã đăng bán vé thành công! 🎟', 'var(--ok)', '✅');

    return true;
  } catch(e) { showToast('Lỗi kết nối server', 'var(--red)', '❌'); return false; }
}


// ── Polling: thông báo seller khi có đơn mới (mỗi 30s) ──
let _lastKnownOrderIds = new Set();
let _pollingStarted = false;

async function pollSellerOrders() {
  if (!authToken || !currentUser || currentUser.id === 'demo') return;
  try {
    const res = await fetch(API + '/orders?role=seller', { headers: getHeaders() });
    if (!res.ok) return;
    const orders = await res.json();
    if (!Array.isArray(orders)) return;

    const newOrders = orders.filter(o =>
      o.status === 'waiting_qr' && !_lastKnownOrderIds.has(o.id)
    );

    // Cập nhật set đã biết
    orders.forEach(o => _lastKnownOrderIds.add(o.id));

    if (newOrders.length === 0) return;

    // Có đơn mới → thông báo
    newOrders.forEach(o => {
      NOTIFICATIONS.unshift({
        id: 'n' + o.id,
        type: 'order',
        icon: '🛒',
        title: 'Đơn hàng mới!',
        body: (o.buyer_name || 'Ai đó') + ' vừa đặt mua vé ' + o.event_name,
        time: 'Vừa xong',
        read: false,
        action: 'orders'
      });
      state.notifCount = (state.notifCount || 0) + 1;
      state.orderBadge = (state.orderBadge || 0) + 1;
    });

    // Load lại orders và render
    await loadOrdersFromAPI();
    setState({});

    // Toast cho đơn đầu tiên
    const first = newOrders[0];
    showToast('Đơn mới: ' + first.event_name, 'var(--ok)', '🛒');
  } catch(e) {}
}

function startPolling() {
  if (_pollingStarted) return;
  _pollingStarted = true;
  // Seed set ban đầu (không notify cho order cũ)
  if (authToken) {
    fetch(API + '/orders?role=seller', { headers: getHeaders() })
      .then(r => r.json())
      .then(orders => {
        if (Array.isArray(orders)) orders.forEach(o => _lastKnownOrderIds.add(o.id));
      }).catch(() => {});
  }
  setInterval(pollSellerOrders, 30 * 1000);
}

// ── Boot: kiểm tra đăng nhập ──
(async function bootAPI() {
  if (authToken) {
    try {
      const res = await fetch(API + '/auth/me', { headers: getHeaders() });
      if (res.ok) {
        currentUser = await res.json();
        localStorage.setItem('sp_user', JSON.stringify(currentUser));
        await loadTicketsFromAPI();
        await loadOrdersFromAPI();
        setState({});
        startPolling();
        return;
      }
    } catch(e) {}
    // Token hết hạn
    localStorage.removeItem('sp_token');
    localStorage.removeItem('sp_user');
    authToken = null; currentUser = null;
  }
  // Chưa đăng nhập → hiện modal
  setTimeout(() => showAuthModal('login'), 500);
})();
