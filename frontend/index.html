      <button onclick="this.closest('[style*=fixed]').remove()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:16px;color:var(--sub);">✕</button>
    </div>
    <div style="padding:20px 24px;">
      <div style="margin-bottom:14px;"><label style="display:block;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:6px;">Ghi chú cho buyer</label>
        <textarea id="submit-msg" placeholder="Mô tả sản phẩm, hướng dẫn sử dụng..." rows="3" style="width:100%;padding:10px 13px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;"></textarea>
      </div>
      <div style="margin-bottom:16px;"><label style="display:block;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:6px;">Upload File (tùy chọn)</label>
        <input type="file" id="submit-file" accept=".pdf,.zip,.rar,.png,.jpg,.jpeg,.mp4,.docx,.txt" style="width:100%;padding:8px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:12px;box-sizing:border-box;">
        <div style="font-size:10px;color:var(--hint);margin-top:4px;">PDF, ZIP, RAR, PNG, JPG, MP4, DOCX (max 50MB)</div>
      </div>
      <button onclick="submitDeliverable('${orderId}',this.closest('[style*=fixed]'))" style="width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#9b87f5,#7b67d5);color:#fff;font-size:14px;font-weight:700;cursor:pointer;">📦 Nộp sản phẩm</button>
    </div>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

async function submitDeliverable(orderId, overlayEl){
  const msg=document.getElementById('submit-msg')?.value.trim();
  const fileEl=document.getElementById('submit-file');
  const file=fileEl?.files?.[0];
  let fileUrl=null, fileName=null;
  if(file){
    const fd=new FormData(); fd.append('file',file);
    try{
      const ur=await fetch(API+`/service-orders/${orderId}/upload`,{method:'POST',headers:{Authorization:`Bearer ${authToken}`},body:fd});
      const ud=await ur.json();
      if(!ur.ok) throw new Error(ud.error||'Upload thất bại');
      fileUrl=ud.file_url; fileName=ud.file_name;
    }catch(e){ showToast(e.message,'err'); return; }
  }
  try{
    const r=await fetch(API+`/service-orders/${orderId}/submit`,{method:'POST',headers:getHeaders(),body:JSON.stringify({message:msg||null,file_url:fileUrl,file_name:fileName})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    if(overlayEl) overlayEl.remove();
    showToast('📦 Đã nộp sản phẩm!','ok');
    openSvcOrderDetail(orderId);
  }catch(e){ showToast(e.message,'err'); }
}

function openSvcReview(orderId){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;';
  let selectedRating=5;
  ov.innerHTML=`<div style="background:var(--card);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:420px;">
    <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:16px;font-weight:800;">⭐ Đánh giá dịch vụ</div>
      <button onclick="this.closest('[style*=fixed]').remove()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:16px;color:var(--sub);">✕</button>
    </div>
    <div style="padding:20px 24px;">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:13px;color:var(--sub);margin-bottom:10px;">Số sao</div>
        <div style="display:flex;justify-content:center;gap:8px;">
          ${[1,2,3,4,5].map(n=>`<button onclick="document.querySelectorAll('.svc-star').forEach((s,i)=>s.style.opacity=i<${n}?'1':'.3');this.dataset.val='${n}';document.getElementById('svc-rating-val').value='${n}';" class="svc-star" style="font-size:28px;background:none;border:none;cursor:pointer;opacity:${n<=5?'1':'.3'};">⭐</button>`).join('')}
        </div>
        <input type="hidden" id="svc-rating-val" value="5">
      </div>
      <div style="margin-bottom:16px;"><label style="display:block;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:6px;">Nhận xét</label>
        <textarea id="svc-review-text" placeholder="Nhận xét về chất lượng dịch vụ..." rows="3" style="width:100%;padding:10px 13px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;"></textarea>
      </div>
      <button onclick="submitSvcReview('${orderId}',this.closest('[style*=fixed]'))" style="width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f5a623,#e09010);color:#fff;font-size:14px;font-weight:700;cursor:pointer;">⭐ Gửi đánh giá</button>
    </div>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

async function submitSvcReview(orderId, overlayEl){
  const rating=parseInt(document.getElementById('svc-rating-val')?.value||'5');
  const review=document.getElementById('svc-review-text')?.value.trim();
  try{
    const r=await fetch(API+'/service-reviews',{method:'POST',headers:getHeaders(),body:JSON.stringify({order_id:orderId,rating,review:review||null})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    if(overlayEl) overlayEl.remove();
    showToast('⭐ Đánh giá thành công!','ok');
    openSvcOrderDetail(orderId);
  }catch(e){ showToast(e.message,'err'); }
}

async function sendSvcMsg(orderId){
  const inp=document.getElementById('svc-msg-input');
  const content=inp?.value.trim();
  if(!content) return;
  inp.value='';
  try{
    await fetch(API+`/service-orders/${orderId}/messages`,{method:'POST',headers:getHeaders(),body:JSON.stringify({content})});
    openSvcOrderDetail(orderId);
  }catch(e){ showToast(e.message,'err'); }
}

function openCreateGig(){
  if(!authToken){ showAuthModal('login'); return; }
  setSvcState({tab:'mygigs',createGigOpen:true});
}

async function submitCreateGig(){
  const cat=document.getElementById('gig-cat')?.value;
  const title=document.getElementById('gig-title')?.value.trim();
  const desc=document.getElementById('gig-desc')?.value.trim();
  const price=document.getElementById('gig-price')?.value;
  const days=document.getElementById('gig-days')?.value;
  const revisions=document.getElementById('gig-revisions')?.value;
  if(!title||!desc||!price){ showToast('Vui lòng điền đầy đủ thông tin','err'); return; }
  try{
    const r=await fetch(API+'/service-listings',{method:'POST',headers:getHeaders(),body:JSON.stringify({category:cat,title,description:desc,price:Number(price),delivery_days:Number(days)||3,revision_count:Number(revisions)||1})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    showToast('✅ Tạo gig thành công!','ok');
    setSvcState({createGigOpen:false});
    loadSvcMyGigs();
  }catch(e){ showToast(e.message,'err'); }
}

async function toggleGigStatus(id, newStatus){
  try{
    const r=await fetch(API+`/service-listings/${id}`,{method:'PUT',headers:getHeaders(),body:JSON.stringify({status:newStatus})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    showToast(newStatus==='active'?'✅ Đã kích hoạt':'⏸️ Đã tạm dừng','ok');
    loadSvcMyGigs();
  }catch(e){ showToast(e.message,'err'); }
}

function bindSvcEvents(){
  if(svcState.tab==='browse' && svcState.listings.length===0) loadSvcListings();
  if(svcState.tab==='myorders' && svcState.myOrders.length===0) loadSvcMyOrders();
  if(svcState.tab==='mygigs' && svcState.myGigs.length===0) loadSvcMyGigs();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg,type){ if(typeof toast==='function') toast(msg,type==='ok'?'success':type==='err'?'error':type); }

</script>

</body>
</html>
