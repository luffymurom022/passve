<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePass Freelance — Thuê Freelancer Chuyên Nghiệp</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--card:#111827;--card2:#1a2235;--border:#1e2d40;
  --text:#e2e8f0;--sub:#6b7280;--brand:#3b82f6;--brand2:#8b5cf6;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh}
a{color:var(--brand);text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit}
input,textarea,select{font-family:inherit;background:var(--card2);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;outline:none;font-size:14px;width:100%;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--brand)}
input::placeholder,textarea::placeholder{color:var(--sub)}
select option{background:var(--card)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;transition:all .2s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.85}
.btn-sm{padding:6px 14px;font-size:13px}
.tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.tag-blue{background:rgba(59,130,246,.15);color:var(--brand)}
.tag-green{background:rgba(16,185,129,.15);color:var(--green)}
.tag-red{background:rgba(239,68,68,.15);color:var(--red)}
.tag-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.tag-purple{background:rgba(139,92,246,.15);color:var(--brand2)}
.tag-gray{background:rgba(107,114,128,.15);color:var(--sub)}

/* Layout */
.header{background:rgba(10,14,26,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;color:var(--text)}
.header-logo span{color:var(--brand)}
.nav-links{display:flex;gap:4px;margin-left:32px}
.nav-link{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .2s;border:none;background:transparent}
.nav-link:hover,.nav-link.active{background:rgba(59,130,246,.1);color:var(--brand)}
.spacer{flex:1}
.header-actions{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.back-link{color:var(--sub);font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer}
.back-link:hover{color:var(--text)}

.container{max-width:1280px;margin:0 auto;padding:0 24px}

/* Hero */
.hero{background:linear-gradient(135deg,#0d1830 0%,#0f0a1a 100%);padding:60px 24px 48px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.15),transparent 70%)}
.hero-title{font-size:42px;font-weight:900;line-height:1.15;margin-bottom:16px}
.hero-title span{background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:17px;color:var(--sub);max-width:560px;margin:0 auto 32px}
.hero-search{max-width:640px;margin:0 auto;display:flex;gap:0}
.hero-search input{border-radius:10px 0 0 10px;border-right:none;font-size:15px;padding:14px 18px;border-color:var(--border)}
.hero-search button{border-radius:0 10px 10px 0;padding:14px 24px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-weight:700;font-size:15px;white-space:nowrap}
.hero-stats{display:flex;justify-content:center;gap:32px;margin-top:28px}
.hero-stat{text-align:center}.hero-stat strong{display:block;font-size:22px;font-weight:800;color:var(--brand)}
.hero-stat span{font-size:12px;color:var(--sub)}

/* Categories bar */
.cat-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-pill{padding:14px 16px;white-space:nowrap;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;background:none;border-left:none;border-right:none;border-top:none}
.cat-pill:hover{color:var(--text)}
.cat-pill.active{color:var(--brand);border-bottom-color:var(--brand)}

/* Main layout */
.main{display:flex;gap:0;min-height:calc(100vh - 180px)}
.sidebar{width:240px;flex-shrink:0;padding:24px 16px;border-right:1px solid var(--border)}
.content{flex:1;padding:24px;min-width:0}

/* Cards */
.gig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.gig-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
.gig-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--brand)}
.gig-img{height:160px;background:linear-gradient(135deg,#1a2235,#0d1830);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.gig-img img{width:100%;height:100%;object-fit:cover}
.gig-badge{position:absolute;top:10px;right:10px}
.gig-body{padding:14px}
.gig-seller{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.gig-seller-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.gig-seller-name{font-size:12px;color:var(--sub);flex:1}
.gig-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gig-meta{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.gig-rating{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--yellow)}
.gig-price{font-size:16px;font-weight:800;color:var(--text)}
.gig-price span{font-size:11px;font-weight:400;color:var(--sub)}

/* Job cards */
.job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;margin-bottom:14px}
.job-card:hover{border-color:var(--brand);transform:translateX(3px)}
.job-title{font-size:16px;font-weight:700;margin-bottom:8px}
.job-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.job-desc{font-size:13px;color:var(--sub);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.job-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.job-budget{font-size:15px;font-weight:700;color:var(--green)}
.job-proposals{font-size:12px;color:var(--sub)}

/* Profile cards */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.profile-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--brand)}
.profile-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 12px;overflow:hidden}
.profile-av img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:15px;font-weight:700;margin-bottom:4px}
.profile-tag{font-size:12px;color:var(--sub);margin-bottom:12px}
.profile-skills{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:12px}
.skill-chip{background:rgba(59,130,246,.1);color:var(--brand);padding:2px 8px;border-radius:999px;font-size:11px}
.profile-stats{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid var(--border)}
.profile-stat{text-align:center}.profile-stat strong{display:block;font-size:15px;font-weight:700}
.profile-stat span{font-size:11px;color:var(--sub)}

/* Leaderboard */
.lb-table{width:100%;border-collapse:collapse}
.lb-table th,.lb-table td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
.lb-table th{font-size:12px;color:var(--sub);font-weight:600;text-transform:uppercase;background:var(--card2)}
.lb-table tr:hover td{background:rgba(255,255,255,.02)}
.lb-rank{font-size:20px;font-weight:900;color:var(--sub);width:40px}
.lb-rank.top1{color:#fbbf24}.lb-rank.top2{color:#94a3b8}.lb-rank.top3{color:#cd7c2e}
.lb-user{display:flex;align-items:center;gap:12px}

/* Workspace */
.workspace{display:flex;gap:0;height:calc(100vh - 120px)}
.ws-sidebar{width:280px;border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.ws-main{flex:1;display:flex;flex-direction:column;min-width:0}
.ws-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ws-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);padding:0 20px}
.ws-tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-left:none;border-right:none;border-top:none}
.ws-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.ws-body{flex:1;overflow-y:auto;padding:20px}

/* Chat */
.chat-msgs{display:flex;flex-direction:column;gap:12px}
.msg{max-width:72%;}.msg.mine{align-self:flex-end}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
.msg.mine .msg-bubble{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.msg.other .msg-bubble{background:var(--card2)}
.msg-meta{font-size:11px;color:var(--sub);margin-top:4px}
.msg.mine .msg-meta{text-align:right}
.chat-input{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);background:var(--card)}
.chat-input input{flex:1}
.chat-input button{padding:10px 20px;background:var(--brand);color:#fff;border-radius:8px;font-weight:600;white-space:nowrap}

/* Milestones */
.milestone-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.milestone-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ms-dot.pending{background:var(--sub)}.ms-dot.in_progress{background:var(--brand)}.ms-dot.submitted{background:var(--yellow)}.ms-dot.approved{background:var(--green)}.ms-dot.rejected{background:var(--red)}
.milestone-actions{display:flex;gap:8px;margin-top:10px}

/* Activity */
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.activity-icon{width:32px;height:32px;border-radius:50%;background:rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.activity-text{font-size:13px;line-height:1.5}
.activity-time{font-size:11px;color:var(--sub);margin-top:2px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card)}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card)}

/* Detail page */
.detail-hero{background:var(--card);border-bottom:1px solid var(--border);padding:28px 24px}
.detail-grid{display:grid;grid-template-columns:1fr 340px;gap:24px;max-width:1280px;margin:0 auto;padding:24px}
.gig-gallery{border-radius:12px;overflow:hidden;background:var(--card2);height:320px;display:flex;align-items:center;justify-content:center;font-size:80px;margin-bottom:20px}
.gig-gallery img{width:100%;height:100%;object-fit:cover}
.order-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:sticky;top:80px}
.order-price{font-size:28px;font-weight:900;margin-bottom:8px}
.order-includes{margin:16px 0}
.order-include{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub);margin-bottom:6px}
.rating-stars{color:var(--yellow);font-size:18px}
.review-item{padding:16px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-stars{color:var(--yellow);font-size:13px}
.review-text{font-size:14px;color:var(--sub);line-height:1.6}

/* Auth gate */
.auth-gate{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;max-width:400px;margin:60px auto}
.auth-gate h2{font-size:22px;font-weight:800;margin-bottom:8px}
.auth-gate p{color:var(--sub);font-size:14px;margin-bottom:24px}
.auth-gate-btns{display:flex;gap:12px;justify-content:center}

/* Contract status bar */
.contract-status-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.cs-title{font-size:16px;font-weight:700}
.cs-meta{display:flex;gap:16px}
.cs-item{text-align:center}.cs-item strong{display:block;font-size:15px;font-weight:700;color:var(--text)}
.cs-item span{font-size:11px;color:var(--sub)}
.progress-bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--green));border-radius:999px;transition:width .4s}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab-btn{padding:10px 18px;font-size:14px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-left:none;border-right:none;border-top:none}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}

/* Section heading */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sec-head h2{font-size:20px;font-weight:800}

/* Empty state */
.empty{text-align:center;padding:48px 24px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:18px;font-weight:700;margin-bottom:8px}
.empty p{font-size:14px;color:var(--sub);margin-bottom:24px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:14px;z-index:9999;animation:slideIn .3s ease;max-width:340px;box-shadow:var(--shadow)}
.toast.success{border-color:var(--green);background:rgba(16,185,129,.1)}
.toast.error{border-color:var(--red);background:rgba(239,68,68,.1)}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Filter sidebar */
.filter-section{margin-bottom:20px}
.filter-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:10px;letter-spacing:.5px}
.filter-option{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;font-size:13px;color:var(--sub);transition:color .2s}
.filter-option:hover,.filter-option.active{color:var(--text)}
.filter-option input[type=radio]{accent-color:var(--brand);flex-shrink:0}

/* Loader */
.loader{text-align:center;padding:48px;color:var(--sub);font-size:14px}
.spin{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Contract list */
.contract-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.contract-item:hover{border-color:var(--brand);transform:translateX(3px)}
.contract-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.contract-title{font-size:15px;font-weight:700}
.contract-meta{display:flex;gap:16px;font-size:12px;color:var(--sub)}

/* Responsive */
@media(max-width:768px){
  .detail-grid{grid-template-columns:1fr}
  .hero-title{font-size:28px}
  .sidebar{display:none}
  .main{display:block}
  .content{padding:16px}
  .form-row{grid-template-columns:1fr}
  .nav-links{display:none}
  .ws-sidebar{display:none}
  .workspace{height:auto;flex-direction:column}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo" onclick="showView('home')" style="cursor:pointer">
    🛡️ Safe<span>Pass</span>
  </div>
  <nav class="nav-links">
    <button class="nav-link" id="nav-browse" onclick="showView('browse')">🔍 Tìm Dịch Vụ</button>
    <button class="nav-link" id="nav-jobs" onclick="showView('jobs')">📋 Job Board</button>
    <button class="nav-link" id="nav-profiles" onclick="showView('profiles')">👥 Freelancers</button>
    <button class="nav-link" id="nav-leaderboard" onclick="showView('leaderboard')">🏆 Xếp Hạng</button>
    <button class="nav-link" id="nav-workspace" onclick="showView('workspace')">💼 Dự Án Của Tôi</button>
  </nav>
  <div class="spacer"></div>
  <div class="header-actions" id="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="window.location.href='/'">← SafePass</button>
    <div id="auth-btn-area"></div>
  </div>
</div>

<!-- APP ROOT -->
<div id="app"></div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeAllModals()">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer" style="display:none"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// STATE & CONFIG
// ═══════════════════════════════════════════
const API = '';
let state = {
  view: 'home',
  user: null,
  token: localStorage.getItem('token'),
  categories: [],
  gigs: [], gigsPage: 1, gigsTotal: 0, gigsFilter: { category: '', q: '', sort: 'rating' },
  jobs: [], jobsFilter: { category: '', q: '' },
  profiles: [],
  leaderboard: [], leaderboardBy: 'rating',
  contracts: [],
  activeContractId: null,
  activeContract: null,
};

const CAT_ICONS = {design:'🎨',video:'🎬',marketing:'📢',ai:'🤖',code:'💻',writing:'✍️'};

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
async function loadUser() {
  if (!state.token) return;
  try {
    const r = await apiFetch('/api/auth/me');
    if (r.user) state.user = r.user;
  } catch(e) {}
  renderAuthArea();
}

function renderAuthArea() {
  const el = document.getElementById('auth-btn-area');
  if (!el) return;
  if (state.user) {
    const initials = (state.user.name||'U').slice(0,1).toUpperCase();
    el.innerHTML = `<div style="display:flex;align-items:center;gap:10px">
      <div class="avatar">${initials}</div>
      <span class="user-name">${state.user.name||'User'}</span>
      <button class="btn btn-ghost btn-sm" onclick="showPostGig()">+ Đăng Dịch Vụ</button>
      <button class="btn btn-primary btn-sm" onclick="showPostJob()">📋 Đăng Job</button>
    </div>`;
  } else {
    el.innerHTML = `<button class="btn btn-primary btn-sm" onclick="window.location.href='/'">Đăng nhập</button>`;
  }
}

async function apiFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const r = await fetch(API + url, { headers, ...opts });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw data;
  return data;
}

// TOAST
// ═══════════════════════════════════════════
function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function showView(view, params = {}) {
  state.view = view;
  Object.assign(state, params);
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  const navMap = { browse:'nav-browse', jobs:'nav-jobs', profiles:'nav-profiles', leaderboard:'nav-leaderboard', workspace:'nav-workspace' };
  if (navMap[view]) document.getElementById(navMap[view])?.classList.add('active');
  render();
  window.scrollTo(0, 0);
  // Handle hash
  if (view === 'workspace' && params.contractId) {
    setTimeout(() => openContract(params.contractId), 100);
  }
}

function render() {
  const app = document.getElementById('app');
  switch(state.view) {
    case 'home': renderHome(); break;
    case 'browse': renderBrowse(); break;
    case 'gig_detail': renderGigDetail(); break;
    case 'jobs': renderJobs(); break;
    case 'job_detail': renderJobDetail(); break;
    case 'profiles': renderProfiles(); break;
    case 'profile_detail': renderProfileDetail(); break;
    case 'leaderboard': renderLeaderboard(); break;
    case 'workspace': renderWorkspace(); break;
    case 'my_gigs': renderMyGigs(); break;
    case 'my_profile': renderMyProfile(); break;
    default: renderHome();
  }
}

let searchTimer;
function debounceSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => setGigFilter({ q: val }), 400);

function setGigFilter(patch) {
  state.gigsFilter = { ...state.gigsFilter, ...patch };
  state.gigsPage = 1;
  renderBrowse();
}

async function loadGigs() {
  const f = state.gigsFilter;
  const p = state.gigsPage || 1;
  let url = `/api/freelance/gigs?limit=24&page=${p}&sort=${f.sort||'rating'}`;
  if (f.category) url += `&category=${f.category}`;
  if (f.q) url += `&q=${encodeURIComponent(f.q)}`;
  if (f.min_price) url += `&min_price=${f.min_price}`;
  if (f.max_price) url += `&max_price=${f.max_price}`;
  try {
    const { gigs, total } = await apiFetch(url);
    const el = document.getElementById('gigs-list');
    const countEl = document.getElementById('gig-count');
    if (!el) return;
    if (countEl) countEl.textContent = `${total || gigs.length} dịch vụ`;
    if (!gigs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>Không tìm thấy</h3><p>Thử thay đổi bộ lọc hoặc từ khóa</p></div>'; return; }
    el.innerHTML = `<div class="gig-grid">${gigs.map(gigCard).join('')}</div>`;
    renderPagination('gig-pagination', p, Math.ceil((total||gigs.length)/24), (pg)=>{state.gigsPage=pg;loadGigs();});
  } catch(e) { document.getElementById('gigs-list').innerHTML = '<p style="color:var(--sub)">Không thể tải dịch vụ</p>'; }
}

function renderPagination(id, cur, total, cb) {
  const el = document.getElementById(id);
  if (!el || total <= 1) { if(el) el.innerHTML=''; return; }
  let html = '';
  if (cur > 1) html += `<button class="btn btn-ghost btn-sm" onclick="(${cb})(${cur-1})">← Trước</button> `;
  html += `<span style="color:var(--sub);font-size:13px;margin:0 12px">Trang ${cur}/${total}</span>`;
  if (cur < total) html += ` <button class="btn btn-ghost btn-sm" onclick="(${cb})(${cur+1})">Tiếp →</button>`;
  el.innerHTML = html;
}

async function submitProposal(jobId) {
  if (!state.user) { toast('Vui lòng đăng nhập', 'error'); return; }
  const price = document.getElementById('prop-price')?.value;
  const days = document.getElementById('prop-days')?.value;
  const letter = document.getElementById('prop-letter')?.value;
  if (!price || !days) { toast('Vui lòng nhập giá và thời gian', 'error'); return; }
  try {
    await apiFetch(`/api/freelance/jobs/${jobId}/proposals`, { method:'POST', body: JSON.stringify({ price, delivery_days: days, cover_letter: letter }) });
    toast('📨 Đã gửi đề xuất thành công!');
    renderJobDetail();
  } catch(e) { toast(e.error||'Gửi thất bại', 'error'); }
}

async function acceptProposal(proposalId) {
  if (!confirm('Thuê freelancer này? Tiền sẽ bị khóa trong Escrow.')) return;
  try {
    const { contract } = await apiFetch(`/api/freelance/proposals/${proposalId}/accept`, { method:'PATCH' });
    toast('🎉 Đã thuê freelancer! Contract đã tạo.');
    showView('workspace', { activeContractId: contract.id });
  } catch(e) { toast(e.error||'Thất bại', 'error'); }
}

async function rejectProposal(proposalId) {
  try {
    await apiFetch(`/api/freelance/proposals/${proposalId}/reject`, { method:'PATCH' });
    toast('Đã từ chối đề xuất');
    renderJobDetail();
  } catch(e) { toast(e.error||'Thất bại', 'error'); }
}

function renderProfiles() {

    <div id="profiles-grid"><div class="loader"><div class="spin"></div><br>Đang tải...</div></div>
  </div>`;
  loadProfiles();

async function loadProfiles(category='', q='') {
  let url = `/api/freelance/profiles?limit=24`;
  if (category) url += `&category=${category}`;
  if (q) url += `&q=${encodeURIComponent(q)}`;
  try {
    const { profiles } = await apiFetch(url);
    const el = document.getElementById('profiles-grid');
    if (!el) return;
    if (!profiles.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><h3>Chưa có freelancer nào</h3></div>'; return; }
    el.innerHTML = `<div class="profile-grid">${profiles.map(profileCard).join('')}</div>`;
  } catch(e) { document.getElementById('profiles-grid').innerHTML = '<p style="color:var(--sub)">Không thể tải danh sách</p>'; }
}

let profileSearchTimer;
function searchFreelancers(val) {
  clearTimeout(profileSearchTimer);
  profileSearchTimer = setTimeout(() => loadProfiles('', val), 400);
}

function loadProfilesFilter(cat) {
  document.querySelectorAll('.cat-bar .cat-pill').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById(cat ? `pc-${cat}` : 'pc-all');
  if (el) el.classList.add('active');
  loadProfiles(cat);
}

function profileCard(p) {
  const user = p.users || {};

  return `<div class="profile-card" onclick="viewProfile('${user.id||p.user_id}')">
    <div class="profile-av">
      ${p.avatar_url ? `<img src="${escAttr(p.avatar_url)}" alt="${escAttr(p.display_name||'')}">` : initials}

    <div class="profile-name">${escHtml(p.display_name||user.name||'Freelancer')}${user.is_verified?' ✓':''}</div>

async function loadLeaderboard(by) {
  state.leaderboardBy = by;
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>{ if(el.textContent.includes(by==='rating'?'Đánh Giá':by==='projects'?'Số Dự Án':'Doanh Thu')) el.classList.add('active'); });
  try {
    const { leaderboard } = await apiFetch(`/api/freelance/leaderboard?by=${by}&limit=20`);
    const el = document.getElementById('lb-content');
    if (!el) return;
    if (!leaderboard.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div><h3>Chưa có dữ liệu</h3></div>'; return; }
    el.innerHTML = `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <table class="lb-table">
        <thead><tr>
          <th>#</th><th>Freelancer</th><th>Kỹ năng</th>
          <th>${by==='rating'?'Đánh Giá':by==='projects'?'Dự Án':'Doanh Thu'}</th>
          <th>Dự án</th><th></th>
        </tr></thead>
        <tbody>${leaderboard.map((p,i)=>{
          const user = p.users||{};
          const initials = (p.display_name||user.name||'F').slice(0,1).toUpperCase();
          const rankClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
          const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
          return `<tr style="cursor:pointer" onclick="viewProfile('${user.id||p.user_id}')">
            <td><div class="lb-rank ${rankClass}">${medal||`#${i+1}`}</div></td>
            <td><div class="lb-user">
              <div class="avatar" style="width:36px;height:36px;font-size:13px">${initials}</div>
              <div><div style="font-weight:700">${escHtml(p.display_name||user.name||'Freelancer')}${user.is_verified?' ✓':''}</div>
              <div style="font-size:11px;color:var(--sub)">${escHtml(p.tagline||p.category||'')}</div></div>
            </div></td>
            <td><div style="display:flex;flex-wrap:wrap;gap:4px">${(p.skills||[]).slice(0,2).map(s=>`<span class="skill-chip">${escHtml(s)}</span>`).join('')}</div></td>
            <td><strong>${by==='earned'?fmtVND(p.total_earned||0):by==='rating'?`⭐${p.avg_rating||'0.0'}`:(p.total_projects||0)+' dự án'}</strong></td>
            <td style="color:var(--sub)">${p.total_projects||0}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();viewProfile('${user.id||p.user_id}')">Xem →</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  } catch(e) { document.getElementById('lb-content').innerHTML = '<p style="color:var(--sub)">Không thể tải bảng xếp hạng</p>'; }
}

        ${!contracts.length?`<div style="font-size:13px;color:var(--sub);padding:12px 0">Chưa có dự án nào.<br>Hãy đặt một dịch vụ!</div>`:''}
        ${contracts.map(c=>{
          const other = c.client?.id === state.user.id ? c.freelancer : c.client;
          const statusColor = {active:'var(--brand)',completed:'var(--green)',disputed:'var(--red)',cancelled:'var(--sub)',pending:'var(--yellow)'}[c.status]||'var(--sub)';

        <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center" onclick="showView('browse')">🔍 Tìm Dịch Vụ</button>
        <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:8px" onclick="showView('my_gigs')">🎯 Gig Của Tôi</button>
        <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:8px" onclick="showView('my_profile')">👤 Hồ Sơ Freelancer</button>

    </div>
    <div class="ws-main" id="ws-main">
      ${!contracts.length?`<div class="empty" style="margin:auto">
        <div class="empty-icon">💼</div>
        <h3>Chưa có dự án nào</h3>
        <p>Đặt dịch vụ hoặc thuê freelancer để bắt đầu</p>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn btn-primary" onclick="showView('browse')">🔍 Tìm Dịch Vụ</button>
          <button class="btn btn-ghost" onclick="showView('jobs')">📋 Xem Job Board</button>
        </div>
      </div>`:'<div class="loader" style="margin:auto"><div class="spin"></div></div>'}

}

async function openContract(id) {
  state.activeContractId = id;
  const wsMain = document.getElementById('ws-main');
  if (!wsMain) return;
  wsMain.innerHTML = '<div class="loader" style="margin:40px auto"><div class="spin"></div><br>Đang tải workspace...</div>';
  // Refresh sidebar highlight
  document.querySelectorAll('.ws-sidebar [onclick]').forEach(el => {
    el.style.border = el.getAttribute('onclick').includes(id) ? '1px solid var(--brand)' : '1px solid var(--border)';
    el.style.background = el.getAttribute('onclick').includes(id) ? 'rgba(59,130,246,.08)' : 'transparent';
  });
  try {
    const { contract, milestones, messages, files, activities } = await apiFetch(`/api/freelance/contracts/${id}`);
    state.activeContract = { contract, milestones, messages, files, activities };
    renderContractWorkspace('chat');
  } catch(e) {
    wsMain.innerHTML = '<div class="empty" style="margin:auto"><div class="empty-icon">❌</div><h3>Không thể tải contract</h3></div>';
  }
}

function renderContractWorkspace(activeTab) {
  const { contract, milestones, messages, files, activities } = state.activeContract;
  const isClient = state.user.id === contract.client_id;
  const other = isClient ? contract.freelancer : contract.client;
  const wsMain = document.getElementById('ws-main');
  const statusColor = {active:'var(--brand)',completed:'var(--green)',disputed:'var(--red)',cancelled:'var(--sub)',pending:'var(--yellow)'}[contract.status]||'var(--sub)';
  const approvedMs = milestones.filter(m=>m.status==='approved').length;
  const msProgress = milestones.length ? Math.round(approvedMs/milestones.length*100) : 0;

  wsMain.innerHTML = `
  <div class="ws-header">
    <div style="flex:1">
      <div style="font-size:16px;font-weight:700">${escHtml(contract.title)}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:2px">${isClient?'Freelancer':'Client'}: ${escHtml(other?.name||'')} • <span style="color:${statusColor};font-weight:600">${contract.status.toUpperCase()}</span></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:15px;font-weight:700">${fmtVND(contract.total_amount)}</div>
      ${contract.deadline?`<div style="font-size:11px;color:var(--sub)">📅 ${contract.deadline}</div>`:''}
    </div>
  </div>
  ${milestones.length?`<div style="padding:10px 20px;background:var(--card2);border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:12px;font-weight:600;color:var(--sub)">TIẾN ĐỘ</span>
      <span style="font-size:12px;font-weight:700">${approvedMs}/${milestones.length} milestone</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${msProgress}%"></div></div>
  </div>`:''}
  <div class="ws-tabs">
    <button class="ws-tab ${activeTab==='chat'?'active':''}" onclick="renderContractWorkspace('chat')">💬 Chat</button>
    <button class="ws-tab ${activeTab==='milestones'?'active':''}" onclick="renderContractWorkspace('milestones')">📋 Milestones</button>
    <button class="ws-tab ${activeTab==='files'?'active':''}" onclick="renderContractWorkspace('files')">📁 Files</button>
    <button class="ws-tab ${activeTab==='timeline'?'active':''}" onclick="renderContractWorkspace('timeline')">📅 Timeline</button>
  </div>
  <div class="ws-body" id="ws-tab-body">
    ${activeTab==='chat'?renderChatTab(messages):activeTab==='milestones'?renderMilestonesTab(milestones,isClient,contract):activeTab==='files'?renderFilesTab(files,contract.id):renderTimelineTab(activities)}
  </div>
  ${activeTab==='chat'?`<div class="chat-input">
    <input id="chat-msg" placeholder="Nhắn tin..." onkeydown="if(event.key==='Enter')sendMsg('${contract.id}')">
    <button onclick="sendMsg('${contract.id}')">Gửi</button>
  </div>`:''}`;

  if (activeTab==='chat') {
    const msgs = document.getElementById('chat-msgs-list');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }
}

function renderChatTab(messages) {
  if (!messages.length) return '<div class="empty"><div class="empty-icon">💬</div><p>Bắt đầu cuộc trò chuyện!</p></div>';
  return `<div class="chat-msgs" id="chat-msgs-list" style="max-height:calc(100vh - 400px);overflow-y:auto;padding-bottom:8px">
    ${messages.map(m=>{
      const mine = m.sender_id === state.user?.id;
      return `<div class="msg ${mine?'mine':'other'}">
        ${!mine?`<div style="font-size:11px;color:var(--sub);margin-bottom:4px">${escHtml(m.sender_name||'')}</div>`:''}
        <div class="msg-bubble">${escHtml(m.text||'')}</div>
        <div class="msg-meta">${fmtTime(m.created_at)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

async function sendMsg(contractId) {
  const input = document.getElementById('chat-msg');
  const text = input?.value?.trim();
  if (!text) return;
  input.value = '';
  try {
    await apiFetch(`/api/freelance/contracts/${contractId}/messages`, { method:'POST', body: JSON.stringify({ text }) });
    // Refresh messages
    const { messages } = await apiFetch(`/api/freelance/contracts/${contractId}/messages`);
    state.activeContract.messages = messages;
    const body = document.getElementById('ws-tab-body');
    if (body) { body.innerHTML = renderChatTab(messages); const el = document.getElementById('chat-msgs-list'); if(el) el.scrollTop=el.scrollHeight; }
  } catch(e) { toast(e.error||'Gửi thất bại','error'); }
}

function renderMilestonesTab(milestones, isClient, contract) {
  const canAddMs = contract.status === 'active';
  return `
  <div>
    ${canAddMs?`<button class="btn btn-primary btn-sm" style="margin-bottom:16px" onclick="showAddMilestone('${contract.id}')">+ Thêm Milestone</button>`:''}
    ${!milestones.length?`<div class="empty"><div class="empty-icon">📋</div><p>Chưa có milestone nào. Thêm để quản lý tiến độ!</p></div>`:''}
    ${milestones.map(ms=>{
      const statusColors = {pending:'var(--sub)',in_progress:'var(--brand)',submitted:'var(--yellow)',approved:'var(--green)',rejected:'var(--red)'};
      const statusLabels = {pending:'Chờ bắt đầu',in_progress:'Đang làm',submitted:'Đã nộp',approved:'✓ Đã duyệt',rejected:'✕ Từ chối'};
      return `<div class="milestone-item">
        <div class="milestone-header">
          <div class="ms-dot ${ms.status}"></div>
          <div style="flex:1"><div style="font-weight:700">${escHtml(ms.title)}</div>
          ${ms.description?`<div style="font-size:12px;color:var(--sub);margin-top:2px">${escHtml(ms.description)}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:700">${fmtVND(ms.amount)}</div>
            ${ms.due_date?`<div style="font-size:11px;color:var(--sub)">📅 ${ms.due_date}</div>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;font-weight:600;color:${statusColors[ms.status]||'var(--sub)'}">${statusLabels[ms.status]||ms.status}</span>
          <div class="milestone-actions">
            ${!isClient && ms.status==='in_progress'?`<button class="btn btn-primary btn-sm" onclick="submitMilestone('${ms.id}')">📤 Nộp Bài</button>`:''}
            ${!isClient && ms.status==='pending'?`<button class="btn btn-ghost btn-sm" onclick="submitMilestone('${ms.id}')">🚀 Bắt Đầu & Nộp</button>`:''}
            ${isClient && ms.status==='submitted'?`<button class="btn btn-green btn-sm" onclick="approveMilestone('${ms.id}')">✓ Duyệt</button>`:''}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderFilesTab(files, contractId) {
  return `<div>
    <div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--sub);margin-bottom:8px">Upload file (URL)</div>
      <div style="display:flex;gap:8px">
        <input id="file-name" placeholder="Tên file" style="max-width:180px">
        <input id="file-url" placeholder="URL link to file" style="flex:1">
        <button class="btn btn-primary btn-sm" onclick="addFile('${contractId}')">Upload</button>
      </div>
    </div>
    ${!files.length?`<div class="empty"><div class="empty-icon">📁</div><p>Chưa có file nào</p></div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px">
      ${files.map(f=>`<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;align-items:center;gap:12px">
        <span style="font-size:24px">📄</span>
        <div style="flex:1"><div style="font-weight:600;font-size:13px">${escHtml(f.file_name)}</div>
        <div style="font-size:11px;color:var(--sub)">${escHtml(f.uploader_name||'')} • ${fmtDate(f.created_at)}</div></div>
        <a href="${escAttr(f.file_url)}" target="_blank" class="btn btn-ghost btn-sm">↗ Mở</a>
      </div>`).join('')}
    </div>
  </div>`;
}

async function addFile(contractId) {
  const name = document.getElementById('file-name')?.value?.trim();
  const url = document.getElementById('file-url')?.value?.trim();
  if (!name || !url) { toast('Nhập tên và URL file', 'error'); return; }
  try {
    await apiFetch(`/api/freelance/contracts/${contractId}/files`, {
      method:'POST', body: JSON.stringify({ file_name: name, file_url: url })
    });
    toast('✅ Đã thêm file');
    const { contract: c, milestones, messages, files, activities } = await apiFetch(`/api/freelance/contracts/${contractId}`);
    state.activeContract = { contract: c, milestones, messages, files, activities };
    renderContractWorkspace('files');
  } catch(e) { toast(e.error||'Thêm file thất bại','error'); }
}

function renderTimelineTab(activities) {
  const icons = { contract_started:'🚀',milestone_created:'📋',milestone_submitted:'📤',milestone_approved:'✅',contract_completed:'🎉',fl_msg:'💬' };
  if (!activities.length) return '<div class="empty"><div class="empty-icon">📅</div><p>Chưa có hoạt động nào</p></div>';
  return `<div>${activities.map(a=>`<div class="activity-item">
    <div class="activity-icon">${icons[a.action]||'📌'}</div>
    <div><div class="activity-text"><strong>${escHtml(a.actor_name||'')}</strong> ${escHtml(a.detail||a.action)}</div>
    <div class="activity-time">${fmtDateTime(a.created_at)}</div></div>
  </div>`).join('')}</div>`;
}

async function submitMilestone(msId) {
  try {
    await apiFetch(`/api/freelance/milestones/${msId}/submit`, { method:'PATCH' });
    toast('📤 Đã nộp milestone!');
    const { contract, milestones, messages, files, activities } = await apiFetch(`/api/freelance/contracts/${state.activeContractId}`);
    state.activeContract = { contract, milestones, messages, files, activities };
    renderContractWorkspace('milestones');
  } catch(e) { toast(e.error||'Thất bại','error'); }
}

async function approveMilestone(msId) {
  if (!confirm('Xác nhận duyệt milestone này? Tiền sẽ được giải ngân cho freelancer khi hoàn tất.')) return;
  try {
    const { contract_completed } = await apiFetch(`/api/freelance/milestones/${msId}/approve`, { method:'PATCH' });
    toast(contract_completed ? '🎉 Dự án hoàn tất! Đã giải ngân cho freelancer.' : '✅ Đã duyệt milestone!');
    const data = await apiFetch(`/api/freelance/contracts/${state.activeContractId}`);
    state.activeContract = data;
    renderContractWorkspace('milestones');
    // Refresh sidebar
    const { contracts } = await apiFetch('/api/freelance/contracts?role=all');
    state.contracts = contracts;
  } catch(e) { toast(e.error||'Thất bại','error'); }
}

function showAddMilestone(contractId) {
  showModal('Thêm Milestone', `
    <div class="form-group"><div class="form-label">Tiêu đề *</div><input id="ms-title" placeholder="VD: Thiết kế mockup"></div>
    <div class="form-group"><div class="form-label">Mô tả</div><textarea id="ms-desc" rows="3" placeholder="Chi tiết milestone..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Giá trị (đ) *</div><input type="number" id="ms-amount" placeholder="500000"></div>
      <div class="form-group"><div class="form-label">Deadline</div><input type="date" id="ms-due"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeAllModals()">Hủy</button>
     <button class="btn btn-primary" onclick="createMilestone('${contractId}')">+ Tạo Milestone</button>`
  );
}

async function createMilestone(contractId) {
  const title = document.getElementById('ms-title')?.value?.trim();
  const desc = document.getElementById('ms-desc')?.value?.trim();
  const amount = document.getElementById('ms-amount')?.value;
  const due = document.getElementById('ms-due')?.value;
  if (!title || !amount) { toast('Nhập tiêu đề và giá trị', 'error'); return; }
  try {
    await apiFetch(`/api/freelance/contracts/${contractId}/milestones`, { method:'POST', body: JSON.stringify({ title, description: desc, amount, due_date: due }) });
    toast('✅ Đã tạo milestone!');
    closeAllModals();
    const data = await apiFetch(`/api/freelance/contracts/${contractId}`);
    state.activeContract = data;
    renderContractWorkspace('milestones');
  } catch(e) { toast(e.error||'Thất bại','error'); }
}

async function renderMyGigs() {
  if (!state.user) { showView('browse'); return; }

    const { gigs } = await apiFetch('/api/freelance/gigs/mine');
    document.getElementById('app').innerHTML = `
    <div class="container" style="padding-top:28px;padding-bottom:48px">
      <div style="background:var(--card);border-bottom:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
        <button class="back-link" onclick="showView('workspace')">← Workspace</button>
      </div>
      <div class="sec-head">
        <h2>🎯 Gig Của Tôi</h2>
        <button class="btn btn-primary" onclick="showPostGig()">+ Đăng Gig Mới</button>
      </div>
      ${!gigs.length?`<div class="empty"><div class="empty-icon">🎯</div><h3>Chưa có gig nào</h3><p>Tạo gig đầu tiên để bắt đầu nhận đơn hàng!</p><button class="btn btn-primary" onclick="showPostGig()">+ Đăng Gig</button></div>`:`<div class="gig-grid">${gigs.map(g=>`<div class="gig-card">

          <div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px">

            <button class="btn btn-red btn-sm" onclick="pauseGig('${g.id}','${g.status}')">
              ${g.status==='active'?'⏸ Tạm dừng':'▶ Bật lại'}
            </button>
          </div>
        </div>`).join('')}</div>`}

async function pauseGig(id, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'paused' : 'active';
  try {
    await apiFetch(`/api/freelance/gigs/${id}`, { method:'PATCH', body: JSON.stringify({ status: newStatus }) });
    toast(newStatus==='active'?'▶ Gig đã bật lại':'⏸ Gig đã tạm dừng');
    renderMyGigs();
  } catch(e) { toast(e.error||'Thất bại','error'); }
}

  } catch(e) { document.getElementById('app').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><h3>Lỗi tải profile</h3></div>'; }
}

async function saveProfile() {
  const skills = document.getElementById('prof-skills')?.value.split(',').map(s=>s.trim()).filter(Boolean);
  const payload = {
    display_name: document.getElementById('prof-name')?.value,
    tagline: document.getElementById('prof-tag')?.value,
    bio: document.getElementById('prof-bio')?.value,
    category: document.getElementById('prof-cat')?.value,
    experience_years: document.getElementById('prof-exp')?.value,
    country: document.getElementById('prof-country')?.value,
    language: document.getElementById('prof-lang')?.value,
    hourly_rate: document.getElementById('prof-rate')?.value,
    portfolio_url: document.getElementById('prof-portfolio')?.value,
    avatar_url: document.getElementById('prof-avatar')?.value,
    skills,
    is_available: document.getElementById('prof-available')?.checked
  };
  try {
    await apiFetch('/api/freelance/profiles/me', { method:'PUT', body: JSON.stringify(payload) });
    toast('✅ Hồ sơ đã được cập nhật!');
    showView('workspace');
  } catch(e) { toast(e.error||'Lưu thất bại','error'); }
}

async function createGig() {
  const title = document.getElementById('pg-title')?.value?.trim();
  const category = document.getElementById('pg-cat')?.value;
  const price = document.getElementById('pg-price')?.value;
  const days = document.getElementById('pg-days')?.value;
  if (!title || !price || !days) { toast('Nhập đầy đủ thông tin bắt buộc', 'error'); return; }
  const tags = document.getElementById('pg-tags')?.value.split(',').map(s=>s.trim()).filter(Boolean);
  try {
    await apiFetch('/api/freelance/gigs', { method:'POST', body: JSON.stringify({
      title, category, subcategory: document.getElementById('pg-subcat')?.value,
      description: document.getElementById('pg-desc')?.value,
      price: parseInt(price), delivery_days: parseInt(days),
      revisions: parseInt(document.getElementById('pg-revs')?.value)||1,
      image_url: document.getElementById('pg-img')?.value || null,
      tags
    })});

    closeAllModals();
    showView('my_gigs');
  } catch(e) { toast(e.error||'Đăng thất bại','error'); }
}

// ═══════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════
function showModal(title, body, footer = '') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const ft = document.getElementById('modal-footer');
  if (footer) { ft.innerHTML = footer; ft.style.display = 'flex'; }
  else { ft.style.display = 'none'; }
  document.getElementById('modal-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeAllModals() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeAllModals();
}

function fmtVND(n) {
  if (!n && n !== 0) return '0đ';
  return Number(n).toLocaleString('vi-VN') + 'đ';
}

function fmtDate(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('vi-VN');
}

function fmtDateTime(str) {
  if (!str) return '';
  return new Date(str).toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function fmtTime(str) {
  if (!str) return '';
  return new Date(str).toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' });
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) { return escHtml(s); }

function renderStars(rating) {
  const r = Math.round(rating * 2) / 2;
  const full = Math.floor(r);
  const half = r % 1 !== 0;
  const empty = 5 - full - (half ? 1 : 0);
  return `<span class="rating-stars">${'★'.repeat(full)}${half?'⯨':''}${'☆'.repeat(empty)}</span>`;
}

async function init() {
  // Load token from URL hash (e.g., /freelance#contract-xxx)
  const hash = window.location.hash;
  if (hash.startsWith('#contract-')) {
    const cid = hash.replace('#contract-','');
    state.view = 'workspace';
    state.activeContractId = cid;
  }
  await loadUser();
  // Load categories
  try {
    const { categories } = await apiFetch('/api/freelance/categories');
    state.categories = categories || [];
  } catch(e) {}
  render();
}
