<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SafePass Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#06090f;--card:#0d1220;--card2:#101828;
  --brand:#3d8ef8;--brand2:#9b87f5;--ok:#22d38e;--warn:#f5a623;--red:#f05068;
  --text:#e8edf8;--sub:#7b8fad;--hint:#3d4f6a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
html,body{height:100%;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);overflow-x:hidden;}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,9,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.topbar-logo{font-size:18px;font-weight:900;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;}
.topbar-logo .sp-badge{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.04em;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.icon-btn{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{background:rgba(255,255,255,.07);color:var(--text);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;padding:4px 0;font-family:inherit;}
.back-btn:hover{color:var(--text);}

/* ── STORY RINGS (horizontal scroll) ── */
.rings-wrap{padding:16px 0 8px;background:var(--bg);border-bottom:1px solid var(--border);overflow:hidden;}
.rings-scroll{display:flex;gap:12px;padding:0 16px;overflow-x:auto;scrollbar-width:none;}
.rings-scroll::-webkit-scrollbar{display:none;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;min-width:64px;}
.ring-avatar{width:64px;height:64px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;}
.ring-avatar::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2),var(--ok));z-index:0;}
.ring-avatar.viewed::before{background:var(--hint);}
.ring-avatar.is-own::before{background:linear-gradient(135deg,var(--ok),var(--brand));}
.ring-avatar-inner{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#1a2a4a,#0d1a36);display:flex;align-items:center;justify-content:center;font-size:22px;z-index:1;position:relative;border:3px solid var(--bg);overflow:hidden;}
.ring-add{width:64px;height:64px;border-radius:50%;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--brand);cursor:pointer;background:var(--card);transition:all .2s;flex-shrink:0;}
.ring-add:hover{border-color:var(--brand);background:rgba(61,142,248,.07);}
.ring-label{font-size:11px;font-weight:600;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;text-align:center;}
.ring-label.unseen{color:var(--text);}

/* ── STORY COUNT BADGE ── */
.ring-count{position:absolute;bottom:0;right:0;z-index:2;background:var(--brand);color:#fff;font-size:9px;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}

/* ── STORY VIEWER (fullscreen) ── */
.viewer-overlay{position:fixed;inset:0;z-index:500;background:#000;display:none;flex-direction:column;}
.viewer-overlay.show{display:flex;}
.viewer-progress-bar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;gap:3px;padding:10px 12px 0;}
.progress-seg{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:#fff;border-radius:3px;width:0%;transition:none;}
.viewer-top{position:absolute;top:0;left:0;right:0;z-index:9;padding:52px 14px 14px;display:flex;align-items:center;gap:10px;background:linear-gradient(to bottom,rgba(0,0,0,.8) 0%,transparent 100%);}
.v-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;border:2px solid rgba(255,255,255,.4);}
.v-info{flex:1;min-width:0;}
.v-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.v-time{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.v-follow-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.v-follow-btn.following{background:rgba(61,142,248,.3);border-color:var(--brand);}
.v-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;flex-shrink:0;opacity:.8;}

/* Story content */
.story-canvas{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.story-bg{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.story-bg-color{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.story-emoji-big{font-size:90px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.4));}
.story-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.2) 40%,transparent 100%);}

/* Story bottom content */
.story-bottom{position:absolute;bottom:0;left:0;right:0;z-index:9;padding:16px 16px 100px;}
.story-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.04em;}
.badge-product{background:rgba(61,142,248,.25);color:#7eb8ff;border:1px solid rgba(61,142,248,.4);}
.badge-flash_sale{background:rgba(240,80,104,.25);color:#ff8fa3;border:1px solid rgba(240,80,104,.4);}
.badge-promo{background:rgba(245,166,35,.2);color:#ffc84a;border:1px solid rgba(245,166,35,.3);}
.badge-announcement{background:rgba(155,135,245,.2);color:#c2b4ff;border:1px solid rgba(155,135,245,.3);}
.story-caption{font-size:17px;font-weight:700;color:#fff;line-height:1.45;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.6);}
.story-price-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.story-price{font-size:22px;font-weight:900;color:var(--ok);text-shadow:0 2px 8px rgba(0,0,0,.4);}
.story-orig-price{font-size:14px;color:rgba(255,255,255,.5);text-decoration:line-through;}
.story-discount{background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;}
.story-cta{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:14px;font-weight:800;padding:12px 22px;border-radius:12px;border:none;cursor:pointer;width:100%;justify-content:center;box-shadow:0 4px 16px rgba(61,142,248,.3);}

/* Story action bar */
.story-actions{position:absolute;bottom:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-around;padding:16px 24px 28px;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);}
.s-action{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;color:#fff;font-family:inherit;}
.s-action-icon{font-size:26px;line-height:1;transition:transform .15s;}
.s-action:active .s-action-icon{transform:scale(.88);}
.s-action-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);}
.s-action.liked .s-action-icon{filter:drop-shadow(0 0 8px rgba(240,80,104,.8));}

/* Tap zones for navigation */
.tap-left{position:absolute;left:0;top:0;width:35%;height:100%;z-index:8;cursor:pointer;}
.tap-right{position:absolute;right:0;top:0;width:35%;height:100%;z-index:8;cursor:pointer;}

/* ── MAIN FEED (non-viewer) ── */
.page-wrap{max-width:640px;margin:0 auto;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px;}
.section-title{font-size:16px;font-weight:800;color:var(--text);}
.section-link{font-size:13px;font-weight:600;color:var(--brand);cursor:pointer;background:none;border:none;font-family:inherit;}

/* Story cards grid */
.story-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 16px;}
.story-card{border-radius:14px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:.6;background:var(--card);transition:transform .2s;}
.story-card:hover{transform:scale(1.02);}
.sc-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;}
.sc-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.15) 55%,transparent 100%);}
.sc-top{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:center;gap:6px;}
.sc-avatar-sm{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.sc-author{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-shadow:0 1px 4px rgba(0,0,0,.8);}
.sc-bottom{position:absolute;bottom:0;left:0;right:0;padding:8px 10px 12px;}
.sc-type{display:inline-flex;align-items:center;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;margin-bottom:5px;letter-spacing:.04em;}
.sc-caption{font-size:12px;font-weight:700;color:#fff;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.sc-price{font-size:14px;font-weight:900;color:var(--ok);margin-top:4px;}
.sc-expire{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:rgba(255,255,255,.8);font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;}
.sc-unseen-ring{position:absolute;inset:0;border-radius:14px;box-shadow:inset 0 0 0 2px var(--brand);pointer-events:none;}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:14px;text-align:center;}
.empty-icon{font-size:56px;line-height:1;}
.empty-title{font-size:18px;font-weight:800;color:var(--text);}
.empty-sub{font-size:14px;color:var(--sub);line-height:1.6;max-width:300px;}

/* ── CREATE STORY MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:640px;padding:0 0 32px;max-height:92vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.22,.61,.36,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto 18px;}
.modal-title{font-size:17px;font-weight:800;text-align:center;margin-bottom:20px;color:var(--text);}
.form-group{padding:0 16px;margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;display:block;letter-spacing:.04em;text-transform:uppercase;}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brand);}
.form-select option{background:#101828;color:var(--text);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:14px;}
.type-card{border:2px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .2s;text-align:center;}
.type-card.selected{border-color:var(--brand);background:rgba(61,142,248,.08);}
.type-card-icon{font-size:24px;margin-bottom:4px;}
.type-card-label{font-size:12px;font-weight:700;color:var(--sub);}
.type-card.selected .type-card-label{color:var(--brand);}

/* BG color picker */
.bg-grid{display:flex;gap:8px;padding:0 16px;flex-wrap:wrap;margin-bottom:14px;}
.bg-swatch{width:36px;height:36px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.bg-swatch.selected{border-color:#fff;transform:scale(1.1);}

/* Emoji picker (simplified) */
.emoji-grid{display:flex;gap:8px;padding:0 16px;flex-wrap:wrap;margin-bottom:14px;}
.emoji-opt{font-size:28px;cursor:pointer;padding:4px;border-radius:8px;transition:all .15s;border:2px solid transparent;}
.emoji-opt.selected{border-color:var(--brand);background:rgba(61,142,248,.1);}

.modal-actions{display:flex;gap:10px;padding:16px 16px 0;}
.btn-primary{flex:1;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:15px;font-weight:800;padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;transition:opacity .2s;}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--sub);font-size:15px;font-weight:700;padding:14px 20px;border-radius:12px;border:1px solid var(--border2);cursor:pointer;font-family:inherit;}

/* ── SELLERS LIST ── */
.sellers-wrap{padding:0 12px 16px;}
.seller-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);}
.seller-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.seller-info{flex:1;min-width:0;}
.seller-name{font-size:14px;font-weight:700;color:var(--text);}
.seller-sub{font-size:12px;color:var(--sub);margin-top:2px;}
.follow-btn{background:rgba(61,142,248,.12);border:1px solid rgba(61,142,248,.3);color:var(--brand);font-size:12px;font-weight:700;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;}
.follow-btn.following{background:rgba(255,255,255,.07);border-color:var(--border2);color:var(--sub);}

/* ── TABS ── */
.tabs{display:flex;gap:0;padding:0 12px;margin-bottom:4px;border-bottom:1px solid var(--border);}
.tab-btn{flex:1;background:none;border:none;color:var(--sub);font-size:13px;font-weight:700;padding:12px 8px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand);}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.toast{background:#1a2a4a;color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);opacity:0;transform:translateY(8px);transition:all .25s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-color:rgba(34,211,142,.3);background:rgba(34,211,142,.15);}
.toast.err{border-color:rgba(240,80,104,.3);background:rgba(240,80,104,.15);}

/* ── LOADING ── */
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
@keyframes spin{to{rotate:360deg;}}

/* Login prompt */
.login-prompt{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 24px;text-align:center;}
.btn-login{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:14px;font-weight:800;padding:13px 28px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo">
    <button class="back-btn" onclick="history.back()">← </button>
    SafePass <span class="sp-badge">STORIES</span>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" title="Khám phá người bán" onclick="showTab('sellers')">🔍</button>
    <button class="icon-btn" title="Đăng story mới" onclick="openCreateModal()" id="create-btn" style="display:none;">＋</button>
  </div>
</div>

<div class="page-wrap">

  <!-- Story Rings -->
  <div class="rings-wrap" id="rings-section" style="display:none;">
    <div class="rings-scroll" id="rings-scroll"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-feed" onclick="showTab('feed')">📖 Feed</button>
    <button class="tab-btn" id="tab-mine" onclick="showTab('mine')">⭐ Của tôi</button>
    <button class="tab-btn" id="tab-sellers" onclick="showTab('sellers')">👥 Khám phá</button>
  </div>

  <!-- Content -->
  <div id="tab-content"></div>

</div>

<!-- ── STORY VIEWER ── -->
<div class="viewer-overlay" id="story-viewer">
  <div class="viewer-progress-bar" id="viewer-progress"></div>

  <!-- Top info -->
  <div class="viewer-top">
    <div class="v-avatar" id="v-avatar">👤</div>
    <div class="v-info">
      <div class="v-name" id="v-name">Người dùng</div>
      <div class="v-time" id="v-time">vừa xong</div>
    </div>
    <button class="v-follow-btn" id="v-follow-btn" onclick="toggleFollowCurrent()" style="display:none;">+ Theo dõi</button>
    <button class="v-close" onclick="closeViewer()">✕</button>
  </div>

  <!-- Story canvas -->
  <div class="story-canvas" id="story-canvas">
    <div class="story-bg-color" id="story-bg-color">
      <div class="story-emoji-big" id="story-emoji-big">🎫</div>
    </div>
    <div class="story-gradient"></div>
  </div>

  <!-- Tap zones -->
  <div class="tap-left" onclick="prevStory()"></div>
  <div class="tap-right" onclick="nextStory()"></div>

  <!-- Bottom info -->
  <div class="story-bottom" id="story-bottom"></div>

  <!-- Action bar -->
  <div class="story-actions">
    <button class="s-action" id="s-like-btn" onclick="likeCurrentStory()">
      <span class="s-action-icon" id="s-like-icon">🤍</span>
      <span class="s-action-label" id="s-like-count">0</span>
    </button>
    <button class="s-action" onclick="shareStory()">
      <span class="s-action-icon">↗️</span>
      <span class="s-action-label">Chia sẻ</span>
    </button>
    <button class="s-action" id="s-delete-btn" onclick="deleteCurrentStory()" style="display:none;">
      <span class="s-action-icon">🗑️</span>
      <span class="s-action-label">Xóa</span>
    </button>
  </div>
</div>

<!-- ── CREATE STORY MODAL ── -->
<div class="modal-overlay" id="create-modal" onclick="if(event.target===this)closeCreateModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📸 Tạo Story Mới</div>

    <!-- Type -->
    <div style="padding:0 16px 6px;"><span class="form-label">Loại story</span></div>
    <div class="type-grid">
      <div class="type-card selected" onclick="selectType('promo')" id="type-promo">
        <div class="type-card-icon">📢</div>
        <div class="type-card-label">Quảng cáo</div>
      </div>
      <div class="type-card" onclick="selectType('product')" id="type-product">
        <div class="type-card-icon">🛍️</div>
        <div class="type-card-label">Sản phẩm</div>
      </div>
      <div class="type-card" onclick="selectType('flash_sale')" id="type-flash_sale">
        <div class="type-card-icon">⚡</div>
        <div class="type-card-label">Flash Sale</div>
      </div>
      <div class="type-card" onclick="selectType('announcement')" id="type-announcement">
        <div class="type-card-icon">📣</div>
        <div class="type-card-label">Thông báo</div>
      </div>
    </div>

    <!-- Caption -->
    <div class="form-group">
      <label class="form-label">Nội dung *</label>
      <textarea class="form-textarea" id="c-caption" placeholder="Nhập nội dung story của bạn..."></textarea>
    </div>

    <!-- Price (conditional) -->
    <div id="price-fields">
      <div class="form-group">
        <label class="form-label">Giá bán (₫)</label>
        <input class="form-input" type="number" id="c-price" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Giá gốc (₫) — để tính % giảm</label>
        <input class="form-input" type="number" id="c-orig-price" placeholder="0">
      </div>
    </div>

    <!-- CTA -->
    <div class="form-group">
      <label class="form-label">Nhãn nút gọi hành động</label>
      <input class="form-input" id="c-cta-label" placeholder="Mua ngay, Xem thêm...">
    </div>
    <div class="form-group">
      <label class="form-label">Link liên kết (URL)</label>
      <input class="form-input" id="c-cta-url" placeholder="https://...">
    </div>

    <!-- Background -->
    <div class="form-group"><span class="form-label">Màu nền</span></div>
    <div class="bg-grid">
      <div class="bg-swatch selected" style="background:linear-gradient(135deg,#1a2a4a,#0d1a36)" data-color="#1a2a4a" onclick="selectBg(this,'#1a2a4a')"></div>
      <div class="bg-swatch" style="background:linear-gradient(135deg,#1a0a2e,#2d0a4e)" data-color="#1a0a2e" onclick="selectBg(this,'#1a0a2e')"></div>
      <div class="bg-swatch" style="background:linear-gradient(135deg,#0a1f0a,#0d2e0d)" data-color="#0a1f0a" onclick="selectBg(this,'#0a1f0a')"></div>
      <div class="bg-swatch" style="background:linear-gradient(135deg,#2e0a0a,#4a0d0d)" data-color="#2e0a0a" onclick="selectBg(this,'#2e0a0a')"></div>
      <div class="bg-swatch" style="background:linear-gradient(135deg,#1a1a00,#2e2e00)" data-color="#1a1a00" onclick="selectBg(this,'#1a1a00')"></div>
      <div class="bg-swatch" style="background:linear-gradient(135deg,#0a2e2e,#0d3e3e)" data-color="#0a2e2e" onclick="selectBg(this,'#0a2e2e')"></div>
      <div class="bg-swatch" style="background:linear-gradient(135deg,#1e0a2e,#2e1040)" data-color="#1e0a2e" onclick="selectBg(this,'#1e0a2e')"></div>
      <div class="bg-swatch" style="background:linear-gradient(135deg,#000000,#111111)" data-color="#000000" onclick="selectBg(this,'#000000')"></div>
    </div>

    <!-- Emoji -->
    <div class="form-group"><span class="form-label">Emoji đại diện</span></div>
    <div class="emoji-grid">
      <span class="emoji-opt selected" onclick="selectEmoji(this,'🎫')" data-e="🎫">🎫</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'🛍️')" data-e="🛍️">🛍️</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'⚡')" data-e="⚡">⚡</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'🎁')" data-e="🎁">🎁</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'🏷️')" data-e="🏷️">🏷️</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'🔥')" data-e="🔥">🔥</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'💎')" data-e="💎">💎</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'🎶')" data-e="🎶">🎶</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'⭐')" data-e="⭐">⭐</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'🎉')" data-e="🎉">🎉</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'💰')" data-e="💰">💰</span>
      <span class="emoji-opt" onclick="selectEmoji(this,'📣')" data-e="📣">📣</span>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCreateModal()">Hủy</button>
      <button class="btn-primary" onclick="submitCreateStory()">🚀 Đăng Story</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
const API = '/api';
const token = localStorage.getItem('safepass_token');
let currentUser = null;

// State
let feedGroups = [];
let viewerState = { groupIdx: 0, storyIdx: 0, timer: null, paused: false };
let createForm = { type: 'promo', bg_color: '#1a2a4a', emoji: '🎫' };
let currentTab = 'feed';

// ── AUTH ──
async function init() {
  if (token) {
    try {
      const r = await fetch(API + '/users/me', { headers: { Authorization: 'Bearer ' + token } });
      if (r.ok) {
        currentUser = await r.json();
        document.getElementById('create-btn').style.display = 'flex';
      }
    } catch(e) {}
  }
  loadFeed();
}

function getHeaders() {
  return { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token };
}

// ── TABS ──
function showTab(tab) {
  currentTab = tab;
  ['feed','mine','sellers'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'feed') loadFeed();
  else if (tab === 'mine') loadMine();
  else if (tab === 'sellers') loadSellers();
}

// ── FEED ──
async function loadFeed() {
  if (!token) {
    renderLoginPrompt();
    return;
  }
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(API + '/stories/feed', { headers: getHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Lỗi');
    feedGroups = d.groups || [];
    renderRings();
    renderFeedGrid();
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Không tải được</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

function renderRings() {
  const sec = document.getElementById('rings-section');
  const scroll = document.getElementById('rings-scroll');
  if (!feedGroups.length) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  let html = '';
  // Add own "create" ring first (if not in groups yet)
  const hasOwnGroup = feedGroups.some(g => g.is_own);
  if (!hasOwnGroup && currentUser) {
    html += `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;min-width:64px;" onclick="openCreateModal()">
      <div class="ring-add">＋</div>
      <span class="ring-label">Đăng story</span>
    </div>`;
  }
  feedGroups.forEach((g, gi) => {
    const initials = (g.author_name || '?').charAt(0).toUpperCase();
    const unseen = g.has_unseen;
    html += `<div class="ring-item" onclick="openViewer(${gi},0)">
      <div class="ring-avatar ${!unseen?'viewed':''} ${g.is_own?'is-own':''}">
        <div class="ring-avatar-inner">${initials}</div>
        ${g.stories.length > 1 ? `<div class="ring-count">${g.stories.length}</div>` : ''}
      </div>
      <span class="ring-label ${unseen?'unseen':''}">${g.is_own?'Story của tôi':g.author_name}</span>
    </div>`;
  });
  scroll.innerHTML = html;
}

function renderFeedGrid() {
  const el = document.getElementById('tab-content');
  if (!feedGroups.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📸</div>
      <div class="empty-title">Chưa có story nào</div>
      <div class="empty-sub">Theo dõi người bán để xem story flash sale và khuyến mãi của họ.</div>
      <button class="btn-login" onclick="showTab('sellers')">🔍 Khám phá người bán</button>
    </div>`;
    return;
  }
  // Flatten all stories for grid display
  const allStories = feedGroups.flatMap((g, gi) => g.stories.map((s, si) => ({ ...s, groupIdx: gi, storyIdx: si })));
  let html = '<div class="section-header"><span class="section-title">🔥 Story đang hoạt động</span><span class="section-link" onclick="loadFeed()">Làm mới</span></div>';
  html += '<div class="story-grid">';
  allStories.forEach(s => {
    const badge = typeLabel(s.type);
    const timeLeft = formatTimeLeft(s.time_left_sec);
    html += `<div class="story-card" onclick="openViewer(${s.groupIdx},${s.storyIdx})">
      <div class="sc-bg" style="background:linear-gradient(135deg,${s.bg_color||'#1a2a4a'},${darken(s.bg_color||'#1a2a4a')});">${s.emoji||'🎫'}</div>
      <div class="sc-overlay"></div>
      ${!s.is_viewed ? '<div class="sc-unseen-ring"></div>' : ''}
      <div class="sc-top">
        <div class="sc-avatar-sm">${(s.author_name||'?').charAt(0).toUpperCase()}</div>
        <span class="sc-author">${escHtml(s.author_name)}</span>
      </div>
      <div class="sc-expire">⏰ ${timeLeft}</div>
      <div class="sc-bottom">
        <div class="sc-type ${badge.cls}">${badge.icon} ${badge.label}</div>
        <div class="sc-caption">${escHtml(s.caption||'')}</div>
        ${s.price ? `<div class="sc-price">${fmtPrice(s.price)}</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── MY STORIES ──
async function loadMine() {
  if (!token) { renderLoginPrompt(); return; }
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(API + '/stories/mine', { headers: getHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    renderMineGrid(d.stories || []);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Lỗi</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

function renderMineGrid(stories) {
  const el = document.getElementById('tab-content');
  if (!stories.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📸</div>
      <div class="empty-title">Bạn chưa có story nào</div>
      <div class="empty-sub">Đăng story để quảng bá sản phẩm, flash sale đến người theo dõi bạn.</div>
      <button class="btn-login" onclick="openCreateModal()">＋ Tạo story ngay</button>
    </div>`;
    return;
  }
  let html = `<div class="section-header"><span class="section-title">Story của tôi (${stories.length})</span><button class="btn-primary" style="padding:7px 14px;font-size:13px;border-radius:8px;" onclick="openCreateModal()">＋ Tạo mới</button></div>`;
  html += '<div class="story-grid">';
  stories.forEach((s, idx) => {
    const badge = typeLabel(s.type);
    const timeLeft = formatTimeLeft(Math.max(0, Math.floor((new Date(s.expires_at) - new Date()) / 1000)));
    html += `<div class="story-card" onclick="openMineViewer(${idx})">
      <div class="sc-bg" style="background:linear-gradient(135deg,${s.bg_color||'#1a2a4a'},${darken(s.bg_color||'#1a2a4a')});">${s.emoji||'🎫'}</div>
      <div class="sc-overlay"></div>
      <div class="sc-expire">⏰ ${timeLeft}</div>
      <div class="sc-top">
        <div class="sc-avatar-sm">⭐</div>
        <span class="sc-author">Tôi</span>
      </div>
      <div class="sc-bottom">
        <div class="sc-type ${badge.cls}">${badge.icon} ${badge.label}</div>
        <div class="sc-caption">${escHtml(s.caption||'')}</div>
        ${s.price ? `<div class="sc-price">${fmtPrice(s.price)}</div>` : ''}
      </div>
      <div style="position:absolute;top:8px;right:8px;display:flex;gap:4px;font-size:10px;color:rgba(255,255,255,.7);">
        <span>👁 ${s.views_count}</span> <span>❤️ ${s.likes_count}</span>
      </div>
    </div>`;
  });
  html += '</div>';
  // Store mine stories for viewer
  window._mineStories = stories;
  el.innerHTML = html;
}

function openMineViewer(idx) {
  const stories = window._mineStories || [];
  if (!stories.length) return;
  // Create a fake group
  const fakeGroup = { author_id: currentUser?.id, author_name: 'Tôi', is_own: true, has_unseen: false, stories };
  feedGroups = feedGroups.filter(g => !g.is_own);
  feedGroups.unshift(fakeGroup);
  openViewer(0, idx);
}

// ── SELLERS ──
async function loadSellers() {
  if (!token) { renderLoginPrompt(); return; }
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const r = await fetch(API + '/stories/sellers', { headers: getHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    renderSellers(d.sellers || []);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

function renderSellers(sellers) {
  const el = document.getElementById('tab-content');
  if (!sellers.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Chưa có người bán nào</div><div class="empty-sub">Khi có người đăng story, họ sẽ xuất hiện ở đây.</div></div>`;
    return;
  }
  let html = '<div class="section-header"><span class="section-title">👥 Người bán đang hoạt động</span></div>';
  html += '<div class="sellers-wrap">';
  sellers.forEach(s => {
    const initials = (s.name || '?').charAt(0).toUpperCase();
    const isOwn = s.is_own;
    html += `<div class="seller-row">
      <div class="seller-av">${initials}</div>
      <div class="seller-info">
        <div class="seller-name">${escHtml(s.name)}</div>
        <div class="seller-sub">${isOwn ? 'Tài khoản của bạn' : (s.is_following ? '✅ Đang theo dõi' : 'Nhấn để theo dõi')}</div>
      </div>
      ${!isOwn ? `<button class="follow-btn ${s.is_following?'following':''}" id="follow-${s.id}" onclick="toggleFollow('${s.id}', this)">${s.is_following?'✓ Đang theo dõi':'+ Theo dõi'}</button>` : ''}
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

async function toggleFollow(uid, btn) {
  if (!token) { showToast('Vui lòng đăng nhập', 'err'); return; }
  try {
    const r = await fetch(API + '/stories/follow/' + uid, { method: 'POST', headers: getHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    if (d.following) {
      btn.textContent = '✓ Đang theo dõi';
      btn.classList.add('following');
      showToast('✅ Đã theo dõi', 'ok');
    } else {
      btn.textContent = '+ Theo dõi';
      btn.classList.remove('following');
      showToast('Đã bỏ theo dõi', 'ok');
    }
  } catch(e) { showToast(e.message, 'err'); }
}

// ── STORY VIEWER ──
function openViewer(groupIdx, storyIdx) {
  if (!feedGroups.length) return;
  viewerState.groupIdx = groupIdx;
  viewerState.storyIdx = storyIdx;
  document.getElementById('story-viewer').classList.add('show');
  document.body.style.overflow = 'hidden';
  renderCurrentStory();
  startProgress();
}

function closeViewer() {
  clearProgress();
  document.getElementById('story-viewer').classList.remove('show');
  document.body.style.overflow = '';
  if (currentTab === 'feed') loadFeed();
  else if (currentTab === 'mine') loadMine();
}

function renderCurrentStory() {
  const group = feedGroups[viewerState.groupIdx];
  if (!group) { closeViewer(); return; }
  const story = group.stories[viewerState.storyIdx];
  if (!story) { closeViewer(); return; }

  // Progress segments
  const prog = document.getElementById('viewer-progress');
  let segs = '';
  group.stories.forEach((_, i) => {
    segs += `<div class="progress-seg"><div class="progress-fill" id="pseg-${i}" style="width:${i < viewerState.storyIdx ? '100%' : '0%'}"></div></div>`;
  });
  prog.innerHTML = segs;

  // Avatar & info
  document.getElementById('v-avatar').textContent = (group.author_name || '?').charAt(0).toUpperCase();
  document.getElementById('v-name').textContent = group.is_own ? 'Story của tôi' : group.author_name;
  document.getElementById('v-time').textContent = timeAgo(story.created_at) + ' · ⏰ còn ' + formatTimeLeft(story.time_left_sec || 0);

  // Follow button
  const followBtn = document.getElementById('v-follow-btn');
  if (!group.is_own && currentUser) {
    followBtn.style.display = '';
    followBtn.textContent = group.is_following ? '✓ Theo dõi' : '+ Theo dõi';
    followBtn.className = 'v-follow-btn' + (group.is_following ? ' following' : '');
  } else {
    followBtn.style.display = 'none';
  }

  // Canvas bg
  const bg = document.getElementById('story-bg-color');
  bg.style.background = `linear-gradient(135deg,${story.bg_color||'#1a2a4a'},${darken(story.bg_color||'#1a2a4a')})`;
  document.getElementById('story-emoji-big').textContent = story.emoji || '🎫';

  // Bottom content
  const badge = typeLabel(story.type);
  let bottomHtml = `<div class="story-type-badge badge-${story.type}">${badge.icon} ${badge.label}</div>`;
  if (story.caption) bottomHtml += `<div class="story-caption">${escHtml(story.caption)}</div>`;
  if (story.price) {
    const pct = story.original_price && story.price < story.original_price
      ? Math.round((1 - story.price / story.original_price) * 100) : story.discount_pct;
    bottomHtml += `<div class="story-price-row">
      <span class="story-price">${fmtPrice(story.price)}</span>
      ${story.original_price ? `<span class="story-orig-price">${fmtPrice(story.original_price)}</span>` : ''}
      ${pct ? `<span class="story-discount">-${pct}%</span>` : ''}
    </div>`;
  }
  if (story.cta_label || story.cta_url) {
    const href = story.cta_url || '#';
    bottomHtml += `<a href="${escHtml(href)}" target="_blank" class="story-cta">${escHtml(story.cta_label||'Xem ngay')} ↗</a>`;
  }
  document.getElementById('story-bottom').innerHTML = bottomHtml;

  // Like button
  const likeIcon = document.getElementById('s-like-icon');
  const likeCt = document.getElementById('s-like-count');
  likeIcon.textContent = story.is_liked ? '❤️' : '🤍';
  document.getElementById('s-like-btn').classList.toggle('liked', !!story.is_liked);
  likeCt.textContent = story.likes_count || 0;

  // Delete button (own stories)
  document.getElementById('s-delete-btn').style.display = group.is_own ? '' : 'none';

  // Mark viewed
  markViewed(story.id, group.is_own);
}

function markViewed(storyId, isOwn) {
  if (!token || isOwn) return;
  fetch(API + '/stories/' + storyId + '/view', { method: 'POST', headers: getHeaders() }).catch(() => {});
  // Mark in state
  const group = feedGroups[viewerState.groupIdx];
  const story = group?.stories[viewerState.storyIdx];
  if (story) { story.is_viewed = true; group.has_unseen = group.stories.some(s => !s.is_viewed); }
}

// Progress timer
const STORY_DURATION = 8000;
function startProgress() {
  clearProgress();
  const fill = document.getElementById('pseg-' + viewerState.storyIdx);
  if (!fill) return;
  fill.style.transition = `width ${STORY_DURATION}ms linear`;
  fill.style.width = '100%';
  viewerState.timer = setTimeout(() => nextStory(), STORY_DURATION);
}

function clearProgress() {
  if (viewerState.timer) { clearTimeout(viewerState.timer); viewerState.timer = null; }
  const fill = document.getElementById('pseg-' + viewerState.storyIdx);
  if (fill) { fill.style.transition = 'none'; }
}

function nextStory() {
  const group = feedGroups[viewerState.groupIdx];
  if (!group) { closeViewer(); return; }
  if (viewerState.storyIdx < group.stories.length - 1) {
    viewerState.storyIdx++;
    renderCurrentStory();
    startProgress();
  } else if (viewerState.groupIdx < feedGroups.length - 1) {
    viewerState.groupIdx++;
    viewerState.storyIdx = 0;
    renderCurrentStory();
    startProgress();
  } else {
    closeViewer();
  }
}

function prevStory() {
  clearProgress();
  if (viewerState.storyIdx > 0) {
    viewerState.storyIdx--;
  } else if (viewerState.groupIdx > 0) {
    viewerState.groupIdx--;
    viewerState.storyIdx = feedGroups[viewerState.groupIdx].stories.length - 1;
  }
  renderCurrentStory();
  startProgress();
}

async function likeCurrentStory() {
  if (!token) { showToast('Vui lòng đăng nhập', 'err'); return; }
  const group = feedGroups[viewerState.groupIdx];
  const story = group?.stories[viewerState.storyIdx];
  if (!story) return;
  try {
    const r = await fetch(API + '/stories/' + story.id + '/like', { method: 'POST', headers: getHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    story.is_liked = d.liked;
    story.likes_count = (story.likes_count || 0) + (d.liked ? 1 : -1);
    document.getElementById('s-like-icon').textContent = d.liked ? '❤️' : '🤍';
    document.getElementById('s-like-count').textContent = story.likes_count;
    document.getElementById('s-like-btn').classList.toggle('liked', d.liked);
  } catch(e) { showToast(e.message, 'err'); }
}

async function deleteCurrentStory() {
  if (!confirm('Xóa story này?')) return;
  const group = feedGroups[viewerState.groupIdx];
  const story = group?.stories[viewerState.storyIdx];
  if (!story) return;
  try {
    const r = await fetch(API + '/stories/' + story.id, { method: 'DELETE', headers: getHeaders() });
    if (!r.ok) throw new Error('Lỗi xóa');
    showToast('✅ Đã xóa story', 'ok');
    group.stories.splice(viewerState.storyIdx, 1);
    if (!group.stories.length) closeViewer();
    else { viewerState.storyIdx = Math.min(viewerState.storyIdx, group.stories.length - 1); renderCurrentStory(); startProgress(); }
  } catch(e) { showToast(e.message, 'err'); }
}

function shareStory() {
  const url = window.location.origin + '/stories';
  if (navigator.share) { navigator.share({ title: 'SafePass Stories', url }); }
  else { navigator.clipboard.writeText(url).then(() => showToast('✅ Đã copy link', 'ok')).catch(() => {}); }
}

async function toggleFollowCurrent() {
  const group = feedGroups[viewerState.groupIdx];
  if (!group || group.is_own) return;
  try {
    const r = await fetch(API + '/stories/follow/' + group.author_id, { method: 'POST', headers: getHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    group.is_following = d.following;
    const btn = document.getElementById('v-follow-btn');
    btn.textContent = d.following ? '✓ Theo dõi' : '+ Theo dõi';
    btn.className = 'v-follow-btn' + (d.following ? ' following' : '');
    showToast(d.following ? '✅ Đã theo dõi' : 'Đã bỏ theo dõi', 'ok');
  } catch(e) { showToast(e.message, 'err'); }
}

// ── CREATE STORY ──
function openCreateModal() {
  if (!token) { showToast('Vui lòng đăng nhập để đăng story', 'err'); return; }
  document.getElementById('create-modal').classList.add('show');
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('show');
}

function selectType(type) {
  createForm.type = type;
  ['promo','product','flash_sale','announcement'].forEach(t => {
    document.getElementById('type-' + t).classList.toggle('selected', t === type);
  });
  document.getElementById('price-fields').style.display = ['product','flash_sale'].includes(type) ? '' : 'none';
}

function selectBg(el, color) {
  createForm.bg_color = color;
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function selectEmoji(el, emoji) {
  createForm.emoji = emoji;
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

async function submitCreateStory() {
  const caption = document.getElementById('c-caption').value.trim();
  const price = document.getElementById('c-price')?.value;
  const origPrice = document.getElementById('c-orig-price')?.value;
  const ctaLabel = document.getElementById('c-cta-label').value.trim();
  const ctaUrl = document.getElementById('c-cta-url').value.trim();
  if (!caption) { showToast('Vui lòng nhập nội dung story', 'err'); return; }
  const body = {
    type: createForm.type, caption, bg_color: createForm.bg_color, emoji: createForm.emoji,
    price: price ? Number(price) : null, original_price: origPrice ? Number(origPrice) : null,
    cta_label: ctaLabel || null, cta_url: ctaUrl || null
  };
  if (body.price && body.original_price && body.price < body.original_price) {
    body.discount_pct = Math.round((1 - body.price / body.original_price) * 100);
  }
  try {
    const r = await fetch(API + '/stories', { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Lỗi tạo story');
    showToast('🚀 Story đã đăng! Tồn tại 24 giờ', 'ok');
    closeCreateModal();
    document.getElementById('c-caption').value = '';
    document.getElementById('c-price').value = '';
    document.getElementById('c-orig-price').value = '';
    document.getElementById('c-cta-label').value = '';
    document.getElementById('c-cta-url').value = '';
    loadFeed();
    showTab('feed');
  } catch(e) { showToast(e.message, 'err'); }
}

function renderLoginPrompt() {
  document.getElementById('tab-content').innerHTML = `<div class="login-prompt">
    <div style="font-size:52px;">📸</div>
    <div style="font-size:18px;font-weight:800;">SafePass Stories</div>
    <div style="font-size:14px;color:var(--sub);line-height:1.6;max-width:280px;">Đăng nhập để xem và đăng story từ người bán.</div>
    <button class="btn-login" onclick="window.location.href='/'">Đăng nhập</button>
  </div>`;
}

// ── HELPERS ──
function typeLabel(type) {
  const map = {
    product: { icon: '🛍️', label: 'Sản phẩm', cls: 'badge-product' },
    flash_sale: { icon: '⚡', label: 'Flash Sale', cls: 'badge-flash_sale' },
    promo: { icon: '📢', label: 'Khuyến mãi', cls: 'badge-promo' },
    announcement: { icon: '📣', label: 'Thông báo', cls: 'badge-announcement' }
  };
  return map[type] || map.promo;
}

function fmtPrice(n) {
  if (!n) return '';
  return Number(n).toLocaleString('vi-VN') + '₫';
}

function formatTimeLeft(sec) {
  if (sec <= 0) return 'Hết hạn';
  if (sec < 3600) return Math.floor(sec / 60) + ' phút';
  return Math.floor(sec / 3600) + ' giờ ' + Math.floor((sec % 3600) / 60) + ' phút';
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'vừa xong';
  if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
  if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
  return Math.floor(diff / 86400) + ' ngày trước';
}

function darken(hex) {
  try {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${Math.max(0, r - 40)},${Math.max(0, g - 40)},${Math.max(0, b - 40)})`;
  } catch(e) { return '#000'; }
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg, type) {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2800);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('story-viewer').classList.contains('show')) return;
  if (e.key === 'ArrowRight') nextStory();
  if (e.key === 'ArrowLeft') prevStory();
  if (e.key === 'Escape') closeViewer();
});

// Init price fields visibility
document.getElementById('price-fields').style.display = 'none';

init();
</script>
