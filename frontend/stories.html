<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SafePass Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#06090f;--bg2:#090d16;--card:#0d1220;--card2:#101828;
  --brand:#3d8ef8;--brand2:#9b87f5;
  --text:#e8edf8;--sub:#7b8fad;--hint:#3d4f6a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --ok:#22d38e;--warn:#f5a623;--red:#f05068;--gold:#ffd700;
  --radius:16px;--radius-sm:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);}

/* ── SCREENS ── */
#scr-feed{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#scr-viewer{display:none;position:fixed;inset:0;z-index:500;background:#000;}
#scr-create{display:none;position:fixed;inset:0;z-index:600;background:var(--bg);flex-direction:column;}

/* ── TOP NAV ── */
.top-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:56px;flex-shrink:0;
  background:rgba(6,9,15,.94);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.logo{font-size:18px;font-weight:900;letter-spacing:-.5px;}
.logo span{color:var(--brand);}
.logo .badge{font-size:11px;font-weight:800;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:2px 9px;border-radius:20px;margin-left:6px;letter-spacing:.04em;}
.nav-right{display:flex;gap:8px;}
.icon-btn{background:none;border:none;color:var(--sub);font-size:21px;cursor:pointer;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{background:rgba(255,255,255,.07);color:var(--text);}

/* ── TABS ── */
.tab-bar{display:flex;padding:0 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.tab-btn{flex:1;background:none;border:none;color:var(--sub);font-size:13px;font-weight:700;padding:11px 4px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand);}

/* ── RINGS ROW ── */
.rings-row{
  display:flex;gap:14px;padding:12px 14px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.rings-row::-webkit-scrollbar{display:none;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;width:64px;}
.ring-outer{
  width:64px;height:64px;border-radius:50%;padding:2.5px;
  background:linear-gradient(135deg,#ff6b35,#f7c948,#fe2c55,#3d8ef8);
  transition:transform .15s;position:relative;
}
.ring-outer.viewed{background:var(--hint);}
.ring-outer.own{background:linear-gradient(135deg,var(--ok),var(--brand));}
.ring-outer:active{transform:scale(.9);}
.ring-inner{
  width:100%;height:100%;border-radius:50%;border:2.5px solid var(--bg);
  background:linear-gradient(135deg,#1a2a4a,#0d1a36);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:var(--text);overflow:hidden;
}
.ring-count{
  position:absolute;bottom:0;right:0;
  background:var(--brand);color:#fff;font-size:9px;font-weight:800;
  width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}
.ring-add{
  width:64px;height:64px;border-radius:50%;
  border:2px dashed var(--border2);background:var(--card);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--brand);
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.ring-add:hover{border-color:var(--brand);background:rgba(61,142,248,.08);}
.ring-label{font-size:10px;font-weight:600;color:var(--sub);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:64px;}
.ring-label.unseen{color:var(--text);}
.ring-label.own-lbl{color:var(--brand);}

/* ── STORY GRID ── */
.scroll-area{flex:1;overflow-y:auto;padding:12px 12px 80px;}
.scroll-area::-webkit-scrollbar{display:none;}
.story-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.story-card{
  border-radius:14px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:.6;
  background:var(--card);transition:transform .15s;border:1px solid var(--border);
}
.story-card:active{transform:scale(.97);}
.sc-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:50px;}
.sc-bg img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.sc-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.15) 50%,transparent 100%);}
.sc-top{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:center;justify-content:space-between;}
.sc-type{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.04em;text-transform:uppercase;}
.sc-type.product{background:rgba(61,142,248,.8);color:#fff;}
.sc-type.flash_sale{background:rgba(240,80,104,.9);color:#fff;}
.sc-type.promo{background:rgba(155,135,245,.8);color:#fff;}
.sc-type.announcement{background:rgba(245,166,35,.85);color:#1a0a00;}
.sc-timer{font-size:9px;font-weight:700;color:rgba(255,255,255,.75);background:rgba(0,0,0,.55);padding:2px 6px;border-radius:8px;}
.sc-unseen{position:absolute;inset:0;border-radius:14px;box-shadow:inset 0 0 0 2px var(--brand);pointer-events:none;}
.sc-bottom{position:absolute;bottom:0;left:0;right:0;padding:8px 10px 12px;}
.sc-author{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.sc-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#ff6b35);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;border:1.5px solid rgba(255,255,255,.5);flex-shrink:0;}
.sc-name{font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-caption{font-size:11px;font-weight:600;color:rgba(255,255,255,.9);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:3px;}
.sc-price{font-size:13px;font-weight:900;color:var(--ok);}
.sc-orig{font-size:10px;color:rgba(255,255,255,.45);text-decoration:line-through;margin-left:3px;}
.sc-disc{font-size:9px;font-weight:800;color:var(--red);margin-left:3px;}
.sc-stats{display:flex;gap:8px;margin-top:4px;}
.sc-stat{font-size:9px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:2px;}

/* ── SELLERS ── */
.sellers-list{display:flex;flex-direction:column;gap:8px;}
.seller-row{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);
}
.seller-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.seller-info{flex:1;min-width:0;}
.seller-name{font-size:14px;font-weight:700;}
.seller-sub{font-size:12px;color:var(--sub);margin-top:2px;}
.follow-btn{
  padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;
  border:none;transition:all .2s;white-space:nowrap;font-family:inherit;
}
.follow-btn.off{background:rgba(61,142,248,.12);border:1px solid rgba(61,142,248,.35);color:var(--brand);}
.follow-btn.on{background:rgba(255,255,255,.07);border:1px solid var(--border2);color:var(--sub);}

/* ── FULLSCREEN VIEWER ── */
.vw-wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;}
.vw-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:90px;overflow:hidden;}
.vw-bg img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.vw-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,transparent 30%,transparent 55%,rgba(0,0,0,.85) 100%);pointer-events:none;}

/* Progress */
.prog-row{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;gap:3px;padding:12px 12px 4px;}
.prog-seg{flex:1;height:2.5px;background:rgba(255,255,255,.28);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:#fff;border-radius:2px;width:0%;}
.prog-fill.done{width:100%;}

/* Viewer top bar */
.vw-top{
  position:absolute;top:0;left:0;right:0;z-index:15;
  display:flex;align-items:center;gap:10px;padding:34px 12px 10px;
}
.vw-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#ff6b35);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid rgba(255,255,255,.65);flex-shrink:0;}
.vw-info{flex:1;min-width:0;}
.vw-name{font-size:13px;font-weight:700;color:#fff;}
.vw-time{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.vw-follow{padding:5px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.7);background:transparent;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0;font-family:inherit;}
.vw-follow.on{background:rgba(255,255,255,.18);}
.vw-close{background:rgba(0,0,0,.45);border:none;border-radius:50%;width:32px;height:32px;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Tap zones */
.tap-l,.tap-r{position:absolute;top:0;bottom:0;z-index:10;cursor:pointer;}
.tap-l{left:0;width:35%;}
.tap-r{right:0;width:35%;}

/* Content overlay */
.vw-content{position:absolute;bottom:0;left:0;right:0;z-index:15;padding:14px 14px 28px;}
.vw-type{display:inline-flex;align-items:center;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase;}
.vw-caption{font-size:17px;font-weight:700;line-height:1.45;color:#fff;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.6);}
.vw-prices{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.vw-price{font-size:22px;font-weight:900;color:var(--ok);text-shadow:0 2px 8px rgba(0,0,0,.4);}
.vw-orig{font-size:14px;color:rgba(255,255,255,.45);text-decoration:line-through;}
.vw-disc{background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;}
.vw-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;font-size:14px;font-weight:800;font-family:inherit;
  box-shadow:0 4px 16px rgba(61,142,248,.35);transition:transform .15s;text-decoration:none;
}
.vw-cta:active{transform:scale(.97);}

/* Right action column */
.vw-actions{
  position:absolute;bottom:100px;right:12px;z-index:15;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.vwa{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.vwa-icon{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.13);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;font-size:21px;
  border:none;color:#fff;cursor:pointer;transition:transform .15s;
}
.vwa-icon:active{transform:scale(.88);}
.vwa-icon.liked{background:rgba(240,80,104,.3);}
.vwa-icon.del{background:rgba(240,80,104,.18);}
.vwa-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.8);text-shadow:0 1px 4px rgba(0,0,0,.8);}

/* ── CREATE SCREEN ── */
.cr-nav{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cr-back{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;line-height:1;padding:0;}
.cr-title{font-size:16px;font-weight:800;flex:1;}
.cr-post{padding:8px 18px;border-radius:20px;background:var(--brand);color:#fff;font-size:13px;font-weight:800;border:none;cursor:pointer;transition:opacity .2s;font-family:inherit;}
.cr-post:disabled{opacity:.38;cursor:default;}
.cr-body{flex:1;overflow-y:auto;padding:16px;}
.cr-body::-webkit-scrollbar{display:none;}

/* Preview card */
.preview-wrap{
  aspect-ratio:.65;border-radius:var(--radius);overflow:hidden;position:relative;
  max-width:240px;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;font-size:58px;
}
.preview-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:58px;}
.preview-inner img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.preview-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 60%);}
.preview-text{position:absolute;bottom:12px;left:10px;right:10px;color:#fff;}
.preview-caption{font-size:13px;font-weight:600;line-height:1.35;color:rgba(255,255,255,.9);}
.preview-price{font-size:16px;font-weight:900;color:var(--ok);margin-top:4px;}

/* Type pills */
.type-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.type-pill{
  display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;
  border:1.5px solid var(--border2);background:var(--card);
  font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:all .2s;color:var(--sub);font-family:inherit;
}
.type-pill.active{border-color:var(--brand);background:rgba(61,142,248,.12);color:var(--brand);}

/* Color palette */
.palette{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.pal-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.pal-dot.sel{border-color:#fff;transform:scale(1.15);}

/* Emoji picker */
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.emo{width:36px;height:36px;border-radius:8px;background:var(--card);border:1.5px solid var(--border);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.emo.sel{border-color:var(--brand);background:rgba(61,142,248,.12);}

/* Form */
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
.fi,.fta{
  width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit;
  padding:11px 13px;outline:none;transition:border .2s;resize:none;
}
.fi:focus,.fta:focus{border-color:var(--brand);}
.fta{min-height:72px;line-height:1.45;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ── EMPTY / LOADING ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 24px;text-align:center;}
.empty-icon{font-size:52px;opacity:.65;}
.empty-title{font-size:16px;font-weight:800;}
.empty-sub{font-size:13px;color:var(--sub);line-height:1.55;max-width:280px;}
.btn-main{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-size:14px;font-weight:800;padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--brand);border-radius:50%;animation:spin .75s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--card2);border:1px solid var(--border2);border-radius:24px;
  padding:10px 20px;font-size:13px;font-weight:600;z-index:9999;
  opacity:0;transition:all .28s;white-space:nowrap;pointer-events:none;
  max-width:88vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok-t{border-color:rgba(34,211,142,.35);background:rgba(34,211,142,.15);}
.toast.err-t{border-color:rgba(240,80,104,.35);background:rgba(240,80,104,.15);}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:62px;display:flex;align-items:center;justify-content:space-around;
  background:rgba(6,9,15,.93);backdrop-filter:blur(18px);border-top:1px solid var(--border);
}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 14px;opacity:.45;transition:opacity .2s;}
.bn.active{opacity:1;}
.bn-ic{font-size:22px;line-height:1;}
.bn-lbl{font-size:9px;font-weight:700;letter-spacing:.04em;color:var(--sub);}
.bn.active .bn-lbl{color:var(--brand);}

/* ── LOGIN GATE ── */
#gate{
  position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:32px;
}
.gate-logo{font-size:30px;font-weight:900;letter-spacing:-.5px;}
.gate-logo span{color:var(--brand);}
.gate-sub{font-size:14px;color:var(--sub);text-align:center;line-height:1.6;}
.gate-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;}
.gate-btn{padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:800;border:none;cursor:pointer;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-family:inherit;}
.gate-link{font-size:13px;color:var(--brand);text-align:center;cursor:pointer;}
.gate-err{color:var(--red);font-size:12px;text-align:center;min-height:16px;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp .28s ease both;}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate">
  <div class="gate-logo">Safe<span>Pass</span></div>
  <p class="gate-sub">Đăng nhập để xem Story 24h từ người bán<br>và chia sẻ flash sale của bạn 🎫</p>
  <div class="gate-form">
    <input id="g-phone" class="fi" type="tel" placeholder="Số điện thoại">
    <input id="g-pass" class="fi" type="password" placeholder="Mật khẩu">
    <p id="g-err" class="gate-err"></p>
    <button class="gate-btn" onclick="gateLogin()">Đăng nhập</button>
    <p class="gate-link" onclick="window.location.href='/'">← Về trang chính</p>
  </div>
</div>

<!-- FEED SCREEN -->
<div id="scr-feed">
  <div class="top-nav">
    <div class="logo">Safe<span>Pass</span><span class="badge">STORIES</span></div>
    <div class="nav-right">
      <button class="icon-btn" onclick="showCreate()" title="Tạo Story">✏️</button>
      <button class="icon-btn" onclick="window.location.href='/'" title="Trang chủ">🏠</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tb-feed" onclick="switchTab('feed')">📖 Feed</button>
    <button class="tab-btn" id="tb-discover" onclick="switchTab('discover')">🔍 Khám phá</button>
    <button class="tab-btn" id="tb-mine" onclick="switchTab('mine')">⭐ Của tôi</button>
  </div>

  <div class="rings-row" id="rings-row">
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
      <div class="ring-add" onclick="showCreate()">＋</div>
      <span class="ring-label own-lbl">Tạo Story</span>
    </div>
  </div>

  <div class="scroll-area" id="scroll-area">
    <div class="spinner"></div>
  </div>

  <div class="bottom-nav">
    <div class="bn" onclick="window.location.href='/'"><span class="bn-ic">🏠</span><span class="bn-lbl">Trang chủ</span></div>
    <div class="bn active"><span class="bn-ic">📖</span><span class="bn-lbl">Stories</span></div>
    <div class="bn" onclick="showCreate()"><span class="bn-ic">✏️</span><span class="bn-lbl">Tạo</span></div>
    <div class="bn" onclick="window.location.href='/live'"><span class="bn-ic">🔴</span><span class="bn-lbl">Live</span></div>

<div class="toast" id="toast"></div>

<script>
// ── GLOBAL STATE ──
const S = {
  token: localStorage.getItem('safepass_token'),
  user: null,
  tab: 'feed',
  groups: [],
  sellers: [],
  mine: [],
  // viewer
  vGroups: [],
  gi: 0, si: 0,
  vTimer: null,
  DURATION: 7000,
  // create form
  crType: 'promo',
  crEmoji: '🎫',
  crColor: '#1a2a4a',
};

const TYPE_META = {
  product:      { label: '🎫 Sản phẩm',   bg: 'rgba(61,142,248,.85)',   fg: '#fff' },
  flash_sale:   { label: '⚡ Flash Sale',  bg: 'rgba(240,80,104,.9)',    fg: '#fff' },
  promo:        { label: '📢 Quảng cáo',   bg: 'rgba(155,135,245,.82)',  fg: '#fff' },
  announcement: { label: '📣 Thông báo',   bg: 'rgba(245,166,35,.88)',   fg: '#1a0a00' },
};

// ── BOOT ──
async function boot() {
  if (!S.token) { showGate(); return; }
  try {
    const r = await api('GET', '/api/auth/me');
    if (!r || !r.user) { showGate(); return; }
    S.user = r.user;
    loadTab('feed');
  } catch { showGate(); }
}

function showGate() { document.getElementById('gate').style.display = 'flex'; }

async function gateLogin() {
  const phone = $('g-phone').value.trim();
  const password = $('g-pass').value;
  const errEl = $('g-err');
  errEl.textContent = '';
  if (!phone || !password) { errEl.textContent = 'Vui lòng nhập đầy đủ'; return; }
  try {
    const r = await api('POST', '/api/auth/login', { phone, password });
    if (!r.token) throw new Error(r.error || 'Đăng nhập thất bại');
    localStorage.setItem('safepass_token', r.token);
    S.token = r.token; S.user = r.user;
    $('gate').style.display = 'none';
    loadTab('feed');
  } catch(e) { errEl.textContent = e.message; }
}

// ── API ──
async function api(method, url, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(S.token ? { Authorization: 'Bearer ' + S.token } : {}) }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || 'Lỗi ' + r.status);
  return d;
}

// ── TABS ──
function switchTab(tab) {
  S.tab = tab;
  ['feed','discover','mine'].forEach(t => {
    $('tb-' + t).classList.toggle('active', t === tab);
  });
  loadTab(tab);
}

async function loadTab(tab) {
  $('scroll-area').innerHTML = '<div class="spinner"></div>';
  try {
    if (tab === 'feed') {
      const d = await api('GET', '/api/stories/feed');
      S.groups = d.groups || [];
      buildRings(S.groups);
      renderGrid(S.groups);
    } else if (tab === 'discover') {
      resetRings();
      const d = await api('GET', '/api/stories/sellers');
      S.sellers = d.sellers || [];
      renderSellers(S.sellers);
    } else if (tab === 'mine') {
      resetRings();
      const d = await api('GET', '/api/stories/mine');
      S.mine = d.stories || [];
      renderMine(S.mine);
    }
  } catch(e) {
    $('scroll-area').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Không thể tải</div><div class="empty-sub">${esc(e.message)}</div></div>`;
  }
}

// ── RINGS ──
function resetRings() {
  $('rings-row').innerHTML = addRingHTML();
}

function addRingHTML() {
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
    <div class="ring-add" onclick="showCreate()">＋</div>
    <span class="ring-label own-lbl">Tạo Story</span>
  </div>`;
}

function buildRings(groups) {
  const row = $('rings-row');
  row.innerHTML = addRingHTML();
  groups.forEach((g, gi) => {
    const initial = (g.author_name || '?')[0].toUpperCase();
    const cls = g.is_own ? 'own' : (g.has_unseen ? '' : 'viewed');
    const div = document.createElement('div');
    div.className = 'ring-item';
    div.innerHTML = `
      <div class="ring-outer ${cls}" style="position:relative;">
        <div class="ring-inner">${initial}</div>
        ${g.stories.length > 1 ? `<div class="ring-count">${g.stories.length}</div>` : ''}
      </div>
      <span class="ring-label ${g.has_unseen ? 'unseen' : ''}">${esc(g.author_name)}</span>`;
    div.addEventListener('click', () => openViewer(gi, 0));
    row.appendChild(div);
  });
}

// ── GRID ──
function renderGrid(groups) {
  const all = [];
  groups.forEach((g, gi) => g.stories.forEach((s, si) => all.push({ ...s, _gi: gi, _si: si, _gName: g.author_name, _isOwn: g.is_own })));

  if (!all.length) {
    $('scroll-area').innerHTML = `<div class="empty anim">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Chưa có Story nào</div>
      <div class="empty-sub">Theo dõi người bán hoặc khám phá tab <b>Khám phá</b> để tìm người bán đang đăng story</div>
      <button class="btn-main" onclick="switchTab('discover')">🔍 Khám phá ngay</button>
    </div>`;
    return;
  }

  $('scroll-area').innerHTML = '<div class="story-grid" id="sg"></div>';
  const grid = $('sg');
  all.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'story-card anim';
    el.style.animationDelay = (i * 0.04) + 's';
    el.innerHTML = storyCardInner(s);
    el.addEventListener('click', () => openViewer(s._gi, s._si));
    grid.appendChild(el);
  });
}

function storyCardInner(s) {
  const tm = TYPE_META[s.type] || TYPE_META.promo;
  const mins = Math.round((s.time_left_sec || 0) / 60);
  const timeStr = mins >= 60 ? Math.round(mins / 60) + 'g' : mins + 'p';
  const bgStyle = s.bg_color ? `background:${s.bg_color}` : '';
  const imgHTML = s.image_url ? `<img src="${esc(s.image_url)}" loading="lazy" onerror="this.style.display='none'">` : '';
  const priceHTML = s.price
    ? `<div class="sc-price">${fmt(s.price)}đ${s.original_price ? `<span class="sc-orig">${fmt(s.original_price)}đ</span>` : ''}${s.discount_pct ? `<span class="sc-disc">-${s.discount_pct}%</span>` : ''}</div>`
    : '';
  return `
    <div class="sc-bg" style="${bgStyle}">${imgHTML}<span style="position:relative;z-index:1">${esc(s.emoji || '🎫')}</span></div>
    <div class="sc-overlay"></div>
    ${!s.is_viewed ? '<div class="sc-unseen"></div>' : ''}
    <div class="sc-top">
      <span class="sc-type ${s.type}">${tm.label}</span>
      <span class="sc-timer">⏱ ${timeStr}</span>
    </div>
    <div class="sc-bottom">
      <div class="sc-author">
        <div class="sc-av">${(s._gName || s.author_name || '?')[0].toUpperCase()}</div>
        <span class="sc-name">${esc(s._gName || s.author_name || 'Người dùng')}</span>
      </div>
      <div class="sc-caption">${esc(s.caption || '')}</div>
      ${priceHTML}
      <div class="sc-stats">
        <span class="sc-stat">👁 ${s.views_count || 0}</span>
        <span class="sc-stat">🤍 ${s.likes_count || 0}</span>
        ${s.is_viewed ? '<span class="sc-stat" style="color:var(--ok)">✓ Đã xem</span>' : ''}
      </div>
    </div>`;
}

// ── SELLERS ──
function renderSellers(sellers) {
  if (!sellers.length) {
    $('scroll-area').innerHTML = `<div class="empty anim"><div class="empty-icon">🔍</div><div class="empty-title">Chưa có người bán nào</div><div class="empty-sub">Người bán có story hoạt động sẽ xuất hiện ở đây</div></div>`;
    return;
  }
  $('scroll-area').innerHTML = '<div class="sellers-list"></div>';
  const list = $('scroll-area').firstChild;
  sellers.forEach((sel, i) => {
    const div = document.createElement('div');
    div.className = 'seller-row anim';
    div.style.animationDelay = (i * 0.04) + 's';
    const followClass = sel.is_following ? 'on' : 'off';
    const followText = sel.is_following ? '✓ Đang theo dõi' : '+ Theo dõi';
    div.innerHTML = `
      <div class="seller-av">${(sel.name || '?')[0].toUpperCase()}</div>
      <div class="seller-info">
        <div class="seller-name">${esc(sel.name || 'Người dùng')}</div>
        <div class="seller-sub">${sel.is_own ? 'Đây là bạn' : (sel.is_following ? 'Đang theo dõi' : 'Chưa theo dõi')}</div>
      </div>
      ${sel.is_own ? '' : `<button class="follow-btn ${followClass}" onclick="followSeller('${sel.id}', this)">${followText}</button>`}`;
    list.appendChild(div);
  });
}

// ── MINE ──
function renderMine(stories) {
  if (!stories.length) {
    $('scroll-area').innerHTML = `<div class="empty anim">
      <div class="empty-icon">📷</div>
      <div class="empty-title">Bạn chưa có Story nào</div>
      <div class="empty-sub">Story tự xoá sau 24 giờ. Hãy đăng story đầu tiên!</div>
      <button class="btn-main" onclick="showCreate()">✏️ Tạo Story</button>
    </div>`;
    return;
  }
  const ownGroup = { author_id: S.user?.id, author_name: S.user?.name || 'Tôi', is_own: true, has_unseen: false, stories };
  S.groups = [ownGroup];
  $('scroll-area').innerHTML = '<div class="story-grid" id="sg"></div>';
  const grid = $('sg');
  stories.forEach((s, si) => {
    const tLeft = Math.max(0, Math.floor((new Date(s.expires_at) - Date.now()) / 1000));
    const enriched = { ...s, _gi: 0, _si: si, _gName: S.user?.name || 'Tôi', is_own: true, time_left_sec: tLeft };
    const el = document.createElement('div');
    el.className = 'story-card anim';
    el.style.animationDelay = (si * 0.04) + 's';
    el.innerHTML = storyCardInner(enriched);
    el.addEventListener('click', () => openViewer(0, si));
    grid.appendChild(el);
  });
}

// ── VIEWER ──
function openViewer(gi, si) {
  S.vGroups = S.groups;
  S.gi = gi; S.si = si;
  document.getElementById('scr-viewer').style.display = 'block';
  renderViewerFrame();
}

function closeViewer() {
  stopTimer();
  document.getElementById('scr-viewer').style.display = 'none';
  loadTab(S.tab);
}

function renderViewerFrame() {
  const g = S.vGroups[S.gi];
  if (!g) { closeViewer(); return; }
  const s = g.stories[S.si];
  if (!s) { advanceGroup(); return; }

  // Background
  const bg = $('vw-bg');
  bg.style.background = s.bg_color || '#1a2a4a';
  if (s.image_url) {
    bg.innerHTML = `<img src="${esc(s.image_url)}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" onerror="this.style.display='none'"><span style="position:relative;font-size:90px">${esc(s.emoji||'🎫')}</span>`;
  } else {
    bg.innerHTML = `<span>${esc(s.emoji || '🎫')}</span>`;
  }

  // Header
  const aName = g.author_name || 'Người dùng';
  $('vw-av').textContent = aName[0].toUpperCase();
  $('vw-name').textContent = aName;
  const mins = Math.max(0, Math.round((s.time_left_sec || 0) / 60));
  const tm = TYPE_META[s.type] || TYPE_META.promo;
  $('vw-time').textContent = `⏱ Còn ${mins >= 60 ? Math.round(mins/60) + 'g' : mins + 'p'} · ${tm.label}`;

  // Follow btn
  const fb = $('vw-follow');
  if (g.is_own) { fb.style.display = 'none'; }
  else {
    fb.style.display = '';
    fb.textContent = g.is_following ? '✓ Đang theo dõi' : '+ Theo dõi';
    fb.className = 'vw-follow' + (g.is_following ? ' on' : '');
  }

  // Type chip
  const tc = $('vw-type');
  tc.textContent = tm.label;
  tc.style.background = tm.bg;
  tc.style.color = tm.fg;

  // Caption
  $('vw-caption').textContent = s.caption || '';

  // Price
  const pr = $('vw-prices');
  if (s.price) {
    pr.style.display = 'flex';
    pr.innerHTML = `<span class="vw-price">${fmt(s.price)}đ</span>
      ${s.original_price ? `<span class="vw-orig">${fmt(s.original_price)}đ</span>` : ''}
      ${s.discount_pct ? `<span class="vw-disc">-${s.discount_pct}%</span>` : ''}`;
  } else { pr.style.display = 'none'; }

  // CTA
  const cta = $('vw-cta');
  if (s.cta_label && s.cta_url) {
    cta.style.display = 'flex'; cta.textContent = s.cta_label; cta.href = s.cta_url; cta.target = '_blank';
  } else if (s.listing_id) {
    cta.style.display = 'flex'; cta.textContent = 'Xem vé 🎫'; cta.href = '/?listing=' + s.listing_id; cta.target = '_self';
  } else { cta.style.display = 'none'; }

  // Like
  $('lk-icon').textContent = s.is_liked ? '❤️' : '🤍';
  $('lk-icon').className = 'vwa-icon' + (s.is_liked ? ' liked' : '');
  $('lk-count').textContent = s.likes_count || 0;

  // Delete
  $('del-btn').style.display = g.is_own ? 'flex' : 'none';

  // Progress bars
  buildProgress(g.stories.length);

  // Mark viewed (fire & forget)
  api('POST', '/api/stories/' + s.id + '/view').catch(() => {});

  // Timer
  startTimer(g.stories.length);
}

function buildProgress(count) {
  const row = $('prog-row');
  row.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const seg = document.createElement('div');
    seg.className = 'prog-seg';
    const fill = document.createElement('div');
    fill.className = 'prog-fill' + (i < S.si ? ' done' : '');
    fill.id = 'pf-' + i;
    seg.appendChild(fill);
    row.appendChild(seg);
  }
  // Animate active fill
  if (S.si < count) {
    requestAnimationFrame(() => {
      const fill = $('pf-' + S.si);
      if (fill) {
        fill.style.transition = 'none';
        fill.style.width = '0%';
        requestAnimationFrame(() => {
          fill.style.transition = `width ${S.DURATION}ms linear`;
          fill.style.width = '100%';
        });
      }
    });
  }
}

function startTimer(count) {
  stopTimer();
  S.vTimer = setTimeout(nextStory, S.DURATION);
}

function stopTimer() {
  if (S.vTimer) { clearTimeout(S.vTimer); S.vTimer = null; }
}

function nextStory() {
  stopTimer();
  const g = S.vGroups[S.gi];
  if (!g) { closeViewer(); return; }
  if (S.si < g.stories.length - 1) { S.si++; renderViewerFrame(); }
  else advanceGroup();
}

function prevStory() {
  stopTimer();
  if (S.si > 0) { S.si--; renderViewerFrame(); }
  else if (S.gi > 0) {
    S.gi--;
    const pg = S.vGroups[S.gi];
    S.si = pg ? pg.stories.length - 1 : 0;
    renderViewerFrame();
  }
}

function advanceGroup() {
  if (S.gi < S.vGroups.length - 1) { S.gi++; S.si = 0; renderViewerFrame(); }
  else closeViewer();
}

// ── LIKE ──
async function toggleLike() {
  const g = S.vGroups[S.gi]; const s = g?.stories[S.si];
  if (!s) return;
  try {
    const r = await api('POST', '/api/stories/' + s.id + '/like');
    s.is_liked = r.liked;
    s.likes_count = Math.max(0, (s.likes_count || 0) + (r.liked ? 1 : -1));
    $('lk-icon').textContent = r.liked ? '❤️' : '🤍';
    $('lk-icon').className = 'vwa-icon' + (r.liked ? ' liked' : '');
    $('lk-count').textContent = s.likes_count;
  } catch(e) { toast(e.message, 'err-t'); }
}

// ── FOLLOW (viewer) ──
async function toggleFollowViewer() {
  const g = S.vGroups[S.gi];
  if (!g || g.is_own) return;
  try {
    const r = await api('POST', '/api/stories/follow/' + g.author_id);
    g.is_following = r.following;
    const fb = $('vw-follow');
    fb.textContent = r.following ? '✓ Đang theo dõi' : '+ Theo dõi';
    fb.className = 'vw-follow' + (r.following ? ' on' : '');
    toast(r.following ? '✓ Đang theo dõi ' + g.author_name : 'Đã bỏ theo dõi');
  } catch(e) { toast(e.message, 'err-t'); }
}

// ── FOLLOW (sellers list) ──
async function followSeller(uid, btn) {
  try {
    const r = await api('POST', '/api/stories/follow/' + uid);
    btn.textContent = r.following ? '✓ Đang theo dõi' : '+ Theo dõi';
    btn.className = 'follow-btn ' + (r.following ? 'on' : 'off');
    toast(r.following ? 'Đang theo dõi!' : 'Đã bỏ theo dõi');
  } catch(e) { toast(e.message, 'err-t'); }
}

// ── DELETE ──
async function deleteStory() {
  const g = S.vGroups[S.gi]; const s = g?.stories[S.si];
  if (!s) return;
  if (!confirm('Xoá story này?')) return;
  try {
    await api('DELETE', '/api/stories/' + s.id);
    toast('Đã xoá story', 'ok-t');
    g.stories.splice(S.si, 1);
    if (!g.stories.length) { closeViewer(); return; }
    if (S.si >= g.stories.length) S.si = g.stories.length - 1;
    renderViewerFrame();
  } catch(e) { toast('Lỗi: ' + e.message, 'err-t'); }
}

// ── SHARE ──
function shareStory() {
  const g = S.vGroups[S.gi]; const s = g?.stories[S.si];
  const text = (s?.caption || 'Story từ SafePass') + '\n' + location.origin + '/stories';
  if (navigator.share) navigator.share({ title: 'SafePass Stories', text, url: location.origin + '/stories' }).catch(() => {});
  else { navigator.clipboard?.writeText(text).then(() => toast('Đã sao chép link!', 'ok-t')).catch(() => {}); }
}

// ── CREATE FORM ──
function showCreate() {
  document.getElementById('scr-create').style.display = 'flex';
  syncPreview();
}

function closeCreate() {
  document.getElementById('scr-create').style.display = 'none';
}

function pickType(t) {
  S.crType = t;
  document.querySelectorAll('.type-pill').forEach(el => el.classList.toggle('active', el.dataset.t === t));
  $('price-wrap').style.display = (t === 'product' || t === 'flash_sale') ? 'block' : 'none';
  syncPreview();
}

function pickEmoji(e) {
  S.crEmoji = e;
  document.querySelectorAll('.emo').forEach(el => el.classList.toggle('sel', el.dataset.e === e));
  syncPreview();
}

function pickColor(c) {
  S.crColor = c;
  document.querySelectorAll('.pal-dot').forEach(el => el.classList.toggle('sel', el.dataset.c === c));
  syncPreview();
}

function onCaption(v) {
  const el = $('prev-cap');
  if (v.trim()) { el.textContent = v; el.style.opacity = '1'; el.style.color = 'rgba(255,255,255,.92)'; }
  else { el.textContent = 'Nội dung story...'; el.style.opacity = '.45'; el.style.color = 'rgba(255,255,255,.55)'; }
  $('cr-post-btn').disabled = !v.trim();
}

function syncPreview() {
  const card = $('prev-card');
  card.style.background = S.crColor;
  const inner = $('prev-inner');
  const imgUrl = $('cr-img')?.value?.trim();
  if (imgUrl) {
    inner.innerHTML = `<img src="${esc(imgUrl)}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" onerror="this.innerHTML='${S.crEmoji}'">`;
  } else {
    inner.textContent = S.crEmoji;
  }
  const price = $('cr-price')?.value;
  const orig = $('cr-orig')?.value;
  const pp = $('prev-price');
  if (price && (S.crType === 'product' || S.crType === 'flash_sale')) {
    pp.style.display = 'block';
    pp.textContent = fmt(price) + 'đ' + (orig ? ` / ${fmt(orig)}đ` : '');
  } else { pp.style.display = 'none'; }
}

async function postStory() {
  const caption = $('cr-caption').value.trim();
  if (!caption) { toast('Nhập nội dung story', 'err-t'); return; }
  const btn = $('cr-post-btn');
  btn.disabled = true; btn.textContent = '...';
  const price = parseFloat($('cr-price')?.value) || null;
  const orig = parseFloat($('cr-orig')?.value) || null;
  const disc = (price && orig && orig > price) ? Math.round((1 - price / orig) * 100) : null;
  try {
    await api('POST', '/api/stories', {
      type: S.crType, caption,
      image_url: $('cr-img')?.value?.trim() || null,
      bg_color: S.crColor, emoji: S.crEmoji,
      price, original_price: orig, discount_pct: disc,
      cta_label: $('cr-cta-lbl')?.value?.trim() || null,
      cta_url: $('cr-cta-url')?.value?.trim() || null,
    });
    toast('🎉 Story đã đăng! Tự xoá sau 24 giờ', 'ok-t');
    // Reset
    ['cr-caption','cr-price','cr-orig','cr-img','cr-cta-lbl','cr-cta-url'].forEach(id => { if ($(id)) $(id).value = ''; });
    closeCreate();
    switchTab('mine');
  } catch(e) {
    toast('Lỗi: ' + e.message, 'err-t');
    btn.disabled = false; btn.textContent = 'Đăng';
  }
}

// ── UTILS ──
function $(id) { return document.getElementById(id); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return Number(n).toLocaleString('vi-VN'); }

function toast(msg, cls = '', dur = 2600) {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast show ' + cls;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', dur);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (document.getElementById('scr-viewer').style.display !== 'block') return;
  if (e.key === 'ArrowRight') nextStory();
  else if (e.key === 'ArrowLeft') prevStory();
  else if (e.key === 'Escape') closeViewer();
});

// ── SWIPE GESTURE ──
let _tx = 0, _ty = 0;
const vScr = document.getElementById('scr-viewer');
vScr.addEventListener('touchstart', e => { _tx = e.changedTouches[0].clientX; _ty = e.changedTouches[0].clientY; }, { passive: true });
vScr.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx;
  const dy = e.changedTouches[0].clientY - _ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextStory(); else prevStory();
  }
  if (dy > 90 && Math.abs(dx) < 40) closeViewer();
}, { passive: true });

// ── HOLD TO PAUSE ──
let _holdT = null;
vScr.addEventListener('touchstart', e => {
  if (e.target.closest('.vwa,.vw-follow,.vw-close,.vw-cta')) return;
  _holdT = setTimeout(stopTimer, 180);
}, { passive: true });
vScr.addEventListener('touchend', () => {
  if (_holdT) { clearTimeout(_holdT); _holdT = null; }
  const g = S.vGroups[S.gi];
  if (g && !S.vTimer) startTimer(g.stories.length);
}, { passive: true });

// ── RUN ──
boot();
</script>
</body>
</html>
